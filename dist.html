, "url": null, "content": "(j) Стержень разломан в двух наугад выбранных точках. Какова вероятность того, что из образовавшихся трех стержней можно составить треугольник?"}, {"index": 7, "url": null, "content": "(j) В 14:00 Аня пришла в столовую и встала в очередь. В 14:02 Аня поняла, что за ней всё ещё никто не стоит, и залипла в телефон. В 14:10 Аня подняла голову и увидела, что в очереди за ней стоит Варя, а за ней Таня, которая пришла позже. Найдите вероятность того, что к 14:10 Таня стояла в очереди не более 4 минут. Время появления Тани и Вари в столовой распределено равномерно на допустимом промежутке. В качестве ответа введите правильную несократимую дробь, например: 1/2."}, {"index": 8, "url": null, "content": "(m) На отрезке [0, 1] в точках x, y, независимо выбранных из равномерного распределения, находится два детектора элементарных частиц. Детектор засекает частицу, если она пролетает на расстоянии не более \\(\\frac{1}{3}\\) от него. Известно, что поля восприятия детекторов покрывают весь отрезок. С какой вероятностью \\(y > \\frac{5}{6}\\)?"}, {"index": 9, "url": null, "content": "(m) На окружности выбираются а) 4 б) n случайных точки. С какой вероятностью центр окружности лежит внутри треугольника с вершинами в этих точках?"}, {"index": 10, "url": null, "content": "(s) Вася поставил учиться две нейронные сети, каждую на своём GPU, и отправился спать. Времена обучения сетей независимы и равномерно распределены на отрезке [1, 3]. Через время t сервер упал и оказалось, что лишь одна сеть успела доучиться. С какой вероятностью \\(t < \\frac{3}{2}\\)? Считайте, что время падения сервера тоже равномерно распределено на отрезке [1, 3]."}, {"index": 11, "url": null, "content": "(s) Саньцзегунь - китайский трёхсекционный боевой цеп. Представляет собой три последовательно соединённые верёвкой или цепью деревянные (реже - металлические) палки. Аня взяла саньцзегунь, состоящий из трёх палок одинакового размера, и бросила его на землю. Какова вероятность того, что крайние палки пересекаются? Считайте, что саньцзегунь представляет собой ломаную из трёх звеньев, а всевозможные углы, которые могут образовать крайние звенья со средним, равновероятны. В качестве ответа введите несократимую дробь, например: 1/2."}, {"index": 12, "url": null, "content": "(s) Из равномерного распределения на отрезке [0, 1] независимо выбираются две точки x и y. При каких числах a события \\(\\max(1 - 2x, y) < a\\) и \\(\\max(1 - 2y, x) < a\\) независимы?"}, {"index": 13, "url": null, "content": "(s) Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины равномерно распределённые на отрезке [0, 1], а t — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}, {"index": 14, "url": null, "content": "(s) Какой толщины должна быть монета, чтобы шанс, что она упадет на ребро, был равен 1/3?"}]}, {"id": "mathematics/probability/[17] 25-12-02 (5.1) Дискретные случайные величины", "name": "[17] 25-12-02 (5.1) Дискретные случайные величины", "problems": [{"index": 0, "url": null, "content": "(j) Найдите математическое ожидание, дисперсию, моду, медиану самых популярных\nдискретных распределений:\n    а) Биноминального\n    б) Пуассона\n    в) Бернулли\n    д) Равномерного\n    г) Геометрического"}, {"index": 1, "url": null, "content": "(j) Бросают два n-гранных кубика. Какова вероятность того, что суммарно выпадет\n\\(k \\in [2, 2n]\\) очков?"}, {"index": 2, "url": null, "content": "(j) Случайная величина \\(\\zeta\\) распределена равномерно на множестве \\(\\{-1, 0, 1\\}\\). Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = 1 - \\zeta^{1000}\\) и \\(\\eta = 1 - \\zeta^{1001}\\)"}, {"index": 3, "url": null, "content": "(m) У игрока есть k советский рублей. Каждый раунд с вероятностью p игрок получает\n1 советский рубль, либо с вероятностью 1−p теряет 1 советский рубль. Игра заканчивается,\nкак только у игрока останется 0 советский рублей или станет не меньше 6 советский\nрублей. Каково матожидание количества раундов игры при k = 2 и p = 0.75?"}, {"index": 4, "url": null, "content": "(m) В далёком созвездии Тау-Кита на каждой половинке костяшки домино стоит от 0\nдо N точек, причём для каждой пары чисел (a, b) таких, что a и b целые от 0 до N, существует ровно одна доминошка, содержащая оба этих числа. Космический турист прилетел\nи выбрал наугад перевёрнутую костяшку. При каком N математическое ожидание модуля\nразности количеств точек на одной и на другой половине этой доминошки будет равно 2?"}, {"index": 5, "url": null, "content": "(m) Вероятность прихода в бюро k человек равнf \\(\\lambda^k e^{-\\lambda}/k!\\). Вероятность получения\nотказа – p. Найти вероятность ровно m отказов."}, {"index": 6, "url": null, "content": "(m) Пусть n стремится к бесконечности и \\(p_n\\) стремится к нулю, так что \\(np_n \\to \\lambda > 0\\).\nДокажите, что для любого k > 0 вероятность получить k успехов в n испытаниях схемы\nБернулли с вероятностью \\(p_n\\) стремится к величине \\(\\lambda^k e^{-\\lambda}/k!\\)"}, {"index": 7, "url": null, "content": "(m) Пусть задана последовательность независимых одинаково распределенных случайных величин \\(\\xi_n\\) имеющих геометрическое распределение, т.е. \\(P(\\xi_n = k) = p(1-p)^{k-1}\\).\nНайдите распределение случайных величин \\(\\tau = \\min\\{n \\geq 1 : \\xi_n > 1\\}\\) и \\(\\xi_\\tau\\), вычислите\n\\(M[\\tau], M[\\xi_\\tau]\\)."}, {"index": 8, "url": null, "content": "(m) Пусть задана последовательность независимых одинаково распределенных случайных величин \\(\\xi_n\\) имеющих равномерное распределение на отрезке [0;1]. Пусть \\(\\tau\\) - номер\nчлена, с которого последовательность начала убывать. Найдите математическое ожидание\n\\(\\tau\\)."}, {"index": 9, "url": null, "content": "(m) У студента ШАДа дома восемь пар носков разных цветов (при этом носки из одной\nпары одного цвета). В течение восьми дней он каждый день случайным образом достает\nдва носка (не обязательно из одной пары) и потом не возвращает их обратно. Найдите\nматематическое ожидание числа дней, в которые были выбраны два носка одного цвета."}, {"index": 10, "url": null, "content": "(s) Доказать, что \\(\\xi\\) геометрически распределенная случайная величина тогда и только\nтогда, когда \\(P(\\xi = n + k|\\xi \\geq k) = P(\\xi = n)\\)"}, {"index": 11, "url": null, "content": "(s) На игровой рулетке n секторов с числами \\(1, 2, \\ldots, n\\). Сколько в среднем раз нужно\nпрокрутить барабан, чтобы сумма выпавших очков стала не меньше n"}, {"index": 12, "url": null, "content": "(s) Робот движется по клеткам бесконечной шахматной доски. Один его шаг - это\nперемещение на случайную из восьми соседних клеток. Найдите математическое ожидание\nи дисперсию разности и модуля разности между количеством черных и количеством белых\nклеток, на которых робот побывал за n шагов (каждая клетка считается столько раз,\nсколько на ней побывал робот). Ответ представьте в виде компактного выражения."}]}, {"id": "mathematics/probability/[17] 25-12-02 (5.2) Метод индикаторов", "name": "[17] 25-12-02 (5.2) Метод индикаторов", "problems": [{"index": 0, "url": null, "content": "(j) Бросают четыре игральные кости. Найдите математическое ожидание и дисперсию\nчисла выпавших очков."}, {"index": 1, "url": null, "content": "(j) В колоде 20 карт, на каждой - номер \\(0, \\ldots, 19\\), все номера различные. Вынули\n5 карт, найти математическое ожидание и дисперсию суммы цифр на вынутых картах."}, {"index": 2, "url": null, "content": "(j) В комнате n ящиков, в каждом лежит по одному подарку. По очереди в комнату\nзаходит m детей, каждый из которых случайным образом выбирает ящик и забирает\nоттуда подарок, если таковой там ещё есть. Сколько в среднем детей уйдут без подарка?\nНайти также дисперсию количество детей без подарка.\nP.S. В нашей стране ответ 0 !"}, {"index": 3, "url": null, "content": "(j) Пусть \\(X_1, \\ldots, X_n\\) - независимые одинаково распределенные случайные величины с\nматематическим ожиданием a и дисперсией \\(\\sigma^2\\), принимающие положительные значения.\nПусть \\(\\xi_k = \\frac{X_k}{X_1 + \\ldots + X_n}\\) Найдите коэффициент корреляции между \\(\\xi_i\\) и \\(\\xi_j\\)."}, {"index": 4, "url": null, "content": "(m) В группе первокурсников ШАДа n ребят и они видят друг друга впервые. А\nв парке аттракционов сегодня дают скидку, если приходит компания ровно из k друзей,\nсреди которых каждый дружит с каждым. Дружба между любой парой однокурсников\nнезависимо возникает с вероятностью p. Макс, один из первокурсников, хочет пойти на\nаттракционы со скидкой. Каким в среднем количеством способов он может это сделать?"}, {"index": 5, "url": null, "content": "(m) Две хоккейные команды одинаковой силы договрились, что будут играть до тех\nпор, пока суммарный счёт не достигнет 2n. Найдите математическое ожидание и дисперсию числа моментов, когда наступала ничья"}, {"index": 6, "url": null, "content": "(m) Последовательность состоит из k нулей и m единиц, расположенных в случайном\nпорядке. Разобьём последовательность на чередующиеся группы нулей и единиц (группа\n– участок, состоящий из всех одинаковых цифр, стоящих подряд) Общее число групп –\nслучайная величина. Найдите ее математическое ожидание и дисперсию."}, {"index": 7, "url": null, "content": "(m) За круглым столом сидят n (n > 4) человек. Все они, независимо друг от друга,\nслучайно (с вероятностью 1/2) выбирают кого-то из своих соседей.\n    Найти:\n    а) среднее количество людей, которых никто не выбрал;\n    б) дисперсию этого количества."}, {"index": 8, "url": null, "content": "(m) Неразборчивый жених женится на первой желающей выйти за него замуж, а потом, как только встретит более привлекательную партию, оформляет развод и заключает\nновый брак. Потенциальные n невест (женщин, не возражающих против брака с ним)\nмогут быть строго ранжированы по своей привлекательности, но встречаются жениху в\nслучайном порядке, все их перестановки равновероятны. Хватит ли в среднем места в\nпаспорте для всех штампов о браках и разводах, если n = 50, а паспорт вмещает\nвсего 5 штампов о браках (вместе с 4 штампами о разводах)?"}, {"index": 9, "url": null, "content": "(m) Крокодила Гена и старуха Шапокляк купили десятигранный кубик и играют в\nигру по следующим правилам:\n    • Первый ход делает старуха Шапокляк.\n    • В свой ход она бросает кубик; если выпадает число от 8 до 10, то право хода остаётся\n    за ней, а иначе ход переходит к крокодилу Гене.\n    • Крокодил Гена в свой ход бросает кубик; если выпадает число от 1 до 8, то ход\n    переходит к старухе Шапокляк, а иначе ход остаётся за ним. Известно, что игру прервали\n    сразу после 91 хода Гены. Пусть \\(\\xi\\)- количество ходов, сделанных Шапокляк. Найдите\n    дисперсию \\(\\xi\\)."}, {"index": 10, "url": null, "content": "(m) По квадратной решетке размера \\(k \\times l\\) паук шагает из точки А в точку В, выбирая\nнаугад любой из путей длины \\(k + l\\). Найдите математическое ожидание и дисперсию числа\nповоротов на его пути в узлах решетки."}, {"index": 11, "url": null, "content": "(s) Благородные девицы пошли в театр. Девиц всего n, и билеты у всех на один ряд,\nв котором ровно n кресел. Если девице, чтобы занять своё место, нужно пройти мимо уже\nсидящей девицы, то последняя должна вежливо встать, чтобы пропустить подругу.\n    а) Найдите математическое ожидание и дисперсию числа вставаний.\n    б) Найдите математическое ожидание и дисперсию числа тех, кому не придётся встать\n    ни разу.\n    Считайте, что они заходят в ряд с n-го кресла."}, {"index": 12, "url": null, "content": "(s) Пусть A и B - две случайных булевых матрицы \\(n \\times n\\), у которых каждый элемент\nравен 1 с вероятностью p (значения различных элементов не зависят друг от друга). Найдите математическое ожидание и дисперсию единиц, которые будут в их произведении,\nесли сложение и умножение происходит по модулю 2."}]}, {"id": "mathematics/probability/[20] 25-12-08 (5.1) Непрерывное распределение", "name": "[20] 25-12-08 (5.1) Непрерывное распределение", "problems": [{"index": 0, "url": null, "content": "(j) Используя теоретико-вероятностные соображения, вычислите интегралы:\n    а) \\(\\int_0^{\\infty} e^{-\\frac{x^2}{3}}\\) б) \\(\\int_0^{\\infty} e^{-x^2+4x-1}\\)"}, {"index": 1, "url": null, "content": "(j) Докажите, что если \\(\\xi\\) распредлена по Коши, то \\(\\eta = \\frac{1}{\\xi}\\) тоже распределена по Коши."}, {"index": 2, "url": null, "content": "(j) Привести пример плотности распределения (непрерывной) случайной величины \\(\\xi\\) и\nнепрерывной функции g, таких что \\(\\eta = g(\\xi)\\) имеет:\n    - дискретное распределение,\n    - невырожденное дискретное распределение"}, {"index": 3, "url": null, "content": "(j) Случайные величины \\(\\xi\\) и \\(\\eta\\) независимы, причем \\(\\xi\\) равномерно распределена на\nотрезке [0, 1], а \\(\\eta\\) - Бернуллиевская случайная величина с вероятностью успеха p. Найдите\nплотность распределения случайной величины \\(\\xi + \\eta\\)."}, {"index": 4, "url": null, "content": "(j) Прямой убыток от пожара в миллионах рублей равномерно распределен на [0; 1].\nЕсли убыток оказывается больше 0.7, то страховая компания выплачивает компенсацию\n0.7.\n    а) Найдите функцию распределения потерь от пожара.\n    б) Чему равны средние потери?"}, {"index": 5, "url": null, "content": "(j) Может ли функция плотности принимать значение больше 2023? Может ли предел\n\\(\\lim_{x \\to \\infty} f(x)\\) не равняться нулю?"}]}, {"id": "mathematics/probability/[20] 25-12-08 (5.2) Математическое ожидание", "name": "[20] 25-12-08 (5.2) Математическое ожидание", "problems": [{"index": 0, "url": null, "content": "(j) Найдите математическое ожидание, дисперсию, моду, медиану самых популярных непрерывных распределений:\n   а) равномерного на отрезке \\([a; b]\\)\n   б) экспонециального\n   в) нормального\n   г) логнормального"}, {"index": 1, "url": null, "content": "(j) Пусть функция распределения случайной величины \\(\\xi\\) равна:\n\n\\[\nF(x) = \\begin{cases} 0, & x < 0 \\\\ \\frac{x+1}{4}, & x \\in [0, 1) \\\\ \\frac{x^2+2}{4}, & x \\in [1, \\sqrt{2}) \\\\ 1, & x \\geq \\sqrt{2} \\end{cases}\n\\]\n\nВычислите \\(Ee^{\\xi}\\)"}, {"index": 2, "url": null, "content": "(j) Что можно сказать про случайную величину с нулевой дисперсией?"}, {"index": 3, "url": null, "content": "(j) Пусть \\(M[\\xi] = 0\\). Доказать, что \\(M[\\xi] \\leq \\frac{1}{2}(D[\\xi] + 1)\\)"}, {"index": 4, "url": null, "content": "(j) Пусть есть \\(\\xi_1, \\ldots, \\xi_n\\) \\(i.i.d\\) равномерно на отрезке \\([0;1]\\).\n   Найдите математическое ожидание\n   а) \\(\\xi_{(n)}\\)\n   б) \\(\\xi_{(1)}\\)\n   в) \\(\\xi_{(k)}\\)"}, {"index": 5, "url": null, "content": "(j) В прямоугольнике \\(ABCD\\) единичной площади выбираем точку \\(M\\). Найти математическое ожидание площади треугольника \\(ABM\\)."}, {"index": 6, "url": null, "content": "(j) Пусть \\(X\\) распределена показательно с показателем 1. Найти математическое ожидание и дисперсию\n   а) \\([X]\\) (целая часть)\n   б) \\(\\{X\\}\\) (нецелая часть)"}, {"index": 7, "url": null, "content": "(m) Найдите наибольшее значение \\(M|X - C|\\) и значение , в котором оно достигается, где \\(X\\) распределена экспоненциально"}, {"index": 8, "url": null, "content": "(m) У положительной случайной величины \\(\\xi\\) сущесвует математическое ожидание \\(M[\\xi]\\). Докажите, что \\(1 \\leq M[\\xi]M\\left[\\frac{1}{\\xi}\\right]\\)"}, {"index": 9, "url": null, "content": "(m) Доказать, что коефициент корреляции между случайными величинами \\(\\xi\\) и \\(\\eta\\) равен единицы тогда и только тогда, когда \\(\\eta = a\\xi + b\\)"}, {"index": 10, "url": null, "content": "(m) Пусть случайная величина \\(\\xi\\) имеет \\(M[|\\xi|]\\). Докажите, что для любого \\(\\epsilon > 0\\) верно \\(P(|\\xi| \\geq \\epsilon) \\leq \\frac{M|\\xi|}{\\epsilon}\\)"}, {"index": 11, "url": null, "content": "(s) На плоскости нарисована ломаная с n звеньями. Длина каждого звена равна 1, ориентированный угол между соседними звеньями с равной вероятностью равен \\(\\alpha\\) или \\(-\\alpha\\). Найдите математическое ожидание квадрата расстояния от ее начальной точки до конечной."}, {"index": 12, "url": null, "content": "(s) Пусть \\(\\xi\\) - строго положительная случайная величина, причем её дисперсия существует и не превосходит 2. Верно ли, что \\(\\mathbf{P}(\\mathbf{E}(\\xi) - 2 \\leq \\xi \\leq 2\\mathbf{E}(\\xi) + 1) \\geq \\frac{1}{2}\\)?"}]}, {"id": "mathematics/probability/[20] 25-12-08 (5.3) Многомерное распредление", "name": "[20] 25-12-08 (5.3) Многомерное распредление", "problems": [{"index": 0, "url": null, "content": "(j) Рассмотрим единичный шар s в 15-мерном пространстве. Необходимо найти минимальное число n такое, что вероятность события \"Все n случайных равномерно распределенных в s точек, выбранных независимо друг от друга, расположены на расстоянии не менее 0.5 от центра шара.\"не превосходит 0.6."}, {"index": 1, "url": null, "content": "(j) Предположим, что случайная величина \\(\\xi\\) имеет симметричное распределение, т.е. \\(P(\\xi = x) = P(\\xi = -x)\\), а случайная величина \\(\\eta\\) принимает значения 1 и \\(-1\\) с вероятностью 1/2. Докажите, что случайные величины \\(\\xi\\) и \\(\\xi\\eta\\) имеют одинаковое распределение."}, {"index": 2, "url": null, "content": "(j) Случайные величины \\(X, Y, Z, W\\) независимы в совокупности и одинаково распределены: каждая принимает значения 1 и \\(-1\\) с вероятностью 1/2. Являются ли независимыми в совокупности следующие наборы случайных величин:\n   - \\(XYZ, XYW, XW\\)\n   - \\(XY, XYW, XW, XZW\\)"}, {"index": 3, "url": null, "content": "(j) \\(P(x = a) = \\lambda, P(\\max(x, y) = a) = \\mu, P(\\min(x, y) = a) = \\nu\\)\n   \\(P(y = a) =\\) ?"}, {"index": 4, "url": null, "content": "(j) Есть ли такие 2 случайные величины, что их сумма распределена равномерно?\n   а) если равномерное имеется в виду дискретное\n   б) если равномерное имеется в виду непрерывное\n   в) те же вопросы для независимых"}, {"index": 5, "url": null, "content": "(j) Есть ли такие 2 непрерывные случайные величины, что их сумма распределена равномерно?\n   а) если равномерное имеется в виду дискретное\n   б) если равномерное имеется в виду непрерывное\n   в) те же вопросы для независимых"}, {"index": 6, "url": null, "content": "(j) Привести пример двух случайных величин \\(\\xi\\) и \\(\\eta\\), имеющих одну и ту же функцию распределения \\((F_\\xi = F_\\eta)\\), но таких, что \\(P(\\xi \\neq \\eta) > 0\\)."}, {"index": 7, "url": null, "content": "(j) Пусть \\(\\xi, \\eta\\) и \\(\\zeta\\) - случайные величины, причем функции распределения величин и совпадают. Верно ли, что тогда функции распределения величин \\(\\xi\\zeta\\) и \\(\\eta\\zeta\\) совпадают?"}, {"index": 8, "url": null, "content": "(m) Две случайные величины имеют какое-то распределение на отрезке [-1, 1] какова их максимальная ковариация?"}, {"index": 9, "url": null, "content": "(j) Пусть \\(\\xi\\) и \\(\\eta\\) независимые случайные величины, распределенные равномерно на отрезке \\([0; a]\\). Найдите распределение\n   а) \\(\\xi\\eta\\)\n   б) \\(\\frac{\\eta}{\\xi}\\)"}, {"index": 10, "url": null, "content": "(j) Показать, что случайная величина \\(\\xi\\) не зависит от самой себя (т.е. \\(\\xi\\) и \\(\\xi\\) независимы) в том и только том случае, когда \\(\\xi = const\\)."}, {"index": 11, "url": null, "content": "(j) Привести пример двух \\(\\xi\\) и \\(\\eta\\) зависимых случайных величин и таких, что \\(\\xi^2\\) и \\(\\eta^2\\) независимы."}, {"index": 12, "url": null, "content": "(j) Пусть \\(\\xi\\) и \\(\\eta\\) независимые случайные величины, распределенные как \\(N(0; 1)\\) (стандартное нормальное распределение. Найдите распределение двумя свособами (по определению и сначала через функциональное преобразование плотности)\n   а) \\(\\sqrt{\\xi^2 + \\eta^2}\\)\n   б) \\(\\xi\\eta\\)"}, {"index": 13, "url": null, "content": "(j) Пусть вектор \\((X, Y)\\) имеет равномерное распределение на треугольнике с вершинами \\(A = (0,0)\\), \\(B = (2,0)\\) и \\(C = (1,1)\\). Найдите функции распределения и плотности случайных величин \\(X\\) и \\(Y\\). Являются ли эти случайные величины независимыми?"}, {"index": 14, "url": null, "content": "(j) Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = \\sin X\\) и \\(\\eta = \\cos X\\), если известно, что \\(X\\) случайная величина, распределенная равномерно на интервале \\((0; 2\\pi)\\)."}, {"index": 15, "url": null, "content": "(m) Пусть \\((\\zeta, \\nu)\\) — координаты случайной точки, имеющей равномерное распределение в области \\(D = \\{x + y \\leq 1, \\quad x \\geq 0, \\quad y \\geq 0\\}\\) Докажите, что коэффициент корреляции между \\(\\zeta\\) и \\(\\nu\\) отрицательный."}, {"index": 16, "url": null, "content": "(m) Пусть заданы две независимые случайные величины \\(X\\) и \\(Y\\), имеющие экспоненциальные распределения с параметрами \\(\\mu = 1\\) и \\(\\lambda = 2\\) соответственно. Найдите дисперсию величины \\(T\\), где:\n\n\\[\nT = \\begin{cases} 1, X > Y \\\\ 0, X \\leq Y \\end{cases}\n\\]"}, {"index": 17, "url": null, "content": "(m) Случайные величины \\(X\\) и \\(Y\\) независимы. Плотность случайной величины \\(X\\) равна \\(p_X(t) = \\frac{t}{2} I_{[0,2]}(t)\\) (где \\(I_{[0,2]}(t)\\) — индикаторная функция отрезка \\([0, 2]\\)), а \\(Y\\) имеет равномерное распределение на отрезке \\([0, 3]\\). Найдите вероятность того, что из отрезков с длинами \\(X\\), \\(Y\\) и 1 можно составить треугольник."}, {"index": 18, "url": null, "content": "(j) Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют экспоненциальное распределение с параметром 1. Найдите плотность распределения случайного вектора \\((\\xi, \\xi + \\eta)\\)."}, {"index": 19, "url": null, "content": "(m) Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора\n   \\((\\sqrt{-2\\ln\\xi}\\cos(\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\eta))\\)"}, {"index": 20, "url": null, "content": "(m) Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора\n   \\((\\sqrt{-2\\ln\\xi}\\cos(\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\pi\\eta))\\)"}, {"index": 21, "url": null, "content": "(m) Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора\n   \\((\\sqrt{-2\\ln\\xi}\\cos(2\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(2\\pi\\eta))\\)"}, {"index": 22, "url": null, "content": "(m) Пусть \\(\\xi_1, \\ldots, \\xi_n\\) - последовательность независимых случайных величин, равномерно распределенных на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\xi(1), \\xi(n))\\), где \\(\\xi(1) = \\min(\\xi_1, \\ldots, \\xi_n)\\), а \\(\\xi(n) = \\max(\\xi_1, \\ldots, \\xi_n)\\)."}, {"index": 23, "url": null, "content": "(s) Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины равномерно распределённые на отрезке \\([0, 1]\\), а \\(t\\) — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}]}, {"id": "mathematics/probability/[26] 25-12-24 (5.1) Условное распределение 102 (Многомерное распределение)", "name": "[26] 25-12-24 (5.1) Условное распределение 102 (Многомерное распределение)", "problems": [{"index": 0, "url": null, "content": "(m) Доказать, что если совместная плотность вероятности \\(f(x_1, x_2, \\ldots, x_n)\\) величин \\(\\xi_1, \\ldots, \\xi_n\\) представима в виде \\(f(x_1, x_2, x_n) = g_1(x_1)g_2(x_2)\\ldots g_n(x_n)\\), где \\(g_1(x_1) > 0, i = 1, 2, \\ldots, n\\), то функции \\(g(x_1), g(x_2), \\ldots, g_n(x_n)\\) с точностью до нормирующих множителей служат частными плотностями вероятности случайных величин \\(\\xi_1, \\ldots, \\xi_n\\) соответственно, причем величины эти являются независимыми."}, {"index": 1, "url": null, "content": "(m) Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы имеют рановомерное распределение на отрезке \\([0;1]\\). Построим \\(\\eta_1 = \\xi_{(1)}, \\eta_2 = \\xi_{(2)} - \\xi_{(1)}, \\ldots, \\eta_n = \\xi_{(n)} - \\xi_{(n-1)}\\).\n   1) Найти совместную плотность \\(\\eta_1, \\ldots, \\eta_n\\)\n   2) Найти плотность каждого \\(\\eta_i\\)\n   3) Будут ли случайные величины \\(\\eta\\) независимы?"}, {"index": 2, "url": null, "content": "(m) Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы и имеют одно и то же показательное распределение с параметром Доказать, что случайные величины \\(max\\{\\xi_1, \\xi_2, .., \\xi_n\\}\\) и \\(\\xi_1 + \\xi_2/2 + \\ldots + \\xi_n/n\\) Одинаково распределены."}]}, {"id": "mathematics/probability/[26] 25-12-24 (5.2) Условное распределение 102 (Дискретное условное математическое ожидание)", "name": "[26] 25-12-24 (5.2) Условное распределение 102 (Дискретное условное математическое ожидание)", "problems": [{"index": 0, "url": null, "content": "(j) Есть три башни, расположенные в углах правильного треугольника. На первой сидит дракон. Дракон перелетает равновероятно в каждый момент времени на одну из соседних башен. Найти математическое ожидание числа перелётов, после которых он вернётся на исходную башню."}, {"index": 1, "url": null, "content": "(j) У нас есть две урны. Вы не можете отличить их друг от друга снаружи, но у одной урны четыре фишки по 1 доллару и шесть фишек по 10 долларов, а у другой урны три фишки по 1 доллару и семь фишек по 10 долларов. Вы случайным образом вытаскиваете фишку из одной урны, и это оказывается фишка в 1 доллар. Затем, не возвращая вынятую вами фишку, я предлагаю вам второй раз вытянуть и сохранить фишку из любой урны. Должны ли вы брать из той же урны, что и в первый раз или же лучше поменять свой выбор и на этот раз брать из другой урны? Каково ожидаемое значение фишки, которую вы берете? Почему?"}, {"index": 2, "url": null, "content": "(j) Кость \\(d_6\\) бросают до выпадения 6. Найжите среднее количесвто выпавших нечетных чисел."}, {"index": 3, "url": null, "content": "(j) Бросают нечестную монету до выпадения последовательности\n   а) РР\n   б) РРО\n   в) РРОР\n   г) РРО или ООР\n   найдите скольок в среднем будет ходов в этой игре."}, {"index": 4, "url": null, "content": "(m)\n   (a) Игроки \\(A\\), \\(B\\) и \\(C\\) сменяя друг друга, по очереди кидают две игральные кости до тех пор пока не получат сумму очков, равную 7. Найдите сколько в среднем ходов сделает \\(B\\).\n\n   (b) В результате проведения эксперимента возможны два исхода: успех (с вероятностью \\(p\\)) и неуспех (с вероятностью \\(1p\\)). Экспериментаторы \\(A\\), \\(B\\) и \\(C\\) сменяя друг друга, по очереди проводят этот эксперимент до тех пор пока не получат успех. Найдите максимальное значение вероятности \\(p\\), при котором математическое ожидание количества ходов \\(B\\) больше или равно математическому ожиданию ходов , математическому ожиданию ходов\n."}, {"index": 5, "url": null, "content": "(m) Игрок решил сыграть в напёрстки со ставкой 1 рубль, а выиграть он может 2 рубля. Изначально у него есть 10 рублей, а получить в итоге он хочет 1000 рублей. Через сколько в среднем раундов игна закончится? Как изменится ответ, если игрок каждый раз будет идти ва-банк (ставить все, что у него есть на данный момент)?"}, {"index": 6, "url": null, "content": "(m) Аня решает задачи по математике и дает правильный ответ на задачу с вероятностью 0,8. У Ани есть только одна попытка чтобы дать ответ на задачу. Маша дала Ане 15 задач и за каждый неправильный ответ дает ей ещё 2 задачи. Аня решает задачи, пока они не кончатся. Найдите математическое ожидание количества задач, которые Маша суммарно даст Ане."}, {"index": 7, "url": null, "content": "(m) Докажите, что если \\(\\xi_1, \\xi_2, \\ldots\\) - независимые одинаково распределенные случайные величины с \\(M|\\xi_1| < \\infty\\), а \\(\\nu\\)- не зависимая от них неотрицательная целочисленная случайная величина с \\(M[\\nu] < \\infty\\), то \\(M[\\xi_1 + \\ldots + \\xi_n] = M[\\xi_1]M[\\nu]\\)."}, {"index": 8, "url": null, "content": "(j) Пусть \\(\\xi\\) - минимальное число подбрасываний монеты, при котором хотя бы один раз выпадает герб и хотя бы один раз - решка. Найдите \\(M[\\xi]\\)."}, {"index": 9, "url": null, "content": "(m) Пусть \\(\\xi\\) и \\(\\eta\\) - соответственно число гербов и число решек, выпадающих при бросании ста монет. Найдите:\n   а) коэффициент корреляции случайных величин \\(xi\\) и \\(\\eta\\);\n   б) ковариацию этих величин."}, {"index": 10, "url": null, "content": "(s) Из земли растет ствол случайного дерева. С вероятностью \\(p\\) ствол расходится на две ветки, а с вероятностью \\(1 - p\\) заканчивается грушей. Каждая из этих веток также с вероятностью \\(p\\) расходится на две ветки, а с вероятностью \\(1 - p\\) заканчивается грушей и так далее. Найдите сколько в среднем будет груш на дереве."}]}, {"id": "mathematics/probability/[26] 25-12-24 (5.3) Условное распределение 102 (Непрерывное условное математическое ожидание)", "name": "[26] 25-12-24 (5.3) Условное распределение 102 (Непрерывное условное математическое ожидание)", "problems": [{"index": 0, "url": null, "content": "(j) Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются две точки \\(X\\) и \\(Y\\). Найдите математичсекое ожидание и дисперсию наибольшего отрезка разбияния."}, {"index": 1, "url": null, "content": "(j) Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются три точки \\(X\\), \\(Y\\), \\(Z\\). Используя условное математическое ожидание и дисперсию наибольшего растояние между ними \\(E[max\\{|X - Y|, |Y - Z|, |X - Z|\\}]\\)"}, {"index": 2, "url": null, "content": "(j) Пусть \\(\\sigma\\) - случайная перестановка на \\(n\\) элементах, \\(\\xi\\)- количество неподвижных элементов \\(\\sigma\\), \\(A_i\\) событие означающее, что \\(i\\)-я точка является неподвижной. Найдите значение условного матожидания \\(E[\\xi|I\\{A_i\\} = x]\\) при всех возможных значениях \\(x\\)."}, {"index": 3, "url": null, "content": "(j) Студент готовится к экзамену ровно час. В начале он кидает правильную монетку. Если выпадает орел, то готовится пол часа и завершает подготовку. Если выпадает решка, то после этого равномерно на отрезке \\([0;1]\\) выбирает число \\(x\\) и готовится \\(x\\) часов и далее еще раз кидает монетку. Если при втором бросании выпадает орел, то студент делает усилие и проводит за подготовкой целый час до конца, если же решка, то прекращает подготовку. Найдите функцию распределения времени подготовки студента и найдите ее математической ожидание."}, {"index": 4, "url": null, "content": "(j) Число пользователей, посещающих Авито с 12.00 до 13.00 является пуассоновской величиной с параметром \\(\\lambda = 100\\). С вероятностью \\(p = 0.15\\) каждый пользователь, независимо от остальных, совершает покупку. Сколько в среднем пользователей совершает покупку в течение этого часа?"}, {"index": 5, "url": null, "content": "(m) Пусть \\(X_1, X_2, Y_1, Y_2\\) - независимые случайные величины, распределенные экспоненциально с параметрами \\(\\lambda_1, \\lambda_2, \\mu_1, \\mu_2\\) соответственно. Найдите \\(E(\\max(X_1 + Y_1, X_2 + Y_2))\\)"}, {"index": 6, "url": null, "content": "(m) Случайные величины \\(X\\) и \\(Y\\) независимы и экспоненциально распределены, \\(X\\) — с параметром \\(\\lambda = 1\\), а \\(Y\\) — с параметром \\(\\lambda = 2\\). Пусть \\(Z = \\max(X, Y)\\). Найти математическое ожидание случайной величины \\(Z\\)."}, {"index": 7, "url": null, "content": "(m) Отрезок \\([0, 1]\\) разбит двумя случайными точками на три части. Найдите математическое ожидание длины меньшей из частей."}, {"index": 8, "url": null, "content": "(s) Пусть \\(\\xi_1\\) и \\(\\xi_2\\) независимые случайные величины, обе распределенные равномерно на интервале \\((0;1)\\). Рассмотрим \\(\\eta_1 = min(\\xi_1, \\xi_2)\\) и \\(\\eta_2 = max(\\xi_1, \\xi_2)\\).\n   1) Докажите, что \\(M\\left[\\frac{\\eta_1}{\\eta_2}\\right] = \\frac{M[\\eta_1]}{M[\\eta_2]} = \\frac{1}{2}\\)\n   2) Найдите \\(cov(\\eta_1; \\eta_2)\\)"}, {"index": 9, "url": null, "content": "(m) Случайная величина \\(X\\) имеет симметричное треугольное распределение на отрезке \\([-2, 2]\\), а условное распределение \\(Y|X\\) задаётся следующим образом:\n   \\(Y|X\\) распределено равномерно на отрезке \\([0; |X|]\\) при \\(X < 1\\)\n   и \\(Y|X\\) распределно как \\(N(3, X) X > 1\\)\n   (нормальное распределение со средним 3 и дисперсией \\(X\\)) Найдите матожидание \\(Y\\)."}, {"index": 10, "url": null, "content": "(s) Пусть задана последовательность независимых случайных величин \\(\\xi_n\\), каждая из которых имеет экспоненциальное распределение с параметром \\(n + 1\\). Пусть случайная величина \\(\\eta\\) имеет распределение Пуассона с параметром \\(\\lambda\\) и независима с величинами \\(\\xi_1, \\ldots, \\xi_n, \\ldots\\)\n   а) найдите такую случайную величину \\(\\xi\\) (или докажите что такой не сущесвует), что \\(\\xi\\) зависит от \\(\\xi_1, \\ldots, \\xi_n\\) (может от чего еще) и ее ковариация с \\(\\eta\\) НЕ равна нулю.\n   б) вычислите \\(E\\xi\\eta\\). раг"}, {"index": 11, "url": null, "content": "(s) Известно, что случайный вектор \\((X, Y)\\) распределён нормально:\n\n\\[(X, Y) \\sim N\\left(\\begin{pmatrix}1\\\\2\\end{pmatrix}, \\begin{pmatrix}1 & 1\\\\1 & 2\\end{pmatrix}\\right)\\]\n\n   Найдите измеримую функцию \\(g(x)\\) минимизирующую математическое ожидание \\(E(24Y^4 + (g(X))^2 + 2g(X)Y^2 + 4)\\)"}, {"index": 12, "url": null, "content": "(s) На параллелограмм со сторонами \\(a\\) и \\(b\\) случайно кидаются две точки. Найдите математическое ожидание квадрата расстояния между ними."}]}, {"id": "mathematics/probability/[26] 25-12-24 (5.4) Условное распределение 102 (Условное распредление)", "name": "[26] 25-12-24 (5.4) Условное распределение 102 (Условное распредление)", "problems": [{"index": 0, "url": null, "content": "(j) Точки \\(\\xi_1, \\ldots, \\xi_n\\) независимы и имеют равномерное распределение на окружности единичной длины. Найти вероятность того, что длина наименьшей дуги, содержащей все эти точки, не больше \\(1/2\\)."}, {"index": 1, "url": null, "content": "(j) На границу курга единичного радиуса бросают три точки \\(\\xi_1, \\xi_2, \\xi_3\\). Затем уже во внтуренность круга случайно бросают точку \\(X\\). Найдите вероятность, что точка \\(X\\) попала в треугольник, образованный точками \\(\\xi_1, \\xi_2, \\xi_3\\)."}, {"index": 2, "url": null, "content": "(j) В квадрат со стороной 5 случайным образом бросают прямоугольник таким образом, что его стороны параллельны сторонам квадрата. Каждый прямоугольник задаётся 2-мя парами точек, все 4 точки задаются независимо из равномерного распределения на отрезке \\([0; 5]\\). Каждая пара точек отвечает проекции прямоугольника на соответствующую ось. Найдите вероятность события \\(S\\), состоящего в том, что после 5 бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные."}, {"index": 3, "url": null, "content": "(m) В квадрат со стороной 5 случайным образом бросают прямоугольник таким образом, что его стороны параллельны сторонам квадрата (вероятность выпадания данного прямоугольника равна отношению его площади к площади квадрата). Найдите вероятность события \\(S\\), состоящего в том, что после 5 бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные."}, {"index": 4, "url": null, "content": "(m) (Формула полной вероятности) В 1) квадрате со стороной 1, 2) окружности радиуса 1. Саначала равномерно выбирается точка и проводится вертикальная прямая. Затем в получившемся разбиении выбирается фигура \\(F_1\\) наибольшей площади и снова из нее равномерно выбирают точку, проводят вертикальную прямую и выбирают в фигуре \\(F_1\\) фигуру наибольшей площади \\(F_2\\).\n   а) Найдите вероятность того, что площадь фигуры \\(F_2\\) больше \\(1/4\\).\n   б) Найдите ту же вероятность при условии, что каждый раз после выбора точки через нее проводится случайная прямая (необязательно вертикальная)."}, {"index": 5, "url": null, "content": "(s) \\(n\\) случайных чисел из интервала \\((0, 1)\\) являются длинами \\(n\\) отрезков, \\(n > 2\\). Какова вероятность того, что из этих отрезков можно составить \\(n\\)-угольник?"}]}];
