<style>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
    </div>
    <div id="folder-bar"></div>
  </aside>
  <div class="sidebar-resizer" id="sidebar-resizer"></div>
  <div class="main">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('train')">Train</button>
      <button class="nav-tab" onclick="switchView('solved')">Solved (<span id="solved-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('failed')">Failed (<span id="failed-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('buried')">Buried (<span id="buried-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('stats')">Stats</button>
    </div>
    <div id="train-view">
      <div class="header">
        <div class="progress" id="progress">Loading…</div>
        <div class="timer-row">
          <span>⏱</span>
          <input type="number" id="timer-min" min="0" max="99" value="0" title="minutes">
          <span>:</span>
          <input type="number" id="timer-sec" min="0" max="59" value="0" title="seconds">
          <button id="timer-start-btn" onclick="userStartTimer()">Start</button>
          <span id="timer-display"></span>
          <span id="overtime-label"></span>
          <button id="timer-reconfig-btn" onclick="reconfigureTimer()" style="display:none">Reconfigure</button>
        </div>
      </div>
      <hr class="divider">
      <div class="problem-area" id="problem-area">
        <div class="status">Loading problems…</div>
      </div>
      <div class="hint-row" id="hint-row" style="display:none">
        <button class="hint-btn" onclick="showHint()">Show hint</button>
        <div class="hint-path" id="hint-path"></div>
        <button class="hint-btn" id="copy-md-btn" onclick="copyMarkdown()" style="margin-left:auto">Copy markdown</button>
      </div>
      <div id="answer-section" style="display:none">
        <textarea id="answer-text" placeholder="Your answer…" rows="4"></textarea>
        <div id="answer-image-list"></div>
        <div id="answer-drop-zone">Paste or drop images here</div>
      </div>
      <div class="actions" id="actions" style="display:none">
        <button class="btn btn-danger" onclick="failProblem()">Fail ✗</button>
        <button class="btn btn-hard" onclick="markSolved('hard')">Hard</button>
        <button class="btn btn-good" onclick="markSolved('good')">Good</button>
        <button class="btn btn-easy" onclick="markSolved('easy')">Easy</button>
        <button class="btn btn-secondary" onclick="delayProblem()">Delay</button>
        <button class="btn btn-secondary" onclick="buryProblem()">Bury</button>
      </div>
    </div>
    <div id="solved-view" style="display:none"></div>
    <div id="failed-view" style="display:none"></div>
    <div id="buried-view" style="display:none"></div>
    <div id="stats-view" style="display:none"></div>
  </div>
</div>

<script>
let topics = [];
let solved = {};
let failed = {};
let buried = {};
let difficulties = {};
let selectedTopics = new Set();
let collapsedNodes = new Set();
let folderTree = null;
let deck = [];
let deckIdx = 0;
let timerHandle = null;
let timerRemaining = 0;
let timerActive = false;
let answers = {};
let currentImages = [];
let currentView = 'train';
let timeStats = {};
let statsCollapsed = new Set();
let problemStartTime = null;

// ── Folder tree ───────────────────────────────────────────────────────────────

function buildTree(topicIds) {
  const root = { path: null, topicId: null, isLeaf: false, children: {} };
  for (const id of topicIds) {
    let node = root;
    const parts = id.split('/');
    for (let i = 0; i < parts.length; i++) {
      const key = parts[i];
      if (!node.children[key]) {
        node.children[key] = {
          name: key,
          path: parts.slice(0, i + 1).join('/'),
          topicId: null,
          isLeaf: false,
          children: {},
        };
      }
      node = node.children[key];
    }
    node.isLeaf = true;
    node.topicId = id;
  }
  return root;
}

function getLeaves(node) {
  if (node.isLeaf) return [node.topicId];
  return Object.values(node.children).flatMap(getLeaves);
}

function findNode(root, path) {
  let node = root;
  for (const part of path.split('/')) {
    node = node.children[part];
    if (!node) return null;
  }
  return node;
}

function unsolvedInTopic(topicId) {
  const t = topics.find(x => x.id === topicId);
  if (!t) return 0;
  const s = solved[topicId] || new Set();
  return t.problems.filter(p => !s.has(p.index)).length;
}

function renderTreeHtml(node) {
  return Object.values(node.children)
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(child => {
      const leaves = getLeaves(child);
      const selCount = leaves.filter(l => selectedTopics.has(l)).length;
      const checked = selCount === leaves.length;
      const indet = selCount > 0 && selCount < leaves.length;
      const rem = leaves.reduce((n, id) => n + unsolvedInTopic(id), 0);
      const p = escHtml(child.path);
      const isCollapsed = !child.isLeaf && collapsedNodes.has(child.path);
      const arrow = child.isLeaf
        ? `<span class="folder-arrow-spacer"></span>`
        : `<span class="folder-arrow" onclick="event.stopPropagation();toggleCollapse('${p}')">${isCollapsed ? '▶' : '▼'}</span>`;
      const subtree = (!child.isLeaf && !isCollapsed)
        ? `<ul class="folder-subtree">${renderTreeHtml(child)}</ul>` : '';
      let levelBtns = '';
      if (!child.isLeaf) {
        const btnHtml = ['junior', 'middle', 'senior'].map(lv => {
          const matching = leaves.filter(id => id.split('/').includes(lv));
          if (!matching.length) return '';
          const allSel = matching.every(id => selectedTopics.has(id));
          return `<button class="folder-level-btn${allSel ? ' active' : ''}" onclick="event.stopPropagation();selectByLevelInNode('${p}','${lv}')" title="${lv}">${lv[0].toUpperCase()}</button>`;
        }).join('');
        if (btnHtml) levelBtns = `<div class="folder-level-btns">${btnHtml}</div>`;
      }
      return `<li class="folder-node">
  <div class="folder-row" onclick="toggleNode('${p}')">
    ${arrow}<input type="checkbox" ${checked ? 'checked' : ''} data-indet="${indet}"
           onclick="event.stopPropagation();toggleNode('${p}')">
    <span>${escHtml(child.name)}</span>
    ${levelBtns}
    <b class="folder-count">${rem}</b>
  </div>${subtree}</li>`;
    }).join('');
}

function toggleCollapse(path) {
  if (collapsedNodes.has(path)) collapsedNodes.delete(path);
  else collapsedNodes.add(path);
  saveCollapsed();
  renderFolderBar();
}

function saveCollapsed() {
  localStorage.setItem('algo_shad_collapsed', JSON.stringify([...collapsedNodes]));
}

function loadCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_collapsed') || '[]');
    collapsedNodes = new Set(saved);
  } catch { collapsedNodes = new Set(); }
}

function saveStatsCollapsed() {
  localStorage.setItem('algo_shad_stats_collapsed', JSON.stringify([...statsCollapsed]));
}

function loadStatsCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_stats_collapsed') || '[]');
    statsCollapsed = new Set(saved);
  } catch { statsCollapsed = new Set(); }
}

// ── Persistence ───────────────────────────────────────────────────────────────

async function loadSolved() {
  if (window.__TOPICS__) {
    // Static dist.html mode: localStorage is the live store; __SOLVED__ is only a first-run seed
    try {
      const raw = localStorage.getItem('algo_shad_solved');
      if (raw) {
        for (const [k, v] of Object.entries(JSON.parse(raw)))
          solved[k] = new Set(v);
        return;
      }
    } catch {}
    try {
      if (window.__PROGRESS__) {
        for (const [topicId, entries] of Object.entries(window.__PROGRESS__))
          for (const [idxStr, entry] of Object.entries(entries))
            if (entry.status === 'solved') {
              if (!solved[topicId]) solved[topicId] = new Set();
              solved[topicId].add(Number(idxStr));
            }
      }
    } catch {}
    return;
  }
  // Server mode: /api/solved is authoritative, localStorage is a fallback
  try {
    const res = await fetch('/api/solved');
    if (res.ok) {
      for (const [k, v] of Object.entries(await res.json()))
        solved[k] = new Set(v);
      return;
    }
  } catch {}
  try {
    const raw = localStorage.getItem('algo_shad_solved');
    if (raw)
      for (const [k, v] of Object.entries(JSON.parse(raw)))
        solved[k] = new Set(v);
  } catch {}
}

function saveSolved() {
  const out = {};
  for (const [k, v] of Object.entries(solved)) out[k] = [...v];
  const body = JSON.stringify(out);
  localStorage.setItem('algo_shad_solved', body);

// ── Scheduler ─────────────────────────────────────────────────────────────────

function firstUnsolved(topic) {
  const s = solved[topic.id] || new Set();
  const f = failed[topic.id] || new Set();
  const k = buried[topic.id] || new Set();
  return topic.problems.find(p => !s.has(p.index) && !k.has(p.index)) ?? null;
}

function activeTopics() {
  return topics.filter(t => selectedTopics.has(t.id));
}

function totalUnsolved() {
  return activeTopics().reduce((n, t) => {
    const s = solved[t.id] || new Set();
    const k = buried[t.id] || new Set();
    return n + t.problems.filter(p => !s.has(p.index) && !k.has(p.index)).length;
  }, 0);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildRound(prevLastTopicId) {
  const available = activeTopics()
    .map(t => ({ topic: t, problem: firstUnsolved(t) }))
    .filter(x => x.problem !== null);

  if (available.length === 0) return [];

  shuffle(available);

  // Ensure first item of new round doesn't repeat last item of previous round
  if (prevLastTopicId && available[0].topic.id === prevLastTopicId) {
    const swap = available.findIndex((x, i) => i > 0 && x.topic.id !== prevLastTopicId);
    if (swap > 0) [available[0], available[swap]] = [available[swap], available[0]];
  }

  // Fix any within-round consecutive duplicates
  // (only relevant when a single topic has multiple problems and all others are exhausted)
  for (let i = 1; i < available.length; i++) {
    if (available[i].topic.id === available[i - 1].topic.id) {
      const swap = available.findIndex((x, j) => j > i && x.topic.id !== available[i - 1].topic.id);
      if (swap > 0) [available[i], available[swap]] = [available[swap], available[i]];
    }
  }

  return available;
}

function advance() {
  if (deckIdx >= deck.length) {
    const prevLastId = deck.length > 0 ? deck[deck.length - 1].topic.id : null;
    deck = buildRound(prevLastId);
    deckIdx = 0;
    if (deck.length === 0) { renderDone(); return; }
  }
  renderCurrent();
}

function startTimer() {
  if (!timerActive) return;
  clearInterval(timerHandle);
  document.getElementById('overtime-label').textContent = '';
  document.getElementById('timer-display').classList.remove('expired');

  const min = +document.getElementById('timer-min').value || 0;
  const sec = +document.getElementById('timer-sec').value || 0;
  const limit = min * 60 + sec;

  timerRemaining = 0;

  if (limit <= 0) {
    document.getElementById('timer-display').textContent = '';
    return;
  }

  renderTimerDisplay();
  timerHandle = setInterval(() => {
    timerRemaining++;
    renderTimerDisplay();
    if (timerRemaining === limit) {
      document.getElementById('timer-display').classList.add('expired');
      beep();
    }
  }, 1000);
}

  document.getElementById('timer-display').textContent =
    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start();
    osc.stop(ctx.currentTime + 0.8);
  } catch {}
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Protect math spans from marked.js by swapping them out before parsing and back after.
function parseWithMath(src) {
  const stash = [];
  const placeholder = (m) => { stash.push(m); return `\x02MATH${stash.length - 1}\x03`; };
  const guarded = src
    .replace(/\\\[[\s\S]*?\\\]/g, placeholder)   // display math \[...\]
    .replace(/\\\([\s\S]*?\\\)/g, placeholder);   // inline math \(...\)
  const html = marked.parse(guarded);
  return html.replace(/\x02MATH(\d+)\x03/g, (_, i) => stash[+i]);
}

function recordTime(outcome) {
  if (problemStartTime === null || !deck.length || deckIdx >= deck.length) return;
  const { topic, problem } = deck[deckIdx];
  const elapsed = Math.round((Date.now() - problemStartTime) / 1000);
  if (!timeStats[topic.id]) timeStats[topic.id] = {};
  const key = String(problem.index);
  if (!timeStats[topic.id][key])
    timeStats[topic.id][key] = { totalSeconds: 0, attempts: 0, solveCount: 0, failCount: 0, buryCount: 0 };
  const s = timeStats[topic.id][key];
  s.totalSeconds += elapsed;
  s.attempts++;
  if (outcome === 'hard') { s.solveCount++; s.hardCount = (s.hardCount || 0) + 1; }
  else if (outcome === 'good') { s.solveCount++; s.goodCount = (s.goodCount || 0) + 1; }
  else if (outcome === 'easy') { s.solveCount++; s.easyCount = (s.easyCount || 0) + 1; }
  else if (outcome === 'failed') s.failCount++;
  else s.buryCount++;
  saveTimeStats();
}

function formatTime(s) {
  if (!s) return '—';
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return sec ? `${m}m ${sec}s` : `${m}m`;
  const h = Math.floor(m / 60), min = m % 60;
  return min ? `${h}h ${min}m` : `${h}h`;
}

function getSubtreeTopicIds(node) {
  if (node.isLeaf) return node.topicId ? [node.topicId] : [];
  return Object.values(node.children).flatMap(getSubtreeTopicIds);
}

function aggregateTopics(topicIds) {
  let total = 0, solvedN = 0, failedN = 0, seconds = 0, attempts = 0;
  for (const id of topicIds) {
    const t = topics.find(x => x.id === id);
    if (!t) continue;
    total += t.problems.length;
    solvedN += (solved[id] || new Set()).size;
    failedN += (failed[id] || new Set()).size;
    const ts = timeStats[id] || {};
    for (const s of Object.values(ts)) { seconds += s.totalSeconds; attempts += s.attempts; }
  }
  return { total, solvedN, failedN, seconds, attempts };
}

function renderBuriedView() {

function switchView(v) {
  currentView = v;
  document.getElementById('train-view').style.display = v === 'train' ? '' : 'none';
  document.getElementById('solved-view').style.display = v === 'solved' ? '' : 'none';
  document.getElementById('failed-view').style.display = v === 'failed' ? '' : 'none';
  document.getElementById('buried-view').style.display = v === 'buried' ? '' : 'none';
  document.getElementById('stats-view').style.display = v === 'stats' ? '' : 'none';
  const tabs = document.querySelectorAll('.nav-tab');
  tabs.forEach(t => t.classList.remove('active'));
  const idx = { train: 0, solved: 1, failed: 2, buried: 3, stats: 4 }[v] ?? 0;
  tabs[idx].classList.add('active');
  if (v === 'solved') renderSolvedView();
  if (v === 'failed') renderFailedView();
  if (v === 'buried') renderBuriedView();
  if (v === 'stats') renderStatsView();
}

function exportProgress() {
  const out = {};
  const allIds = new Set([
    ...Object.keys(solved),
    ...Object.keys(failed),
    ...Object.keys(buried),
  ]);
  for (const topicId of allIds) {
    out[topicId] = {};
    for (const idx of (solved[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'solved', difficulty: difficulties[topicId]?.[String(idx)] ?? 'good' };
    for (const idx of (failed[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'failed' };
    for (const idx of (buried[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'buried' };
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      for (const [topicId, entries] of Object.entries(data)) {
        for (const [idxStr, entry] of Object.entries(entries)) {
          const idx = Number(idxStr);
          if (entry.status === 'solved') {
            if (!solved[topicId]) solved[topicId] = new Set();
            solved[topicId].add(idx);
            if (entry.difficulty) {
              if (!difficulties[topicId]) difficulties[topicId] = {};
              difficulties[topicId][idxStr] = entry.difficulty;
            }
          } else if (entry.status === 'failed') {
            if (!failed[topicId]) failed[topicId] = new Set();
            failed[topicId].add(idx);
          } else if (entry.status === 'buried') {
            if (!buried[topicId]) buried[topicId] = new Set();
            buried[topicId].add(idx);
          }
        }
      }
      saveSolved();
      saveFailed();
      saveBuried();
      saveDifficulties();
      updateSolvedCount();
      updateFailedCount();
      updateBuriedCount();
      if (currentView === 'solved') renderSolvedView();
      else if (currentView === 'failed') renderFailedView();
      else if (currentView === 'buried') renderBuriedView();
      else if (currentView === 'stats') renderStatsView();
    } catch {
      alert('Failed to import: invalid JSON');
    }
  };
  input.click();
}

  el.innerHTML = exportBar + sections.map(({ topic, problems }) => `

function unsolve(topicId, idx) {
  if (solved[topicId]) {
    solved[topicId].delete(idx);
    if (solved[topicId].size === 0) delete solved[topicId];
  }
  saveSolved();
  updateSolvedCount();
  renderSolvedView();
  renderFolderBar();
}

function csvField(v) {
  return '"' + String(v ?? '').replace(/"/g, '""') + '"';
}

function exportStatsCSV() {
  const header = ['folder','topic_id','problem_index','status','difficulty','total_seconds','attempts','hard_count','good_count','easy_count','fail_count','bury_count','problem_type','problem_statement','answer_text','has_images'];
  const rows = [header.join(',')];
  for (const t of topics) {
    const folder = t.id.includes('/') ? t.id.substring(0, t.id.lastIndexOf('/')) : t.id;
    for (const p of t.problems) {
      const isSolved = (solved[t.id] || new Set()).has(p.index);
      const isFailed = (failed[t.id] || new Set()).has(p.index);
      const isBuried = (buried[t.id] || new Set()).has(p.index);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      const diff = difficulties[t.id]?.[String(p.index)] ?? '';
      const ts = timeStats[t.id]?.[String(p.index)] || { totalSeconds: 0, attempts: 0, hardCount: 0, goodCount: 0, easyCount: 0, failCount: 0, buryCount: 0 };
      const ans = answers[t.id]?.[String(p.index)];
      const stmt = p.url ? p.url : (p.content || '').replace(/\n/g, ' ').substring(0, 300);
      rows.push([
        csvField(folder), csvField(t.id), csvField(p.index), csvField(status), csvField(diff),
        csvField(ts.totalSeconds), csvField(ts.attempts),
        csvField(ts.hardCount||0), csvField(ts.goodCount||0), csvField(ts.easyCount||0),
        csvField(ts.failCount), csvField(ts.buryCount),
        csvField(p.url ? 'url' : 'text'), csvField(stmt),
        csvField(ans?.text || ''), csvField(!!(ans?.images?.length)),
      ].join(','));
    }
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stats.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderStatsView() {
  const el = document.getElementById('stats-view');

  // ── Folder aggregate table ──────────────────────────────────────────────────
  const folderRows = [];
  const allIds = topics.map(t => t.id);
  const allAgg = aggregateTopics(allIds);
  folderRows.push(`<tr>
    <td><strong>All</strong></td>
    <td class="mono">${allAgg.total}</td>
    <td class="mono">${allAgg.solvedN}</td>
    <td class="mono">${allAgg.failedN}</td>
    <td class="mono">${formatTime(allAgg.seconds)}</td>
    <td class="mono">${allAgg.attempts || '—'}</td>
  </tr>`);

  function walkForStats(node, depth) {
    if (node.path === null) {
      for (const child of Object.values(node.children)) walkForStats(child, 0);
      return;
    }
    const ids = getSubtreeTopicIds(node);
    if (ids.length === 0) return;
    const agg = aggregateTopics(ids);
    const pad = depth * 16;
    const label = node.path.split('/').pop();
    const hasChildren = Object.values(node.children).some(c => getSubtreeTopicIds(c).length > 0);
    const pathAttr = escHtml(node.path);
    const toggleHtml = hasChildren
      ? `<button class="stats-fold-btn" data-stats-toggle="${pathAttr}" onclick="toggleStatsFolder('${pathAttr}')">▼</button>`
      : `<span style="display:inline-block;width:14px"></span>`;
    folderRows.push(`<tr data-stats-path="${pathAttr}">
      <td style="padding-left:${10 + pad}px">${toggleHtml} ${escHtml(label)}</td>
      <td class="mono">${agg.total}</td>
      <td class="mono">${agg.solvedN}</td>
      <td class="mono">${agg.failedN}</td>
      <td class="mono">${formatTime(agg.seconds)}</td>
      <td class="mono">${agg.attempts || '—'}</td>
    </tr>`);
    for (const child of Object.values(node.children)) walkForStats(child, depth + 1);
  }
  if (folderTree) walkForStats(folderTree, 0);

  // ── Per-problem table ───────────────────────────────────────────────────────
  const problemRows = [];
  for (const t of topics) {
    const ts = timeStats[t.id];
    if (!ts) continue;
    for (const [idxStr, s] of Object.entries(ts)) {
      const idx = Number(idxStr);
      const isSolved = (solved[t.id] || new Set()).has(idx);
      const isFailed = (failed[t.id] || new Set()).has(idx);
      const isBuried = (buried[t.id] || new Set()).has(idx);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      problemRows.push(`<tr>
        <td>${escHtml(t.id)}</td>
        <td class="mono">#${idx + 1}</td>
        <td><span class="status-badge ${status}">${status}</span></td>
        <td class="mono">${formatTime(s.totalSeconds)}</td>
        <td class="mono">${s.attempts}</td>
        <td class="mono">${s.hardCount||0} / ${s.goodCount||0} / ${s.easyCount||0} / ${s.failCount} / ${s.buryCount}</td>
      </tr>`);
    }
  }

  el.innerHTML = `
    <div class="stats-bar">
      <button class="unsolve-btn" style="padding:5px 12px;font-size:13px" onclick="exportStatsCSV()">Export CSV ↓</button>
    </div>
    <div class="stats-section-title">Folder Stats</div>
    <table class="stats-table">
      <thead><tr>
        <th>Folder</th><th>Problems</th><th>Solved</th><th>Failed</th><th>Time Spent</th><th>Attempts</th>
      </tr></thead>
      <tbody>${folderRows.join('')}</tbody>
    </table>
    <div class="stats-section-title">Problem Stats</div>
    ${problemRows.length === 0
      ? '<div class="status" style="padding-top:0;text-align:left;color:#9ca3af;font-size:13px">No problems attempted yet.</div>'
      : `<table class="stats-table">
          <thead><tr>
            <th>Topic</th><th>#</th><th>Status</th><th>Time</th><th>Attempts</th><th>H / G / E / F / Bury</th>
          </tr></thead>
          <tbody>${problemRows.join('')}</tbody>
        </table>`}`;
  applyStatsCollapsed();
}

function applyStatsCollapsed() {
  document.querySelectorAll('#stats-view tr[data-stats-path]').forEach(row => {
    const rpath = row.dataset.statsPath;
    const hidden = [...statsCollapsed].some(cp => rpath.startsWith(cp + '/'));
    row.style.display = hidden ? 'none' : '';
  });
  document.querySelectorAll('#stats-view [data-stats-toggle]').forEach(btn => {
    btn.textContent = statsCollapsed.has(btn.dataset.statsToggle) ? '▶' : '▼';
  });
}

function toggleStatsFolder(path) {
  if (statsCollapsed.has(path)) statsCollapsed.delete(path);
  else statsCollapsed.add(path);
  saveStatsCollapsed();
  applyStatsCollapsed();
}

function markSolved(difficulty) {
  const { topic, problem } = deck[deckIdx];
  if (!solved[topic.id]) solved[topic.id] = new Set();
  solved[topic.id].add(problem.index);
  saveSolved();
  if (!difficulties[topic.id]) difficulties[topic.id] = {};
  difficulties[topic.id][String(problem.index)] = difficulty;
  saveDifficulties();
  updateSolvedCount();
  recordTime(difficulty);
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function delayProblem() {
  recordTime('skip');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function buryProblem() {
  const { topic, problem } = deck[deckIdx];
  if (!buried[topic.id]) buried[topic.id] = new Set();
  buried[topic.id].add(problem.index);
  saveBuried();
  updateBuriedCount();
  recordTime('bury');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function newSession() {
  deck = [];
  deckIdx = 0;
  advance();
}

async function init() {
  await loadSolved();
  loadFailed();
  loadBuried();
  loadDifficulties();
  loadAnswers();
  loadTimeStats();
  loadCollapsed();
  loadStatsCollapsed();
  const _isCollapsed = localStorage.getItem('algo_shad_sidebar') === '1';
  if (_isCollapsed) document.querySelector('.app').classList.add('collapsed');
  const _sidebar = document.querySelector('.sidebar');
  if (!_isCollapsed) {
    const _sw = localStorage.getItem('algo_shad_sidebar_width');
    if (_sw) _sidebar.style.width = _sw + 'px';
  }
  (function() {
    const resizer = document.getElementById('sidebar-resizer');
    const MIN = 160, MAX = 600;
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      resizer.classList.add('dragging');
      _sidebar.style.transition = 'none';
      const startX = e.clientX;
      const startW = _sidebar.getBoundingClientRect().width;
      function onMove(e) {
        const w = Math.min(MAX, Math.max(MIN, startW + e.clientX - startX));
        _sidebar.style.width = w + 'px';
      }
      function onUp() {
        resizer.classList.remove('dragging');
        _sidebar.style.transition = '';
        localStorage.setItem('algo_shad_sidebar_width', parseInt(_sidebar.style.width));
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  })();
  loadTimerPrefs();
  const _tmin = +document.getElementById('timer-min').value || 0;
  const _tsec = +document.getElementById('timer-sec').value || 0;
  if (_tmin * 60 + _tsec > 0) userStartTimer();
  if (window.__TOPICS__) {
    topics = window.__TOPICS__;
  } else {
    try {
      const res = await fetch('/api/problems');
      if (!res.ok) throw new Error(res.status);
      topics = (await res.json()).topics;
    } catch {
      document.getElementById('problem-area').innerHTML =
        '<div class="status">Could not load problems — is <code>server.py</code> running?</div>';
      return;
    }
  }
  const allTopicIds = topics.map(t => t.id).sort();
  folderTree = buildTree(allTopicIds);
  loadTopicPrefs(allTopicIds);
  updateSolvedCount();
  updateFailedCount();
  updateBuriedCount();
  renderFolderBar();
  advance();
}

document.addEventListener('DOMContentLoaded', init);

 q = 0\\). Выразите через \\(p\\) и \\(q\\): \\(x_1^3 + x_2^3\\)."}, {"index": 3, "url": null, "content": "Пусть \\(x_1\\), \\(x_2\\) — корни уравнения \\(x^2 + px + q = 0\\). Выразите через \\(p\\) и \\(q\\): \\(\\frac{1}{(x_1 + p)^2} + \\frac{1}{(x_2 + p)^2}\\)."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/junior/02 Уравнение с новыми корнями", "name": "02 Уравнение с новыми корнями", "problems": [{"index": 0, "url": null, "content": "Уравнение \\(x^2 + px + q = 0\\) имеет корни \\(x_1\\) и \\(x_2\\). Напишите уравнение, корнями которого будут числа \\(y_1 = x_1^3\\), \\(y_2 = x_2^3\\)."}, {"index": 1, "url": null, "content": "Уравнение \\(x^2 + px + q = 0\\) имеет корни \\(x_1\\) и \\(x_2\\). Напишите уравнение, корнями которого будут числа \\(y_1 = \\frac{1}{x_1^2}\\), \\(y_2 = \\frac{1}{x_2^2}\\)."}, {"index": 2, "url": null, "content": "Уравнение \\(x^2 + px + q = 0\\) имеет корни \\(x_1\\) и \\(x_2\\). Напишите уравнение, корнями которого будут числа \\(y_1 = x_1 + \\frac{1}{x_2}\\), \\(y_2 = x_2 + \\frac{1}{x_1}\\)."}, {"index": 3, "url": null, "content": "Уравнение \\(x^2 + px + q = 0\\) имеет корни \\(x_1\\) и \\(x_2\\). Напишите уравнение, корнями которого будут числа \\(y_1 = \\frac{x_2}{x_1}\\), \\(y_2 = \\frac{x_1}{x_2}\\)."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/junior/04 Максимум суммы квадратов", "name": "04 Максимум суммы квадратов", "problems": [{"index": 0, "url": null, "content": "При каких значениях параметра \\(a\\) сумма квадратов корней уравнения \\(x^2 + 2ax + 2a^2 + 4a + 3 = 0\\) является наибольшей? Чему равна эта сумма?"}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/junior/05 Условие разложения на множители", "name": "05 Условие разложения на множители", "problems": [{"index": 0, "url": null, "content": "Какими должны быть \\(p\\) и \\(q\\), чтобы выполнялось равенство \\(Ax^4 + Bx^2 + C = A(x^2 + px + q)(x^2 - px + q)\\)?"}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/junior/10 Делимость теорема остатка", "name": "10 Делимость теорема остатка", "problems": [{"index": 0, "url": null, "content": "При каком значении \\(a\\) многочлен \\(P(x) = x^{1000} + ax^2 + 9\\) делится на \\(x + 1\\)?"}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/junior/13 Делимость проверка трёх корней", "name": "13 Делимость проверка трёх корней", "problems": [{"index": 0, "url": null, "content": "Докажите, что многочлен \\(P(x) = (x + 1)^6 - x^6 - 2x - 1\\) делится на \\(x(x + 1)(2x + 1)\\)."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/middle/03 Рекуррентная формула степенных сумм", "name": "03 Рекуррентная формула степенных сумм", "problems": [{"index": 0, "url": null, "content": "Пусть \\(x_1\\), \\(x_2\\) — корни квадратного уравнения \\(ax^2 + bx + c = 0\\) и \\(S_n = x_1^n + x_2^n\\) (\\(n \\geqslant 0\\)). Докажите формулу \\(a S_m + b S_{m-1} + c S_{m-2} = 0 \\quad (m \\geqslant 2)\\)."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/middle/06 Касательные к параболе перпендикуляр", "name": "06 Касательные к параболе перпендикуляр", "problems": [{"index": 0, "url": null, "content": "Нарисуйте множество всех таких точек координатной плоскости, из которых к параболе \\(y = x^2/4\\) можно провести две перпендикулярные друг другу касательные."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/middle/07 Вещественность корней доказательство", "name": "07 Вещественность корней доказательство", "problems": [{"index": 0, "url": null, "content": "Докажите, что корни уравнения \\((x - a)(x - b) + (x - b)(x - c) + (x - a)(x - c) = 0\\) всегда вещественные."}, {"index": 1, "url": null, "content": "Докажите, что корни уравнения \\(c(x - a)(x - b) + a(x - b)(x - c) + b(x - a)(x - c) = 0\\) всегда вещественные."}]}, {"id": "courses/mathematics/algebra/[04] 25-10-20 (4) Многочлены 101/middle/08 Общий корень двух квадра : \\(x^{10} + x^5 + 1\\)."}, {"index": 2, "url": null, "content": "Разложите на множители с действительными коэффициентами: \\(x^2y^2 - x^2 + 4xy - y^2 + 1\\)."}, {"index": 3, "url": null, "content": "Разложите на множители с действительными коэффициентами: \\((x - y)^5 + (y - z)^5 + (z - x)^5\\)."}, {"index": 4, "url": null, "content": "Разложите на множители с действительными коэффициентами: \\(a^8 + a^6b^2 + a^4b^4 + a^2b^6 + b^8\\)."}, {"index": 5, "url": null, "content": "Разложите на множители с действительными коэффициентами: \\(a^4 + b^4 + c^4 - 2a^2b^2 - 2a^2c^2 - 2b^2c^2\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/junior/01 Арифметика комплексных чисел", "name": "01 Арифметика комплексных чисел", "problems": [{"index": 0, "url": null, "content": "Вычислите \\((1+i)(2-i)(1+2i) + (1-i)(2+i)(1-2i)\\)."}, {"index": 1, "url": null, "content": "Найдите \\(x\\) и \\(y\\), если \\((2+i)x + (2-i)y = 6\\) и \\((3+2i)x - (2+3i)y = 5+4i\\)."}, {"index": 2, "url": null, "content": "Вычислите \\((100+10\\omega+\\omega^2)(100+10\\omega^2+\\omega)\\), если \\(\\omega = -\\frac{1}{2} + i\\frac{\\sqrt{3}}{2}\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/junior/02 Квадратные уравнения комплексные", "name": "02 Квадратные уравнения комплексные", "problems": [{"index": 0, "url": null, "content": "Решите уравнение \\(z^2+z+1=0\\)."}, {"index": 1, "url": null, "content": "Решите уравнение \\(z^2+iz+1=0\\)."}, {"index": 2, "url": null, "content": "Решите уравнение \\((2+i)z^2-(5-i)z+(2-2i)=0\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/junior/04 Формула Муавра степени", "name": "04 Формула Муавра степени", "problems": [{"index": 0, "url": null, "content": "Пользуясь формулой Муавра, вычислите \\((\\sqrt{3}+i)^{10}\\)."}, {"index": 1, "url": null, "content": "Пользуясь формулой Муавра, вычислите \\((2-i\\sqrt{3}+i)^{100}\\)."}, {"index": 2, "url": null, "content": "Пользуясь формулой Муавра, вычислите \\((1+\\cos \\alpha + i\\sin \\alpha)^n\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/junior/05 Комплексные корни n-й степени", "name": "05 Комплексные корни n-й степени", "problems": [{"index": 0, "url": null, "content": "Вычислите комплексные корни \\(\\sqrt{1+i}\\)."}, {"index": 1, "url": null, "content": "Вычислите комплексные корни \\(\\sqrt[4]{-4}\\)."}, {"index": 2, "url": null, "content": "Вычислите комплексные корни \\(\\sqrt[5]{2+3i}\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/middle/03 Модуль оценки неравенства", "name": "03 Модуль оценки неравенства", "problems": [{"index": 0, "url": null, "content": "Опишите множество точек комплексной плоскости для которых \\(|z-1-i|<1\\)."}, {"index": 1, "url": null, "content": "Найдите \\(\\min|3+2i-z|\\), если \\(|z| \\le 1\\)."}, {"index": 2, "url": null, "content": "Докажите, что для \\(|z| < \\frac{1}{2}\\) выполняется \\(|(1+i)z^3+iz| < \\frac{3}{4}\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/middle/06 Тригонометрические формулы через комплексные", "name": "06 Тригонометрические формулы через комплексные", "problems": [{"index": 0, "url": null, "content": "Выразите формулу для \\(\\cos 5x\\) через \\(\\sin x\\) и \\(\\cos x\\)."}, {"index": 1, "url": null, "content": "Выразите формулу для \\(\\text{tg } 4x\\) через \\(\\text{tg } x\\)."}, {"index": 2, "url": null, "content": "Выразите формулу для \\(\\sin(nx)\\) через \\(\\sin x\\), \\(\\cos x\\), знак суммы и \\(C_k^n\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/senior/07 Суммы тригонометрических рядов", "name": "07 Суммы тригонометрических рядов", "problems": [{"index": 0, "url": null, "content": "Выразив тригонометрические функции через комплексные числа, вычислите \\(\\sin \\alpha + \\sin 2\\alpha + \\ldots + \\sin n\\alpha\\)."}, {"index": 1, "url": null, "content": "Выразив тригонометрические функции через комплексные числа, вычислите \\(\\cos \\alpha + 2\\cos 2\\alpha + \\ldots + 2^{n-1} \\cos n\\alpha\\)."}, {"index": 2, "url": null, "content": "Выразив тригонометрические функции через комплексные числа, вычислите \\(\\cos \\alpha + 2\\cos 2\\alpha + \\ldots + n\\cos n\\alpha\\)."}]}, {"id": "courses/mathematics/algebra/[05] 25-10-20 (7) Комплексные числа 101/senior/08 Деление круга корни единицы", "name": "08 Деление круга корни единицы", "problems": [{"index": 0, "url": null, "content": "С помощью многочлена деления круга разложите на множители с вещественными коэффициентами \\(x^8 + 1\\)."}, {"index": 1, "url": null, "content": "Найдите сумму всех корней степени \\(n\\) из \\(1\\)."}, {"index": 2, "url": null, "content": "Найдите все комплексные корни уравнения \\((x - 1)^n = (x + 1)^n\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/01 Найти размерность пространства", "name": "01 Найти размерность пространства", "problems": [{"index": 0, "url": null, "content": "Найти размерность комплексных чисел."}, {"index": 1, "url": null, "content": "Найти размерность многочленов степени \\(n\\) c корнем в нуле."}, {"index": 2, "url": null, "content": "Найти размерность непрерывных функций."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/02 Вектор в линейной оболочке", "name": "02 Вектор в линейной оболочке", "problems": [{"index": 0, "url": null, "content": "При каких значениях параметра а вектор \\((a, 4, −1, −2)\\) лежит в линейной оболочке векторов \\((1, a, 3, 0), (−2, 1, 2, 2)\\) и \\((0, 1, 1, 3)\\)? В ответ запишите сумму этих значений."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/03 Линейная зависимость набора", "name": "03 Линейная зависимость набора", "problems": [{"index": 0, "url": null, "content": "Пусть \\(k(x) = x^3 − x^2 + 2x + 3\\), \\(l(x) = 3x^3 + x^2 − x − 1\\), \\(m(x) = x^3 + x^2 + 2\\), \\(n(x) = 7x^3 + ax^2 + 5\\). Найдите значение параметра \\(a\\), для которого множество \\((k, l, m, n)\\) будет линейно зависимым."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/04 Доказать независимость векторов", "name": "04 Доказать независимость векторов", "problems": [{"index": 0, "url": null, "content": "Доказать линейную независимость векторов \\(e^x, e^{2x}\\)."}, {"index": 1, "url": null, "content": "Доказать линейную независимость векторов \\(e^x, e^{2x}, 1\\)."}, {"index": 2, "url": null, "content": "Доказать линейную независимость векторов \\(\\cos(x), \\sin(x), e^x, e^{2x}, 1\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/05 Независимость функций детерминанта", "name": "05 Независимость функций детерминанта", "problems": [{"index": 0, "url": null, "content": "Докажите, что функции \\(\\det(X)\\), \\(\\det(X + E)\\) и \\(\\det(X − E)\\) на пространстве комплексных матриц \\(3 \\times 3\\) линейно независимы."}, {"index": 1, "url": null, "content": "Докажите, что найдется \\(m \\in N\\), для которого набор функций \\(\\det(X − mE), \\det(X − (m − 1)E), \\det(X − (m − 2)E), \\dots, \\det(X + mE)\\) линейно зависим."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/07 Подпространства объединение пересечение", "name": "07 Подпространства объединение пересечение", "problems": [{"index": 0, "url": null, "content": "Пусть \\(U\\) и \\(V\\) — подпространства векторного пространства \\(W\\). Всегда ли \\(U \\cup V\\) — тоже подпространство? Докажите или приведите контрпример."}, {"index": 1, "url": null, "content": "Всегда ли \\(U \\cap V\\) — тоже подпространство? Докажите или приведите контрпример."}, {"index": 2, "url": null, "content": "Всегда ли \\(V \\setminus U\\) — тоже подпространство? Докажите или приведите контрпример."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/junior/08 Прямая сумма R четыре", "name": "08 Прямая сумма R четыре", "problems": [{"index": 0, "url": null, "content": "Рассмотри подпространства \\(U = \\langle (1, 1, 1, 1), (−1, −2, 0, 1) \\rangle\\) и \\(V = \\langle (−1, −1, 1, −1), (2, 2, 0, 1) \\rangle\\). Докажите, что эти подпространства раскладывают в прямую сумму пространство \\(R^4\\)."}, {"index": 1, "url": null, "content": "Рассмотри подпространства \\(U = \\langle (1, 1, 1, 1), (−1, −2, 0, 1) \\rangle\\) и \\(V = \\langle (−1, −1, 1, −1), (2, 2, 0, 1) \\rangle\\). Найдите проекцию вектора \\((4, 2, 4, 4)\\) на пространства \\(U\\) и \\(V\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле вырожденные матрицы", "name": "06 Конечное поле вырожденные матрицы", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество вырожденных матриц."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле количество базисов", "name": "06 Конечное поле количество базисов", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество базисов."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле количество векторов", "name": "06 Конечное поле количество векторов", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество векторов."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле количество подпространств", "name": "06 Конечное поле количество подпространств", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество подпространств."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле линейные отображения", "name": "06 Конечное поле линейные отображения", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество линейных отображений."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/06 Конечное поле невырожденные матрицы", "name": "06 Конечное поле невырожденные матрицы", "problems": [{"index": 0, "url": null, "content": "Пусть \\(V\\) — \\(n\\)-мерное пространство над полем из \\(q\\) элементов. Найти количество невырожденных матриц."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/09 Прямая сумма проекции", "name": "09 Прямая сумма проекции", "problems": [{"index": 0, "url": null, "content": "Рассмотрим в векторном пространстве \\(W\\) размерности \\(n\\) два подпространства: \\(x_1 + \\dots + x_n = 0\\) и \\(x_1 = \\dots = x_n\\). Докажите, что они образуют прямую сумму и найти проекции единичных векторов на эти подпространства."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/10 Симметричная кососимметричная разложение", "name": "10 Симметричная кососимметричная разложение", "problems": [{"index": 0, "url": null, "content": "Докажите, что любую матрицу можно представить в виде суммы симметричной и кососимметричной, причем единственным образом."}, {"index": 1, "url": null, "content": "Найдите проекцию верхнетреугольной матрицы из всех единиц на оба этих подпространства (симметричных матриц и кососимметричных матриц)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/11 Верхнетреугольная кососимметричная разложение", "name": "11 Верхнетреугольная кососимметричная разложение", "problems": [{"index": 0, "url": null, "content": "Доказать, что любую матрицу можно представить как сумму верхнетреугольной и кососимметричной матриц, причем единственным образом."}, {"index": 1, "url": null, "content": "Доказать, что любую матрицу можно представить как сумму верхнетреугольной и кососимметричной матриц, причем единственным образом. Найти проекцию матрицы из всех единиц на эти подпространства."}, {"index": 2, "url": null, "content": "Доказать, что любую матрицу можно представить как сумму верхнетреугольной и симметрической матриц, причем единственным образом."}, {"index": 3, "url": null, "content": "Доказать, что любую матрицу можно представить как сумму верхнетреугольной и симметрической матриц, причем единственным образом. Найти проекцию матрицы из всех единиц на эти подпространства."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/12 Независимые векторы нулевые координаты", "name": "12 Независимые векторы нулевые координаты", "problems": [{"index": 0, "url": null, "content": "Векторы \\(e_1, \\dots, e_{m+1}\\) в \\(R^n\\) линейно независимы. Докажите, что среди их линейных комбинаций есть ненулевой вектор, у которого первые \\(m\\) координат нулевые."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[01] Базис и векторные пространства/middle/13 Расстояние до линейной оболочки", "name": "13 Расстояние до линейной оболочки", "problems": [{"index": 0, "url": null, "content": "Найдите расстояние от матрицы \\(A = \\begin{pmatrix} 1 & 5 \\\\ 6 & 6 \\end{pmatrix}\\) до линейной оболочки матриц \\(B = \\begin{pmatrix} 2 & 6 \\\\ 1 & 4 \\end{pmatrix}, C = \\begin{pmatrix} 1 & 1 \\\\ 1 & 2 \\end{pmatrix}, D = \\begin{pmatrix} 2 & 2 \\\\ 2 & 4 \\end{pmatrix}\\), если скалярное произведение на матрицах задано следующим образом: \\(\\langle X, Y \\rangle = tr(X^T Y)\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/junior/14 Система уравнений параметр", "name": "14 Система уравнений параметр", "problems": [{"index": 0, "url": null, "content": "Найдите, при каких значениях параметра \\(a\\) система уравнений \\(\\begin{cases} x + y + 5z = 1 \\\\ 2x + 3y + 13z = 4 \\\\ x + 4y + 15z = 2 \\\\ 6y + 21z = a \\end{cases}\\) имеет решение."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/junior/15 Матрица след ранг определитель", "name": "15 Матрица след ранг определитель", "problems": [{"index": 0, "url": null, "content": "Рассмотрим набор \\(\\{\\lambda_1, \\dots, \\lambda_n\\}\\), все \\(\\lambda\\) отличны от нуля, и матрицу \\(n\\) на \\(n\\) такую, что \\(a_{ij} = \\frac{\\lambda_i}{\\lambda_j}\\). Найдите след матрицы \\(a_{ij}\\)."}, {"index": 1, "url": null, "content": "Рассмотрим набор \\(\\{\\lambda_1, \\dots, \\lambda_n\\}\\), все \\(\\lambda\\) отличны от нуля, и матрицу \\(n\\) на \\(n\\) такую, что \\(a_{ij} = \\frac{\\lambda_i}{\\lambda_j}\\). Найдите ранг матрицы \\(a_{ij}\\)."}, {"index": 2, "url": null, "content": "Рассмотрим набор \\(\\{\\lambda_1, \\dots, \\lambda_n\\}\\), все \\(\\lambda\\) отличны от нуля, и матрицу \\(n\\) на \\(n\\) такую, что \\(a_{ij} = \\frac{\\lambda_i}{\\lambda_j}\\). Найдите определитель матрицы \\(a_{ij}\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/junior/16 Матрица ранга один", "name": "16 Матрица ранга один", "problems": [{"index": 0, "url": null, "content": "Докажите, что любая матрица ранга \\(1\\) представима как произведение \\(vv^T\\), где \\(v\\) — вектор столбец."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/junior/17 Элементарные преобразования ранг", "name": "17 Элементарные преобразования ранг", "problems": [{"index": 0, "url": null, "content": "Почему элементарные преобразования не меняют ранг матрицы?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/junior/18 Ранг составной матрицы", "name": "18 Ранг составной матрицы", "problems": [{"index": 0, "url": null, "content": "Доказать, что ранг матрицы \\((А|В)\\), полученной приписыванием к матрице \\(А\\) матрицы \\(В\\), не превосходит суммы рангов матриц \\(А\\) и \\(В\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/19 Ранг матрицы n на n", "name": "19 Ранг матрицы n на n", "problems": [{"index": 0, "url": null, "content": "Найти ранг матрицы \\(A = a_{ij}\\) размером \\(n \\times n\\) (\\(n > 3\\)), где \\(a_{ij} = i + j − 2ij\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/20 Диагональное преобладание невырожденность", "name": "20 Диагональное преобладание невырожденность", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(|a_{ii}| > |a_{ik}|\\) при \\(i = 1, \\dots n\\), то матрица \\(A = |a_{ij}|\\) невырождённая."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/21 Ранг матрицы тригонометрические", "name": "21 Ранг матрицы тригонометрические", "problems": [{"index": 0, "url": null, "content": "Найдите ранг матрицы \\(n \\times n\\), если \\(a_{ij} = \\sin i + \\sin j\\)."}, {"index": 1, "url": null, "content": "Найдите ранг матрицы \\(n \\times n\\), если \\(a_{ij} = \\ln i + \\ln j\\)."}, {"index": 2, "url": null, "content": "Найдите ранг матрицы \\(n \\times n\\), если \\(a_{ij} = e^i + e^j\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/22 Матрица сумма ранга один", "name": "22 Матрица сумма ранга один", "problems": [{"index": 0, "url": null, "content": "Доказать, что всякую матрицу ранга \\(r\\) можно представить в виде суммы \\(r\\) матриц ранга \\(1\\), но нельзя представить в виде суммы меньшего числа таких матриц."}, {"index": 1, "url": null, "content": "Единственное ли такое представление?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/23 Ранг подматрицы невырожденной", "name": "23 Ранг подматрицы невырожденной", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(20\\) на \\(20\\) невырождена. Какое наименьшее значение может иметь ранг подматрицы \\(12\\) на \\(13\\) матрицы \\(A\\)? (Подматрица получается вычёркиванием из \\(A\\) некоторых строк и столбцов.)"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/24 Минор независимых строк столбцов", "name": "24 Минор независимых строк столбцов", "problems": [{"index": 0, "url": null, "content": "Доказать, что если ранг матрицы равен \\(r\\), то минор, стоящий на пересечении любых \\(r\\) линейно независимых строк и линейно независимых столбцов, отличен от \\(0\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[02] Ранг матрицы/middle/25 Матричное уравнение AX B", "name": "25 Матричное уравнение AX B", "problems": [{"index": 0, "url": null, "content": "Пусть \\(А\\), \\(В\\) — матрицы размеров \\(m \\times n\\) и \\(m \\times k\\) соответственно. Доказать, что матричное уравнение \\(АХ = В\\), где \\(Х\\) — матрица размера \\(n \\times k\\), имеет решение тогда и только тогда, когда ранг матрицы \\(А\\) совпадает с рангом расширенной матрицы \\((А|В)\\).
