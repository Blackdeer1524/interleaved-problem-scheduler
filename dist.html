хорда \\(AB\\) разбивает круг.\n\nHint: https://shadhelper.notion.site/318a809716af447b86d64adfaf047fc6"}]}, {"id": "ysda/2015/Теория вероятностей/Случайные величины в общем случае/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "На плоскости нарисована ломаная с \\(n\\) звеньями. Длина каждого звена равна \\(1\\), ориентированный угол между соседними звеньями с равной вероятностью равен \\(\\alpha\\) и \\(-\\alpha\\).\nНайдите математическое ожидание квадрата расстояния от её начальной точки до конечной.\n\nHint: https://shadhelper.notion.site/da9fe38b6d91459a9906aa14583f88c5"}]}, {"id": "ysda/2016/Алгебра/Билинейные и квадратичные функции/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "В пространстве многочленов с действительными коэффициентами степени не выше \\(n\\) задана квадратичная форма \\(Q(f)=f(1)f(2)\\). Найдите ее сигнатуру (число единиц и минус единиц в нормальном виде).\n\nHint: https://shadhelper.notion.site/8abab17283c24ad2b746e1d034b0f4b8"}]}, {"id": "ysda/2016/Алгебра/Билинейные и квадратичные функции/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — симметричные билинейные функции на двумерном вещественном пространстве, причем \\(A\\) положительно определена, а \\(B\\) отрицательно определена. Докажите, что любая непрерывная кривая в пространстве симметричных билинейных функций, соединяющая \\(A\\) и \\(B\\), содержит функцию с вырожденной матрицей.\n\nHint: https://shadhelper.notion.site/3caf93f5aa3346b688f3970e0f18fccc"}]}, {"id": "ysda/2016/Алгебра/Матрицы/Задача 1 (2)", "name": "Задача 1 (2)", "problems": [{"index": 0, "url": null, "content": "Докажите, что любая квадратная вещественная матрица является суммой\nдвух обратимых.\n\nHint: https://shadhelper.notion.site/e694c0aa0c5b4c6386748d16b9a85d53"}]}, {"id": "ysda/2016/Алгебра/Матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — квадратные матрицы одинакового размера.\nВерно ли, что если \\(ABA=A\\), то \\(BAB=B\\)?\n\nHint: https://shadhelper.notion.site/dafc4acd279242a598e0938f911cf33f"}]}, {"id": "ysda/2016/Алгебра/Определители/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Пусть \\(J\\in Mat_{2n\\times2n}(\\mathbb{R})\\) — кососимметрическая матрица, \\(\\beta\\) — положительное число, а\n\\(u\\in\\mathbb{R}^{2n}\\) — ненулевой вектор. \\(det(E+\\beta uu^{T}J)\\).\n\nHint: https://shadhelper.notion.site/13fe24acdf3b4bdda08266121ebc387a"}]}, {"id": "ysda/2016/Алгебра/Спектральная теория матриц/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Докажите, что целочисленная матрица не может иметь собственного\nзначения, равного \\(\\frac{1}{4}(-3+i\\sqrt{5})\\).\n\nHint: https://shadhelper.notion.site/4ffd809b30fd4eca82fabf38c4b6fced"}]}, {"id": "ysda/2016/Математический анализ/Интегралы/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f:\\mathbb{R}^2 \\rightarrow \\mathbb{R}\\) — ограниченная гладкая функция, причём её среднее значение на любой окружности радиуса \\(1\\) равно значению в центре этой окружности. Докажите, что \\(f\\) постоянна.\n\nHint: https://shadhelper.notion.site/e316786e33174426a5cbc3e3ced0f273"}]}, {"id": "ysda/2016/Математический анализ/Интегралы/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Найдите предел последовательности\n\\[\n\\lim \\limits_{n\\to\\infty} \\int_0^1 e^{\\{nx\\}} x^{2016} dx,\n\\]\nгде \\(\\{t\\}\\) означает дробную часть числа \\(t\\).\n\nHint: https://shadhelper.notion.site/071e9668913c42eab1c4863e1076112d"}]}, {"id": "ysda/2016/Математический анализ/Непрерывные функции/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Может ли непрерывная на всей числовой прямой функция принимать каждое значение (а) дважды? (б) трижды?\n\nHint: https://shadhelper.notion.site/c9add3c24c3a4f8ba3da2fd296b42726"}]}, {"id": "ysda/2016/Математический анализ/Непрерывные функции/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Существует ли непрерывная функция \\(f(x)\\), для которой \\(f(f(x)) = 1- x^3\\)?\n\nHint: https://shadhelper.notion.site/896de5a2e1794a08917dd6e2657a40db"}]}, {"id": "ysda/2016/Математический анализ/Предел функций/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Решите уравнение\n\\[\n\\lim_{n\\to \\infty} \\cos nx =1.\n\\]\n\nHint: https://shadhelper.notion.site/ec7fa94db59d44fa8b64bc18dae33c49"}]}, {"id": "ysda/2016/Математический анализ/Ряды/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Исследуйте на сходимость ряд\n\\[\n\\sum_{n=3}^{\\infty} (\\ln \\ln n)^{-\\ln n}\n\\]\n\nHint: https://shadhelper.notion.site/61eef898bca1467285e2b0b5c85a60b1"}]}, {"id": "ysda/2016/Теория вероятностей/Геометрические вероятности/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "В мишень, которая представляет собой прямоугольник размера \\(3\\times 2\\), стреляют из пистолета. Известно, что отклонение пули от точки, на которую нацелен пистолет, произвольно, но не превышает \\(0.1\\) по любому направлению, параллельному сторонам прямоугольника. Стрелок целится в произвольную точку мишени. С какой вероятностью он попадет в мишень?\n\nHint: https://shadhelper.notion.site/de1d17ef5a6b4c89bc790f078590aca4"}]}, {"id": "ysda/2016/Теория вероятностей/Дискретные случайные величины/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Каждая из случайных величин \\(X\\) и \\(Y\\) принимает два значения, причём \\(\\mathrm{cov}(X,Y) = 0\\). Докажите, что \\(X\\) и \\(Y\\) независимы.\n\nHint: https://shadhelper.notion.site/53b6cbf42ad54b2da4e2b36cd2f4d0d2"}]}, {"id": "ysda/2016/Теория вероятностей/Дискретные случайные величины/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "В ряд расположены \\(m\\) предметов. Случайно выбираются \\(k\\) предметов, \\(k<m\\). Случайная величина \\(X\\) равна количеству таких предметов \\(i\\), что \\(i\\) выбран, а все его соседи не выбраны. Найдите математическое ожидание.\n\nHint: https://shadhelper.notion.site/129a562a63bb49a68746d6a9d2b6d893"}]}, {"id": "ysda/2016/Теория вероятностей/Случайные блуждания/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Робот движется по клеткам бесконечной шахматной доски. Один его шаг — это перемещение на случайную из восьми соседних клеток. Найдите математическое ожидание модуля разности между количеством черных и количеством белых клеток, на которых робот побывал за \\(n\\) шагов (каждая клетка считается столько раз, сколько на ней побывал робот).\nОтвет представьте в виде компактного выражения.\n\nHint: https://shadhelper.notion.site/034cec1b1ea9462db06c15370cdbec72"}]}, {"id": "ysda/2016/Теория вероятностей/Случайные величины в общем случае/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(X\\) и \\(Y\\) независимы. Плотность случайной величины \\(X\\) равна \\({p_X(t) = \\dfrac{t}{2} I_{[0,2]}(t)}\\) (где \\(I_{[0,2]}(t)\\) — индикаторная функция отрезка \\([0,2]\\)), а \\(Y\\) имеет равномерное распределение на отрезке \\([0,3]\\). Найдите вероятность того, что из отрезков с длинами \\(X\\), \\(Y\\) и \\(1\\) можно составить треугольник.\n\nHint: https://shadhelper.notion.site/c702f11994824afb98ef414f8f537d69"}]}, {"id": "ysda/2016/Теория вероятностей/Случайные величины в общем случае/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины равномерно распределённые на отрезке \\([0,1]\\), а \\(t\\) — фиксированное число. Найдите \\(P(\\xi+\\eta < t\\lambda)\\).\n\nHint: https://shadhelper.notion.site/f99a86222b034e95a8f4b6d7cd5915af"}]}, {"id": "ysda/2017/Алгебра/Билинейные и квадратичные функции/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Верно ли, что если матрица \\(A\\in Mat_{n}(\\mathbb{R})\\) симметрична и положительно определена, то квадратичная форма \\(q(X)=tr(X^{T}AX)\\) на пространстве \\(Mat_{n}(\\mathbb{R})\\) будет положительно определенной?\n\nHint: https://shadhelper.notion.site/ee1e0970abd64457bd790ae4d7ee79ca"}]}, {"id": "ysda/2017/Алгебра/Линейные отображения/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(x\\) и \\(y\\) — два ненулевых вектора из \\(\\mathbb{R}^{n}\\). Верно ли, что найдется симметричная матрица \\(A\\), для которой \\(y=Ax\\)?\n\nHint: https://shadhelper.notion.site/54ff51ee6aa14eaeaa913c80c5b621fa"}]}, {"id": "ysda/2017/Алгебра/Матрицы/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Существует ли скалярное произведение на пространстве матриц \\(n\\times n\\;(n>1)\\),\nотносительно которого матрица из всех единиц была бы ортогональна\nлюбой верхнетреугольной матрице?\n\nHint: https://shadhelper.notion.site/de2be93ff7d747a48ed0fb050b6c690b"}]}, {"id": "ysda/2017/Алгебра/Спектральная теория матриц/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(n\\times n\\) имеет различные собственные значения \\(\\lambda_{1},\\ldots,\\lambda_{n}\\). Найдите все собственные значения (в том числе комплексные) матрицы\n\\[\n\\left(\\begin{array}{cc}0 & -A\\\\A & 0\\end{array}\\right)\n\\]\n\nHint: https://shadhelper.notion.site/63432e599f7e407eb6a7981d0039c57e"}]}, {"id": "ysda/2017/Алгебра/Спектральная теория матриц/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Назовем матрицу вращательной, если при повороте на \\(90^{\\circ}\\) вокруг центра она не меняется.\n(a) Докажите, что для любого набора чисел \\(\\lambda_{1},\\ldots\\lambda_{k}\\in\\mathbb{R}\\) найдется \\(n\\in\\mathbb{N}\\) и вращательная матрица \\(n\\times n\\), для которой \\(\\lambda_{1},\\ldots\\lambda_{k}\\) являются собственными значениями.\n(б) Докажите, что у вращательной матрицы с действительными коэффициентами все собственные векторы \\(v\\) с отличными от нуля действительными собственными значениями симметричны (то есть \\(v_{i}=v_{n-i+1}\\)).\n\nHint: https://shadhelper.notion.site/d6ab2f4f8ec94cb6ba01c76f8870f4ee"}]}, {"id": "ysda/2017/Алгебра/Спектральная теория матриц/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "В пространстве \\(\\mathbb{R}[x,y]\\) многочленов с действительными коэффициентами от переменных \\(x\\) и \\(y\\) действует оператор \\(y\\frac{\\partial}{\\partial x}+x\\frac{\\partial}{\\partial y}\\).\n(a) Докажите, что каждое целое число является его собственным значением.\n(b) Найдите все его собственные значения. Является ли он диагонализуемым?\n\nHint: https://shadhelper.notion.site/f00ed3048494414b823329e64fcbaefe"}]}, {"id": "ysda/2017/Математический анализ/Интегралы/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Докажите, что для произвольного \\(a_0 \\in (0;2\\pi)\\) последовательность, заданная условием\n\\[\na_{n+1} = \\int \\limits_0^{a_n} \\left(1+\\frac{1}{4} \\cos^{2n+1} t\\right) dt,\n\\]\nимеет предел и найдите его.\n\nHint: https://shadhelper.notion.site/e26afa457505492f94d6c1ac442d4dc6"}]}, {"id": "ysda/2017/Математический анализ/Непрерывные функции/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Непрерывная функция \\(f(x)\\) такова, что \\(f(0)=f(2)\\). Докажите, что для какого-то \\(x\\in[0,2]\\) имеет место равенство \\(f(x) = f(x-1)\\).\n\nHint: https://shadhelper.notion.site/a38c14fd741d4a35bb9a6e7849904f28"}]}, {"id": "ysda/2017/Математический анализ/Производные/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Известно, что \\(a_0+\\frac{a_1}{2}+\\frac{a_2}{3}+\\ldots+\\frac{a_n}{n+1}=0\\). Докажите, что многочлен \\({a_0+a_1 x +a_2x^2+\\ldots+a_nx^n}\\) имеет хотя бы один действительный корень.\n\nHint: https://shadhelper.notion.site/9ecd1b50d8ee4260af52d3debcf12c95"}]}, {"id": "ysda/2017/Математический анализ/Ряды/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Найдите сумму\n\\[\n\\sum_{k=0}^{\\infty} (-1)^k \\frac{(k+1)^2}{k!}.\n\\]\n\nHint: https://shadhelper.notion.site/f787a80645de4490811b378a13631134"}]}, {"id": "ysda/2017/Математический анализ/Ряды/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Последовательность \\(a_n\\) задана условием \\(a_1=1\\), \\(a_{n+1} =\\sin a_n\\). Сходится ли ряд \\(\\sum_{i=1}^{\\infty} a_i\\).\n\nHint: https://shadhelper.notion.site/122ee14c034c458fa1b05780fcd2c129"}]}, {"id": "ysda/2017/Математический анализ/Ряды/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Исследуйте на сходимость (абсолютную и условную) ряд \\(\\sum \\limits_{k=1}^{\\infty} a_k\\), где\n\\[\na_k = \\int \\limits_0^{\\frac{\\sin k}{k}} \\frac{\\sin t}{t} dt.\n\\]\n\nHint: https://shadhelper.notion.site/b6c8aeba6e9b4606b41cdd0eb2819ee4"}]}, {"id": "ysda/2017/Теория вероятностей/Дискретные случайные величины/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1,\\ldots,X_n\\) — независимые одинаково распределённые случайные величины с математическим ожиданием \\(a\\) и дисперсией \\(\\sigma^2\\), принимающие положительные значения. Пусть также \\(m<n\\). Найдите математическое ожидание отношения:\n\\[\n\\frac{X_1+\\ldots + X_m}{X_1+\\ldots + X_n}.\n\\]\n\nHint: https://shadhelper.notion.site/b3a0728e743d4b1893097243435daf22"}]}, {"id": "ysda/2017/Теория вероятностей/Дискретные случайные величины/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — две случайных булевых матрицы \\(n\\times n\\), у которых каждый элемент равен \\(1\\) с вероятностью \\(p\\) (значения различных элементов не зависят друг от друга).\nСколько в среднем единиц будет в их произведении , если сложение и умножение происходит по модулю \\(2\\).\n\nHint: https://shadhelper.notion.site/ad8bfad867f54fe58cb852e397537a17"}]}, {"id": "ysda/2017/Теория вероятностей/Комбинаторика/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Чёрный куб покрасили снаружи белой краской, затем разрезали на \\(27\\) одинаковых маленьких кубиков и как попало сложили из них большой куб. С какой вероятностью все грани этого куба будут белыми?\n\nHint: https://shadhelper.notion.site/18073ee2feb440859871876e0d21333b"}]}, {"id": "ysda/2017/Теория вероятностей/Случайные величины в общем случае/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Из равномерного распределения на отрезке \\([0,1]\\) независимо выбираются две точки \\(x\\) и \\(y\\). При каких числах \\(a\\) события \\(\\max(1-2x,y)<a\\) и \\(\\max(1-2y,x)<a\\) независимы?\n\nHint: https://shadhelper.notion.site/75b38c418d7d40d8b3e9dcf3ea5b8aa5"}]}, {"id": "ysda/2017/Теория вероятностей/Случайные величины в общем случае/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Вася поставил учиться две нейронные сети, каждую на своём GPU, и отправился спать. Времена обучения сетей независимы и равномерно распределены на отрезке \\([1,3]\\). Через время \\(t\\) сервер упал и оказалось, что лишь одна сеть успела доучиться. С какой вероятностью \\(t\\leqslant \\dfrac{3}{2}\\)? Считайте, что время падения сервера тоже равномерно распределено на отрезке \\([1,3]\\).\n\nHint: https://shadhelper.notion.site/8f7d3eb9d64a4281a1a33ff3c1ef1a1d"}]}, {"id": "ysda/2017/Теория вероятностей/Случайные величины в общем случае/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X\\) — случайная величина, принимающая значения на отрезке \\([0,1]\\). Пусть также \\(m\\) — медиана. Рассмотрим бинаризацию этой величины\n\\[\n\\beta(X) = \\begin{cases} 1 , & X\\geqslant m,\\\\ 0, & X<m \\end{cases}.\n\\]\nВерно ли , что дисперсия \\(\\beta(X)\\) не меньше дисперсии \\(X\\)? А если функция распределения \\(X\\) непрерывна? Под медианой здесь имеется ввиду число \\(m\\), для которого \\({P(X\\leqslant m) = P(X\\geqslant m)}\\).\n\nHint: https://shadhelper.notion.site/876e7b2d5f884f9cbaa24cff0b76efce"}]}, {"id": "ysda/2018/Алгебра/Билинейные и квадратичные формы. Закон инерции./Задача 11", "name": "Задача 11", "problems": [{"index": 0, "url": null, "content": "Даны две вещественные симметрические матрицы \\(2\\times2\\). Могут ли они задавать одну и ту же квадратичную форму, только в разных базисах?\n\nHint: https://shadhelper.notion.site/87dac8a314e141ddb8438df36dc25107"}]}, {"id": "ysda/2018/Алгебра/Билинейные и квадратичные формы. Закон инерции./Задача 12", "name": "Задача 12", "problems": [{"index": 0, "url": null, "content": "Даны две вещественные симметрические матрицы \\(2\\times2\\).\nМогут ли они задавать один и тот же линейный оператор, только в разных базисах?\n\nHint: https://shadhelper.notion.site/bd1982dad2f147d0957c13f4d3e4c8e0"}]}, {"id": "ysda/2018/Алгебра/Векторные пространства,Ранг матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — квадратная матрица \\(n\\times n\\). Докажите, что \\(n-rkA\\geqslant rkA-rkA^{2}\\).\n\nHint: https://shadhelper.notion.site/7df9846899fd4cf6bd9e556a176d8784"}]}, {"id": "ysda/2018/Алгебра/Векторные пространства. Базис размерность/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Проверить, являются ли вектора базисом векторного пространства.\n\nHint: https://shadhelper.notion.site/cc856c311319486aad2e484102faff68"}]}, {"id": "ysda/2018/Алгебра/Векторные пространства. Базис размерность,Поля/Задача 10", "name": "Задача 10", "problems": [{"index": 0, "url": null, "content": "Найти количество базисов в пространстве \\({F_q}^n\\), где \\(F_q\\) - конечное поле.\n\nHint: https://shadhelper.notion.site/9748d2bb02a74ff19f037a499b87667e"}]}, {"id": "ysda/2018/Алгебра/Комплексные числа,Линейные отображения и матрицы ранги/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "\\(B^2 = A\\), значит \\(B\\) - квадратный корень из \\(A\\). Сколько у матрицы может быть квадратных корней (матрицы над комплексными числами)\n\nHint: https://shadhelper.notion.site/8d0a38c3e4174e5897f5ed832fb430d0"}]}, {"id": "ysda/2018/Алгебра/Комплексные числа,Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 16", "name": "Задача 16", "problems": [{"index": 0, "url": null, "content": "У матрицы \\(A\\) собственные значения известны \\(\\lambda_1,\\dots,\\lambda_n\\).\nОператор \\(\\Phi\\) из пространства матриц в пространство матриц комплекснозначных: \\(\\Phi(X) = AX + XA\\). Найти собственные значения \\(\\Phi\\).\n\nHint: https://shadhelper.notion.site/f25ec9a8e3e846e2b6d761670a751321"}]}, {"id": "ysda/2018/Алгебра/Комплексные числа,Линейные отображения и матрицы ранги.,Линейные отображения и матрицы ранги/Задача 19", "name": "Задача 19", "problems": [{"index": 0, "url": null, "content": "Найти \\(\\{ | {B : B^2 = A} |\\) , где \\(A \\in\\) множество линейных операторов над конечномерными векторными пространствами над полем \\(\\mathbb{C}\\}\\), где\n\\(|x|\\) означает мощность множества. (т.е. найти множество мощностей квадратных корней линейных операторов)\n\nHint: https://shadhelper.notion.site/e832d631f4644bbd894c8484b8758098"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Задача 1\nПусть \\(A\\) — квадратная матрица \\(n \\times n\\). Докажите, что \\(n-\\operatorname{rk} A \\geqslant \\operatorname{rk} A-\\operatorname{rk} A^{2}\\)\n🤫 Подсказки\n🤔 Решение\nОтвет\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/60250984a15c4bfeb0cac94d72da1f9d"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги./Задача 15", "name": "Задача 15", "problems": [{"index": 0, "url": null, "content": "Опишите класс матриц \\(A\\) для которых выполняется \\(A^{-1} = p(A)\\), \\(p(A)\\) - это многочлен\n\nHint: https://shadhelper.notion.site/450a76e9dc994e3c859330290468833e"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги./Задача 17", "name": "Задача 17", "problems": [{"index": 0, "url": null, "content": "В матрице \\(A\\) сумма элементов каждой строки \\(= s\\), существует обратная. Что можно сказать про суммы элементов обратной матрицы?\n\nHint: https://shadhelper.notion.site/fc1c262d1d8f4cf28c7706ff8e32ac4f"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Сколько существует матриц \\(M \\times N\\), элементы которых равны \\(\\pm 1\\), и произведение всех элементов в каждом столбце и каждой строке равно \\(1\\)?\n\nHint: https://shadhelper.notion.site/3244478b4e5f4e37bacd45d2286859a3"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Дана матрица линейного оператора в жордановой форме. Найти все инвариантные подпространства данного оператора.\n\nHint: https://shadhelper.notion.site/f7b9e8f7b186428bb19c2efefd26e98d"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Написать матрицу линейного оператора, имеющего только \\(1\\) собственный вектор.\n\nHint: https://shadhelper.notion.site/da41bb3cebc54798ad04f27599b7918f"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Написать матрицу линейного оператора, не имеющего собственных векторов, но имеющего инвариантные подпространства.\n\nHint: https://shadhelper.notion.site/f5f42049a8cf40f78c1025fe3067515d"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Найти общий вид жордановой клетки в \\(k\\)-й степени \\((J_n^k(\\lambda))\\)\n\nHint: https://shadhelper.notion.site/c616115fb7524d0e9d79b8078581617f"}]}, {"id": "ysda/2018/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 9", "name": "Задача 9", "problems": [{"index": 0, "url": null, "content": "Какие могут быть характеристические корни у матрицы \\(A\\), если \\(A^4 = A^2\\). Указать явно матрицу, у которой будут все возможные в данном случае корни.\n\nHint: https://shadhelper.notion.site/a0589d327a744bea9c1c5ef2d91345ef"}]}, {"id": "ysda/2018/Алгебра/Матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Существуют ли ортогональные кососимметричные матрицы \\(2019\\times2019\\)?\nА \\(2018\\times2018\\)?\n\nHint: https://shadhelper.notion.site/152405e6456440d78854c62cdc2225f4"}]}, {"id": "ysda/2018/Алгебра/Определители/Задача 13", "name": "Задача 13", "problems": [{"index": 0, "url": null, "content": "У действительных матриц \\(2\\times2\\) совпадают след и определитель. Могут ли они задавать один и тот же оператор?\n\nHint: https://shadhelper.notion.site/c5f209ed77e3498f9e2633a2b8123ba4"}]}, {"id": "ysda/2018/Алгебра/Определители/Задача 2 (2)", "name": "Задача 2 (2)", "problems": [{"index": 0, "url": null, "content": "Посчитать определитель матрицы размера \\(n\\), где \\(n\\) - любое число\n\nHint: https://shadhelper.notion.site/f346e3d25c1a4b0a9e66109519012a60"}]}, {"id": "ysda/2018/Алгебра/Определители/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "(a) Докажите, что функции \\(det(X),det(X+E)\\) и \\(det(X-E)\\) на пространстве комплексных матриц \\(3\\times3\\) линейно независимы.\n(b) Докажите, что найдется \\(m\\in N\\), для которого набор функций\n\\(det(X-mE),det(X-(m-1)E),det(X-(m-2)E),\\ldots,det(X+mE)\\)\nлинейно зависим.\n\nHint: https://shadhelper.notion.site/0124a027d2c04c05ae9ed923a642b925"}]}, {"id": "ysda/2018/Алгебра/Определители/Задача 5 (2)", "name": "Задача 5 (2)", "problems": [{"index": 0, "url": null, "content": "Задача 5\nПусть \\(A\\) и \\(B\\) — ортогональные матрицы (не ортогональные друг другу, а просто ортогональные!). Докажите, что\n\\[\n\\det(A^TB - B^TA) =\\det(A+B)\\cdot \\det(A-B)\n\\]\n🤫 Подсказки\n🤔 Решение\nОтвет\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/bd4244eed3e04c869fc73ca83b1765e3"}]}, {"id": "ysda/2018/Алгебра/Определители/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — ортогональные матрицы (не ортогональные друг другу, а просто ортогональные!). Докажите, что \\(det(A^{T}B-B^{T}A)=det(A+B)det(A-B)\\).\n\nHint: https://shadhelper.notion.site/9ba5d52fc04949d3bf37c38ad2111e31"}]}, {"id": "ysda/2018/Алгебра/Перестановки./Задача 14", "name": "Задача 14", "problems": [{"index": 0, "url": null, "content": "Сколько существует подстановок длины \\(6\\), из которых можно извлечь квадратный корень?\n\nHint: https://shadhelper.notion.site/5e059e0b455a4bf38a7c2570b9cc567c"}]}, {"id": "ysda/2018/Алгебра/Перестановки./Задача 20", "name": "Задача 20", "problems": [{"index": 0, "url": null, "content": "Найти количество перестановок \\(s\\), таких что существует \\(\\tau: \\tau^2 = s\\)\n\nHint: https://shadhelper.notion.site/261d4afa93c9453f9461a8baea53011e"}]}, {"id": "ysda/2018/Алгебра/Спектральная теория матриц/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Линейный оператор \\(A:\\mathbb{R}^{n}\\rightarrow\\mathbb{R}^{n}\\) таков, что \\(A^{3}\\) — это оператор проекции. Какие собственные значения может иметь \\(A\\)? Верно ли, что \\(A\\) будет иметь диагональную\nматрицу в каком-либо базисе \\(\\mathbb{R}^{n}\\)?\n\nHint: https://shadhelper.notion.site/df0c03b5af6d46e5b84dca331fe68f2d"}]}, {"id": "ysda/2018/Алгебра/Спектральная теория матриц/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Для двух квадратных матриц \\(A\\) и \\(B\\) одного и того же размера \\(n\\) обозначим через\n\\(A\\bigstar B\\) матрицу, определяемую следующим образом:\n\\[\n(A\\bigstar B)_{ij}=\\begin{cases}(AB)_{ij} & \\text{если}\\:i\\:\\text{нечетно},\\\\b_{ij}, & \\text{иначе}.\\end{cases}\n\\]\nДля матрицы \\(A\\) определим оператор \\(\\Phi_{A}:B\\mapsto A\\bigstar B\\) на пространстве матриц \\(n\\times n\\).\n(a) Может ли этот оператор иметь собственное значение \\(2\\) для какой-либо матрицы \\(A\\)?\n(b) Какое наибольшее число различных собственных значений может иметь\nтакой оператор (при фиксированном \\(n\\))?\n\nHint: https://shadhelper.notion.site/44173bda7c094ec5893a0c0b3e1eb27a"}]}, {"id": "ysda/2018/Алгебра/ТЧ/Задача 18", "name": "Задача 18", "problems": [{"index": 0, "url": null, "content": "Сколько существует разложений числа \\(N\\) в сумму \\(r\\) четных и \\(s\\) нечётных целых неотрицательных чисел?\n\nHint: https://shadhelper.notion.site/157c81cb93db4330a33acf2233b08fea"}]}, {"id": "ysda/2018/Математический анализ/Дифференциальное исчисления функций многих переменных./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Найти дифференциал функции двух переменных: \\(d(xy^{xy})\\)\n\nHint: https://shadhelper.notion.site/704d1a5823674bdc9fb097e010ae0f9c"}]}, {"id": "ysda/2018/Математический анализ/Дифференцируемость./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Дана функция \\(f(x) = (\\sin{x})^{\\cos{x}}\\).\nНайти область определения и вычислить производную.\n\nHint: https://shadhelper.notion.site/9ab9c331aad3474ab6576a082b862117"}]}, {"id": "ysda/2018/Математический анализ/Дифференцируемость./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Найти производную \\(x^x\\)\n\nHint: https://shadhelper.notion.site/bc93b9ecb4ff4feaa60f5dd3195f92b0"}]}, {"id": "ysda/2018/Математический анализ/Интегралы/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Определите, сколько корней имеет уравнение\n\\[\n\\int \\limits_x^{x+\\frac{1}{2}} \\cos\\left(\\frac{t^2}{3}\\right)=0\n\\]\nна отрезке \\([0,3]\\).\n\nHint: https://shadhelper.notion.site/7938f5df6abb4c699def1d03ddb5c238"}]}, {"id": "ysda/2018/Математический анализ/Интегралы/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "(a) Для непрерывной функции \\(f(x)\\) найдите\n\\[\n\\frac{d}{da} \\iint \\limits_{-a\\leqslant x,y \\leqslant a} f\\left(\\frac{x+y}{2}\\right) dxdy.\n\\]\n(b) Опишите все непрерывные функции \\(f(x)\\), для которых при всех \\(a\\in\\mathbb{R}\\) имеет место равенство\n\\[\n\\iint \\limits_{-a\\leqslant x,y \\leqslant a} f\\left(\\frac{x+y}{2}\\right) dxdy = \\int \\limits_{-a}^a f(x)\\ dx.\n\\]\n\nHint: https://shadhelper.notion.site/e4836a7a320d45b2bca7e53fba83b7a7"}]}, {"id": "ysda/2018/Математический анализ/Непрерывность./Задача 13", "name": "Задача 13", "problems": [{"index": 0, "url": null, "content": "Доказать, что функция выпуклая на всем \\(\\mathbb{R}\\) непрерывна.\n\nHint: https://shadhelper.notion.site/8cb1937baff948eca7e9d76d687c6497"}]}, {"id": "ysda/2018/Математический анализ/Непрерывные функции/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Верно ли, что всякая нечётная непрерывная функция, удовлетворяющая условию \\(f(x)=2f(x)\\), линейна?\n\nHint: https://shadhelper.notion.site/ef0c98c5075d481f91ab9a7a7c6653e9"}]}, {"id": "ysda/2018/Математический анализ/Несобственный интеграл./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Найти интеграл \\(\\int \\arctg{x}dx\\)\n\nHint: https://shadhelper.notion.site/d017bc14a58c412cbd06c0be68adbee1"}]}, {"id": "ysda/2018/Математический анализ/Предел функции,Непрерывность/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Задача 4\nВерно ли, что всякая нечетная непрерывная функция, удовлетворяющая условию \\(f(2x) = 2f(x)\\), линейна.\n🤫 Подсказки\n🤔 Решение\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/a13f18cebab14f3fb8dd68ecdbe41de6"}]}, {"id": "ysda/2018/Математический анализ/Предел функции./Задача 9", "name": "Задача 9", "problems": [{"index": 0, "url": null, "content": "\\(\\lim\\limits_{x\\to 0}x^{\\sin x}\\)\n\nHint: https://shadhelper.notion.site/f903c1db0a254ca0ae137323eded1465"}]}, {"id": "ysda/2018/Математический анализ/Предел функции.,Несобственный интеграл.,Интегралы зависящие от параметра./Задача 10", "name": "Задача 10", "problems": [{"index": 0, "url": null, "content": "\\(\\lim\\limits_{n\\to \\infty}\\int\\frac{x^n}{x+1}dx\\)\n\nHint: https://shadhelper.notion.site/891f4c721635478c952dd1a5cbc56374"}]}, {"id": "ysda/2018/Математический анализ/Производные/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) — гладкая вещественная функция, причём \\(f(0)=0,\\ f(1) = 1\\). Докажите, что найдутся различные \\(x_1,x_2 \\in [0,1]\\), для которых\n\\[\n\\frac{1}{f'(x_1)} + \\frac{1}{f'(x_2)}=2.\n\\]\n\nHint: https://shadhelper.notion.site/8bca28947c1f46c5adf8121bffc35a0c"}]}, {"id": "ysda/2018/Математический анализ/Ряды/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\{\\xi_n\\}_{n\\geqslant 1}\\) — последовательность случайных величин, имеющих стандартное нормальное распределение. Сходится ли ряд\n\\[\n\\sum_{n=1}^{\\infty} P(\\xi_n>\\sqrt{2 \\ln n + 2 \\ln \\ln n})?\n\\]\n\nHint: https://shadhelper.notion.site/4c485b25aa484efaa5556022a9109f1d"}]}, {"id": "ysda/2018/Математический анализ/Степенные ряды./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Разложить \\(\\arctg{x}\\) в ряд Маклорена.\n\nHint: https://shadhelper.notion.site/fb002fee455e496c841c2473f47f28c4"}]}, {"id": "ysda/2018/Математический анализ/Функции многих переменных./Задача 12", "name": "Задача 12", "problems": [{"index": 0, "url": null, "content": "Сколько компонент связности у решений уравнения \\(y^3 + 3xy^2 - x^3 = 1\\)?\n\nHint: https://shadhelper.notion.site/0816074157e049d8a2be9983a280dd7f"}]}, {"id": "ysda/2018/Математический анализ/Числовые последовательности/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Последовательность \\((a_n)\\) такова, что все \\(a_n \\in (0,1)\\) и, кроме того, \\(a_{n+1}<\\frac{a_n+a_{n-1}}{2}\\) . Верно ли, что \\(a_n\\) сходится? Найдите множество всех возможных пределов таких последовательностей.\n\nHint: https://shadhelper.notion.site/c86fc9f6f6b046d2beffed33ea306049"}]}, {"id": "ysda/2018/Математический анализ/Числовые ряды/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Задача 8\nПусть \\(\\{\\xi_n\\}_{n\\geqslant 1}\\) — последовательность случайных величин, имеющих стандартное нормальное распределение. Сходится ли ряд?\n\\[\n\\sum_{n=1}^{\\infty} P\\left(\\xi_n> \\sqrt{2 \\ln n+2 \\ln \\ln n}\\right)\n\\]\n🤫 Подсказки\n🤔 Решение\nОтвет\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/990170eb10ce4bdd914daca930d7d008"}]}, {"id": "ysda/2018/Математический анализ/Числовые ряды. Основные признаки абсолютной и условной сходимости./Задача 11", "name": "Задача 11", "problems": [{"index": 0, "url": null, "content": "Пусть ряд из \\(a_n \\geq 0\\) сходится, сходится ли ряд \\(b_n = 2^n \\cdot a_{2^n}\\) ?\n\nHint: https://shadhelper.notion.site/8d2c9d10d7e948ef92fa01d8b4169be4"}]}, {"id": "ysda/2018/Математический анализ/Числовые ряды. Основные признаки абсолютной и условной сходимости./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Если неотрицательный ряд \\(\\{a_n\\}\\) сходится, сходится ли ряд из \\(\\{\\tg(a_n)\\}\\)?\n\nHint: https://shadhelper.notion.site/50e28426564643a499c5289bdf54fb14"}]}, {"id": "ysda/2018/Математический анализ/Числовые ряды. Основные признаки абсолютной и условной сходимости./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Исследовать на сходимость \\(A = \\sum_{n = 2}^{\\infty}\\frac{\\sin n}{\\ln n}\\)\n\nHint: https://shadhelper.notion.site/f7ae2c8852a24efaa338baebacd6d090"}]}, {"id": "ysda/2018/Теория вероятностей/Геометрические вероятности/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "На отрезке \\([0,1]\\) в точках \\(x\\), \\(y\\), независимо выбранных из равномерного распределения, находится два детектора элементарных частиц. Детектор засекает частицу, если она пролетает на расстоянии не более \\(\\dfrac{1}{3}\\) от него. Известно, что поля восприятия детекторов покрывают весь отрезок. С какой вероятностью \\(y>\\dfrac{5}{6}\\)?\n\nHint: https://shadhelper.notion.site/67a886a29f824e2c89fe5398457567aa"}]}, {"id": "ysda/2018/Теория вероятностей/Геометрические вероятности./Задача 12", "name": "Задача 12", "problems": [{"index": 0, "url": null, "content": "\\(x\\) и \\(y\\) случайные точки на отрезке \\([0, 1]\\), найти вероятность того, что можно составить треугольник из отсекаемых отрезков.\n\nHint: https://shadhelper.notion.site/852434bf50c048ae95131c5b51927740"}]}, {"id": "ysda/2018/Теория вероятностей/Геометрические вероятности./Задача 39", "name": "Задача 39", "problems": [{"index": 0, "url": null, "content": "Случайная точка \\(A\\) делит отрезок \\([0, 1]\\) на две части. Пусть \\(M\\) - длина большей части, а \\(m\\) - длина меньшей. Найдите вероятности \\(P(M = x)\\) и \\(P(m = x)\\) при каждом \\(x\\).\n\nHint: https://shadhelper.notion.site/8491fe4f8f2a4f19aed74c9034940e89"}]}, {"id": "ysda/2018/Теория вероятностей/Геометрические вероятности./Задача 40", "name": "Задача 40", "problems": [{"index": 0, "url": null, "content": "Палочку длиной \\(1\\) разламывают в двух местах случайным образом. Найдите вероятность того, что из полученных частей можно сложить треугольник.\n\nHint: https://shadhelper.notion.site/82e3889369b24f409d2e972a7db53590"}]}, {"id": "ysda/2018/Теория вероятностей/Геометрические вероятности./Задача 41", "name": "Задача 41", "problems": [{"index": 0, "url": null, "content": "Три человека загадали по числу из отрезка \\([0, 1]\\). Какова вероятность того, что существует треугольник с заданными сторонами?\n\nHint: https://shadhelper.notion.site/0aa41bece40848d6b81e711c78a1b655"}]}, {"id": "ysda/2018/Теория вероятностей/Дискретные случайные величины/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(X\\) равна длине цикла, содержащего одновременно элементы \\(1\\) и \\(2\\), при случайной перестановке множества \\(\\{1,2,\\ldots,n\\}\\). Если такого цикла нет, то \\(X=0\\). Найдите распределение случайной величины \\(X\\) и ее математическое ожидание.\n\nHint: https://shadhelper.notion.site/63491a73638c49b4a6ab801b3c330010"}]}, {"id": "ysda/2018/Теория вероятностей/Дискретные случайные величины/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Вы попали в лабиринт, состоящий из нескольких комнат, соединенных системой двусторонних порталов. Каждый портал соединяет только одну пару комнат лабиринта. Порталом можно пользоваться неограниченное число раз. Вы появляетесь в комнате \\(v_1\\) и прыжками перемещаетесь между комнатами. В комнате \\(v_6\\) находится выход из лабиринта. Предположим, что каждый следующий портал для прыжка вы выбираете случайно и равновероятно среди всех порталов в этой комнате, включая портал до предыдущей комнаты. Найдите математическое ожидание количества прыжков до первого попадания в \\(v_6\\).\nСхема лабиринта:\nmaze.png\n\nHint: https://shadhelper.notion.site/99aaa8d53b924842b034b3afc94e7e12"}]}, {"id": "ysda/2018/Теория вероятностей/Классическая вероятность./Задача 19", "name": "Задача 19", "problems": [{"index": 0, "url": null, "content": "Какова вероятность того, что в группе из \\(25\\) человек хотя бы двое родились в один день?\n\nHint: https://shadhelper.notion.site/c46e8c45ae8045de9cc913832a9fb251"}]}, {"id": "ysda/2018/Теория вероятностей/Классическая вероятность./Задача 22", "name": "Задача 22", "problems": [{"index": 0, "url": null, "content": "Последовательно бросают \\(n\\) правильных монет. Какова вероятность того, что не выпадет подряд:\nорел и решка,\nдва орла\n\nHint: https://shadhelper.notion.site/3b137c24ee89411388470776e246e051"}]}, {"id": "ysda/2018/Теория вероятностей/Классическая вероятность./Задача 23", "name": "Задача 23", "problems": [{"index": 0, "url": null, "content": "Задача n\nПо \\(n\\) ящикам раскладывается \\(m\\) шаров случайным образом. Какова вероятность того, что в каждом ящике есть хотя бы один шар?\n\nHint: https://shadhelper.notion.site/bda6bbc998aa4328b3fdbaf485bb9968"}]}, {"id": "ysda/2018/Теория вероятностей/Классическая вероятность./Задача 24", "name": "Задача 24", "problems": [{"index": 0, "url": null, "content": "Алиса и Боб случайно подбрасывают \\(n\\) монет. Какова вероятность того, что число орлов у Алисы будет строго больше, чем у Боба? Каков будет ответ на этот вопрос, если Алиса подбросила \\(n + 1\\) монету?\n\nHint: https://shadhelper.notion.site/5de2f197ec65446da4806a13a2a9fe42"}]}, {"id": "ysda/2018/Теория вероятностей/Комбинаторика/Задача 2 (2)", "name": "Задача 2 (2)", "problems": [{"index": 0, "url": null, "content": "Сколькими способами \\(n\\) различных четных чисел и \\(n\\) различных нечетных чисел можно записать в таблицу \\(2\\times n\\) таким образом, чтобы нечетное число никогда не стояло под четным? Ответ должен содержать не более одной суммы.\n\nHint: https://shadhelper.notion.site/93044d2c0ed44e38afabe3c3d99b7156"}]}, {"id": "ysda/2018/Теория вероятностей/Комбинаторика/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Задача 2\nСколькими способами \\(n\\) различных четных чисел и \\(n\\) различных нечетных чисел можно записать в таблицу \\(2\\times n\\) таким образом, чтобы нечетное число никогда не стояло под четным? Ответ должен содержать не более одной суммы.\n🤫 Подсказки\n🤔 Решение\nОтвет\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/556e6f162577473a9aef11599db82295"}]}, {"id": "ysda/2018/Теория вероятностей/Конечные марковские цепи./Задача 10", "name": "Задача 10", "problems": [{"index": 0, "url": null, "content": "Есть три башни, расположенные в углах правильного треугольника. На первой сидит дракон. Дракон перелетает равновероятно в каждый момент времени на одну из соседних башен. Найти математическое ожидание числа перелётов, после которых он вернётся на исходную башню.\n\nHint: https://shadhelper.notion.site/651bf11f421c4cee91a89873e1da7f58"}]}, {"id": "ysda/2018/Теория вероятностей/Конечные марковские цепи./Задача 11", "name": "Задача 11", "problems": [{"index": 0, "url": null, "content": "В самолёте \\(N\\) мест. Первой в самолёт заходит сумасшедшая старушка и занимает произвольное место (возможно, что и своё). После этого каждый пассажир действует следующим образом: если его место свободно, он садится на него, если нет – то он занимает одно из свободных мест произвольным образом. Найти вероятность того, что последний пассажир займёт своё место.\n\nHint: https://shadhelper.notion.site/844ed021293047eeb4a032aaaf570fbe"}]}, {"id": "ysda/2018/Теория вероятностей/Математические ожидания функций случайных величин/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Задача 3\nНа станцию приходят в случайное время две электрички. Времена их приходов независимы и имеют экспоненциальное распределение с плотностью \\(e^{-x}\\) при \\(x>0\\). Студент приходит на станцию в момент времени \\(2\\). Найдите:\na) вероятность того, что он сможет уехать хотя бы на одной электричке;\nб) математическое ожидание времени ожидания студентом ближайшей электрички (считаем, что время ожидания равно нулю, если студент опоздал на обе электрички).\n🤫 Подсказки\n🤔 Решение\nОтвет\n📽 Видео-решение\n\nHint: https://shadhelper.notion.site/ae239dbbdba64188aaa6e0df8a4c1a11"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Дана случайная подстановка длины \\(n\\), найти матожидание числа неподвижных точек.\n\nHint: https://shadhelper.notion.site/9e79d9901df24a10bb415694c753a8fc"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 31", "name": "Задача 31", "problems": [{"index": 0, "url": null, "content": "Вычислить \\(E\\xi\\) и \\(D\\xi\\), если:\n\\(\\xi\\) имеет распределение Бернулли;\n\\(\\xi\\) имеет биномиальное распределение \\(Bin(n, p)\\)\n\nHint: https://shadhelper.notion.site/81c4d7f1c5b84d6a97cfa9b410cd02c9"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 32", "name": "Задача 32", "problems": [{"index": 0, "url": null, "content": "Бросают три игральные кости. Найдите математическое ожидание и дисперсию числа выпавших очков.\n\nHint: https://shadhelper.notion.site/f9700701260d497b8d898b70c881a0d1"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 33", "name": "Задача 33", "problems": [{"index": 0, "url": null, "content": "\\(n\\) писем случайным образом разложили по \\(n\\) конвертам с уже подписанными адресами. Найдите математическое ожидание и дисперсию количества писем, лежащих в конвертах с правильными адресами.\n\nHint: https://shadhelper.notion.site/899002a183484e0eb7b856737ea72202"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 34", "name": "Задача 34", "problems": [{"index": 0, "url": null, "content": "Правильную монету подбрасывают до первого выпадения орла. Пусть \\(\\xi\\) есть номер испытания, в котором орел выпал впервые. Найдите математическое ожидание и дисперсию случайной величины \\(\\xi\\).\n\nHint: https://shadhelper.notion.site/33bb064f714441edb73f3e5042b1a633"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Дана монета с вероятностями выпадения орла – \\(p\\), решки – \\(q\\). Найти математическое ожидание числа выпадений орла при \\(n\\) бросаниях.\nJul 2, 2018\n\nHint: https://shadhelper.notion.site/adf0d3121264430190c128b2588536a6"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "В колоде \\(20\\) карт, на каждой - номер \\(0, \\dots , 19,\\) все номера различные. Вынули \\(5\\)карт, найти математическое ожидание суммы цифр на вынутых картах.\n\nHint: https://shadhelper.notion.site/684e7635f6864130b4730e215f6b9520"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание непрерывных случайных величин./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Посчитать дисперсию функции распределения по заданной функции плотности вероятности.\n\nHint: https://shadhelper.notion.site/b0be599871294015960427c15fd3292e"}]}, {"id": "ysda/2018/Теория вероятностей/Математическое ожидание непрерывных случайных величин./Задача 46", "name": "Задача 46", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(\\xi\\) имеет нормальное распределение \\(N(\\mu, \\sigma^2)\\). Вычислите \\(E\\xi\\) и \\(D\\xi\\).\n\nHint: https://shadhelper.notion.site/e226064b82e34b49ab331db9baf5b3c5"}]}, {"id": "ysda/2018/Теория вероятностей/Независиомть событий./Задача 29", "name": "Задача 29", "problems": [{"index": 0, "url": null, "content": "События \\(A, B\\) и \\(C\\) попарно независимы и равновероятны, их пересечение - пустое множество.\nКакое максимально возможное значение может принимать величина \\(P(A)\\)?\n\nHint: https://shadhelper.notion.site/59b72bf0490f4ce6ac9909a04c7857cc"}]}, {"id": "ysda/2018/Теория вероятностей/Простейшее случайное блуждание./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Задача про пьяницу. Пьяница двигается по одномерной прямой, влево или вправо с вероятностью \\(p\\) или \\(q\\) соответственно. В \\(N\\) шагах справа от него пропасть. Найти вероятность того, что он упадёт в яму.\n\nHint: https://shadhelper.notion.site/376f993b0a4d459a82f0aa5d20eb60a6"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 14", "name": "Задача 14", "problems": [{"index": 0, "url": null, "content": "Есть ли такие \\(2\\) случайные величины, что их сумма распределена равномерно?\n\nHint: https://shadhelper.notion.site/fbad087ae251481ea79003dbcac9971b"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 15", "name": "Задача 15", "problems": [{"index": 0, "url": null, "content": "Есть ли такие \\(2\\) непрерывные случайные величины, что их сумма распределена равномерно?\n\nHint: https://shadhelper.notion.site/f2b116b4e5bf40c7857a0da14f2b04fb"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 17", "name": "Задача 17", "problems": [{"index": 0, "url": null, "content": "\\(n\\) независимых одинаково распределенных величин на \\([0, 1]\\). Найти матожидание минимума.\n\nHint: https://shadhelper.notion.site/8e2e083ff9494635adfa6df472aa6c8d"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 35", "name": "Задача 35", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\xi_2\\) - независимые случайные величины, имеющие биномиальное распределение \\(\\xi_i \\sim Bin(n_i, p)\\). Как распределена случайная величина \\(\\xi_1 + \\xi_2\\)?\n\nHint: https://shadhelper.notion.site/11033b5699804d8d963134fe6f20fd3e"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 36", "name": "Задача 36", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\xi_2\\) - независимые случайные величины, имеющие распределение Пуассона \\(\\xi_i \\sim Pois(n_i, p)\\). Как распределена случайная величина \\(\\xi_1 + \\xi_2\\)?\n\nHint: https://shadhelper.notion.site/3496794fd7b44fffa91c7edf50a778ae"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 37", "name": "Задача 37", "problems": [{"index": 0, "url": null, "content": "Предположим, что случайная величина \\(\\xi\\) имеет симметричное распределение, т.е. \\(P (\\xi = x) = P (\\xi = - x)\\), а случайная величина \\(\\eta\\) принимает значения \\(1\\) и \\(-1\\) с вероятностью \\(1/2\\). Докажите, что случайные величины \\(\\xi\\) и \\(\\xi\\eta\\) имеют одинаковое распределение.\nСлучайные величины \\(X, Y, Z, W\\) независимы в совокупности и одинаково распределены: каждая принимает значения \\(1\\) и \\(-1\\) с вероятностью \\(1/2\\). Являются ли независимыми в совокупности следующие наборы случайных величин:\n\\(XYZ, XYW, XW\\)\n\\(XY, XYW, XW, XZW\\)\n\nHint: https://shadhelper.notion.site/f0f79d5b482c498aad152949d15c36da"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 43", "name": "Задача 43", "problems": [{"index": 0, "url": null, "content": "Пусть точка \\((x, y)\\) выбирается из круга равномерно. Найдите плотность распределения случайной величины \\(x\\).\n\nHint: https://shadhelper.notion.site/211b534fd51548e5a091481f6a7a2a14"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 44", "name": "Задача 44", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi\\) и \\(\\eta\\) независимы, причем \\(\\xi\\) равномерно\nраспределена на отрезке \\([0, 1]\\), а \\(\\eta\\) - Бернуллиевская случайная\nвеличина с вероятностью успеха \\(p\\). Найдите плотность распределения случайной величины \\(\\xi + \\eta\\).\n\nHint: https://shadhelper.notion.site/e4379da2a3d3462580dadd7c585e0313"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 45", "name": "Задача 45", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) независимы и каждая из них равномерно распределена на отрезке \\([0, 1]\\). Найдите плотность распределения случайной величины \\(\\xi + \\eta\\).\n\nHint: https://shadhelper.notion.site/1fd53b5fa3394ce5bdfe92aa9f05fd80"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 48", "name": "Задача 48", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых случайных величин \\(\\xi_n\\), каждая из которых имеет экспоненциальное распределение с параметром \\(n + 1\\). Пусть случайная величина \\(\\eta\\) имеет распределение Пуассона с параметром \\(\\lambda\\) и независима с величинами \\(\\xi_1, \\dots, \\xi_n, \\dots\\) Вычислите \\(E\\xi\\eta\\).\n\nHint: https://shadhelper.notion.site/c7b3e36ed92a4d1e858c1f922a1ad4c9"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 49", "name": "Задача 49", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайной величины \\(\\xi + \\eta\\).\n\nHint: https://shadhelper.notion.site/bc45731d86f144c0a9c03b57e996946e"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 50", "name": "Задача 50", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют нормальное распределение \\(N(0, 1)\\). Найдите плотность распределения случайной величины \\(\\xi + \\eta\\).\n\nHint: https://shadhelper.notion.site/d032767e52e64adf8dde6f6ff081ba78"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 51", "name": "Задача 51", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют экспоненциальное распределение с параметром \\(1\\). Найдите плотность распределения случайной величины \\(\\xi/\\eta\\).\n\nHint: https://shadhelper.notion.site/20627c8adca74e07a4955e35cf10b98c"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 52", "name": "Задача 52", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайной величины \\(\\xi\\eta\\).\n\nHint: https://shadhelper.notion.site/06dcfdcad1aa498f95581cce236755f4"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 53", "name": "Задача 53", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют нормальное распределение \\(N(0, 1)\\). Найдите плотность распределения случайной величины \\(\\xi/\\eta\\).\n\nHint: https://shadhelper.notion.site/48386127d8b54aa0907ee90ed59c1eff"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 54", "name": "Задача 54", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют экспоненциальное распределение с параметром \\(1\\). Найдите плотность распределения случайного вектора \\((\\xi, \\xi + \\eta)\\).\n\nHint: https://shadhelper.notion.site/a8ed6aedcc7a4c3aa295d3f4a3a4de0f"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 55", "name": "Задача 55", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\dots , \\xi_n\\) - последовательность независимых случайных величин, равномерно распределенных на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\xi(1), \\xi(n))\\), где \\(\\xi(1) = \\min(\\xi_1, \\dots , \\xi_n)\\), а \\(\\xi(n) = \\max(\\xi_1, \\dots , \\xi_n)\\).\n\nHint: https://shadhelper.notion.site/f46e7af03ccf4abbaf60a36a0dee0042"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 56", "name": "Задача 56", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(2\\pi\\eta),\\sqrt{-2\\ln\\xi}\\sin(2\\pi\\eta))\\)\n\nHint: https://shadhelper.notion.site/b485ce0e7550470c94a413319a9864a1"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные векторы./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi_1, \\dots, \\xi_n\\) независимы и имеют\nравномерное распределение на отрезке \\([0,1]\\). Пусть \\(\\eta = \\max(\\xi_1, \\dots, \\xi_n)\\), \\(\\zeta = \\min(\\xi_1, \\dots, \\xi_n)\\). Найти \\(E(\\eta), E(\\zeta), D(\\eta), D(\\zeta)\\).\n\nHint: https://shadhelper.notion.site/56ec47b862fd44a4afdf52e8547fbe30"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины в общем случае/Задача 3 (2)", "name": "Задача 3 (2)", "problems": [{"index": 0, "url": null, "content": "На станцию приходят в случайное время две электрички. Времена их приходов независимы и имеют экспоненциальное распределение с плотностью \\(e^{-x}\\) при \\(x>0\\).\nСтудент приходит на станцию в момент времени \\(2\\). Найдите\na) вероятность того, что он сможет уехать хотя бы на одной электричке;\nб) математическое ожидание времени ожидания студентом ближайшей электрички (считаем, что время ожидания равно нулю, если студент опоздал на обе электрички).\n\nHint: https://shadhelper.notion.site/976837e8b43b4d25af4e22abe8416e7c"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины в общем случае/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(X\\) и \\(Y\\) независимы. \\(X\\) имеет распределение Лапласа с плотностью \\(\\dfrac{1}{2}e^{-|x|}\\), а \\(Y\\) — равномерное на отрезке \\([1,2]\\). Найдите плотность распределения случайной величины \\(X- 2 Y\\).\n\nHint: https://shadhelper.notion.site/284402eade954f81b9de545633e7ccab"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины в общем случае/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\{\\xi_n\\}_{n\\geqslant 1}\\) — последовательность случайных величин, имеющих стандартное нормальное распределение. Сходится ли ряд:\n\\[\n\\sum_{n=1}^{\\infty} P(\\xi_n>\\sqrt{2\\ln n + 2 \\ln \\ln n}) ?\n\\]\n\nHint: https://shadhelper.notion.site/4882ca7df1204630bf533ea9f672f034"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Две случайные величины имеют какое-то распределение на отрезке \\([−1, 1]\\) какова их максимальная ковариация?\n\nHint: https://shadhelper.notion.site/ec918f9239b14855b7e6f7e0a65dccdf"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины. Распределение случайных величин./Задача 18", "name": "Задача 18", "problems": [{"index": 0, "url": null, "content": "Привести пример плотности распределения (непрерывной) случайной величины \\(\\xi\\) и непрерывной фукнции \\(g\\), таких что \\(\\eta = g(\\xi)\\) имеет:\nдискретное распределение,\nневырожденное дискретное распределение\n\nHint: https://shadhelper.notion.site/797a66560e15465e9399eed397fc05eb"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины. Распределение случайных величин./Задача 38", "name": "Задача 38", "problems": [{"index": 0, "url": null, "content": "Правильный \\(N\\)-гранный кубик бросили \\(n\\) раз. Пусть \\(\\xi_{(n)}\\) - максимальное выпавшее число очков. Найдите распределение \\(\\xi_{(n)}\\). Найдите \\(E\\xi_{(n)}\\). Покажите, что \\(\\xi_{(n)}\\)сходится к \\(N\\) по вероятности.\n\nHint: https://shadhelper.notion.site/0d9c7da161a94d72b70facc168ac6db5"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины. Распределение случайных величин./Задача 42", "name": "Задача 42", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(\\xi \\sim N(0, 1)\\). Найдите плотность распределения случайной величины \\(\\xi^2\\).\n\nHint: https://shadhelper.notion.site/2cedb23472624e448d4a85edd266cf08"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины. Распределение случайных величин./Задача 47", "name": "Задача 47", "problems": [{"index": 0, "url": null, "content": "Пусть функция распределения случайной величины \\(\\xi\\) равна:\n\\[\nF(x) = \\begin{cases} 0, & x < 0\\\\ \\frac{x+1}{4}, & x \\in [0, 1)\\\\ \\frac{x^2 +2}{4}, & x \\in [1, \\sqrt{2})\\\\ 1, & x \\geq \\sqrt{2} \\end{cases}\n\\]\nВычислите \\(Ee^\\xi\\)\n\nHint: https://shadhelper.notion.site/60ff5e440d054a168400982e051e567b"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины.,Случайные векторы./Задача 13", "name": "Задача 13", "problems": [{"index": 0, "url": null, "content": "\\(P(x = a) = \\lambda, P(\\max(x,y) = a) = \\mu, P(\\min(x,y) = a) = \\nu\\)\n\\(P(y = a) =\\) ?\n\nHint: https://shadhelper.notion.site/3568900b69e344428eb0c01746318de1"}]}, {"id": "ysda/2018/Теория вероятностей/Случайные величины.,Условная вероятность./Задача 16", "name": "Задача 16", "problems": [{"index": 0, "url": null, "content": "\\(X \\sim N(0, 1)\\). Найти \\(\\lim\\limits_{t \\rightarrow \\infty} P(X > t + \\frac{X}{t} | X > t)\\)\n\nHint: https://shadhelper.notion.site/19d2d827e3e5481d9d2f3308df5c1e75"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 20", "name": "Задача 20", "problems": [{"index": 0, "url": null, "content": "Из \\(36\\) карточной колоды игроком случайным образом выбирается \\(6\\) карт. Игрок объявляет, что у него есть туз. Какова вероятность, что у него есть еще хотя бы один туз? Какова вероятность, что у него есть еще хотя бы один туз, если он объявил, что у него есть туз пик?\n\nHint: https://shadhelper.notion.site/4aee686767e341908c5fa7241929eef3"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 25", "name": "Задача 25", "problems": [{"index": 0, "url": null, "content": "Некий человек одновременно купил две коробки спичек, по \\(n\\) штук в каждой, и положил их в карман. После этого каждый раз, когда ему нужно было зажечь спичку, он доставал наудачу ту или иную коробку. Через некоторое время, вытащив одну из коробок, человек обнаружил, что она пуста. Какова вероятность того, что во второй коробке в этот момент находилось еще \\(k\\) спичек?\n\nHint: https://shadhelper.notion.site/7d6e6bfceba944f8aa020de71d8505b8"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 26", "name": "Задача 26", "problems": [{"index": 0, "url": null, "content": "В семье двое детей.\nКакова вероятность того, что в семье двое мальчиков, если известно, что в семье есть мальчик?\nКакова вероятность того, что один из детей мальчик, родившийся в понедельник?\n\nHint: https://shadhelper.notion.site/1a67f7b23f9940e8a7532b50b12ba0d5"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 27", "name": "Задача 27", "problems": [{"index": 0, "url": null, "content": "Вы участвуете в игре, в которой вам нужно выбрать одну из трёх дверей. За одной из дверей находится автомобиль, за двумя другими - козы. Вы выбираете одну из дверей (например 1-ую) после этого ведущий, который знает, где находится автомобиль, открывает одну из оставшихся дверей (например 3-ю) за которой находится коза. После этого ведущий предлагает вам изменить свой выбор и выбрать дверь номер 2. Увеличатся ли ваши шансы выиграть автомобиль, если вы\nпримете предложение ведущего и измените свой выбор?\n\nHint: https://shadhelper.notion.site/332386cf88cc4b39be5df9a84e264b64"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 28", "name": "Задача 28", "problems": [{"index": 0, "url": null, "content": "Три студента пишут контрольную работу из \\(4\\)-х задач. Первый студент решает любую задачу с вероятностью \\(3/4\\), второй - с вероятностью \\(1/2\\), третий - \\(1/4\\). Преподаватель получил анонимную работу с тремя решенными задачами. Кому данная работа скорее всего принадлежит?\n\nHint: https://shadhelper.notion.site/2bb008f439c842c194990ff374294192"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 30", "name": "Задача 30", "problems": [{"index": 0, "url": null, "content": "Игрок решил сыграть в напёрстки со ставкой \\(1\\) рубль. Изначально у него есть \\(10\\) рублей, а получить в итоге он хочет \\(1000\\) рублей. Какова вероятность, что он достигнет желаемого? Будет ли выгоднее, если игрок каждый раз будет идти ва-банк?\n\nHint: https://shadhelper.notion.site/fc9c5e5265154208a79135333cd6fee1"}]}, {"id": "ysda/2018/Теория вероятностей/Условная вероятность. Формулы полной вероятности./Задача 21", "name": "Задача 21", "problems": [{"index": 0, "url": null, "content": "Бросают два \\(n\\)-гранных кубика. Какова вероятность того, что суммарно выпадет \\(k \\in [2, 2n]\\) очков?\n\nHint: https://shadhelper.notion.site/f00fb40264304f3aafe1d1fbbcc9f55e"}]}, {"id": "ysda/2018/Теория вероятностей,Алгебра/Случайные величины./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Вероятность какого события больше: что случайная матрица диагонализируема или нет? Для упрощения можно считать, что матрица комплексная.\n\nHint: https://shadhelper.notion.site/c5b22f92a6ac41cc8923881a8bfe6925"}]}, {"id": "ysda/2018/Теория вероятностей,Алгебра/Случайные величины./Задача 9", "name": "Задача 9", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(n \\times n\\) со случайными значениями из конечного поля \\(F_q\\).\nНайти вероятность того, что матрица будет вырождена.\n\nHint: https://shadhelper.notion.site/c0962ee7b8cf4f53a3efcf2ee266217b"}]}, {"id": "ysda/2019/Алгебра/Билинейные и квадратичные формы. Закон инерции./Задача 23", "name": "Задача 23", "problems": [{"index": 0, "url": null, "content": "Доказать, что если \\((\\varphi -\\psi)\\) - положительно определенная квадратная форма, то \\(\\varphi\\) и \\(\\psi\\) диагонализируемы в одном и том же базисе.\n\nHint: https://shadhelper.notion.site/3ea2cac162034b4d98f5c3812179a762"}]}, {"id": "ysda/2019/Алгебра/Билинейные и квадратичные функции/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "При каком значении параметра \\(a\\in\\mathbb{R}\\) матрицы\n\\(A=\\left(\\begin{array}{cc}\n1 & 4-a-a^{2}\\\\\n2 & -1\n\\end{array}\\right)\\) и \\(B=\\left(\\begin{array}{cc}\n-a-1 & 3\\\\\n3 & 5\n\\end{array}\\right)\\)\nмогут быть матрицами одной и той же билинейной формы \\(V\\times V\\rightarrow\\mathbb{R}\\)\nв различных базисах?\n\nHint: https://shadhelper.notion.site/40cd042ddbfe417f9e16a52c7e2ed25e"}]}, {"id": "ysda/2019/Алгебра/Векторные пространства,Ранг матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Заполните третий столбец матрицы\n\\[\n\\frac{1}{6}\\left(\\begin{array}{ccc}\n\\ \\ \\ 5 & -2 & ?\\\\\n-2 & \\ \\ \\ 2 & ?\\\\\n-1 & -2 & ?\n\\end{array}\\right)\n\\]\nесли известно, что это матрица ортогональной проекции на некоторую\nплоскость.\n\nHint: https://shadhelper.notion.site/e4562b4439994ea595c37fd396eb73f3"}]}, {"id": "ysda/2019/Алгебра/Векторные пространства,Ранг матрицы/Задача 6 (2)", "name": "Задача 6 (2)", "problems": [{"index": 0, "url": null, "content": "Квадратная вещественная матрица \\(A\\) такова, что \\(A^{T}=p(A)\\), где \\(p(x)\\) — многочлен с ненулевым свободным членом. Докажите, что \\(A\\) обратима. Верно ли, что для любого оператора \\(\\varphi:\\mathbb{R}^{n}\\rightarrow\\mathbb{R}^{n}\\) найдётся многочлен \\(p(x)\\) и некоторый базис, в котором матрица \\(\\varphi\\)\nудовлетворяет условию \\(A^{T}=p(A)\\)?\n\nHint: https://shadhelper.notion.site/6e9fd794068545e09d669e74d2aa9a7d"}]}, {"id": "ysda/2019/Алгебра/Векторные пространства,Ранг матрицы/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Матрицы \\(A\\) и \\(B\\) таковы, что \\(A^{2}=A,\\) \\(B^{2}=B\\) и матрица\n\\(E-(A+B)\\) обратима. Докажите, что \\(rkA=rkB\\).\n\nHint: https://shadhelper.notion.site/3b57c970be0e44c48a8c7edcdf833680"}]}, {"id": "ysda/2019/Алгебра/Векторные пространства. Базис размерность. Подпространства./Задача 21", "name": "Задача 21", "problems": [{"index": 0, "url": null, "content": "Доказать:\n\\[\nker(A^TA+AA^T)=kerA \\cap kerA^T\n\\]\n\nHint: https://shadhelper.notion.site/c62d4e235b6846a28a50783e2971588a"}]}, {"id": "ysda/2019/Алгебра/Линейные отображения и матрицы ранги./Задача 22", "name": "Задача 22", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица вырождена тогда и только тогда, когда она - делитель нуля.\n\nHint: https://shadhelper.notion.site/788c1b0766b54ea896242710ee9c50ed"}]}, {"id": "ysda/2019/Алгебра/Спектральная теория матриц/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Верно ли, что для любых линейно-независимых \\(v,w\\in\\mathbb{R}^{n}\\) найдётся матрица \\(A\\) размера\n\\(n\\times n\\), для которой вектор \\(v\\) является собственным с собственным значением \\(5\\), а вектор \\(w\\) не лежит в образе? Если да, то найти хотя бы одну такую матрицу. Обязательно объясните ответ.\n\nHint: https://shadhelper.notion.site/e3edc32fc2224476a6b265a8bc77c85c"}]}, {"id": "ysda/2019/Алгебра/Спектральная теория матриц/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Для квадратной вещественной матрицы \\(A\\) размера \\(n\\times n\\) и вектора \\(v\\in\\mathbb{R}^{n}\\) положим:\n\\[\nU(A)=\\left\\{ X\\in Mat_{n}(\\mathbb{R})|\\:AX=XA\\right\\} ,\\;W(A,v)=\\left\\langle v,Av,A^{2}v,A^{3}v...\\right\\rangle\n\\]\n(а) Пусть матрица \\(A\\) такова, что \\(dimW(A,v)=n\\) для любого \\(v\\neq0\\).\nКакова максимально возможная размерность \\(U(A)\\)?\n(b) Пусть матрица \\(A\\) такова, что \\(dimW(A,v)<n\\) для любого \\(v\\).\nКакова минимально возможная размерность \\(U(A)\\)?\n\nHint: https://shadhelper.notion.site/01967bbbc5714c86a80ab0063f324575"}]}, {"id": "ysda/2019/Математический анализ/Интегралы/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Найдите предел\n\\[\n\\lim_{x\\to 0} \\int \\limits_0^x \\frac{\\cos (t^3)}{t+x}\\ dt.\n\\]\n\nHint: https://shadhelper.notion.site/fea03243e2ec47efb991ab12ee573b8e"}]}, {"id": "ysda/2019/Математический анализ/Интегралы/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Вещественнозначная функция \\(f\\) определена на отрезке \\([a;b] \\ \\ (b-a\\geqslant 4)\\) и дифференцируема на нём. Докажите, что найдётся точка \\(x_0 \\in (a,b)\\), для которой\n\\[\nf'(x_0)<1+f^2(x_0).\n\\]\n\nHint: https://shadhelper.notion.site/10a66eeb08df4e8986933a4a53339310"}]}, {"id": "ysda/2019/Математический анализ/Непрерывные функции/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Пусть \\(M\\) — множество непрерывных убывающих функций на отрезке \\([0,1]\\), для которых \\(f(1)=0\\). Найдите\n\\[\n\\inf_{f\\in M} \\sup_{x\\in [0,1]} \\frac{x f(x)}{\\int_0^1 f(t) dt}.\n\\]\n\nHint: https://shadhelper.notion.site/4613fd3747ac406aafc2d1434f89d6e9"}]}, {"id": "ysda/2019/Математический анализ/Предел функций/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Известно, что \\(\\lim_{x \\to 0} \\frac{f(x)}{\\sin x} =2\\). Чему равен предел \\(\\lim_{x\\to 0} \\frac{\\ln(1+3x)}{f(x)}\\)?\n\nHint: https://shadhelper.notion.site/6a615e7e78534198a3a7cdf0942df4fc"}]}, {"id": "ysda/2019/Математический анализ/Производные/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "На картинке ниже изображены градиенты бесконечно гладкой функции \\(f(x,y)\\) в узлах решетки с шагом \\(0.5\\) (вектор исходит из той точки, в которой вычисляется градиент).\ngradients.png\nУтверждается, что существуют прямые (более одной), вдоль которых матрица вторых производных\n\\[\n\\left(\\begin{array}{cc} \\frac{\\partial^2 f}{\\partial x^2} & \\frac{\\partial^2 f}{\\partial x \\partial y} \\\\ \\frac{\\partial^2 f}{\\partial x \\partial y} & \\frac{\\partial^2 f}{\\partial y^2} \\end{array}\\right)\n\\]\nвырождена.\n(a) Найдите и укажите их количество и угловые коэффициенты (то есть коэффициенты \\(a\\) в уравнении \\(y = ax+b\\)).\n(b) Верно ли, что существуют точки, в которых градиент не равен нулю, но, стартовав из которых, нельзя с помощью градиентного спуска прийти в точку минимума?\n\nHint: https://shadhelper.notion.site/555da5a44e554d758017e1be5b3847c9"}]}, {"id": "ysda/2019/Математический анализ/Ряды/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Что вы можете сказать о сходимости (абсолютной или условной) ряда \\(\\sum \\limits_{n=1}^{\\infty}(n+2019)a_n\\), если известно, что ряд \\(\\sum \\limits_{n=1}^{\\infty}(n-2019)a_n\\) сходится (а) абсолютно, (б) условно?\n\nHint: https://shadhelper.notion.site/0093325396f846ef91a11621010d4cfd"}]}, {"id": "ysda/2019/Теория вероятностей/Геометрические вероятности/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Лёша и Марина договорились встретиться между \\(8:00\\) и \\(9:00\\) и вместе пойти на экзамен в ШАД. Каждый из них приходит на место встречи в случайный момент времени, ждёт \\(15\\) минут и уходит (никому не хочется опоздать на экзамен). Являются ли независимыми события \"Лёша и Марина не встретились\" и \"хотя бы один из них пришел после \\(8:45\\)\"? Время считайте непрерывным.\n\nHint: https://shadhelper.notion.site/f8d8b5560de14b0792d091bf386cb91f"}]}, {"id": "ysda/2019/Теория вероятностей/Дискретные случайные величины/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Алёна очень любит алгебру. Каждый день, заходя на свой любимый алгебраический форум, она с вероятностью \\(\\dfrac{1}{4}\\) находит там новую интересную задачу про группы, а с вероятностью\n\\(\\dfrac{1}{10}\\) интересную задачку про кольца. С вероятностью \\(\\dfrac{13}{20}\\) новых задач на форуме не окажется. Пусть \\(X\\) — это минимальное число дней, за которые у Алёны появится хотя бы одна новая задача про группы и хотя бы одна про кольца. Найдите распределение случайной величины \\(X\\). В ответе должны участвовать только компактные выражения (не содержащие знаков суммирования, многоточий и пр.).\n\nHint: https://shadhelper.notion.site/48394fa778a74f8181926926d0204998"}]}, {"id": "ysda/2019/Теория вероятностей/Дискретные случайные величины/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "В корзине лежит \\(m\\) чёрных шаров и \\(n\\) красных. Вася достаёт из корзины случайный шар и, если он чёрный, то заменяет его на красный, а если он красный, то кладёт его обратно.\nНайдите математическое ожидание и дисперсию числа красных шаров в корзине после \\(k\\) итераций этой процедуры. Оба ответа должны быть компактными выражениями\n(то есть не содержать знаков суммирования, многоточий и пр.).\n\nHint: https://shadhelper.notion.site/cc42c3cc325a403c84b89f00713ee4e4"}]}, {"id": "ysda/2019/Теория вероятностей/Дискретные случайные величины/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Найти предел:\n\\[\n\\lim_{n\\rightarrow \\infty} \\sum_{k=n}^{5n} C_{k-1}^{n-1} \\left(\\frac{1}{5}\\right)^n \\left(\\frac{4}{5} \\right)^{k-n}.\n\\]\n\nHint: https://shadhelper.notion.site/00346ab0a5b74652a51ed496f720cac9"}]}, {"id": "ysda/2019/Теория вероятностей/Комбинаторика/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "В обществе анонимных подарков состоят \\(3n\\) человек. Они готовят подарки друг другу на Новый год. Известно, что ровно \\(n\\) человек хотели бы получить в подарок галстук, \\(n\\) человек — носки, а \\(n\\) человек — ручного динозавра. Каждый из членов общества случайно выбирает и покупает подарок среди тех двух, что он сам не хотел бы получить (например, если он хочет получить носки, то купит галстук или динозавра). Собравшись на новогоднюю вечеринку, члены общества сложили свои подарки в общую кучу, а в конце праздника разобрали их случайно. Алиса и Боб входят в общество анонимных подарков. Алиса хотела бы получить в подарок ручного динозавра, а Боб — носки. Найдите вероятность того, что ни Алиса, ни Боб не получат те подарки, которые хотели.\n\nHint: https://shadhelper.notion.site/9fe9b26a7ca04a94a985c9231e2bf66a"}]}, {"id": "ysda/2019/Теория вероятностей/Случайные величины в общем случае/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(X\\) и \\(Y\\) независимы и экспоненциально распределены, \\(X\\) — с параметром \\(\\lambda=1\\), а \\(Y\\) — с параметром \\(\\lambda = 2\\). Пусть \\(Z=\\max(X,Y)\\). Найти математическое ожидание случайной величины \\(Z\\).\n\nHint: https://shadhelper.notion.site/f1de07d48ea840b0aa029becf08982e6"}]}, {"id": "ysda/2020/Алгебра/Комплексные числа,Многочлены от одной переменной.,Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) - вещественная \\(n \\times n\\) матрица такая, что \\(A^2 = -E\\), где \\(E\\) - единичная \\(n \\times n\\) матрица и пусть \\(f(t)\\) - многочлен такой, что \\(f(A) \\neq \\lambda E\\) для любого \\(\\lambda \\in \\mathbf{R}\\). Верно ли, что матрица \\(A\\) не имеет действительных собственных значений? Ответ обоснуйте.\n\nHint: https://shadhelper.notion.site/77593f0b01f54c46a021001bddd0603f"}]}, {"id": "ysda/2020/Алгебра/Определители/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Гермионе задали задачу: Пусть \\(A\\) и \\(B\\) - матрицы \\(3 \\times 2\\) и \\(2 \\times 3\\) соответственно. Найдите определитель матрицы \\(BA\\), если известно, что эта матрица невырождена и, кроме того,\n\\[\nAB=\\begin{pmatrix}\n8 & 2 & -2\\\\\n2 & 5 & 4\\\\\n-2 & 4 & 5\\\\\n\\end{pmatrix}\n\\]\nГермиона не смогла решить задачу и попросила помощи у Рона. Рон возвёл матрицу в квадрат после чего Гермиона быстро нашла определитель матрицы BA. А вы сможете это сделать? Объясните ваш ответ.\n\nHint: https://shadhelper.notion.site/c4429f8c7cb94441861edb1227d3a8ac"}]}, {"id": "ysda/2020/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях. Связные графы циклы деревья. Раскраски графов./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Футбольный мяч состоит из красных шестиугольников и желтых пятиугольников, причем швы на стыке этих многоугольников не пересекаются в одной точке в количестве более трех штук, а если два многоугольника граничат, то граничат сразу по всей стороне от вершины до вершины. Каждый желтый многоугольник граничит только с красными, а каждый красный с\nтремя желтыми и тремя красными. Сколько лоскутов желтого цвета?\n\nHint: https://shadhelper.notion.site/4bd001efa64743289ebd03ae11a81ecc"}]}, {"id": "ysda/2020/Математический анализ/Дифференцируемость./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найти максимальное \\(a\\), для которого существуют функции \\(f(x)\\) и \\(g(x)\\) такие, что \\((f(x))^2+(g(x))^2 ≥ a\\) и выполнены следующие условия:\n\\(f(x)\\) и \\(g(x)\\) - неубывающие дважды дифференцируемые функции,\n\\(f''(x) = g(x)\\) и \\(g''(x) = f(x)\\),\nфункция \\(f(x)g(x)\\) линейна.\n\nHint: https://shadhelper.notion.site/191f5a0427a0498eb7559fbb303be300"}]}, {"id": "ysda/2020/Математический анализ/Предел функции./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(S\\) - множество невозрастающих последовательностей \\((x_i)\\) положительных чисел таких, что \\(x_1 = 1\\) и \\(\\lim\\limits_{i \\to \\infty} x_i = 0\\). Вычислите предел\n\\[\n\\lim\\limits_{n\\to\\infty}\\inf\\limits_{(x_i)\\in S}\\sum\\limits_{k=1}^n\\frac{x_k^2}{x_{k+1}}\n\\]\n\nHint: https://shadhelper.notion.site/9c448ba37e2c4a9589732484c40f3d59"}]}, {"id": "ysda/2020/Теория вероятностей/Математическое ожидание непрерывных случайных величин./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(X\\) имеет экспоненциальное распределение с параметром \\(λ = 1\\). Найдите матожидание \\(\\mathbf{E}[\\frac{1}{X}]\\), если оно существует или докажите, что оно не существует.\n\nHint: https://shadhelper.notion.site/54ed3c604e7b4326889a5a90eddea87d"}]}, {"id": "ysda/2020/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "В первой коробке лежат \\(4\\) черных и \\(3\\) белых шара, а во второй - \\(5\\) черных и \\(4\\) белых. Из первой коробки наугад вынимается один шар и перекладывается во вторую после чего из второй коробки наугад вынимается один шар, который оказывается черным. Чему равна вероятность того, что из первой коробки был вынут белый шар?\n\nHint: https://shadhelper.notion.site/1c2e4a3dd5214eba911ccf484052fa74"}]}, {"id": "ysda/2021/Алгебра/Векторные пространства. Базис размерность. Подпространства./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Верно ли, что для любых двух неколлинеарных векторов \\(v, w\\) в \\(\\mathbf{R}^n\\) найдётся скалярное произведение, относительно которого w является ортогональной проекцией вектора \\(v\\) на некоторое \\((n - 1)\\)-мерное подпространство?\n\nHint: https://shadhelper.notion.site/e7582a5f547444b19faa65bf3213766b"}]}, {"id": "ysda/2021/Алгебра/Евклидово пространство. Самосопряжённые и ортогональные операторы./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Известно, что\n\\[\nA =\n\\begin{pmatrix}\n1 & 1 & 1 \\\\\n1 & 1 & 3 \\\\\n1 & 3 & 4 \\\\\n\\end{pmatrix}\n\\]\nявляется матрицей некоторого ортонормированного оператора в нек
