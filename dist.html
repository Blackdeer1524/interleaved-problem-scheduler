ед матрицы XY диагональная", "name": "37 След матрицы XY диагональная", "problems": [{"index": 0, "url": null, "content": "Пусть заданы \\(3\\) матрицы размера \\(2 \\times 2\\) (\\(F\\) — обратимая диагональная, \\(Y\\) и \\(X\\)) из действительных чисел. Для любых натуральных \\(m \\le 4\\) выполнено следующее равенство \\(F^m X − Y = 0_{2 \\times 2}\\), где \\(0_{2 \\times 2}\\) — нулевая матрица. Найдите максимально и минимально возможные значения следа матрицы \\(XY\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/junior/38 Ранг квадрата элементарные преобразования", "name": "38 Ранг квадрата элементарные преобразования", "problems": [{"index": 0, "url": null, "content": "Может ли при элементарных преобразованиях матрицы \\(A\\) измениться ранг матрицы \\(A^2\\)?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/middle/39 Матрицы коммутируют XY лямбда мю", "name": "39 Матрицы коммутируют XY лямбда мю", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X\\) и \\(Y\\) — квадратные матрицы одинакового размера, причём \\(XY = \\lambda X + \\mu Y\\) для некоторых \\(\\lambda, \\mu \\neq 0\\). Докажите, что матрицы \\(X\\) и \\(Y\\) коммутируют."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/middle/40 Матрица след ноль коммутаторы", "name": "40 Матрица след ноль коммутаторы", "problems": [{"index": 0, "url": null, "content": "Доказать, что любая матрица со следом \\(0\\) является суммой коммутаторов матриц со следом \\(0\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/middle/41 Квадраты матриц коммутируют", "name": "41 Квадраты матриц коммутируют", "problems": [{"index": 0, "url": null, "content": "Матрицы \\(A\\) и \\(B\\) не коммутируют между собой, т. е. \\(AB \\neq BA\\). Может ли оказаться, что матрицы \\(A^2\\) и \\(B^2\\) коммутируют?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/middle/42 Матричное уравнение единственное решение", "name": "42 Матричное уравнение единственное решение", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — квадратная матрица. Доказать, что матричное уравнение \\(AX = B\\) имеет единственное решение тогда и только тогда, когда матрица \\(A\\) невырождена."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/senior/43 Скалярная матрица коммутирует", "name": "43 Скалярная матрица коммутирует", "problems": [{"index": 0, "url": null, "content": "Пусть квадратная матрица перестановочна со всеми невырожденными матрицами. Доказать, что такой матрицей может быть только скалярная матрица."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/senior/44 Матрица нули единицы квадрат", "name": "44 Матрица нули единицы квадрат", "problems": [{"index": 0, "url": null, "content": "При каких натуральных \\(N\\) существует квадратная матрица порядка \\(N\\) с элементами \\(0, 1\\) такая, что её квадрат — это матрица из одних единиц?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[03] Матрицы/senior/45 Матрица неотрицательные элементы обратная", "name": "45 Матрица неотрицательные элементы обратная", "problems": [{"index": 0, "url": null, "content": "Найдите все такие матрицы \\(A\\), для которых все элементы матриц \\(A\\) и \\(A^{-1}\\) неотрицательны."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/junior/46 Ортогонализация Грама Шмидта", "name": "46 Ортогонализация Грама Шмидта", "problems": [{"index": 0, "url": null, "content": "С помощью процесса ортогонализации построить ортогональный базис линейной оболочки системы векторов евклидова пространства: \\(((1, 2, 2, -1), (1, 1, -5, 3), (3, 2, 8, -7))\\)."}, {"index": 1, "url": null, "content": "С помощью процесса ортогонализации построить ортогональный базис линейной оболочки системы векторов евклидова пространства: \\(((1, 1, -1, -2), (5, 8, -2, -3), (3, 9, 3, 8))\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/junior/47 Проекция многочлена скалярное произведение", "name": "47 Проекция многочлена скалярное произведение", "problems": [{"index": 0, "url": null, "content": "На пространстве многочленов от переменной \\(x\\) с вещественными коэффициентами задано скалярное произведение \\(\\langle u, v \\rangle = \\int_2^6 u(x)v(x)dx\\). Найдите длину ортогональной проекции многочлена \\(y = 1 + x^4\\) на линейную оболочку многочленов \\(x^3 − 1\\) и \\(x^2 + x\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/48 Проекция точки на плоскость", "name": "48 Проекция точки на плоскость", "problems": [{"index": 0, "url": null, "content": "Даны точки \\(B (1, 2, -3)\\) и \\(C (2, 2, 1)\\), а также плоскости \\(\\alpha : x + y + z = 0\\) и \\(\\beta : 2x + 3y = 0\\). Найдите координаты точки \\(А\\), если известно, что её ортогональная проекция на \\(\\alpha\\) совпадает с проекцией точки \\(B\\), а на \\(\\beta\\) — с проекцией точки \\(C\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/49 Расстояние до гиперплоскости R4", "name": "49 Расстояние до гиперплоскости R4", "problems": [{"index": 0, "url": null, "content": "В евклидовом пространстве \\(R^4\\) найти расстояние от точки \\((-3, -1, -2, 5)\\) до гиперплоскости \\(2x_1 + 4x_2 − 5x_3 − 2x_4 = 4\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/50 Проекция вектора линейная оболочка", "name": "50 Проекция вектора линейная оболочка", "problems": [{"index": 0, "url": null, "content": "В евклидовом пространстве \\(R^4\\) найти ортогональную проекцию вектора \\((6, 2, 5, 1)\\) на линейную оболочку векторов \\((1, - 1, 1, 0), (1, 0, 1, 1)\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/51 Расстояние до оболочки матриц tr", "name": "51 Расстояние до оболочки матриц tr", "problems": [{"index": 0, "url": null, "content": "Найдите расстояние от матрицы \\(A = \\begin{pmatrix} 1 & 5 \\\\ 6 & 6 \\end{pmatrix}\\) до линейной оболочки матриц \\(B = \\begin{pmatrix} 2 & 6 \\\\ 1 & 4 \\end{pmatrix}, C = \\begin{pmatrix} 1 & 1 \\\\ 1 & 2 \\end{pmatrix}, D = \\begin{pmatrix} 2 & 2 \\\\ 2 & 4 \\end{pmatrix}\\), если скалярное произведение на матрицах задано следующим образом: \\(\\langle X, Y \\rangle = tr(X^T Y)\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/52 Расстояние матриц кососимметричные", "name": "52 Расстояние матриц кососимметричные", "problems": [{"index": 0, "url": null, "content": "Найдите расстояние относительно скалярного произведения \\(\\langle A, B \\rangle = tr(AB^T)\\) на пространстве квадратных матриц от единичной матрицы до пространства кососимметрических матриц."}, {"index": 1, "url": null, "content": "Найдите расстояние от верхнетреугольной матрицы до пространства симметрических и до пространства кососимметрических матриц."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/middle/53 Скалярное произведение функций", "name": "53 Скалярное произведение функций", "problems": [{"index": 0, "url": null, "content": "Докажите, что \\((f, g) = \\int_a^b f(x)g(x)dx\\) является скалярным произведением на пространстве бесконечно дифференцируемых функций на отрезке \\([a; b]\\)."}, {"index": 1, "url": null, "content": "Рассмотрим скалярное произведение \\((f, g) = \\int_a^b f(x)g(x)dx\\) на пространстве бесконечно дифференцируемых функций на отрезке \\([a; b]\\). Опишите пространство, ортогональное пространству постоянных функций, и приведите пример хотя бы одного подпространства (отличного от нулевого), которое ортогонально пространству постоянных функций."}, {"index": 2, "url": null, "content": "Рассмотрим скалярное произведение \\((f, g) = \\int_a^b f(x)g(x)dx\\) на пространстве бесконечно дифференцируемых функций на отрезке \\([a; b]\\). Найдите угол между \\(e^x\\) и \\(x\\) относительно этого скалярного произведения."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/senior/54 Ортогональная проекция скалярное произведение", "name": "54 Ортогональная проекция скалярное произведение", "problems": [{"index": 0, "url": null, "content": "Верно ли, что для любых двух неколлинеарных векторов \\(v, w\\) в \\(R^n\\) найдётся скалярное произведение, относительно которого \\(w\\) является ортогональной проекцией вектора \\(v\\) на некоторое \\((n − 1)\\)-мерное подпространство?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/senior/55 Матрица единиц ортогональна верхнетреугольным", "name": "55 Матрица единиц ортогональна верхнетреугольным", "problems": [{"index": 0, "url": null, "content": "Существует ли скалярное произведение на пространстве матриц \\(n \\times n\\) (\\(n > 1\\)), относительно которого матрица из всех единиц была бы ортогональна любой верхнетреугольной матрице?"}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/senior/56 Ядро матрицы влечет ядро", "name": "56 Ядро матрицы влечет ядро", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — матрицы размера \\(m \\times n\\) и \\(k \\times n\\) соответственно, причём если \\(AX = 0\\) для некоторого столбца \\(X\\), то \\(BX = 0\\). Докажите, что \\(B = CA\\), где \\(C\\) — матрица размера \\(k \\times m\\)."}]}, {"id": "courses/mathematics/algebra/[11] 25-11-04 (5) Векторные пространства 102/[04] Ортогональность и скалярное проивздение/senior/57 Матрица след ноль скалярная", "name": "57 Матрица след ноль скалярная", "problems": [{"index": 0, "url": null, "content": "Матрица \\(A\\) порядка \\(n\\) такова, что для любой матрицы \\(X\\) порядка \\(n\\) с нулевым следом \\(tr(AX) = 0\\). Докажите, что \\(A = \\lambda E\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/junior/01 Матрица оператора образ ядро", "name": "01 Матрица оператора образ ядро", "problems": [{"index": 0, "url": null, "content": "Написать матрицу линейного отображения оператора, найти его образ и ядро (их размерности) для оператора интегрирования на пространстве многочленов."}, {"index": 1, "url": null, "content": "Написать матрицу линейного отображения оператора, найти его образ и ядро (их размерности) для оператора умножения справа на матрицу \\(A\\) в пространстве матриц 2 на 2."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/junior/02 Ранг один след AB ноль", "name": "02 Ранг один след AB ноль", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(rk(A) = 1\\) и \\(tr(AB) = 0\\), то \\(ABA = 0\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/junior/03 Последовательность рангов степеней", "name": "03 Последовательность рангов степеней", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\). Рассмотрим последовательность \\(A, A^2, A^3, \\dots\\). Обозначим \\(r_k = rk(A^k)\\). Что можно сказать о последовательности \\(r_1, r_2, \\dots\\)?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/junior/04 Возможные последовательности рангов", "name": "04 Возможные последовательности рангов", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — матрица. Рассмотрим последовательность \\(r_k = rk(A^k)\\). Может ли последовательность рангов \\(r_1, r_2, r_3, \\dots\\) иметь вид \\(n, n - 1, n - 2, \\dots , 1, 0, 0, \\dots\\)?"}, {"index": 1, "url": null, "content": "Пусть \\(A\\) — матрица. Рассмотрим последовательность \\(r_k = rk(A^k)\\). Может ли последовательность рангов иметь вид \\(n - 1, n - 2, \\dots , 1, 0, 0, \\dots\\)?"}, {"index": 2, "url": null, "content": "Пусть \\(A\\) — матрица. Рассмотрим последовательность \\(r_k = rk(A^k)\\). Может ли последовательность рангов иметь вид \\(5, 4, 4, 3, 2, 1, 1, 1, \\dots\\)?"}, {"index": 3, "url": null, "content": "Пусть \\(A\\) — матрица. Рассмотрим последовательность \\(r_k = rk(A^k)\\). Может ли последовательность рангов иметь вид \\(4, 3, 1, \\dots\\)?"}, {"index": 4, "url": null, "content": "Пусть \\(A\\) — матрица. Рассмотрим последовательность \\(r_k = rk(A^k)\\). Может ли последовательность рангов иметь вид \\(4, 2, 1, \\dots\\)?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/05 Ядро образ прямая сумма", "name": "05 Ядро образ прямая сумма", "problems": [{"index": 0, "url": null, "content": "Образуют ли ядро и образ оператора прямую сумму подпространств?"}, {"index": 1, "url": null, "content": "Докажите, что ядро и образ образуют прямую сумму, если пересекаются по 0."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/06 Решения AX равно B пространство", "name": "06 Решения AX равно B пространство", "problems": [{"index": 0, "url": null, "content": "Рассмотрим выражение \\(AX = B\\) для оператора \\(A\\). Докажите, что такие \\(X\\) образуют векторное пространство и найдите его размерность, если \\(X\\) — вектор столбец."}, {"index": 1, "url": null, "content": "Докажите, что такие \\(X\\) образуют векторное пространство и найдите его размерность, если \\(X\\) — матрица \\(n\\) на \\(n\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/07 Ранг A равен ранг AT A", "name": "07 Ранг A равен ранг AT A", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — вещественная матрица. Докажите, что \\(rk(A) = rk(A^T A)\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/08 Ранг один det A плюс E", "name": "08 Ранг один det A плюс E", "problems": [{"index": 0, "url": null, "content": "Пусть матрица \\(A\\) квадратная, причём \\(rk(A) = 1\\). Докажите, что \\(det(A + E) = tr(A) + 1\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/09 Идемпотентная матрица ранг ядро", "name": "09 Идемпотентная матрица ранг ядро", "problems": [{"index": 0, "url": null, "content": "Пусть матрица \\(n \\times n\\), \\(A^2 = A\\) — идемпотентная матрица. Доказать, что \\(rk(A) + rk(E - A) = n\\)."}, {"index": 1, "url": null, "content": "Пусть матрица \\(n \\times n\\), \\(A^2 = A\\) — идемпотентная матрица. Доказать, что \\(Im(A) \\cap Ker(A) = 0\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/10 Ранг AT A вещественные комплексные", "name": "10 Ранг AT A вещественные комплексные", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A \\in Mat_{mn}(R)\\). Доказать, что \\(rk(A^t A) = rk(A)\\)."}, {"index": 1, "url": null, "content": "Пусть \\(A \\in Mat_{mn}(C)\\). Верно ли, что \\(rk(A^t A) = rk(A)\\) над полем комплексных чисел?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[01] Линейные операторы/middle/11 Матрица E минус XA невырожденная", "name": "11 Матрица E минус XA невырожденная", "problems": [{"index": 0, "url": null, "content": "Существует ли ненулевая матрица \\(A\\) размером \\(n \\times n\\) с действительными компонентами такая, что для любой \\(n \\times n\\)-матрицы \\(X\\) матрица \\(E - XA\\) невырожденная? (Здесь \\(E\\) — единичная \\(n \\times n\\)-матрица.)"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/junior/12 Определитель кососимметрическая нечетный порядок", "name": "12 Определитель кососимметрическая нечетный порядок", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — квадратная матрица нечётного порядка, \\(A^t\\) — транспонированная к ней. Доказать, что \\(|A - A^t| = 0\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/junior/13 Идемпотент det и det 2A минус E", "name": "13 Идемпотент det и det 2A минус E", "problems": [{"index": 0, "url": null, "content": "Доказать, что если \\(A\\) — матрица размером \\(n \\times n\\), \\(A^2 = A\\), то матрица \\(B = 2A - E\\) удовлетворяет условию \\(B^2 = E\\). Найти \\(|A|\\) и \\(|B|\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/junior/14 Определитель циклическая матрица", "name": "14 Определитель циклическая матрица", "problems": [{"index": 0, "url": null, "content": "Найдите определитель \\(\\begin{vmatrix} 1 & \\frac{1}{5} & \\frac{1}{25} & \\dots & \\left(\\frac{1}{5}\\right)^{n-1} \\\\ \\left(\\frac{1}{5}\\right)^{n-1} & 1 & \\frac{1}{5} & \\dots & \\left(\\frac{1}{5}\\right)^{n-1} \\\\ \\left(\\frac{1}{5}\\right)^{n-2} & \\left(\\frac{1}{5}\\right)^{n-1} & 1 & \\dots & \\left(\\frac{1}{5}\\right)^{n-3} \\\\ \\dots & \\dots & \\dots & \\dots & \\dots \\\\ \\left(\\frac{1}{5}\\right) & \\left(\\frac{1}{25}\\right) & \\left(\\frac{1}{5}\\right)^3 & \\dots & 1 \\end{vmatrix}\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/junior/15 Максимум определителя обратной матрицы", "name": "15 Максимум определителя обратной матрицы", "problems": [{"index": 0, "url": null, "content": "При каких значениях параметра \\(a\\) максимален определитель матрицы, обратной к \\(\\begin{pmatrix} a & -7 & -3 \\\\ 4 & -10 & a^2 \\\\ 0 & a & 2 \\end{pmatrix}\\)?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/junior/19 Определитель присоединенной матрицы", "name": "19 Определитель присоединенной матрицы", "problems": [{"index": 0, "url": null, "content": "Пусть известен определитель матрицы \\(A\\), чему равен определитель присоединённой матрицы?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/16 Сравнение определителей матриц", "name": "16 Сравнение определителей матриц", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A = ||a_{ij}||\\) и \\(B = ||b_{ij}||\\) — квадратные матрицы порядка \\(n > 2\\). Известно, что \\(a_{ii} > b_{ii} > 0\\) при любом \\(i = 1, \\dots, n\\). Выберете верное утверждение: а) \\(det(A) > det(B)\\); б) \\(det(A - B) > 0\\); в) \\(det(A) < det(B)\\); г) \\(det(A) > det(A - B)\\); д) все четыре утверждения а, б, в, г ложные."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/17 Определитель матрицы знаки", "name": "17 Определитель матрицы знаки", "problems": [{"index": 0, "url": null, "content": "Найдите детерминант матрицы \\(n\\)-го порядка \\(A\\), где \\(a_{ij} = (-1)^{|i - j|}\\) если \\(i \\neq j\\) и \\(a_{ii} = 2\\)."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/18 Ранг присоединенной матрицы", "name": "18 Ранг присоединенной матрицы", "problems": [{"index": 0, "url": null, "content": "Пусть известен ранг матрицы \\(A\\), чему равен ранг присоединённой матрицы?"}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/20 Идемпотент определитель E минус A", "name": "20 Идемпотент определитель E минус A", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — матрица \\(n \\times n\\) такая, что \\(A^2 = A\\), \\(E\\) — единичная \\(n \\times n\\) матрица. Доказать, что определитель матрицы \\(E - A\\) равен 0 или 1."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/21 Определитель алгебраические дополнения", "name": "21 Определитель алгебраические дополнения", "problems": [{"index": 0, "url": null, "content": "Пусть задан определитель матрицы. Строим матрицу заменой элемента \\(a_{ij}\\) на алгебраическое дополнение (не на минор \\(M_{ij}\\), а на \\((-1)^{i+j}M_{ij}\\)). Найти определитель этой матрицы."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/22 Определитель падающих факториалов", "name": "22 Определитель падающих факториалов", "problems": [{"index": 0, "url": null, "content": "Пусть \\(x^{\\downarrow n} = x(x - 1) \\dots (x - n + 1)\\). Найти определитель матрицы \\(n + 1 \\times n + 1\\) с общим элементом \\(a_{ij} = x_i^{\\downarrow j-1}\\), \\(j = 2, 3, \\dots\\), первый столбец — единицы."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/23 Определитель Вандермонда подматрица", "name": "23 Определитель Вандермонда подматрица", "problems": [{"index": 0, "url": null, "content": "Вычислить определитель матрицы Вандермонда без предпоследнего столбца."}, {"index": 1, "url": null, "content": "Вычислить определитель матрицы Вандермонда без второго и предпоследнего столбца."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/middle/24 Производная определителя по параметру", "name": "24 Производная определителя по параметру", "problems": [{"index": 0, "url": null, "content": "Пусть дана матрица, где каждый элемент \\(ij(x)\\) рассматривается как функция от \\(x\\). Напишите какую-нибудь аналитическую формулу производной по \\(x\\) от детерминанта этой матрицы."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/senior/25 Матрица единиц подряд определитель", "name": "25 Матрица единиц подряд определитель", "problems": [{"index": 0, "url": null, "content": "Дана матрица из нулей и единиц, причём для каждой строки матрицы верно следующее: если в строке есть единицы, то они все идут подряд (неразрывной группой из единиц). Докажите, что определитель такой матрицы может быть равен только \\(\\pm 1\\) или 0."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/senior/26 Максимальный определитель ограничение нормы", "name": "26 Максимальный определитель ограничение нормы", "problems": [{"index": 0, "url": null, "content": "Найдите максимальное значение определителя матрицы второго порядка, если сумма квадратов всех её элементов не превосходит 1."}, {"index": 1, "url": null, "content": "Найдите максимальное значение определителя матрицы третьего порядка, если сумма квадратов всех её элементов не превосходит 1."}]}, {"id": "courses/mathematics/algebra/[15] 25-12-03 (5) Линейные операторы 102/[02] Определители/senior/27 Матрица смежности дерева определитель", "name": "27 Матрица смежности дерева определитель", "problems": [{"index": 0, "url": null, "content": "Пусть \\(G\\) — дерево, а \\(A(G)\\) — его матрица смежности. Какие значения может принимать \\(det(A(G))\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/junior/01 Собственные числа квадрата оператора", "name": "01 Собственные числа квадрата оператора", "problems": [{"index": 0, "url": null, "content": "Пусть у оператора \\(A^2\\) собственное значение \\(\\lambda\\). Какие могут быть собственные числа у оператора \\(A\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/junior/02 Матрица n различных собственных чисел", "name": "02 Матрица n различных собственных чисел", "problems": [{"index": 0, "url": null, "content": "Докажите, что если у квадратной матрицы \\(n\\) на \\(n\\) есть \\(n\\) различных собственных чисел, то она диагонализуема."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/junior/03 Сумма строк невырожденная обратная", "name": "03 Сумма строк невырожденная обратная", "problems": [{"index": 0, "url": null, "content": "Сумма элементов каждой строки невырождённой матрицы \\(A\\) равна \\(s\\). Докажите, что сумма элементов каждой строки матрицы \\(A^{-1}\\) равна \\(1/s\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/middle/04 Оператор n плюс один собственных векторов", "name": "04 Оператор n плюс один собственных векторов", "problems": [{"index": 0, "url": null, "content": "У линейного преобразования \\(n\\)-мерного пространства существуют такие \\(n + 1\\) собственных векторов, что любые \\(n\\) из них линейно независимы. Найдите все матрицы, которые задают такое преобразование."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/middle/05 Собственные значения оператора Phi", "name": "05 Собственные значения оператора Phi", "problems": [{"index": 0, "url": null, "content": "У матрицы \\(A\\) собственные значения \\(\\lambda_1, \\dots, \\lambda_n\\). Оператор \\(\\Phi\\) из пространства матриц в пространство матриц комплекснозначных: \\(\\Phi(X) = AX + XA\\). Найти собственные значения \\(\\Phi\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/middle/06 Матрицы AB ноль собственные E плюс BA", "name": "06 Матрицы AB ноль собственные E плюс BA", "problems": [{"index": 0, "url": null, "content": "Квадратные матрицы \\(A\\) и \\(B\\) таковы, что \\(AB = 0\\). Что можно сказать о собственных значениях матрицы \\(E + BA\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[01] Собственные числа/senior/07 Собственные значения операторов от A", "name": "07 Собственные значения операторов от A", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\lambda_1, \\dots, \\lambda_n\\) — корни характеристического многочлена матрицы \\(A\\). Найти собственные значения линейного оператора \\(X \\to AX^tA\\) в пространстве действительных матриц."}, {"index": 1, "url": null, "content": "Найти собственные значения линейного оператора \\(X \\to AXA^{-1}\\) в пространстве действительных матриц (матрица \\(A\\) невырождённая)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/08 Общий собственный вектор двух матриц", "name": "08 Общий собственный вектор двух матриц", "problems": [{"index": 0, "url": null, "content": "Определите, при каком вещественном значении параметра \\(a\\) линейные операторы \\(A\\) и \\(B\\), заданные матрицами \\(A = \\frac{1}{10} \\begin{pmatrix} 28a - 1 & 6(2a - 1) & 3(2a - 3) \\\\ 3(2a + 1) & 2(7a + 4) & 2a + 17 \\\\ -3(2a + 1) & -2(2a - 1) & 8a - 7 \\end{pmatrix}\\) и \\(B = \\frac{1}{10} \\begin{pmatrix} -2a - 9 & -12 & -3(2a + 3) \\\\ 3(2a - 1) & 6 & 18a + 7 \\\\ -3(2a - 1) & 4 & -3(6a - 1) \\end{pmatrix}\\), имеют хотя бы один общий вектор с одинаковым собственным значением."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/09 Оператор на многочленах сумма собственных", "name": "09 Оператор на многочленах сумма собственных", "problems": [{"index": 0, "url": null, "content": "Линейный оператор \\(\\varphi\\) действует на пространстве многочленов степени не выше 2 с вещественными коэффициентами. Известно, что \\(\\varphi(x^2 - x - 2) = x^2 + 3x + 3\\), \\(\\varphi(-2x^2 + 3x + 2) = 2x^2 + x + 1\\), \\(\\varphi(-x^2 - 2x + 9) = x^2 + 2x + 3\\). Найдите сумму действительных собственных значений оператора \\(\\varphi\\) (сумму следует вычислять с учётом алгебраической кратности собственных значений)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/10 ЖНФ нильпотентная матрица", "name": "10 ЖНФ нильпотентная матрица", "problems": [{"index": 0, "url": null, "content": "Что можно сказать про ЖНФ оператора \\(A\\), если \\(A^k = 0\\) (у нильпотентной матрицы собственные числа равны нулю)?"}, {"index": 1, "url": null, "content": "Что можно сказать про ЖНФ оператора \\(A\\), если \\(\\exp(A) = E\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/11 Матрицы след определитель один оператор", "name": "11 Матрицы след определитель один оператор", "problems": [{"index": 0, "url": null, "content": "У действительных матриц \\(2 \\times 2\\) совпадают след и определитель. Могут ли они задавать один и тот же оператор?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/12 Следы степеней нуль собственные числа", "name": "12 Следы степеней нуль собственные числа", "problems": [{"index": 0, "url": null, "content": "Доказать, что если \\(\\operatorname{tr}(A) = \\operatorname{tr}(A^2) = \\operatorname{tr}(A^3) = \\dots = \\operatorname{tr}(A^k) = 0\\), то все собственные числа матрицы \\(A\\) равны нулю."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/13 Характеристические корни A четыре A квадрат", "name": "13 Характеристические корни A четыре A квадрат", "problems": [{"index": 0, "url": null, "content": "Какие могут быть характеристические корни у матрицы \\(A\\), если \\(A^4 = A^2\\)? Указать явно матрицу, у которой будут все возможные в данном случае корни."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/14 Максимальный след A квадрат плюс A", "name": "14 Максимальный след A квадрат плюс A", "problems": [{"index": 0, "url": null, "content": "Известно, что \\(A^2 + A = 2I\\), где \\(A\\) — квадратная матрица размера \\(5 \\times 5\\) над полем действительных чисел (\\(A \\in \\operatorname{Mat}_{5 \\times 5}(\\mathbf{R})\\)), а \\(I\\) — единичная соответствующего порядка. Найдите максимально возможное значение следа матрицы."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/15 Матрица один собственный вектор", "name": "15 Матрица один собственный вектор", "problems": [{"index": 0, "url": null, "content": "Написать матрицу линейного оператора, имеющего только 1 собственный вектор."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/junior/16 Ранг E минус A квадрат единица", "name": "16 Ранг E минус A квадрат единица", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(9 \\times 9\\) над полем характеристики, отличной от 2, такова, что \\(A^2 = E\\). Найдите ранг матрицы \\(E - A\\), если известно, что ранг матрицы \\(E + A\\) равен 7."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/17 Матрица без собственных инвариантные подпространства", "name": "17 Матрица без собственных инвариантные подпространства", "problems": [{"index": 0, "url": null, "content": "Написать матрицу линейного оператора, не имеющего собственных векторов, но имеющего инвариантные подпространства."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/18 Матрица оператора другой базис", "name": "18 Матрица оператора другой базис", "problems": [{"index": 0, "url": null, "content": "На конечномерном векторном пространстве \\(V\\) над полем задан линейный оператор \\(A : V \\to V\\). Верно ли, что для любого базиса \\(\\phi\\) у пространства \\(V\\) существует другой базис \\(\\psi\\) такой, что \\(A_\\phi = A_\\psi\\), где \\(A_\\phi, A_\\psi\\) — матрицы оператора \\(A\\) в соответствующих базисах?"}, {"index": 1, "url": null, "content": "На конечномерном векторном пространстве \\(V\\) над полем задан линейный оператор \\(A : V \\to V\\). Пусть для некоторого базиса \\(\\phi\\) существует другой базис \\(\\psi\\) такой, что \\(A_\\phi = A_\\psi\\). Единственный ли такой базис \\(\\psi\\)?"}, {"index": 2, "url": null, "content": "На конечномерном векторном пространстве \\(V\\) над полем задан линейный оператор \\(A : V \\to V\\). Пусть для некоторого базиса \\(\\phi\\) существует более одного базиса \\(\\psi\\) такого, что \\(A_\\phi = A_\\psi\\). Конечно ли число таких базисов?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/19 Неотрицательная матрица собственные степени", "name": "19 Неотрицательная матрица собственные степени", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\lambda_1, \\dots, \\lambda_n\\) — собственные значения матрицы \\(A\\) размером \\(n \\times n\\), все элементы которой неотрицательные действительные числа. Докажите, что \\(\\lambda_1^k + \\dots + \\lambda_n^k \\ge 0\\) для любого натурального числа \\(k\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/20 Ранг E минус A действительные коэффициенты", "name": "20 Ранг E минус A действительные коэффициенты", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(9 \\times 9\\) с действительными коэффициентами такова, что \\(A^2 = E\\). Найдите ранг матрицы \\(E - A\\), если известно, что ранг матрицы \\(E + A\\) равен 7."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/21 ЖНФ матрицы vvT", "name": "21 ЖНФ матрицы vvT", "problems": [{"index": 0, "url": null, "content": "Найти спектр (алгебраическую и геометрическую кратность) и ЖНФ матрицы \\(vv^T\\), где \\(v\\) — вектор столбец."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/22 Определитель матрицы произведение плюс k", "name": "22 Определитель матрицы произведение плюс k", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(B\\) размером \\(n \\times n\\). Если \\(i \\neq j\\), то \\(b_{ij} = a_i a_j\\); иначе \\(b_{ii} = a_i^2 + k\\). Вычислите определитель матрицы \\(B\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/23 ЖНФ операторов дифференцирования", "name": "23 ЖНФ операторов дифференцирования", "problems": [{"index": 0, "url": null, "content": "Рассмотрим пространство многочленов, натянутое на вектора \\(1, x, y\\). Найдите нормальную жорданову форму оператора \\(2 \\frac{\\partial}{\\partial x} + \\frac{\\partial}{\\partial y}\\)."}, {"index": 1, "url": null, "content": "Найдите нормальную жорданову форму оператора \\(f(x, y) \\to f(2x, 3y)\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/24 Вещественная матрица tr ноль квадрат плюс транспонированная", "name": "24 Вещественная матрица tr ноль квадрат плюс транспонированная", "problems": [{"index": 0, "url": null, "content": "Существует ли вещественная матрица третьего порядка такая, что \\(\\operatorname{tr}(A) = 0\\) и \\(A^2 + A^t = E\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/25 Куб оператора проекция собственные", "name": "25 Куб оператора проекция собственные", "problems": [{"index": 0, "url": null, "content": "Линейный оператор \\(A : \\mathbf{R}^n \\to \\mathbf{R}^n\\) таков, что \\(A^3\\) — это оператор проекции. Какие собственные значения может иметь \\(A\\)? Верно ли, что \\(A\\) будет иметь диагональную матрицу в каком-либо базисе \\(\\mathbf{R}^n\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/26 Матрица ортогональной проекции заполнить столбец", "name": "26 Матрица ортогональной проекции заполнить столбец", "problems": [{"index": 0, "url": null, "content": "Заполните третий столбец матрицы \\(\\frac{1}{6} \\begin{pmatrix} 5 & -2 & ? \\\\ -2 & 2 & ? \\\\ -1 & -2 & ? \\end{pmatrix}\\), если известно, что это матрица ортогональной проекции на некоторую плоскость."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/27 ЖНФ матрицы квадрат разности", "name": "27 ЖНФ матрицы квадрат разности", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(A\\) размера \\(n \\times n\\), где \\(a_{ij} = (i - j)^2, i, j = 1, \\dots, n\\). Найдите ЖНФ матрицы \\(A\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/28 ЖНФ матрицы модуль разности", "name": "28 ЖНФ матрицы модуль разности", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(A\\) размера \\(n \\times n\\), где \\(a_{ij} = |i - j|, i, j = 1, \\dots, n\\). Найдите ЖНФ матрицы \\(A\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/middle/29 ЖНФ матрицы i минус 2ij плюс j", "name": "29 ЖНФ матрицы i минус 2ij плюс j", "problems": [{"index": 0, "url": null, "content": "Найти ЖНФ матрицы \\(A\\), где \\(a_{ij} = i - 2ij + j\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/senior/30 Ранг A квадрат предел обратной матрицы", "name": "30 Ранг A квадрат предел обратной матрицы", "problems": [{"index": 0, "url": null, "content": "Докажите, что \\(\\operatorname{rk}(A) = \\operatorname{rk}(A^2)\\) тогда и только тогда, когда существует \\(\\lim_{\\lambda \\to 0} (A + \\lambda E)^{-1} A\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[02] Жорданова Нормальная Форма/senior/31 Вращательная матрица собственные векторы", "name": "31 Вращательная матрица собственные векторы", "problems": [{"index": 0, "url": null, "content": "Назовём матрицу вращательной, если при повороте на \\(90^\\circ\\) вокруг центра она не меняется. Докажите, что для любого набора чисел \\(\\lambda_1, \\dots, \\lambda_k \\in \\mathbf{R}\\) найдётся \\(n \\in \\mathbf{N}\\) и вращательная матрица \\(n \\times n\\), для которой \\(\\lambda_1, \\dots, \\lambda_k\\) являются собственными значениями."}, {"index": 1, "url": null, "content": "Докажите, что у вращательной матрицы с действительными коэффициентами все собственные векторы \\(v\\) с отличными от нуля действительными собственными значениями симметричны (то есть \\(v_i = v_{n-i+1}\\))."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/junior/32 Матрица A квадрат минус E действительные", "name": "32 Матрица A квадрат минус E действительные", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — вещественная \\(n \\times n\\) матрица такая, что \\(A^2 = -E\\), где \\(E\\) — единичная \\(n \\times n\\) матрица, и пусть \\(f(t)\\) — многочлен такой, что \\(f(A) \\neq \\lambda E\\) для любого \\(\\lambda \\in \\mathbf{R}\\). Верно ли, что матрица \\(A\\) не имеет действительных собственных значений? Ответ обоснуйте."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/junior/33 Обратная матрица многочлен", "name": "33 Обратная матрица многочлен", "problems": [{"index": 0, "url": null, "content": "Опишите класс матриц \\(A\\), для которых выполняется \\(A^{-1} = p(A)\\), где \\(p(A)\\) — многочлен."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/junior/34 Минимальный многочлен диагональной матрицы", "name": "34 Минимальный многочлен диагональной матрицы", "problems": [{"index": 0, "url": null, "content": "Найти минимальный многочлен диагональной матрицы с различными элементами на главной диагонали."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/junior/35 Минимальный многочлен жордановой клетки", "name": "35 Минимальный многочлен жордановой клетки", "problems": [{"index": 0, "url": null, "content": "Найти минимальный многочлен жордановой клетки порядка \\(n\\) с числом \\(\\lambda\\) на главной диагонали."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/junior/36 Минимальный многочлен операторов", "name": "36 Минимальный многочлен операторов", "problems": [{"index": 0, "url": null, "content": "Найти минимальный многочлен тождественного оператора."}, {"index": 1, "url": null, "content": "Найти минимальный многочлен нулевого оператора."}, {"index": 2, "url": null, "content": "Найти минимальный многочлен оператора проектирования \\(n\\)-мерного пространства \\(V\\) на \\(k\\)-мерное подпространство \\(L(0 < k < n)\\)."}, {"index": 3, "url": null, "content": "Найти минимальный многочлен оператора отражения."}, {"index": 4, "url": null, "content": "Найти минимальный многочлен нильпотентного оператора индекса \\(k\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/middle/37 Матрица fA собственные вещественные", "name": "37 Матрица fA собственные вещественные", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(A\\) размера \\(n \\times n\\) с вещественными коэффициентами такая, что \\(A^2 = -E\\), где \\(E\\) — единичная матрица \\(n \\times n\\). Пусть многочлен \\(f(x) \\in \\mathbf{R}[x]\\) таков, что \\(f(x) \\neq \\lambda E\\) ни для какого \\(\\lambda \\in \\mathbf{R}\\). Верно ли, что матрица \\(f(A)\\) не имеет действительных собственных значений? Обязательно обоснуйте ответ. В качестве ответа введите одно целое число — 1, если это верно, и 0, если это неверно."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/middle/38 Целочисленная матрица комплексное собственное", "name": "38 Целочисленная матрица комплексное собственное", "problems": [{"index": 0, "url": null, "content": "Докажите, что целочисленная матрица не может иметь собственного значения, равного \\(\\frac{1}{4}(-3 + i\\sqrt{5})\\)."}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/senior/39 Коммутант и циклическое пространство матрицы", "name": "39 Коммутант и циклическое пространство матрицы", "problems": [{"index": 0, "url": null, "content": "Для квадратной вещественной матрицы \\(A\\) размера \\(n \\times n\\) и вектора \\(v \\in \\mathbf{R}^n\\) положим \\(\\operatorname{U}(A) = \\{X \\in \\operatorname{Mat}_n(\\mathbf{R}) | AX = XA\\}\\), \\(W(A, v) = \\langle v, Av, A^2v, A^3v\\dots\\rangle\\). Пусть матрица \\(A\\) такова, что \\(\\operatorname{dim}W(A, v) = n\\) для любого \\(v \\neq 0\\). Какова максимально возможная размерность \\(\\operatorname{U}(A)\\)?"}, {"index": 1, "url": null, "content": "Пусть матрица \\(A\\) такова, что \\(\\operatorname{dim}W(A, v) < n\\) для любого \\(v\\). Какова минимально возможная размерность \\(\\operatorname{U}(A)\\)?"}]}, {"id": "courses/mathematics/algebra/[18] 25-12-08 (5) Жорданова нормальная форма 102/[03] Собственные числа и многочлены/senior/40 Транспонированная равна многочлен обратимость", "name": "40 Транспонированная равна многочлен обратимость", "problems": [{"index": 0, "url": null, "content": "Квадратная вещественная матрица \\(A\\) такова, что \\(A^T = p(A)\\), где \\(p(x)\\) — многочлен с ненулевым свободным членом. Докажите, что \\(A\\) обратима. Верно ли, что для любого оператора \\(\\varphi : \\mathbf{R}^n \\to \\mathbf{R}^n\\) найдётся многочлен \\(p(x)\\) и некоторый базис, в котором матрица \\(\\varphi\\) удовлетворяет условию \\(A^T = p(A)\\)?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[01] Ортогональные операторы/junior/01 Канонический базис ортогонального оператора", "name": "01 Канонический базис ортогонального оператора", "problems": [{"index": 0, "url": null, "content": "Найти канонический базис и матрицу в этом базисе ортогонального оператора, заданного в некотором ортонормированном базисе матрицей \\(A = \\frac{1}{3} \\begin{bmatrix} 2 & 2 & -1 \\\\ 2 & -1 & 2 \\\\ -1 & 2 & 2 \\end{bmatrix}\\)."}, {"index": 1, "url": null, "content": "Найти канонический базис и матрицу в этом базисе ортогонального оператора, заданного в некотором ортонормированном базисе матрицей \\(B = \\frac{1}{2} \\begin{bmatrix} 1 & 1 & -\\sqrt{2} \\\\ 1 & 1 & \\sqrt{2} \\\\ \\sqrt{2} & -\\sqrt{2} & 0 \\end{bmatrix}\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[01] Ортогональные операторы/junior/02 Матрица Грама Шмидта ортогональна", "name": "02 Матрица Грама Шмидта ортогональна", "problems": [{"index": 0, "url": null, "content": "Правда ли, что матрица замены координат от обычного базиса к базису, полученному ортогонализацией Грама–Шмидта, ортогональна?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[01] Ортогональные операторы/middle/03 Матрица плюс минус единицы степень", "name": "03 Матрица плюс минус единицы степень", "problems": [{"index": 0, "url": null, "content": "В каждой строке невырожденной квадратной \\(n \\times n\\) матрицы \\(A\\) стоит только одно отличное от 0 число, равное +1 или -1. Докажите, что найдётся такое \\(m\\), при котором \\(m\\)-я степень матрицы совпадает с матрицей, транспонированной к \\(A\\), то есть \\(A^m = A^t\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[01] Ортогональные операторы/middle/04 Теорема об альтернативе неотрицательные", "name": "04 Теорема об альтернативе неотрицательные", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — произвольная вещественная матрица размером \\(m \\times n\\). Докажите, что либо найдётся ненулевой вектор \\(x = (x_1, \\dots, x_n)\\) с неотрицательными координатами, для которого вектор \\(Ax^t\\) имеет неотрицательные координаты, либо найдётся ненулевой вектор \\(y = (y_1, \\dots, y_m)\\), для которого вектор \\(A^t y^t\\) имеет неотрицательные координаты (теорема об альтернативе)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[01] Ортогональные операторы/middle/05 Проекции сторон многоугольника постоянная сумма", "name": "05 Проекции сторон многоугольника постоянная сумма", "problems": [{"index": 0, "url": null, "content": "Докажите, что сумма квадратов длин проекций сторон плоского четырёхугольника на любую прямую, лежащую в его плоскости, постоянна тогда и только тогда, когда векторы сторон этого четырёхугольника являются проекциями векторов, идущих из центра правильного тетраэдра в его вершины."}, {"index": 1, "url": null, "content": "Докажите, что сумма квадратов длин проекций сторон плоского \\(n\\)-угольника на любую прямую, лежащую в его плоскости, постоянна тогда и только тогда, когда векторы сторон этого \\(n\\)-угольника являются проекциями векторов, идущих из центра правильного \\((n - 1)\\)-мерного симплекса в его вершины."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[02] Симметрические операторы/junior/06 Собственный базис симметричного оператора", "name": "06 Собственный базис симметричного оператора", "problems": [{"index": 0, "url": null, "content": "Найти собственный ортонормированный базис и матрицу в этом базисе оператора, заданного в некотором ортонормированном базисе матрицей \\(A = \\begin{bmatrix} 2 & 1 \\\\ 1 & 2 \\end{bmatrix}\\)."}, {"index": 1, "url": null, "content": "Найти собственный ортонормированный базис и матрицу в этом базисе оператора, заданного в некотором ортонормированном базисе матрицей \\(B = \\begin{bmatrix} 11 & 2 & -8 \\\\ 2 & 2 & 10 \\\\ -8 & 10 & 5 \\end{bmatrix}\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[02] Симметрические операторы/middle/07 Трёхдиагональная матрица кратные собственные", "name": "07 Трёхдиагональная матрица кратные собственные", "problems": [{"index": 0, "url": null, "content": "Рассмотрим трёхдиагональную матрицу \\(n\\) на \\(n\\) с числами \\(\\alpha_1, \\dots, \\alpha_n\\) на диагонали и с числами \\(\\beta_1, \\dots, \\beta_{n-1}\\) выше и ниже главной диагонали. Докажите, что у матрицы нет кратных собственных значений."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[02] Симметрические операторы/middle/08 Симметричная матрица вектор y равно Ax", "name": "08 Симметричная матрица вектор y равно Ax", "problems": [{"index": 0, "url": null, "content": "Пусть \\(x\\) и \\(y\\) — два ненулевых вектора из \\(R^n\\). Верно ли, что найдётся симметричная матрица \\(A\\), для которой \\(y = Ax\\)?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[02] Симметрические операторы/middle/09 Билинейная функция идемпотент размерности", "name": "09 Билинейная функция идемпотент размерности", "problems": [{"index": 0, "url": null, "content": "Рассмотрим некоторую билинейную функцию \\(Q : V \\times W \\to R\\) на вещественных линейных пространствах \\(V\\) и \\(W\\). В базисах \\(\\alpha\\) и \\(\\beta\\) функция \\(Q\\) имеет матрицу \\(Q_{\\alpha,\\beta}\\): \\(Q(v, w) = v_\\alpha^T (Q_{\\alpha,\\beta}) w_\\beta\\). Рассмотрим \\(Q_{\\alpha,\\beta}\\) как матрицу некоторого линейного оператора. Оказалось, что в некотором другом базисе его матрица \\(B\\) обладает следующим свойством: \\(B^2 = B\\). Найдите максимальную и минимальную возможную размерности собственного подпространства этого оператора, если известно, что \\(Q\\) в некоторой другой паре базисов \\(\\omega, \\gamma\\): \\(Q_{\\omega,\\gamma} = \\begin{pmatrix} 2 & 0 & 2 & 3 \\\\ 0 & 0 & 0 & 2 \\\\ 4 & 0 & 4 & 5 \\\\ 2 & 0 & 2 & 2 \\end{pmatrix}\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/junior/10 Сигнатура билинейной формы", "name": "10 Сигнатура билинейной формы", "problems": [{"index": 0, "url": null, "content": "Найти сигнатуру билинейной формы с матрицей \\(vv^t\\)."}, {"index": 1, "url": null, "content": "Найти сигнатуру билинейной формы с матрицей \\(vu^t\\)."}, {"index": 2, "url": null, "content": "Найти сигнатуру билинейной формы с матрицей \\(a_{ij} = (i - j)^2\\)."}, {"index": 3, "url": null, "content": "Найти сигнатуру билинейной формы с матрицей \\(a_{ij} = \\sin(i) + \\sin(j)\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/11 Сигнатура форм матрицы многочлены", "name": "11 Сигнатура форм матрицы многочлены", "problems": [{"index": 0, "url": null, "content": "Найти сигнатуру билинейной формы \\(\\det(AB)\\) в пространстве матриц \\(n\\) на \\(n\\)."}, {"index": 1, "url": null, "content": "Найти сигнатуру билинейной формы \\(\\operatorname{tr}(A + B)\\) в пространстве матриц \\(n\\) на \\(n\\)."}, {"index": 2, "url": null, "content": "Найти сигнатуру билинейной формы \\(\\int_0^1 f(x)g(x)dx\\) на пространстве многочленов степени \\(n\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/12 Сигнатура матрицы смежности графа", "name": "12 Сигнатура матрицы смежности графа", "problems": [{"index": 0, "url": null, "content": "Найти сигнатуру (число единиц и минус единиц) для матрицы смежности дерева, где все вершины имеют степень один."}, {"index": 1, "url": null, "content": "Найти сигнатуру для матрицы смежности цикла, где все вершины имеют степень 2."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/13 Невырожденная форма B и минус B эквивалентны", "name": "13 Невырожденная форма B и минус B эквивалентны", "problems": [{"index": 0, "url": null, "content": "Пусть \\(B\\) — матрица невырожденной билинейной функции \\(f\\) на вещественном пространстве размерности \\(2n\\). Могут ли \\(B\\) и \\(-B\\) быть эквивалентны?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/14 Билинейная функция симметричная кососимметричная", "name": "14 Билинейная функция симметричная кососимметричная", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) — билинейная функция на пространстве \\(V\\) и для любых \\(x, y \\in V\\) из равенства \\(f(x, y) = 0\\) вытекает \\(f(y, x) = 0\\). Доказать, что если \\(f\\) — билинейная функция, то \\(f\\) — симметричная или кососимметричная функция."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/15 Эквивалентность форм целые числа", "name": "15 Эквивалентность форм целые числа", "problems": [{"index": 0, "url": null, "content": "Когда над целыми числами эквивалентны формы, заданные матрицами \\(\\begin{bmatrix} 0 & 1 \\\\ 1 & n \\end{bmatrix}\\) и \\(\\begin{bmatrix} 0 & 1 \\\\ 1 & m \\end{bmatrix}\\)?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/middle/16 Матрицы одной билинейной формы параметр", "name": "16 Матрицы одной билинейной формы параметр", "problems": [{"index": 0, "url": null, "content": "При каком значении параметра \\(a \\in R\\) матрицы \\(A = \\begin{pmatrix} 1 & 4 + 2a + a^2 \\\\ 2 & -1 \\end{pmatrix}\\) и \\(B = \\begin{pmatrix} -a - 1 & -3 \\\\ -3 & 5 \\end{pmatrix}\\) могут быть матрицами одной и той же билинейной формы \\(V \\times V \\to R\\) в различных базисах?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[03] Канонический и нормальный вид/senior/17 Сигнатура квадратичной формы многочлены", "name": "17 Сигнатура квадратичной формы многочлены", "problems": [{"index": 0, "url": null, "content": "В пространстве многочленов с действительными коэффициентами степени не выше \\(n\\) задана квадратичная форма \\(Q(f) = f(1)f(2)\\). Найдите её сигнатуру (число единиц и минус единиц в нормальном виде)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/junior/18 Неотрицательная матрица квадратный корень", "name": "18 Неотрицательная матрица квадратный корень", "problems": [{"index": 0, "url": null, "content": "Докажите, что для неотрицательно определённой матрицы \\(A\\) существует такая матрица \\(B\\), что \\(A = B^2\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/junior/19 Положительно определённая обратная матрица", "name": "19 Положительно определённая обратная матрица", "problems": [{"index": 0, "url": null, "content": "Докажите, что если матрица \\(A\\) положительно определена, то \\(A^{-1}\\) тоже положительно определена."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/junior/23 Неотрицательная блочная матрица", "name": "23 Неотрицательная блочная матрица", "problems": [{"index": 0, "url": null, "content": "Доказать, что если \\(A \\ge 0\\), то \\(\\begin{bmatrix} A & A \\\\ A & A \\end{bmatrix} \\ge 0\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/20 Минимальный параметр неотрицательная форма", "name": "20 Минимальный параметр неотрицательная форма", "problems": [{"index": 0, "url": null, "content": "Найдите минимальное \\(a\\) такое, что функция \\(f(x, y) = ax^2 + 12xy + (a + 5)y^2\\) принимает неотрицательные значения."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/21 Формы диагонализируемы вместе", "name": "21 Формы диагонализируемы вместе", "problems": [{"index": 0, "url": null, "content": "Доказать, что если \\((\\varphi - \\psi)\\) — положительно определённая квадратная форма, то \\(\\varphi\\) и \\(\\psi\\) диагонализируемы в одном и том же базисе."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/22 Неотрицательный оператор сумма ранга один", "name": "22 Неотрицательный оператор сумма ранга один", "problems": [{"index": 0, "url": null, "content": "Доказать, что неотрицательное самосопряжённое преобразование ранга \\(r\\) есть сумма \\(r\\) неотрицательных самосопряжённых преобразований ранга 1."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/24 Матрица Гильберта положительно определена", "name": "24 Матрица Гильберта положительно определена", "problems": [{"index": 0, "url": null, "content": "Доказать, что матрица \\(a_{ij} = \\frac{1}{i+j-1}\\) положительно определена."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/25 След произведения неотрицательных матриц", "name": "25 След произведения неотрицательных матриц", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(A \\ge 0\\) и \\(B \\ge 0\\) неотрицательно определена, то \\(\\operatorname{tr}(AB) \\ge 0\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/26 Порядок неотрицательных матриц следы квадратов", "name": "26 Порядок неотрицательных матриц следы квадратов", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(A \\ge 0\\) и \\(B \\ge 0\\) неотрицательно определена и \\(A \\ge B\\), то \\(\\operatorname{tr}(A^2) \\ge \\operatorname{tr}(B^2)\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/27 Квадратичная форма XtAX положительно определена", "name": "27 Квадратичная форма XtAX положительно определена", "problems": [{"index": 0, "url": null, "content": "Верно ли, что если матрица \\(A \\in Mat_n(R)\\) симметрична и положительно определена, то квадратичная форма \\(q(X) = \\operatorname{tr}(X^T A X)\\) на пространстве \\(Mat_n(R)\\) будет положительно определённой?"}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/28 Матрица смежности отрицательное собственное", "name": "28 Матрица смежности отрицательное собственное", "problems": [{"index": 0, "url": null, "content": "Дан неориентированный непустой граф \\(G\\) без петель. Пронумеруем все его вершины. Матрица смежности графа \\(G\\) с конечным числом вершин \\(n\\) — это квадратная матрица \\(A\\) размера \\(n\\), в которой значение элемента \\(a_{ij}\\) равно числу рёбер из \\(i\\)-й вершины графа в \\(j\\)-ю вершину. Докажите, что матрица \\(A\\) имеет отрицательное собственное значение."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/29 Ядро суммы ATA плюс AAT", "name": "29 Ядро суммы ATA плюс AAT", "problems": [{"index": 0, "url": null, "content": "Доказать, что \\(\\ker(A^T A + A A^T) = \\ker A \\cap \\ker A^T\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/middle/30 Матрица пересечений кругов определитель", "name": "30 Матрица пересечений кругов определитель", "problems": [{"index": 0, "url": null, "content": "Пусть \\(K_1, K_2, \\dots, K_n\\) — круги на плоскости. Через \\(a_{ij}\\) обозначим площадь пересечения \\(K_i \\cap K_j\\). Пусть \\(A = (a_{ij})\\) — матрица порядка \\(n\\), составленная из этих чисел. Доказать, что \\(\\det(A) > 0\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/senior/31 Матрица пересечений множеств неотрицательная", "name": "31 Матрица пересечений множеств неотрицательная", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A_1, A_2, \\dots, A_n\\) — конечные множества и \\(a_{ij} = |A_i \\cap A_j|\\). Докажите, что матрица \\((a_{ij})_{i=1,2,\\dots,n}^{j=1,2,\\dots,n}\\) неотрицательно определена."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[04] Знак формы/senior/32 Кривая между положительной отрицательной формой", "name": "32 Кривая между положительной отрицательной формой", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — симметричные билинейные функции на двумерном вещественном пространстве, причём \\(A\\) положительно определена, а \\(B\\) отрицательно определена. Докажите, что любая непрерывная кривая в пространстве симметричных билинейных функций, соединяющая \\(A\\) и \\(B\\), содержит функцию с вырожденной матрицей."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/junior/33 Симметричные ортогональные кососимметричные операторы", "name": "33 Симметричные ортогональные кососимметричные операторы", "problems": [{"index": 0, "url": null, "content": "Классифицируйте все нетривиальные операторы, которые являются симметричными и ортогональными."}, {"index": 1, "url": null, "content": "Классифицируйте все нетривиальные операторы, которые являются кососимметричными и ортогональными."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/junior/34 Симметрическая кососимметрическая ненулевой вектор", "name": "34 Симметрическая кососимметрическая ненулевой вектор", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(g \\neq 0\\), где \\(g\\) — симметрическая или кососимметрическая билинейная функция, то существует такой вектор \\(a\\), что \\(g(a; a) \\neq 0\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/junior/35 Многочлен кососимметрической матрицы нечётные коэф", "name": "35 Многочлен кососимметрической матрицы нечётные коэф", "problems": [{"index": 0, "url": null, "content": "Матрица \\(A\\) кососимметрическая. Докажите, что у многочлена \\(f(x) = \\det(A + xE)\\) все коэффициенты при нечётных степенях равны нулю."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/junior/36 Кососимметрическая xAx равно нуль", "name": "36 Кососимметрическая xAx равно нуль", "problems": [{"index": 0, "url": null, "content": "Равенство \\((x, Ax) = 0\\) выполняется для всех \\(x\\) тогда и только тогда, когда матрица \\(A\\) кососимметрическая."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/middle/37 Кососимметрическая A плюс E невырожденная", "name": "37 Кососимметрическая A плюс E невырожденная", "problems": [{"index": 0, "url": null, "content": "Докажите, что если матрица \\(A\\) вещественная кососимметрическая, то матрица \\(A + E\\) невырожденная."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/middle/38 Кососимметрическая J определитель E плюс uu", "name": "38 Кососимметрическая J определитель E плюс uu", "problems": [{"index": 0, "url": null, "content": "Пусть \\(J \\in Mat_{2n \\times 2n}(R)\\) — кососимметрическая матрица, \\(\\beta\\) — положительное число, а \\(u \\in R^{2n}\\) — ненулевой вектор. Найдите \\(\\det(E + \\beta uu^T J)\\)."}]}, {"id": "courses/mathematics/algebra/[24] 25-12-15 (5) Квадратичные формы 102/[05] Кососимметрические матрицы/middle/39 Классификация нормальных матриц", "name": "39 Классификация нормальных матриц", "problems": [{"index": 0, "url": null, "content": "Классифицируйте все матрицы, для которых \\(A A^t = A^t A\\) (нормальные)."}, {"index": 1, "url": null, "content": "Классифицируйте все матрицы, которые нормальные и ортогональные."}, {"index": 2, "url": null, "content": "Классифицируйте все матрицы, которые нормальные и симметрические."}, {"index": 3, "url": null, "content": "Классифицируйте все матрицы, которые нормальные и кососимметрические."}]}, {"id": "courses/mathematics/analysis/[08] 25-10-27 (7) Числовые ряды 101/01 Алгебраические преобразования", "name": "01 Алгебраические преобразования", "problems": [{"index": 0, "url": null, "content": "Вычислите \\(\\sum_{k=1}^{\\infty} \\frac{k-1}{k!}\\)"}, {"index": 1, "url": null, "content": "Вычислите \\(\\sum_{k=1}^{\\infty} \\frac{k}{2^k}\\)"}, {"index": 2, "url": null, "content": "Вычислите \\(\\sum_{k=1}^{\\infty} \\frac{1}{k(k+1)(k+2)}\\)"}]}, {"id": "courses/mathematics/analysis/[08] 25-10-27 (7) Числовые ряды 101/02 Свойства сходящихся рядов", "name": "02 Свойства сходящихся рядов", "problems": [{"index": 0, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{(2k+1)(2k+2)(2k+3)}{(4k-1)(4k-2)(4k-3)}\\)"}, {"index": 1, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} a_k\\), где \\(a_k = \\frac{k}{2^k}\\), если в числе \\(k\\) нет нулей, и \\(a_k = \\frac{(-1)^k}{2^k}\\) в остальных случаях"}, {"index": 2, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} a_k^2\\), если известно, что \\(\\sum_{k=1}^{\\infty} a_k\\) сходится и при этом \\(a_k \\ge 0\\)"}]}, {"id": "courses/mathematics/analysis/[08] 25-10-27 (7) Числовые ряды 101/03 Сравнение с известными рядами", "name": "03 Сравнение с известными рядами", "problems": [{"index": 0, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{1}{1000k+1}\\)"}, {"index": 1, "url": null, "content": "Исследуйте сходимость ряда (7) Числовые ряды 101/07 Признак Раабе", "name": "07 Признак Раабе", "problems": [{"index": 0, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{1 \\cdot 3 \\cdot 5 \\cdots (2k-1)}{2 \\cdot 4 \\cdot 6 \\cdots 2k}\\)"}, {"index": 1, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{\\sqrt{k!}}{(2+\\sqrt{1})(2+\\sqrt{2})\\cdots(2+\\sqrt{k})}\\)"}, {"index": 2, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{k^k}{e^k \\cdot k!}\\)"}]}, {"id": "courses/mathematics/analysis/[08] 25-10-27 (7) Числовые ряды 101/08 Признаки Дирихле и Абеля", "name": "08 Признаки Дирихле и Абеля", "problems": [{"index": 0, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\sin\\!\\left(\\frac{1}{k}\\right) \\sin k\\)"}, {"index": 1, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{(-1)^k \\sin^2 k}{k}\\)"}, {"index": 2, "url": null, "content": "Исследуйте сходимость ряда \\(\\sum_{k=1}^{\\infty} \\frac{\\ln^{100}(k) \\cdot \\sin(\\frac{\\pi k}{4})}{k}\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/junior/01 Нахождение пределов последовательности", "name": "01 Нахождение пределов последовательности", "problems": [{"index": 0, "url": null, "content": "Найдите \\(\\lim_{n\\to\\infty} \\left(\\sqrt[3]{n+1} - \\sqrt[3]{n-1}\\right)\\)"}, {"index": 1, "url": null, "content": "Найдите \\(\\lim_{n\\to\\infty} \\sqrt[n]{5^n n^5 + 2n - 1}\\)"}, {"index": 2, "url": null, "content": "Найдите \\(\\lim_{n\\to\\infty} \\sqrt[n]{1^2 + 2^2 + \\ldots + n^2}\\)"}, {"index": 3, "url": null, "content": "Найдите \\(\\lim_{n\\to\\infty} (n + 1 + n\\cos n)^{\\frac{1}{2n + n\\sin n}}\\)"}, {"index": 4, "url": null, "content": "Найдите \\(\\lim_{n\\to\\infty} (\\sqrt{2} - \\sqrt[3]{2})\\cdots(\\sqrt{2} - \\sqrt[2n+1]{2})\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/junior/02 Сходимость и предел последовательности", "name": "02 Сходимость и предел последовательности", "problems": [{"index": 0, "url": null, "content": "Исследовать на сходимость и найти предел \\(a_n = \\frac{10}{1} \\cdot \\frac{11}{4} \\cdot \\ldots \\cdot \\frac{n+9}{3n-2}\\)"}, {"index": 1, "url": null, "content": "Исследовать на сходимость и найти предел \\(a_{n+1} = \\frac{n+2}{n} a_n,\\ a_1 = 1\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/junior/03 Предел степенной разности", "name": "03 Предел степенной разности", "problems": [{"index": 0, "url": null, "content": "Для \\(a \\in (0, 1)\\) найдите предел \\((n+1)^a - n^a\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/junior/04 Предел sin факториала", "name": "04 Предел sin факториала", "problems": [{"index": 0, "url": null, "content": "Для рационального \\(a\\) найдите предел \\(\\sin(n!\\, a\\pi)\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/junior/13 Применение теоремы Штольца", "name": "13 Применение теоремы Штольца", "problems": [{"index": 0, "url": null, "content": "Найдите предел \\(\\frac{1}{n\\sqrt{n}}\\left(1 + \\sqrt{2} + \\ldots + \\sqrt{n}\\right)\\)"}, {"index": 1, "url": null, "content": "Найдите предел \\(\\frac{a + 2a^2 + \\ldots + na^n}{na^{n+1}},\\ a > 1\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/middle/05 Постоянная Эйлера-Маскерони", "name": "05 Постоянная Эйлера-Маскерони", "problems": [{"index": 0, "url": null, "content": "Доказать, что \\(a_n\\) и \\(b_n\\) сходятся к одному и тому же числу, где \\(a_n = 1 + \\frac{1}{2} + \\ldots + \\frac{1}{n-1} - \\ln(n)\\) и \\(b_n = 1 + \\frac{1}{2} + \\ldots + \\frac{1}{n-1} + \\frac{1}{n} - \\ln(n)\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/middle/06 График предела функции", "name": "06 График предела функции", "problems": [{"index": 0, "url": null, "content": "Построить график функции \\(f(x) = \\lim_{n \\to \\infty} \\sqrt[n]{1 + x^n + \\left(\\frac{x^2}{2}\\right)^n},\\ x \\ge 0\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/middle/07 Рекуррентные последовательности", "name": "07 Рекуррентные последовательности", "problems": [{"index": 0, "url": null, "content": "Исследовать на сходимость и найти предел: \\(a_0 = 2023,\\ a_n = a_{n-1}\\left(\\frac{n}{n+1}\\right)^2 + \\frac{1}{(n+1)^2}\\)"}, {"index": 1, "url": null, "content": "Исследовать на сходимость и найти предел: \\(a_0 = 0,\\ a_1 = 1,\\ a_{n+1} = \\frac{a_n + na_{n-1}}{n+1}\\)"}, {"index": 2, "url": null, "content": "Исследовать на сходимость и найти предел при всех значениях параметров \\(x, y\\): \\(a_{n+1} = x \\cdot a_n + y,\\ a_1 = 0\\)"}, {"index": 3, "url": null, "content": "Исследовать на сходимость и найти предел при всех значениях параметров \\(x, y\\): \\(a_{n+2} = a_{n+1} + a_n,\\ a_1 = x,\\ a_2 = y\\)"}]}, {"id": "courses/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[01] Последовательности/middle/08 Монотонные рекуррентные последовательности", "name": "08 Монотонные рекуррентные последовательности", "problems": [{"index": 0, "url": null, "content": "Исследовать на сходимость и найти предел: \\(a_{n+1} = \\sqrt[p]{a + a_n}\\), где \\(a_1 = \\sqrt[p]{a}\\), \\(a > 0\\), \\(p > 1\\) и натурально"}, {"index": 1, "url": null, "content": "Исследовать на сходимость и найти предел: \\(a_{n+1} = \\frac{1}{3}\\left(2a_n + \\frac{2}{a_n^2}\\right)\\)"}, {"index": 2, "url": null, "content": "Исследовать на сходимость и найти предел: \\(a_0 = -\\frac{1}{2},\\ a_{n+1} = \\frac{a_n^2(a_n - 3)}{4}\\)"}, {"index": 3, "url": null, "content": "Исследовать на сх ые функции 102/[01] Непреррывность/junior/01 Исследование на непрерывность", "name": "01 Исследование на непрерывность", "problems": [{"index": 0, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(\\frac{|x-1|}{x^3 - x^2}\\)"}, {"index": 1, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(\\frac{x}{\\sin x}\\)"}, {"index": 2, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(x \\cos \\frac{1}{x}\\)"}, {"index": 3, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: индикатор рациональных чисел (функция Дирихле)"}, {"index": 4, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: функцию Римана"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/junior/02 Функция с заданным множеством непрерывности", "name": "02 Функция с заданным множеством непрерывности", "problems": [{"index": 0, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в одной точке"}, {"index": 1, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в двух точках"}, {"index": 2, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в \\(n\\) точках"}, {"index": 3, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в счётном множестве точек"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/junior/03 Непрерывное отображение отрезка", "name": "03 Непрерывное отображение отрезка", "problems": [{"index": 0, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\(\\mathbb{R}\\)?"}, {"index": 1, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\((c, d)\\)?"}, {"index": 2, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\([0; 1] \\cup [3; 4]\\)?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/04 Теорема Коши о промежуточном значении", "name": "04 Теорема Коши о промежуточном значении", "problems": [{"index": 0, "url": null, "content": "Доказать, что для любой непрерывной функции \\(f\\) из \\([0;1]\\) в \\([0;1]\\) существует неподвижная точка \\(x \\in [0;1]\\) такая, что \\(f(x) = x\\)"}, {"index": 1, "url": null, "content": "Верно ли то же самое для непрерывной функции \\(f\\) из \\((0;1)\\) в \\((0;1)\\)? А из \\([0;1)\\) в \\([0;1)\\)?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/05 Функциональное уравнение Коши", "name": "05 Функциональное уравнение Коши", "problems": [{"index": 0, "url": null, "content": "Найдите все непрерывные функции \\(f(x)\\) такие, что для всяких \\(x, y\\) выполнено \\(f(x + y) = f(x)f(y)\\). Можно ли заменить условие непрерывности на ограниченность? монотонность? непрерывность только в одной точке?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/06 Среднее значение непрерывной функции", "name": "06 Среднее значение непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на отрезке \\([a, b]\\) и \\(a = x_0 < x_1 < \\ldots < x_n = b\\). Доказать, что существует \\(\\xi \\in (a; b)\\) такое, что \\(f(\\xi) = \\frac{f(x_0) + f(x_1) + \\ldots + f(x_n)}{n+1}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/07 Срезающая функция", "name": "07 Срезающая функция", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на \\([a, b]\\). Доказать, что функция \\(f_c(x)\\), определённая как \\(-c\\) при \\(f(x) < -c\\), как \\(f(x)\\) при \\(|f(x)| \\le c\\) и как \\(c\\) при \\(f(x) > c\\), также непрерывна."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/08 Нечётная непрерывная функция", "name": "08 Нечётная непрерывная функция", "problems": [{"index": 0, "url": null, "content": "Верно ли, что всякая нечётная непрерывная функция, удовлетворяющая условию \\(f(x) = 2f(x)\\), линейна?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/09 Наименьший период непрерывной функции", "name": "09 Наименьший период непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Пусть функция \\(f(x)\\) определена на всей числовой оси, непрерывна хотя бы в одной точке, периодична и отлична от постоянной. Доказать, что она имеет наименьший положительный период."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/10 Кратность значений непрерывной функции", "name": "10 Кратность значений непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Может ли непрерывная на всей числовой прямой функция принимать каждое своё значение дважды?"}, {"index": 1, "url": null, "content": "Может ли непрерывная на всей числовой прямой функция принимать каждое своё значение трижды?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/11 Теорема Вейерштрасса", "name": "11 Теорема Вейерштрасса", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на \\([a, b]\\). Доказать, что функции \\(m(x) = \\inf_{a \\le y < x} f(y)\\) и \\(M(x) = \\sup_{a \\le y < x} f(y)\\) также непрерывны на \\([a, b]\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/12 Теорема о сжимающем отображении", "name": "12 Теорема о сжимающем отображении", "problems": [{"index": 0, "url": null, "content": "Пусть дана функция \\(f\\colon \\mathbb{R} \\to \\mathbb{R}\\) такая, что для всяких \\(x, y\\) выполнено \\(|f(x) - f(y)| < q|x - y|\\), где \\(q < 1\\). Докажите непрерывность функции \\(f\\)."}, {"index": 1, "url": null, "content": "В условиях задачи 1 докажите существование и единственность неподвижной точки \\(f(x) = x\\) и постройте последовательность, сходящуюся к ней."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/13 Предел функции", "name": "13 Предел функции", "problems": [{"index": 0, "url": null, "content": "Вычислите при всех \\(x\\) предел \\(\\lim_{n \\to \\infty} \\frac{\\sin\\!\\left(x + \\frac{1}{n}\\right) - \\sin(x)}{\\sin\\!\\left(x + \\frac{1}{n}\\right)\\!\\left(\\sqrt{x+n} - \\sqrt{n}\\right)}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/14 Сумма ряда", "name": "14 Сумма ряда", "problems": [{"index": 0, "url": null, "content": "Найдите сумму \\(\\sum_{k=0}^{\\infty} (-1)^k \\frac{(k+1)^2}{k!}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/15 Пределы по формуле Тейлора", "name": "15 Пределы по формуле Тейлора", "problems": [{"index": 0, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{x\\sqrt[3]{\\cos x} - \\sin x}{x^5}\\)"}, {"index": 1, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{\\cos(2x) - \\sqrt[4]{e^{-x^2}}}{x^4}\\)"}, {"index": 2, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{e^{x^2} \\cos x - \\operatorname{ch} x + x^5}{x^6 + x^2 \\sin^3 x}\\)"}, {"index": 3, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{e^{-\\frac{x^2}{2}} - \\sqr
