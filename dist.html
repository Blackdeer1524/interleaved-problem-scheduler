отором ортонормированном базисе. Пусть\n\\[\nB =\n\\begin{pmatrix}\n4 & 3 & 1 \\\\\n* & * & * \\\\\n* & * & *\n\\end{pmatrix}\n\\]\n- матрица этого же оператора в некотором другом ортонормированном базисе. Найдите все варианты для значений элементов, помеченных звездочками.\n\nHint: https://shadhelper.notion.site/2d488659932640dfb3275d936e5fdae8"}]}, {"id": "ysda/2021/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения.,Самосопряжённые и ортогональные операторы./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть\n\\[\nM =\n\\begin{pmatrix}\nE & A \\\\\nA^T & E\n\\end{pmatrix}\n\\]\nгде \\(E\\) - \\(n \\times n\\) единичная матрица, \\(A = U\\Lambda V^T\\), где \\(U, V\\) - ортогональные \\(n \\times n\\) матрицы, \\(\\Lambda\\) - диагональная матрица с числами \\(\\lambda_1, \\dots ,\\lambda_n\\) на диагонали. Найдите собственное значение матрицы \\(M\\).\n\nHint: https://shadhelper.notion.site/aee233f511ba4c58bfdaa74fa87f190d"}]}, {"id": "ysda/2021/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Какой минимальной длины существует цепочка из цифр, такая, что в ней в качестве фрагментов четырёх из подряд идущих цифр присутствует все не начинающиеся с нуля цепочки из \\(4\\) цифр?\n\nHint: https://shadhelper.notion.site/92f5e4b2727f4d3d9873148e35414970"}]}, {"id": "ysda/2021/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях. Связные графы циклы деревья. Двудольные графы теорема Холла о свадьбах. Эйлеровы и гамильтоновы графы./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Дан граф без кратных ребер и петель с \\(40\\) вершинами. Известно, что у любого ребра хотя бы одним из концов является вершина, из которой выходит не более \\(4\\) других ребер. Какое наибольшее количество ребер может быть в этом графе?\n\nHint: https://shadhelper.notion.site/5eb5504f7b44415fba8f8a7ae319a9af"}]}, {"id": "ysda/2021/Математический анализ/Дифференцируемость./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Пусть функция \\(f(x)\\) дифференцируема на отрезке \\([0, 1]\\), причем \\(f(0) = f(1) = 0\\). Известно, что \\(|f''(x)| ≤ A\\) для всех \\(x \\in (0, 1)\\). Найдите максимально возможное значение \\(|f''(x)|\\) при \\(x \\in [0, 1]\\).\n\nHint: https://shadhelper.notion.site/962d9eaa296b4a14a2402ce025b0c698"}]}, {"id": "ysda/2021/Математический анализ/Интегрирование функций одной переменной основные методы интегрирования. Формула Ньютона-Лейбница. Теоремы о среднем,Непрерывность./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Верно ли, что для любой непрерывной функции \\(g(x)\\) существует единственная функция \\(h(x)\\) такая, что:\n\\[\n\\int_0^{h(a)}(\\sin(a)\\cos(x)+2)dx=g(a)\n\\]\n\nHint: https://shadhelper.notion.site/0b01130f0f1d4c579a654d6b8ae74954"}]}, {"id": "ysda/2021/Математический анализ/Предел функции. Непрерывность. Теоремы Вейерштрасса.,Дифференцируемость./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть\n\\[\nf(x) = \\frac{cx^2(1-c)^2}{(x^2+c^3)(x^2+c)}\n\\]\nНайдите при каких параметрах \\(c\\) во всех точках, в которых \\(f(x)\\) определена, выполняется неравенство \\(0 ≤ f(x) ≤ 1\\)\n\nHint: https://shadhelper.notion.site/7e809f83fdaf45649c9c1c27b163b00c"}]}, {"id": "ysda/2021/Математический анализ/Предел функции.,Несобственный интеграл.,Интегралы зависящие от параметра./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Вычислите при всех \\(x\\) предел\n\\[\n\\lim_{n\\to\\infty}\\frac{\\sin(x+\\frac{1}{n})-\\sin(x)}{\\sin(x+\\frac{1}{n})(\\sqrt{x+n}-\\sqrt{n})}\n\\]\n\nHint: https://shadhelper.notion.site/4a01fe508f2141a5b02e0acf1607d3ff"}]}, {"id": "ysda/2021/Теория вероятностей/Математическое ожидание случайных величин./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) - строго положительная случайная величина, причем её дисперсия существует и не превосходит \\(2\\). Верно ли, что \\(\\mathbf{P}(\\mathbf{E}(\\xi) − 2 ≤ \\xi ≤ 2\\mathbf{E}(\\xi) + 1) ≥ \\frac{1}{2}\\)?\n\nHint: https://shadhelper.notion.site/e708cc9cfbef4dac8c947d93df6b72ad"}]}, {"id": "ysda/2021/Теория вероятностей/Случайные векторы./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1, X_2, Y_1, Y_2\\) - независимые случайные величины, распределенные экспоненциально с параметрами \\(\\lambda_1, \\lambda_2, \\mu_1, \\mu_2\\) соответственно. Найдите \\(E(\\max(X_1 + Y_1, X_2 + Y_2))\\)\n\nHint: https://shadhelper.notion.site/09e5f7ef3a2b42afb2181d62c7743c18"}]}, {"id": "ysda/2021/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "(a) Игроки \\(A, B\\) и \\(C\\) сменяя друг друга, по очереди кидают две игральные кости до тех пор пока не получат сумму очков, равную \\(7\\). Найдите вероятность того, что сумму очков равную \\(7\\) получит \\(B\\).\n(b) В результате проведения эксперимента возможны два исхода: успех (с вероятностью \\(p\\)) и неуспех (с вероятностью \\(1 − p\\)). Экспериментаторы \\(A, B\\) и \\(C\\) сменяя друг друга, по очереди проводят этот эксперимент до тех пор пока не получат успех. Найдите максимальное значение вероятности \\(p\\), при котором вероятность того, что успех получит \\(B\\) больше либо равна \\(\\frac{1}{3}\\).\n\nHint: https://shadhelper.notion.site/78cc50effbfc470a89f899f68fe58c7d"}]}, {"id": "ysda/2021/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Вася бросает \\(20\\)-гранную кость, на гранях которой написаны числа от \\(1\\) до \\(20\\), а вероятность выпадения граней одинакова. Он видит, что выпало, и при желании может бросить кость второй раз (в этом случае результат первого броска забывается и засчитывается результат второго броска).\nПетя бросает \\(10\\)-гранную кость, на гранях которой написаны числа от \\(1\\) до \\(10\\), а вероятность выпадения каждой из граней одинакова. Петя выигрывает, если у него выпадает очков больше, чем у Васи, в противном случае выигрывает Вася. Проигравший платит выигравшему столько, сколько у выигравшего выпало очков. При каком максимальном результате первого броска Васе следует бросить кость второй раз, чтобы максимизировать матожидание своего выигрыша?\n\nHint: https://shadhelper.notion.site/e98623d74e19441aa4845544e1ee4e39"}]}, {"id": "ysda/2021/Теория вероятностей,Алгебра/Случайные векторы./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "В \\(\\mathbb{R}^n\\) дана система, состоящая из \\(m\\) векторов и имеющая ранг \\(k\\). У векторов этой\nсистемы случайным образом изменили координаты с номерами \\(0 ≤ a_1 < \\dots < a_d ≤ n\\). Какой ранг возможен у полученной системы?\n\nHint: https://shadhelper.notion.site/022aa983ed45481391126dcd68aed467"}]}, {"id": "ysda/2022/Алгебра/Векторные пространства. Базис размерность. Подпространства./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Пусть задано два аффинных подпространства \\(V\\) и \\(W\\) в евклидовом пространстве матриц \\(Mat_{2\\times 2}(\\mathbb{R})\\) со скалярным произведением \\(\\langle A, B \\rangle = tr(A^T B)\\):\n\\[\nV = \\begin{pmatrix}\n1 & -9 \\\\\n-3 & -2\n\\end{pmatrix} + L\n\\]\nгде \\(L\\) - линейная оболочка матрицы \\(\\begin{pmatrix}\n1 & 5 \\\\\n4 & 0\n\\end{pmatrix}\\) , а \\(W\\) - аффинное подпространство, заданное матричным уравнением:\n\\[\n\\begin{pmatrix}\n1 & 2 \\\\\n-3 & -6\n\\end{pmatrix} W =\n\\begin{pmatrix}\n-21 & 37 \\\\\n63 & -111\n\\end{pmatrix}\n\\]\nНайдите общий перпендикуляр \\(P\\) между этими подпространствами.\n\nHint: https://shadhelper.notion.site/332769ca94c84bedbfc779f059052d8d"}]}, {"id": "ysda/2022/Алгебра/Векторные пространства. Подпространства/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Найдите расстояние от матрицы\n\\[\nA = \\begin{pmatrix}\n1 & 5\\\\\n6 & 6\n\\end{pmatrix}\n\\]\nдо линейной оболочки матриц\n\\[\nB = \\begin{pmatrix}\n2 & 6\\\\\n1 & 4\n\\end{pmatrix},\nC = \\begin{pmatrix}\n1 & 1\\\\\n1 & 2\n\\end{pmatrix},\nD = \\begin{pmatrix}\n2 & 2\\\\\n2 & 4\n\\end{pmatrix}\n\\]\nесли скалярное произведение на матрицах задано следующим образом:\n\\[\n\\langle X,Y \\rangle = tr(X^TY)\n\\]\n\nHint: https://shadhelper.notion.site/1faedd3900254c8da2f1fc8f44f155d7"}]}, {"id": "ysda/2022/Алгебра/Линейные отображения и матрицы ранги./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Раскройте скобки в матричном выражении:\n\\[\n(A-B^T)^2(A^T+B)^2\n\\]\n\nHint: https://shadhelper.notion.site/fa5654491c7c40f6b18abaf2b991556f"}]}, {"id": "ysda/2022/Алгебра/Линейные отображения и матрицы ранги./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица такова, что \\(tr(AX) = 0\\) для любой матрицы \\(X\\) того же размера, имеющей нулевой след (напомним, что след матрицы - это сумма элементов на главной диагонали). Докажите, что матрица является скалярной (т.е. имеет вид \\(\\lambda E\\) для некоторого \\(\\lambda\\), где \\(E\\) - единичная матрица)\n\nHint: https://shadhelper.notion.site/21bc0f8cfc354aa9b602d8ac6b6a0f32"}]}, {"id": "ysda/2022/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Определите, при каком вещественном значении параметра \\(a\\) линейные операторы \\(A\\) и \\(B\\), заданные матрицами\n\\[\nA=\\frac{1}{10} \\begin{pmatrix}\n28a-1 & 6(2a-1) & 3(2a-3)\\\\\n3(2a+1) & 2(7a+4) & 2a+17\\\\\n-3(2a+1) & -2(2a-1) & 8a-7\\\\\n\\end{pmatrix}\n\\]\nимеют хотя бы один общий вектор с одинаковым собственным значением.\n\\[\nB=\\frac{1}{10}\n\\begin{pmatrix}\n-2a-9 & -12 & -3(2a+3)\\\\\n3(2a-1) & 6 & 18a+7\\\\\n-3(2a-1) & 4 & -3(6a-1)\\\\\n\\end{pmatrix}\n\\]\n\nHint: https://shadhelper.notion.site/8c8ffa51e1154e9b9ee4d7d6bed256e6"}]}, {"id": "ysda/2022/Алгебра/Многочлены от одной переменной.,Векторные пространства. Базис размерность. Подпространства./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "На пространстве многочленов от переменной \\(x\\) с вещественными коэффициентами задано скалярное произведение\n\\[\n\\langle u,v \\rangle =\\int_2^6 u(x)v(x)dx\n\\]\nНайдите длину ортогональной проекции многочлена \\(y=1+x^4\\) на линейную оболочку многочленов \\(x^3-1\\) и \\(x^2+x\\).\n\nHint: https://shadhelper.notion.site/77bc76b067f149cc9dffeb5c6b0d7b18"}]}, {"id": "ysda/2022/Алгебра/Многочлены от одной переменной.,Линейные отображения и матрицы ранги./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Пусть\n\\[\nk(x)=x^3-x^2+2x+3\\\\\nl(x)=3x^3+x^2-x-1\\\\\nm(x)=x^3+x^2+2\\\\\nn(x)=7x^3+ax^2+5\n\\]\nНайдите значение параметра \\(a\\), для которого множество \\((k, l, m, n)\\) будет линейно зависимым.\n\nHint: https://shadhelper.notion.site/15d2c8965d7c4f4ca941f253662e8677"}]}, {"id": "ysda/2022/Алгебра/Многочлены от одной переменной.,Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Линейный оператор \\(\\varphi\\) действует на пространстве многочленов степени не выше \\(2\\) с вещественными коэффициентами. Известно, что\n\\[\n\\varphi(x^2-x-2) = x^2 +3x+3,\\\\\\varphi(-2x^2+3x+2) = 2x^2+x+1,\\\\\\varphi(-x^2-2x+9) = x^2+2x+3\n\\]\nНайдите сумму действительных собственных значений оператора \\(\\varphi\\) (сумму следует вычислять с учетом алгебраической кратности собственных значений).\n\nHint: https://shadhelper.notion.site/2a4241efef644bba93edb45519d24ab5"}]}, {"id": "ysda/2022/Алгебра/Поля,Линейные отображения и матрицы ранги./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Известно, что \\(A^2 + A = 2I\\), где \\(A\\) - квадратная матрица размера \\(5 \\times 5\\) над полем действительных чисел \\((A \\in Mat_{5 \\times 5}(\\mathbf{R}))\\), а \\(I\\) - единичная соответствующего порядка. Найдите максимально возможное значение следа матрицы.\n\nHint: https://shadhelper.notion.site/577b228cfbff42339931334870ad10bd"}]}, {"id": "ysda/2022/Алгебра/Поля,Определители,Линейные отображения и матрицы ранги./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(M_{n\\times n}(\\mathbb{R})\\) - пространство матриц размера \\(n \\times n\\) над полем действительных чисел, а\n\\[\nF : M_{n\\times n}(\\mathbb{R}) \\rightarrow M_{n\\times n}(\\mathbb{R})\n\\]\nлинейный оператор, такой, что \\(det F(A) = det A\\), для любой \\(A \\in M_{n\\times n}(\\mathbb{R})\\).\nВерно ли, что оператор \\(F\\) обратим?\n\nHint: https://shadhelper.notion.site/a2173d91ca8b4dd3ba48b08c6db5cf96"}]}, {"id": "ysda/2022/Алгебра/Системы линейных уравнений./Задача 1 (2)", "name": "Задача 1 (2)", "problems": [{"index": 0, "url": null, "content": "Найдите, при каких значениях параметров \\(a\\) и \\(b\\) линейная оболочка векторов\n\\[\nv = \\begin{pmatrix}\n1\\\\-2\\\\-1\\\\0\n\\end{pmatrix},\nw = \\begin{pmatrix}\n1\\\\1\\\\1\\\\5\n\\end{pmatrix}\n\\]\nсовпадает с множеством решений системы линейных уравнений \\(Ax = 0\\), где матрица \\(A\\) равна:\n\\[\n\\begin{pmatrix}\na-2 & -b-1 & ab+2 & 0\\\\\n-10 & -5b & 0 & ab+2\\\\\n2a-14 & -7b-2 & 2ab+4 & ab+2\n\\end{pmatrix}\n\\]\n\nHint: https://shadhelper.notion.site/fbf0c5dfbd944d29a8054d8fb95c07f8"}]}, {"id": "ysda/2022/Алгебра/Системы линейных уравнений./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найдите, при каких значениях параметра \\(a\\) система уравнений\n\\[\n\\begin{cases}\nx + y + 5z = 1 \\\\\n2x + 3y + 13z = 4 \\\\\nx + 4y + 15z = 2 \\\\\n6y + 21z = a\n\\end{cases}\n\\]\nимеет решение.\n\nHint: https://shadhelper.notion.site/8d2baf85bbb24932b781383bbf5e7837"}]}, {"id": "ysda/2022/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "В темноте, за круглым столом, собрались орки и эльфы - всего \\(12\\) их было. Орки всегда лгут, а эльфы говорят лишь правду. Каждый из них проворчал: “Все кроме меня и моих соседей – орки”.\nСколько эльфов за столом сидело?\nКаждое существо не сообщает никакой информации про себя и соседей. Только про остальных!\n\nHint: https://shadhelper.notion.site/9b86be1273d94f9da04a4c1539313f08"}]}, {"id": "ysda/2022/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях. Связные графы циклы деревья. Двудольные графы теорема Холла о свадьбах. Эйлеровы и гамильтоновы графы. Раскраски графов./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Дан граф со \\(120\\) вершинами (без петель и кратных рёбер). Известно, что самый короткий несамопересекающийся цикл в этом графе состоит из \\(12\\) вершин. Верно ли, что в графе найдётся вершина, из которой выходит менее \\(3\\) рёбер?\n\nHint: https://shadhelper.notion.site/585c33964dbd40ccb3d9409a6ef97e45"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Рассмотрим функцию\n\\[\nf(x)= \\begin{cases} \\arcctg \\left(5\\frac{\\sin x}{\\cos x}\\right), -\\frac{\\pi}{2} < x < \\frac{\\pi}{2}\\\\ \\lim\\limits_{t\\to 0}\\frac{a(1-\\cos t)}{t^2}, x = \\frac{\\pi}{2}\\\\ bx+c, x > \\frac{\\pi}{2} \\end{cases}\n\\]\nПри каких вещественных значениях параметров \\(a, b\\) и \\(c\\) функция дифференцируема для любых \\(x ≥ −\\frac{\\pi}{2}\\)?\n\nHint: https://shadhelper.notion.site/72b778937deb4595b14b5177ff23d146"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Найти максимально возможную площадь прямоугольника, вписанного в фигуру, ограниченную следующими кривыми:\n\\[\ny = 8, y = -10x^2+25x-4\n\\]\n\nHint: https://shadhelper.notion.site/b867dab5e4384d699bc68a527c69766d"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Найдите производную сложной функции\n\\[\nf(x)=e^{\\sin({g(\\ln x)})}\n\\]\nв точке \\(x = e\\), если известно, что \\(g(1) = 5\\), а \\(g^{\\prime}(1) = 3\\).\n\nHint: https://shadhelper.notion.site/10e30f0925254a0ba456888338694d82"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Прямоугольная глыба льда тает на солнце. В момент времени \\(t_0\\) глыба имеет высоту \\(3\\)см, длину \\(4\\)см и ширину \\(11\\)см, и каждый из размеров уменьшается со скоростью \\(1\\) сантиметр в час (т.е. производные высоты, длины и ширины как функций от времени в точке \\(t_0\\) равны \\(-1\\)). Найдите производную объема по времени в момент \\(t_0\\)\n(т.е. \\(\\frac{dV}{dt}|_{t=t_0}\\)).\n\nHint: https://shadhelper.notion.site/816c5e95b6224734baefc236205c9303"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 7 (2)", "name": "Задача 7 (2)", "problems": [{"index": 0, "url": null, "content": "Берег моря представляет собой прямую линию, протянувшуюся с востока на запад. Остров находится на расстоянии \\(7\\)км к северу от ближайшей к нему точки \\((T)\\) береговой линии. Лёша остановился в хижине на берегу, которая находится в \\(11\\)км к западу от \\(T\\). Лёша планирует отправится из хижины на вокзал, который находится на берегу в \\(25\\)км восточнее \\(T\\), посетив по пути остров. Лёша бегает со скоростью \\(10\\)км/ч и плавает со скоростью \\(2\\)км/ч. За какое минимальное время Лёша доберется до вокзала, если в любой точке суши, расположенной восточнее \\(T\\), он может арендовать скутер со скоростью передвижения \\(25\\)км/ч?\n\nHint: https://shadhelper.notion.site/bdc560adbbb74bc4b98f67e3435603bc"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Функция \\(f(x)\\) задана на отрезке \\([-\\frac{1}{3},14]\\). График её производной имеет следующий вид:\nphoto1695666592.jpeg\nНайдите точки, в которых находятся локальные максимумы функции \\(f(x)\\) на отрезке \\([−\\frac{1}{3}, 14]\\).\nНапомним определения локального максимума:\nОпределение: Пусть \\(M \\subseteq \\mathbb{R}\\) и задана функция \\(f : M \\to \\mathbb{R}\\). Тогда \\(x_0 \\in M\\) - точка локального максимума \\(f\\), если \\(\\exists \\varepsilon > 0 : \\forall x \\in M : |x − x_0| < \\varepsilon ⇒ f(x_0) ≥ f(x)\\). Проще говоря: существует небольшая окрестность точки \\(x_0\\) (радиуса \\(\\varepsilon\\)), в которой\nзначение функции в \\(x_0\\) не меньше значений функции в точках данной окрестности.\n\nHint: https://shadhelper.notion.site/b8d7ec2b923f4d818c9ae4b29bbe08dd"}]}, {"id": "ysda/2022/Математический анализ/Дифференцируемость.,Интегрирование функций одной переменной./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Дана функция\n\\[\ng(x) = \\int\\limits_{x-1}^{1-x}e^{t^2}(2022+(1-t)(1+t))dt\n\\]\nнайдите ее экстремумы, если \\(x \\in (−\\infty; +\\infty)\\)\n\nHint: https://shadhelper.notion.site/9c2af3e9fc794d8ca508a393eeb70ed9"}]}, {"id": "ysda/2022/Математический анализ/Интегрирование функций одной переменной./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Функция \\(f\\) такова, что для любых \\(a < b\\) имеет место равенство:\n\\[\n\\int_a^b f(x)dx = \\frac{e^b(a^4+7)-e^a(b^4+7)}{(a^4+7)(b^4+7)}\n\\]\nНайдите интеграл:\n\\[\n\\int_0^3 f(8x-4)dx\n\\]\n\nHint: https://shadhelper.notion.site/95f5354fd37e4c8ca08a235f8b7f0921"}]}, {"id": "ysda/2022/Математический анализ/Кратные интегралы./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(g(x)\\) - непрерывная функция, заданная на отрезке \\([0, 1]\\). Верно ли, что:\n\\[\n\\int_0^1\\int_0^1|g(x)+g(y)|dxdy \\geq \\int_0^1|g(x)|dx\n\\]\n\nHint: https://shadhelper.notion.site/55b60775a187405fbcb8296d2d95517d"}]}, {"id": "ysda/2022/Математический анализ/Предел функции. Непрерывность. Теоремы Вейерштрасса.,Дифференцируемость./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Функция \\(g(x)\\) при \\(x \\in (−\\infty,+\\infty)\\) задана формулой\n\\[\ng(x) = \\int\\limits_{x-1}^{1-x}e^{t^2}[2022+(1-t)sign(1+t)]dt\n\\]\nНайдите (если существуют) точки локальных максимумов и минимумов функции \\(g(x)\\).\n\nHint: https://shadhelper.notion.site/f9e3fa9a3fcc4d22944248bd84121eb4"}]}, {"id": "ysda/2022/Математический анализ/Предел функции.,Несобственный интеграл.,Интегралы зависящие от параметра./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Найти предел\n\\[\n\\lim\\limits_{x\\rightarrow0+}\\frac{1}{x}\\int_{0}^{2022x}t\\sqrt{|\\cos\\frac{1}{t}|}dt\n\\]\n\nHint: https://shadhelper.notion.site/04a512bcb897463cbbb95f44df0baf68"}]}, {"id": "ysda/2022/Теория вероятностей/Классическая вероятность./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Подбрасываются \\(16\\) симметричных монет (вероятности орла и решки совпадают).\nНайдите вероятность того, что:\nНа всех монетах выпадут орлы.\nНа \\(6\\) монетах выпадут орлы, а на \\(10\\) - решки.\nОрлы выпадут хотя бы на двух монетах.\n\nHint: https://shadhelper.notion.site/dc4ed407103242f2b8bedbde0f29cf51"}]}, {"id": "ysda/2022/Теория вероятностей/Классическая вероятность./Задача 9", "name": "Задача 9", "problems": [{"index": 0, "url": null, "content": "Перед нами колода из \\(36\\) карт. Какова вероятность что среди вытянутых наугад \\(6\\) карт найдутся не менее трёх королей и ровно две пятерки?\n\nHint: https://shadhelper.notion.site/06c2e6e7ff324a039396f75bee3ebd71"}]}, {"id": "ysda/2022/Теория вероятностей/Математическое ожидание дискретных случайных величин./Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "У студента ШАДа дома восемь пар носков разных цветов (при этом носки из одной пары одного цвета). В течение восьми дней он каждый день случайным образом достает два носка (не обязательно из одной пары) и потом не возвращает их обратно. Найдите математическое ожидание числа дней, в которые были выбраны два носка одного цвета.\n\nHint: https://shadhelper.notion.site/de3a3e7a0b8043018601f00cc2182256"}]}, {"id": "ysda/2022/Теория вероятностей/Математическое ожидание непрерывных случайных величин./Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(X\\) задана функцией плотности:\n\\[\nf_X(x)= \\begin{cases} c(-3x^2+25), 1<x<2\\\\0 \\end{cases}\n\\]\nНайдите математическое ожидание \\(X\\).\n\nHint: https://shadhelper.notion.site/3cb5efb4a8ac45a5ace63611e5344cc8"}]}, {"id": "ysda/2022/Теория вероятностей/Случайные векторы./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Пусть задан случайный вектор \\(v = (X_1, X_2, X_3)\\), компоненты которого независимы и распределены равномерно на отрезке \\([1, 5]\\). Найдите функцию плотности случайного вектора \\(w = (X_{(3)}, X_{(2)}, X_{(1)})\\), состоящего из компонент вектора \\(v\\), упорядоченных по невозрастанию.\n\nHint: https://shadhelper.notion.site/7e40b5be54e14eb6a313033a7b2375b2"}]}, {"id": "ysda/2022/Теория вероятностей/Случайные векторы./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Пусть \\(U\\) – случайная величина, имеющая равномерное распределение на \\([0, 1]\\). Пусть также \\(Z\\) – случайная величина такая, что \\(0 ≤ Z ≤ 4\\), \\(E(Z) = 1\\), \\(Z\\) и \\(U\\) независимы. Найти значение функции распределения случайной величины \\(\\frac{Z}{U}\\) в точке \\(8\\).\n\nHint: https://shadhelper.notion.site/b151ecb946a142f59a438015b316d4cc"}]}, {"id": "ysda/2022/Теория вероятностей/Случайные векторы./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть заданы две независимые случайные величины \\(X\\) и \\(Y\\), имеющие экспоненциальные распределения с параметрами \\(\\mu = 1\\) и \\(\\lambda = 2\\) соответственно. Найдите дисперсию величины \\(T\\), где:\n\\[\nT = \\begin{cases} 1, X>Y \\\\ 0, X \\leq Y \\end{cases}\n\\]\n\nHint: https://shadhelper.notion.site/33beb60698e34666b6a17f3b2057d4a0"}]}, {"id": "ysda/2022/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Два биатлониста стреляют по мишени. Первый, менее опытный, попадает с вероятностью \\(\\frac{1}{3}\\). Второй - с вероятностью \\(\\frac{5}{6}\\).\nНайдите минимально возможную вероятность того, что оба попадут по мишени.\nСобытия \\(``\\)первый стрелок попал в мишень\\(\"\\)(A) и \\(``\\)второй стрелок попал в мишень\\(\"\\)(B) не обязаны быть независимыми.\n\nHint: https://shadhelper.notion.site/6acf65a7e01e4d6aacc798a70f90f8ba"}]}, {"id": "ysda/2022/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "В мешке лежат шары трёх цветов: \\(6\\) красных, \\(2\\) чёрных, \\(2\\) белых. Мы вытаскиваем последовательно \\(5\\) шаров. Какова вероятность, что первые два шара были чёрными при условии, что четвёртый и пятый были красным и белым соответственно.\n\nHint: https://shadhelper.notion.site/f5d9710c4bf74f3997ecf34d32cb5c92"}]}, {"id": "ysda/2022/Теория вероятностей/Условная вероятность. Формулы полной вероятности Теорема Байеса./Задача 9", "name": "Задача 9", "problems": [{"index": 0, "url": null, "content": "Из земли растет ствол случайного дерева. С вероятностью \\(p\\) ствол расходится на две ветки, а с вероятностью \\(1 − p\\) заканчивается грушей. Каждая из этих веток также с вероятностью \\(p\\) расходится на две ветки, а с вероятностью \\(1−p\\) заканчивается грушей и так далее. Найдите вероятность того, что на дереве растет \\(30\\) груш, если p = 0, 4\n\nHint: https://shadhelper.notion.site/5835ddc83a8f40c48d38b6941472cf87"}]}, {"id": "ysda/2023/Алгебра/Билинейные и квадратичные формы. Закон инерции./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Рассмотрим некоторую билинейную функцию \\(Q: V \\times W \\rightarrow \\mathbf{R}\\) - на вещественных линейных пространствах \\(V\\) и \\(W\\). В базисах \\(\\alpha\\) и \\(\\beta\\) \\(Q\\) имеет матрицу \\(Q_{\\alpha, \\beta}\\):\n\\[\nQ(v, w) = v_{\\alpha}^T (Q_{\\alpha, \\beta})w_{\\beta}\n\\]\nгде \\(v_{\\alpha}, w_{\\beta}\\) - координаты векторов \\(v, w\\) в соответствующих базисах.\nРассмотрим \\(Q_{\\alpha, \\beta}\\) как матрицу некоторого линейного оператора в некотором базисе.\nОказалось, что в некотором другом базисе его матрица \\(B\\) обладает следующим свойством: \\(B^2 = B\\).\nНайдите максимальную и минимальную возможную размерности собственного подпространства этого оператора, если известно, что \\(Q\\) в некоторой другой паре базисов \\(\\omega, \\gamma\\):\n\\[\nQ_{\\omega, \\gamma}=\n\\begin{pmatrix}\n2 & 0 & 2 & 3\\\\\n0 & 0 & 0 & 2\\\\\n4 & 0 & 4 & 5\\\\\n2 & 0 & 2 & 2\n\\end{pmatrix}\n\\]\n\nHint: https://shadhelper.notion.site/879ce43bbfc44b9e8cba1cf36b4532ae"}]}, {"id": "ysda/2023/Алгебра/Линейные отображения и матрицы ранги./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Пусть заданы \\(3\\) матрицы размера \\(2 \\times 2\\) (\\(F\\) (обратимая, диагональная), \\(Y\\) и \\(X\\)) из действительных чисел. Для любых натуральных \\(m \\leq 4\\) выполнено следующее равенство\n\\[\nF^mX-Y = 0_{2 \\times 2}\n\\]\nгде \\(0_{2 \\times 2}\\) - нулевая матрица.\nНайдите максимально и минимально возможные значения следа матрицы \\(X − Y\\).\n\nHint: https://shadhelper.notion.site/09b12fc79b414eefa869f5315e151235"}]}, {"id": "ysda/2023/Алгебра/Линейные отображения и матрицы ранги. Собственные векторы и собственные значения./Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "На линейном пространстве размерности \\(4\\) над полем \\(\\mathbb{R}\\) задан класс линейных операторов \\(C\\).\nДля любого оператора \\(A\\) из класса \\(C\\) выполнено:\nВсе собственные значения \\(A\\) действительные.\nВ одном из базисов исходного пространства \\(\\varphi\\) : \\(rank(A_{\\varphi})=2\\) и \\(tr(A_{\\varphi}A_{\\varphi}^T)=5\\), гдe \\(A_{\\varphi}\\) - матрица \\(A\\) в базисе \\(\\varphi\\).\nНайдите \\(\\sup\\limits_{A \\in C}|\\lambda(A)|\\) и \\(\\inf\\limits_{A \\in C}|\\lambda(A)|\\), где \\(\\lambda(A)\\) - максимальное по модулю собственное значение оператора \\(A\\).\n\nHint: https://shadhelper.notion.site/fef8098ac56b4eaca86ccd65563e6258"}]}, {"id": "ysda/2023/Алгебра/Определители/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Найдите определитель\n\\[\n\\begin{vmatrix} 1 & \\frac{1}{5}& \\frac{1}{25} & \\dots & \\left(\\frac{1}{5}\\right)^{n-1}\\\\ \\left(\\frac{1}{5}\\right)^{n-1} & 1 & \\frac{1}{5} & \\dots & \\left(\\frac{1}{5}\\right)^{n-1}\\\\ \\left(\\frac{1}{5}\\right)^{n-2} & \\left(\\frac{1}{5}\\right)^{n-1} & 1 & \\dots & \\left(\\frac{1}{5}\\right)^{n-3}\\\\ \\dots & \\dots & \\dots & \\dots & \\dots \\\\ \\left(\\frac{1}{5}\\right) & \\left(\\frac{1}{25}\\right) & \\left(\\frac{1}{5}\\right)^3 & \\dots & 1\\\\ \\end{vmatrix}\n\\]\n\nHint: https://shadhelper.notion.site/87d6b56cf7384afdb23ddd7c14b1e559"}]}, {"id": "ysda/2023/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "В компании \\(100\\) человек. Известно, что среди любых \\(10\\) есть трое попарно знакомых. При каком наименьшем \\(n\\) гарантировано будет верно следующее утверждение: найдётся \\(n\\) человек таких, что любой из оставшихся знаком с кем-то из этих \\(n\\)?\n\nHint: https://shadhelper.notion.site/b32da757965c48da90ce18a932b84cc5"}]}, {"id": "ysda/2023/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях. Связные графы циклы деревья. Двудольные графы теорема Холла о свадьбах. Эйлеровы и гамильтоновы графы. Раскраски графов./Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "В ШАД поступили всего \\(10\\) студентов. Кураторы решили ограничить число доступных курсов и придумали набор простых правил:\nНа каждый курс должно быть записано нечётное число студентов.\nДля любой пары курсов число студентов, записанных одновременно на оба, кратно \\(2\\).\nКакое максимальное число курсов можно прочитать по новым правилам?\n\nHint: https://shadhelper.notion.site/cea9c3df2d9f47b3900c52b707fbe7c6"}]}, {"id": "ysda/2023/Дискретная математика/Графы. Степень вершины лемма о рукопожатиях. Связные графы циклы деревья. Двудольные графы теорема Холла о свадьбах. Эйлеровы и гамильтоновы графы. Раскраски графов./Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "В стране \\(100\\) городов. Некоторые пары городов соединены авиалиниями. Оказалось, что любые \\(4\\) города соединены друг с другом не более чем четырьмя авиалиниями. Какое наибольшее количество авиалиний может быть в этой стране?\n\nHint: https://shadhelper.notion.site/f9c46578b7c74b74a337235600e70f9a"}]}, {"id": "ysda/2023/Математический анализ/Предел числовых последовательностей./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найдите предел последовательности \\(\\{a_n\\}_{n=1}^{\\infty}\\), где\n\\[\na_n = |\\sin(\\pi\\sqrt[3]{n^3+n^2})|\n\\]\n\nHint: https://shadhelper.notion.site/73358aeb1f1a4b1a9d12e1a5b01922dc"}]}, {"id": "ysda/2023/Теория вероятностей/Геометрические вероятности./Задача 1 (2)", "name": "Задача 1 (2)", "problems": [{"index": 0, "url": null, "content": "В квадрат со стороной \\(5\\) случайным образом бросают прямоугольник таким образом, что его стороны параллельны сторонам квадрата (вероятность выпадания данного прямоугольника равна отношению его площади к площади квадрата). Найдите вероятность события \\(S\\), состоящего в том, что после \\(5\\) бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные.\n\nHint: https://shadhelper.notion.site/4001e77c465643279d99567c2daeb577"}]}, {"id": "ysda/2023/Теория вероятностей/Геометрические вероятности./Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "В квадрат со стороной \\(5\\) случайным образом бросают прямоугольник таким образом, что его стороны параллельны сторонам квадрата. Каждый прямоугольник задаётся \\(2\\)-мя парами точек, все \\(4\\) точки задаются независимо из равномерного распределения на отрезке \\([0; 5]\\). Каждая пара точек отвечает проекции прямоугольника на соответствующую ось. Найдите вероятность события \\(S\\), состоящего в том, что после \\(5\\) бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные.\n\nHint: https://shadhelper.notion.site/0535415c01fd42aeb91c5f95a8b601aa"}]}, {"id": "ysda/2023/Теория вероятностей/Конечные марковские цепи./Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "В группе первокурсников ШАДа \\(n\\) ребят и они видят друг друга впервые. А в парке аттракционов сегодня дают скидку, если приходит компания ровно из \\(k\\) друзей, среди которых каждый дружит с каждым. Дружба между любой парой однокурсников независимо возникает с вероятностью \\(p\\).\nМакс, один из первокурсников, хочет пойти на аттракционы со скидкой. Каким в среднем количеством способов он может это сделать?\n\nHint: https://shadhelper.notion.site/2b854bdb1b2f46eba334800dd6d17248"}]}, {"id": "ysda/2023/Теория вероятностей/Случайные векторы./Задача 2", "name": "Задача 2", "pro
