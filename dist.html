02 Painted Cube Faces", "problems": [{"index": 0, "url": null, "content": "Куб со стороной 10 см окрасили по поверхности, разделили на \\(10^3\\) кубиков со стороной 1 см, перемешали кубики, наугад выбрали один. Какова вероятность того, что у этого кубика ровно одна окрашенная грань?"}, {"index": 1, "url": null, "content": "Какова вероятность того, что у этого кубика хотя бы две окрашенные грани?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/junior/03 Deck Kings And Fives", "name": "03 Deck Kings And Fives", "problems": [{"index": 0, "url": null, "content": "Перед нами колода из 36 карт. Какова вероятность того, что среди вытянутых наугад 6 карт найдутся не менее трёх королей и ровно две пятерки? В качестве ответа укажите одно вещественное число, округлённое до четырёх знаков после запятой: значение вероятности, умноженное на \\(10^3\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/junior/04 Banach Matchbox Problem", "name": "04 Banach Matchbox Problem", "problems": [{"index": 0, "url": null, "content": "Польский математик Стефан Банах имел привычку носить в каждом из двух карманов пальто по коробку спичек. Всякий раз, когда ему хотелось закурить трубку, он выбирал наугад один из коробков и доставал из него спичку. Первоначально в каждом коробке было по \\(n\\) спичек. Но когда-то наступает момент, когда выбранный наугад коробок оказывается пустым. Какова вероятность того, что в другом коробке в этот момент осталось ровно \\(k\\) спичек?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/middle/05 Three Cities Connectivity", "name": "05 Three Cities Connectivity", "problems": [{"index": 0, "url": null, "content": "В стране 3 города, каждый город соединён с каждым дорогой. Дорога может быть разрушена с вероятностью \\(1/2\\). Найдите вероятность того, что в стране из любого города можно добраться до любого другого города."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/middle/06 Sticks Broken Paired", "name": "06 Sticks Broken Paired", "problems": [{"index": 0, "url": null, "content": "Имеются \\(n\\) различных палочек. Каждая из них разламывается на две неодинаковые части — короткую и длинную. Получившиеся \\(2n\\) обломков перемешивают и наугад склеивают попарно в новые \\(n\\) палочек. Найти вероятность того, что каждая из новых палочек склеена из длинного и короткого обломка."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/middle/07 Matrix Finite Field Singular", "name": "07 Matrix Finite Field Singular", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(n \\times n\\) со случайными значениями из конечного поля \\(\\mathbb{F}_q\\). Найти вероятность того, что матрица будет вырождена."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/senior/08 Permutation Cycle Probability", "name": "08 Permutation Cycle Probability", "problems": [{"index": 0, "url": null, "content": "Рассмотрим случайную перестановку на \\(n\\) элементах. Докажите, что данные \\(k\\) элементов окажутся в одном цикле с вероятностью \\(1/k\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/senior/09 Round Table Mixed Pairs", "name": "09 Round Table Mixed Pairs", "problems": [{"index": 0, "url": null, "content": "Имеется \\(n\\) женщин и \\(n\\) мужчин, их случайно рассаживают за круглый обеденный стол. Какова вероятность, что в полученной рассадке гостей можно разбить на непересекающиеся пары так, что в каждой паре есть и мужчина и женщина?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/senior/10 Black Cube White Faces", "name": "10 Black Cube White Faces", "problems": [{"index": 0, "url": null, "content": "Чёрный куб покрасили снаружи белой краской, затем разрезали на 27 одинаковых маленьких кубиков и как попало сложили из них большой куб. С какой вероятностью все грани этого куба будут белыми?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/11 Точки на окружности дуга", "name": "11 Точки на окружности дуга", "problems": [{"index": 0, "url": null, "content": "n точек бросили на окружность единичной длины. Найдите вероятность того, что все точки принадлежат дуге длины x."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/12 Кости условная вероятность", "name": "12 Кости условная вероятность", "problems": [{"index": 0, "url": null, "content": "Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях (различные числа выпадают с равной вероятностью). Найдите вероятность того, что хотя бы на одной из них выпало 7, если сумма выпавших значений не превосходит 20."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/13 Независимость событий дополнения", "name": "13 Независимость событий дополнения", "problems": [{"index": 0, "url": null, "content": "Доказать, что если события A и B независимы, то также независимы события A и \\(\\overline{B}\\)."}, {"index": 1, "url": null, "content": "Доказать, что если события A и B независимы, то также независимы события \\(\\overline{A}\\) и \\(\\overline{B}\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/15 Муравьи многогранники встреча ребре", "name": "15 Муравьи многогранники встреча ребре", "problems": [{"index": 0, "url": null, "content": "В вершинах треугольника сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 1, "url": null, "content": "В вершинах четырёхугольника с диагоналями сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 2, "url": null, "content": "В вершинах куба сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 3, "url": null, "content": "В вершинах октаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 4, "url": null, "content": "В вершинах додекаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 5, "url": null, "content": "В вершинах икосаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/16 Независимые события оценка суммы", "name": "16 Независимые события оценка суммы", "problems": [{"index": 0, "url": null, "content": "Независимые в совокупности события \\(A_1, A_2, \\ldots, A_n\\) имеют вероятности \\(p_1, p_2, \\ldots, p_n\\) соответственно. Докажите, что \\(1 - e^{-(p_1+p_2+\\ldots+p_n)} < P(A_1 + A_2 + \\ldots + A_n) < p_1 + p_2 + \\ldots + p_n\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/17 День рождения позиция очереди", "name": "17 День рождения позиция очереди", "problems": [{"index": 0, "url": null, "content": "В кинотеатре менеджер объявляет, что подарит бесплатный билет первому человеку в очереди, чей день рождения совпадает с днём рождения кого-либо из уже купивших билет. Вам предоставляется возможность выбрать любую позицию в очереди. Предполагая, что вы не знаете чьих-либо дней рождения и все дни рождения распределены равновероятно в течение года (365 дней), найдите позицию в очереди, которая даёт наибольшие шансы получить бесплатный билет."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/21 Порядковая статистика k-е число", "name": "21 Порядковая статистика k-е число", "problems": [{"index": 0, "url": null, "content": "Из чисел от 1 до 100 случайно выбирается n чисел. Найдите вероятность того, что k-ое по величине число равно x."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/22 Три числа среднее без возврата", "name": "22 Три числа среднее без возврата", "problems": [{"index": 0, "url": null, "content": "Из чисел от 1 до 100 последовательно, без возвращения выбирается три числа. Найдите вероятность того, что третье выбранное число будет заключено между первыми двумя."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/23 Три стрелка пробоины мишень", "name": "23 Три стрелка пробоины мишень", "problems": [{"index": 0, "url": null, "content": "Три стрелка, попадающие в цель независимо друг от друга с вероятностями 0,5, 0,4 и 0,3 соответственно, выстрелили по мишени одновременно. Найдите вероятность того, что в мишени не образовалось ни одной пробоины (событие \\(X_0\\))."}, {"index": 1, "url": null, "content": "Найдите вероятность того, что в мишени образовалась одна пробоина (событие \\(X_1\\))."}, {"index": 2, "url": null, "content": "Найдите вероятность того, что в мишени образовалось две пробоины (событие \\(X_2\\))."}, {"index": 3, "url": null, "content": "Найдите вероятность того, что в мишени образовалось три пробоины (событие \\(X_3\\))."}, {"index": 4, "url": null, "content": "Найдите вероятность того, что в мишени образовалась хотя бы одна пробоина (событие Y)."}, {"index": 5, "url": null, "content": "Найдите вероятность того, что в мишени образовалось не менее двух пробоин (событие Z)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/14 Кубик треугольник три числа", "name": "14 Кубик треугольник три числа", "problems": [{"index": 0, "url": null, "content": "Игральный кубик подбросили 3 раза. Найдите вероятность того, что полученные три числа могут быть длинами сторон некоторого треугольника."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/18 Монета орлы подряд рекуррентность", "name": "18 Монета орлы подряд рекуррентность", "problems": [{"index": 0, "url": null, "content": "Монету подбросили 10 раз. Найдите вероятность того, что в последовательности результатов этого опыта не будет двух последовательных орлов."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/19 Теннисный турнир победа схема", "name": "19 Теннисный турнир победа схема", "problems": [{"index": 0, "url": null, "content": "Три теннисиста (А, В и С) играют в турнире по следующей схеме. Сначала А играет с В, а во всех следующих партиях победитель последней партии встречается с участником, не игравшим в этой партии. Победителем турнира считается тот, кто выигрывает две партии подряд. Найдите вероятность победы для каждого участника."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/20 Подмножества пересечение пустое", "name": "20 Подмножества пересечение пустое", "problems": [{"index": 0, "url": null, "content": "Дано множество \\(A = \\{1, \\ldots, n\\}\\). Среди всех его подмножеств равновероятно выбираются k подмножеств. Найдите вероятность того, что \\(A_1 \\cap A_2 \\cap \\ldots \\cap A_k = \\emptyset\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/24 Парадокс Кондорсе маршруты выбор", "name": "24 Парадокс Кондорсе маршруты выбор", "problems": [{"index": 0, "url": null, "content": "Джордж, Гаррис и Джей выбирают один из трёх маршрутов своего будущего путешествия. Каждый упорядочивает маршруты по своему предпочтению. Они договорились считать вариант a лучше варианта b, если a предпочтительнее b по мнению большинства. Найдите вероятность того, что найдётся маршрут, который в глазах путешественников лучше двух других, если их предпочтения равновероятны и независимы."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/25 Автомобиль интервал вероятность шоссе", "name": "25 Автомобиль интервал вероятность шоссе", "problems": [{"index": 0, "url": null, "content": "Вероятность наблюдения хотя бы одного автомобиля на шоссе в течение любого 20-минутного интервала времени равна 609/625. Найдите вероятность наблюдения хотя бы одного автомобиля в течение любого 5-минутного интервала времени. Предположите, что вероятность увидеть автомобиль в любой момент одинакова (постоянна) в течение всех 20 минут."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/senior/26 Многогранники кости симуляция", "name": "26 Многогранники кости симуляция", "problems": [{"index": 0, "url": null, "content": "У вас имеется неограниченное число костей в форме всех возможных правильных многогранников. Определите, можно ли, однократно бросив некоторый набор таких костей, симулировать бросок правильной семигранной кости."}, {"index": 1, "url": null, "content": "Определите, можно ли, однократно бросив некоторый набор таких костей, симулировать бросок правильной 15-гранной кости."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/27 Студенты группы экзамен Байес", "name": "27 Студенты группы экзамен Байес", "problems": [{"index": 0, "url": null, "content": "Один и тот же предмет в университете изучают студенты трёх групп: в первой 25 человек, а во второй и третьей по 20. Вероятность, что случайный студент первой группы сдаст экзамен 75%. Во второй группе эта вероятность равна 70%, а в третьей — 90%. Известно, что Вася сдал экзамен. Найдите вероятности того, что Вася учится в первой, второй или третьей группе соответственно."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/28 Монета нечестная орёл Байес", "name": "28 Монета нечестная орёл Байес", "problems": [{"index": 0, "url": null, "content": "Вам дается 1000 монет. Среди них 1 монета с орлами с обеих сторон. Остальные 999 монет — честные. Вы случайным образом выбираете монету и подбрасываете её 10 раз. Каждый раз монета выпадает орлом. Какова вероятность того, что выбранная вами монета окажется нечестной?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/29 Шары коробки красный Байес", "name": "29 Шары коробки красный Байес", "problems": [{"index": 0, "url": null, "content": "Имеется две коробки. В первой находится 4 синих шара и 5 красных, а во второй — 1 синий и 5 красных. Случайно равновероятно выбирается коробка, и из неё случайно равновероятно выбирается шар. Найдите вероятность того, что была выбрана первая коробка, при условии, что шар оказался красным."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/30 Кости восьмигранные условная семёрка", "name": "30 Кости восьмигранные условная семёрка", "problems": [{"index": 0, "url": null, "content": "Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях (различные числа выпадают с равной вероятностью). Какова вероятность того, что хотя бы на одной из них выпало 7, если сумма выпавших значений не превосходит 20?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/31 Ноутбуки заводы брак Байес", "name": "31 Ноутбуки заводы брак Байес", "problems": [{"index": 0, "url": null, "content": "На складе лежат ноутбуки \"Плутон\". Их производят по одному и тому же чертежу два завода: Завод красного знамени \"Поломка\" и Радиотехнический завод им. Криворучкина. На складе изделия этих заводов представлены в отношении 4:3. Известно, что 1 из 1000 ноутбуков производства ЗКЗ \"Поломка\" бракован, а у РЗ им. Криворучкина бракован только 1 из 1500 ноутбуков. Один из случайно выбранных ноутбуков на складе оказался сломан. Какова вероятность, что он был произведен на ЗКЗ \"Поломка\"?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/32 Книги цитаты условная вторая", "name": "32 Книги цитаты условная вторая", "problems": [{"index": 0, "url": null, "content": "Маша нашла n+1 новую книгу с цитатами, в каждой книге n цитат. Всего в книгах \\(\\frac{n(n+1)}{2}\\) цитат, которые понравятся Маше. Цитаты распределены по правилу: есть одна книга без подходящих цитат, одна книга с ровно двумя хорошими цитатами, ..., одна книга, где все цитаты хорошие. Маша наугад выбрала книгу и прочитала случайную цитату — та ей понравилась. Затем Маша случайно выбрала ещё одну цитату из той же книги. Найдите вероятность того, что и вторая цитата ей понравится."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/33 Маша спорт пятница условная", "name": "33 Маша спорт пятница условная", "problems": [{"index": 0, "url": null, "content": "Маша каждый день после работы собирается пойти на спорт. Известно, что она так и не сходит на спорт на неделе с вероятностью 1/3, а с вероятностью 2/3 сходит, но только в один из будних дней, причём в любой из них с равной вероятностью. В пятницу утром Аня заметила, что Маша так и не сходила на спорт на этой неделе. Найдите вероятность того, что в пятницу она всё-таки сходит на спорт."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/34 Урны шары перекладывание Байес", "name": "34 Урны шары перекладывание Байес", "problems": [{"index": 0, "url": null, "content": "В каждой из урн содержится 2 чёрных и 8 белых шаров. Из первой урны наудачу извлечён 1 шар и переложен во вторую урну, после чего из второй урны извлечён шар. Найдите вероятность того, что шар, извлечённый из второй урны, окажется белым."}, {"index": 1, "url": null, "content": "Если извлечённый из второй урны шар оказался белым, найдите вероятность того, что из первой урны был переложен белый шар."}, {"index": 2, "url": null, "content": "Если извлечённый из второй урны шар оказался белым, найдите вероятность того, что из первой урны был переложен чёрный шар."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/35 Пять урн белый условная Байес", "name": "35 Пять урн белый условная Байес", "problems": [{"index": 0, "url": null, "content": "Имеется пять урн. В 1-й, 2-й и 3-й урнах находится по 2 белых и 3 чёрных шара; в 4-й и 5-й урнах — по 1 белому и 1 чёрному шару. Случайно выбирается урна и из неё извлекается шар. Найдите условную вероятность того, что выбрана 4-я или 5-я урна, если извлечённый шар оказался белым."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/36 Шары цвета условная последовательность", "name": "36 Шары цвета условная последовательность", "problems": [{"index": 0, "url": null, "content": "В мешке лежат шары трёх цветов: 6 красных, 2 чёрных, 2 белых. Последовательно вытаскивается 5 шаров. Найдите вероятность того, что первые два шара были чёрными, при условии, что четвёртый и пятый оказались красным и белым соответственно."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/37 Коробки шары перекладывание Байес", "name": "37 Коробки шары перекладывание Байес", "problems": [{"index": 0, "url": null, "content": "В первой коробке лежит 4 чёрных шара и 3 белых. Во второй коробке лежит 5 чёрных и 4 белых шара. Из первой коробки наугад выбирается один шар и перекладывается во вторую, после чего из второй коробки достаётся произвольный шар. Если известно, что он оказался чёрным, найдите вероятность того, что из первой во вторую коробку переложили белый шар."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/38 Урна белый шар три игрока", "name": "38 Урна белый шар три игрока", "problems": [{"index": 0, "url": null, "content": "Из урны, содержащей a белых и b чёрных шаров, три игрока извлекают шары по очереди. Выигрывает тот, кому раньше попадается белый шар. Найдите вероятности \\(p_1, p_2, p_3\\) выигрыша 1-го, 2-го, 3-го игроков при извлечении по схеме равновероятного выбора с возвращением."}, {"index": 1, "url": null, "content": "Найдите вероятности \\(p_1, p_2, p_3\\) выигрыша 1-го, 2-го, 3-го игроков при извлечении по схеме равновероятного выбора без возвращения."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/39 Кости сумма семь очередь", "name": "39 Кости сумма семь очередь", "problems": [{"index": 0, "url": null, "content": "Игроки А, В и С сменяя друг друга, по очереди кидают две игральные кости до тех пор, пока не получат сумму очков, равную 7. Найдите вероятность того, что сумму очков, равную 7, получит В."}, {"index": 1, "url": null, "content": "В результате проведения эксперимента возможны два исхода: успех (с вероятностью p) и неуспех (с вероятностью 1−p). Экспериментаторы А, В и С сменяя друг друга, по очереди проводят этот эксперимент до тех пор, пока не получат успех. Найдите максимальное значение вероятности p, при котором вероятность того, что успех получит В, больше либо равна 1/3."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/40 Паутина мошка паук вернуться", "name": "40 Паутина мошка паук вернуться", "problems": [{"index": 0, "url": null, "content": "По паутине, имеющей вид правильного шестиугольника, разбитого на правильные треугольники, двигается мошка. В середине паутины (точка О) сидит паук. На каждой развилке нитей паутины мошка выбирает маршрут случайным образом, в частности, может повернуть назад. Если мошка попадает в точку О, то паук её съедает. Найдите вероятность того, что, начав прогулку по паутине в вершине шестиугольника, мошка в неё вернётся."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/41 Дротики третий дальше первого", "name": "41 Дротики третий дальше первого", "problems": [{"index": 0, "url": null, "content": "Иван бросает два дротика в мишень для дартса, целясь в центр. Второй дротик попадает дальше от центра, чем первый. Если Иван бросает третий дротик, целясь в центр, найдите вероятность того, что третий бросок будет дальше от центра, чем первый. Предположите, что мастерство Ивана постоянно."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/42 Конфеты красные синие зелёные", "name": "42 Конфеты красные синие зелёные", "problems": [{"index": 0, "url": null, "content": "Вы достаёте конфеты одну за другой из банки, в которой находится 10 красных конфет, 20 синих конфет и 30 зелёных конфет. Найдите вероятность того, что в банке останется по крайней мере 1 синяя конфета и 1 зелёная конфета, когда вы достанете все красные конфеты."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/43 Русская рулетка пуля выбор", "name": "43 Русская рулетка пуля выбор", "problems": [{"index": 0, "url": null, "content": "В 6-камерный револьвер вставляется одна пуля. Барабан вращается случайным образом, так что каждая камера с одинаковой вероятностью окажется под ударником. Два игрока по очереди нажимают на спусковой крючок без дальнейшего вращения, пока пистолет не выстрелит. Если вы можете выбрать, играть первым или вторым, что вы выберете? Найдите вашу вероятность проигрыша."}, {"index": 1, "url": null, "content": "Снова вращают барабан после каждого нажатия на спусковой крючок. Выберете ли вы быть первым или вторым игроком? Найдите вашу вероятность проигрыша."}, {"index": 2, "url": null, "content": "В патронник случайным образом помещены две пули. Ваш противник сыграл первым и остался жив после первого нажатия на спусковой крючок. Вам предоставляется выбор — крутить ли барабан. Стоит ли вам крутить барабан?"}, {"index": 3, "url": null, "content": "Две пули случайным образом оказываются в двух последовательных положениях. Если ваш противник выжил в первом раунде, следует ли вам вращать барабан?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/44 Шары урны равные числа", "name": "44 Шары урны равные числа", "problems": [{"index": 0, "url": null, "content": "Имеются 2n шаров с числами \\(1, \\ldots, n\\), каждое число встречается по два раза. Эти шары случайным образом раскладываются по два в n урн. Из каждой урны вынимается один шар. Найдите вероятность того, что на вынутых шарах все числа различные."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/45 Тапки мешки пара условная", "name": "45 Тапки мешки пара условная", "problems": [{"index": 0, "url": null, "content": "Рядом стоят 2 мешка: один с левыми, другой с правыми тапками. В каждом ровно по 11 различных тапок. Уникальных пар ровно 11. Два друга решили собрать хотя бы одну пару и выбрали по мешку. Оба тянут тапки из своего мешка случайно и независимо. Найдите вероятность того, что друзья собрали хотя бы 1 пару при условии, что «левый друг» вытянул как минимум три тапка."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/46 Баскетбол штрафные броски вероятность", "name": "46 Баскетбол штрафные броски вероятность", "problems": [{"index": 0, "url": null, "content": "Баскетболистка выполняет 100 штрафных бросков. Она набирает одно очко, если мяч проходит через обруч, и ноль очков, если промахивается. Она забила со своего первого броска и промахнулась со второго. Для каждого из следующих бросков вероятность того, что она забьёт, равна доле успешных бросков на данный момент. Найдите вероятность того, что после 100 бросков она забьёт ровно 50 корзин."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/47 Заключённые освобождение парадокс", "name": "47 Заключённые освобождение парадокс", "problems": [{"index": 0, "url": null, "content": "Трое заключённых А, В и С с одинаково примерным поведением подали заявку на условно-досрочное освобождение. Комиссия решила освободить двух из них. Надзиратель знает, кто будет освобождён; А может спросить имя (кроме своего) другого счастливчика. А думает, что если надзиратель скажет «В будет освобождён», его шанс снизится до 1/2. Объясните, что не так в рассуждениях А."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/48 Две урны белый последовательный", "name": "48 Две урны белый последовательный", "problems": [{"index": 0, "url": null, "content": "В первой урне a белых, b чёрных шаров. Во второй урне c белых, d чёрных шаров. Наугад выбирается урна и из неё извлекается шар без возвращения. Шар оказался белым. Найдите вероятность того, что следующий шар, извлечённый из той же урны, окажется белым."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/49 Ноутбуки продавцы брак совместный", "name": "49 Ноутбуки продавцы брак совместный", "problems": [{"index": 0, "url": null, "content": "На маркетплейсе Озон ноутбук \"Плутон\" продают три продавца с долями продаж 25%, 45% и 30% соответственно. Доля брака в их продукции составляет 2%, 3% и 5% соответственно. Найдите вероятность того, что два случайно выбранных бракованных ноутбука \"Плутон\" были проданы одним и тем же продавцом."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/50 Стрелки зависимость выстрелы события", "name": "50 Стрелки зависимость выстрелы события", "problems": [{"index": 0, "url": null, "content": "При каждом выстреле, независимо от остальных, первый стрелок попадает в мишень с вероятностью \\(p_1\\), второй — с вероятностью \\(p_2\\). Из них наугад выбирается один стрелок. Пусть A и B — события, состоящие в том, что выбранный стрелок попадёт в мишень при первом и, соответственно, при втором выстреле. Являются ли события A и B зависимыми или независимыми?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/51 Стрелки два выстрела успех", "name": "51 Стрелки два выстрела успех", "problems": [{"index": 0, "url": null, "content": "При каждом выстреле, независимо от остальных, первый стрелок попадает в мишень с вероятностью 0,8, второй — с вероятностью 0,7. Из них наугад выбирается один стрелок. Первый выстрел оказался успешным. Найдите вероятность того, что успешным будет и второй выстрел, произведённый этим же стрелком."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/52 Урны шары круговое перекладывание", "name": "52 Урны шары круговое перекладывание", "problems": [{"index": 0, "url": null, "content": "Имеется n урн, в каждой из которых находится a белых и b чёрных шаров. Наугад последовательно перекладывают по одному шару из первой урны во вторую, из второй в третью, ..., из \\((n-1)\\)-й в n-ю, из n-й в первую. Найдите вероятность того, что шар, наугад извлечённый после этого из n-й урны, окажется белым."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/53 Тетраэдр перевороты вероятность ребро", "name": "53 Тетраэдр перевороты вероятность ребро", "problems": [{"index": 0, "url": null, "content": "На плоскости расположен правильный тетраэдр. Раз в минуту он переворачивается через одно из рёбер, причём перевороты через разные рёбра равновероятны. Найдите вероятность того, что через некоторое время тетраэдр вернётся в исходное положение."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/54 Монета капитал разорение", "name": "54 Монета капитал разорение", "problems": [{"index": 0, "url": null, "content": "Игрок выбирает герб или решку, после чего бросается монета. Если выпадает названная сторона, он выигрывает 1 рубль; иначе проигрывает 1 рубль. Обладая начальным капиталом a рублей, игрок хочет довести капитал до \\(b > a\\) рублей. Игра заканчивается, когда игрок набирает сумму b или разоряется. Найдите вероятность того, что игрок разорится."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/55 Монета два орла подряд первый", "name": "55 Монета два орла подряд первый", "problems": [{"index": 0, "url": null, "content": "Двое по очереди подбрасывают монету. Выигрывает тот, у которого раньше выпадут подряд два орла. Найдите вероятность выигрыша для первого игрока."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/56 Монета три орла две решки", "name": "56 Монета три орла две решки", "problems": [{"index": 0, "url": null, "content": "Монету подбрасывают несколько раз до тех пор, пока не выпадут подряд три орла или две решки. Найдите вероятность того, что бросания завершатся выпадением трёх орлов. Вероятности выпадения орла и решки равны 1/2, результаты бросков независимы."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/senior/57 Самолёт пассажиры место последний", "name": "57 Самолёт пассажиры место последний", "problems": [{"index": 0, "url": null, "content": "При посадке в самолёт выстроилась очередь из n пассажиров, у каждого из которых имеется билет на одно из n мест. Первой в очереди стоит сумасшедшая старушка. Она вбегает в салон и садится на случайное место (возможно, и на своё). Далее пассажиры по очереди занимают свои места, а в случае, если своё место уже занято, садятся случайным образом на одно из свободных мест. Найдите вероятность того, что последний пассажир займёт своё место."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/senior/58 Анонимные подарки галстук носки динозавр", "name": "58 Анонимные подарки галстук носки динозавр", "problems": [{"index": 0, "url": null, "content": "В обществе анонимных подарков состоят 3n человек: n хотят получить галстук, n — носки, n — ручного динозавра. Каждый случайно выбирает и покупает подарок среди тех двух, что он сам не хотел бы получить. Собравшись на вечеринку, члены общества сложили подарки в кучу и разобрали их случайно. Алиса хотела бы получить ручного динозавра, а Боб — носки. Найдите вероятность того, что ни Алиса, ни Боб не получат желаемые подарки."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/59 Прямоугольник окружность угол точка", "name": "59 Прямоугольник окружность угол точка", "problems": [{"index": 0, "url": null, "content": "Найдите вероятность того, что случайно выбранная точка из прямоугольника со сторонами a и b окажется внутри окружности радиуса r с центром в левом верхнем углу прямоугольника (точки внутри прямоугольника распределены равномерно)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/60 Встреча друзья ШАД до сорока", "name": "60 Встреча друзья ШАД до сорока", "problems": [{"index": 0, "url": null, "content": "Два друга договорились встретиться у входа в ШАД с 14:00 до 15:00, не договорившись о точном времени. Момент прихода каждого равномерно распределён на этом часе; через 15 минут ожидания они заходят одни. Известно, что они встретились. Найдите вероятность того, что оба пришли до 14:40."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/61 Встреча независимость событий пятнадцать", "name": "61 Встреча независимость событий пятнадцать", "problems": [{"index": 0, "url": null, "content": "Лёша и Марина договорились встретиться между 8:00 и 9:00. Каждый приходит в случайный момент, ждёт 15 минут и уходит. Являются ли независимыми события «Лёша и Марина не встретились» и «хотя бы один из них пришёл после 8:45»? Время считайте непрерывным."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/62 Пистолет мишень отклонение попадание", "name": "62 Пистолет мишень отклонение попадание", "problems": [{"index": 0, "url": null, "content": "В мишень размера \\(3 \\times 2\\) стреляют из пистолета. Отклонение пули от точки прицеливания не превышает 0,1 по любому направлению, параллельному сторонам прямоугольника. Стрелок целится в произвольную точку мишени. Найдите вероятность того, что он попадёт в мишень."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/63 Круг расстояние абсцисса квадрат", "name": "63 Круг расстояние абсцисса квадрат", "problems": [{"index": 0, "url": null, "content": "Точку бросают наугад в круг \\(x^2 + y^2 < 1\\). Найдите вероятность того, что расстояние от точки до центра круга превысит 1/2."}, {"index": 1, "url": null, "content": "Найдите вероятность того, что абсцисса точки будет не больше 1/2."}, {"index": 2, "url": null, "content": "Найдите вероятность того, что точка окажется вне квадрата, вписанного в данный круг."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/64 Прыжки точка расстояние равномерные", "name": "64 Прыжки точка расстояние равномерные", "problems": [{"index": 0, "url": null, "content": "Находясь в начальный момент в точке O, некоторый объект совершает два прыжка: направо (в положительном направлении) и налево (в отрицательном направлении). Длины прыжков — независимые равномерные случайные величины: первый прыжок равномерно распределён на \\([0, 4]\\), второй — на \\([0, 2]\\). Найдите вероятность того, что после двух прыжков объект окажется в точке, удалённой от O на расстояние не больше 1."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/65 Стержень три части треугольник", "name": "65 Стержень три части треугольник", "problems": [{"index": 0, "url": null, "content": "Стержень разломан в двух наугад выбранных точках. Найдите вероятность того, что из образовавшихся трёх стержней можно составить треугольник."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/66 Очередь Варя Таня время", "name": "66 Очередь Варя Таня время", "problems": [{"index": 0, "url": null, "content": "В 14:00 Аня встала в очередь. В 14:02 она поняла, что за ней никто не стоит. В 14:10 она увидела: за ней стоит Варя, а за Варей — Таня, пришедшая позже. Найдите вероятность того, что к 14:10 Таня стояла в очереди не более 4 минут. Время появления Тани и Вари в столовой распределено равномерно на допустимом промежутке."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/middle/67 Детекторы отрезок покрытие условная", "name": "67 Детекторы отрезок покрытие условная", "problems": [{"index": 0, "url": null, "content": "На отрезке [0, 1] в точках x, y, независимо выбранных из равномерного распределения, находятся два детектора элементарных частиц. Детектор засекает частицу, если она пролетает на расстоянии не более \\(\\frac{1}{3}\\) от него. Известно, что поля восприятия детекторов покрывают весь отрезок. Найдите вероятность того, что \\(y > \\frac{5}{6}\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/middle/68 Окружность точки центр треугольник", "name": "68 Окружность точки центр треугольник", "problems": [{"index": 0, "url": null, "content": "На окружности выбираются 4 случайных точки. Найдите вероятность того, что центр окружности лежит внутри треугольника, образованного тремя из этих точек (или четырёхугольника с вершинами в этих точках)."}, {"index": 1, "url": null, "content": "На окружности выбираются n случайных точек. Найдите вероятность того, что центр окружности лежит внутри выпуклой оболочки этих точек."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/69 Нейронные сети GPU сервер условная", "name": "69 Нейронные сети GPU сервер условная", "problems": [{"index": 0, "url": null, "content": "Вася поставил учиться две нейронные сети, каждую на своём GPU, и отправился спать. Времена обучения сетей независимы и равномерно распределены на отрезке [1, 3]. Через время t сервер упал, и оказалось, что лишь одна сеть успела доучиться. Найдите вероятность того, что \\(t < \\frac{3}{2}\\). Считайте, что время падения сервера тоже равномерно распределено на отрезке [1, 3]."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/70 Саньцзегунь палки пересечение крайние", "name": "70 Саньцзегунь палки пересечение крайние", "problems": [{"index": 0, "url": null, "content": "Аня взяла саньцзегунь, состоящий из трёх палок одинакового размера, и бросила его на землю. Найдите вероятность того, что крайние палки пересекаются. Считайте, что саньцзегунь представляет собой ломаную из трёх звеньев, а всевозможные углы, которые могут образовать крайние звенья со средним, равновероятны."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/71 Две точки отрезок независимость событий", "name": "71 Две точки отрезок независимость событий", "problems": [{"index": 0, "url": null, "content": "Из равномерного распределения на отрезке [0, 1] независимо выбираются две точки x и y. При каких числах a события \\(\\max(1 - 2x, y) < a\\) и \\(\\max(1 - 2y, x) < a\\) независимы?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/72 Три равномерные сумма вероятность", "name": "72 Три равномерные сумма вероятность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины, равномерно распределённые на отрезке [0, 1], а t — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/73 Монета ребро толщина треть", "name": "73 Монета ребро толщина треть", "problems": [{"index": 0, "url": null, "content": "Какой толщины должна быть монета, чтобы шанс того, что она упадёт на ребро, был равен 1/3?"}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/1 Дискретные распределения характеристики таблица", "name": "1 Дискретные распределения характеристики таблица", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану биноминального распределения."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану распределения Пуассона."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану распределения Бернулли."}, {"index": 3, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану равномерного распределения."}, {"index": 4, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану геометрического распределения."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/2 Два кубика сумма k очков", "name": "2 Два кубика сумма k очков", "problems": [{"index": 0, "url": null, "content": "Бросают два n-гранных кубика. Найдите вероятность того, что суммарно выпадет \\(k \\in [2, 2n]\\) очков."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/3 Равномерное множество независимость некоррелированность", "name": "3 Равномерное множество независимость некоррелированность", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(\\zeta\\) распределена равномерно на множестве \\(\\{-1, 0, 1\\}\\). Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = 1 - \\zeta^{1000}\\) и \\(\\eta = 1 - \\zeta^{1001}\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/10 Носки пары дни матожидание", "name": "10 Носки пары дни матожидание", "problems": [{"index": 0, "url": null, "content": "У студента ШАДа дома восемь пар носков разных цветов (носки из одной пары одного цвета). В течение восьми дней он каждый день случайным образом достаёт два носка и не возвращает их обратно. Найдите математическое ожидание числа дней, в которые были выбраны два носка одного цвета."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/4 Игрок рубли раунды матожидание", "name": "4 Игрок рубли раунды матожидание", "problems": [{"index": 0, "url": null, "content": "У игрока есть k советских рублей. Каждый раунд с вероятностью p игрок получает 1 рубль, либо с вероятностью 1−p теряет 1 рубль. Игра заканчивается, как только у игрока останется 0 рублей или станет не меньше 6 рублей. Найдите математическое ожидание количества раундов игры при k = 2 и p = 0,75."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/5 Домино Тау-Кита модуль разности", "name": "5 Домино Тау-Кита модуль разности", "problems": [{"index": 0, "url": null, "content": "В далёком созвездии Тау-Кита на каждой половинке костяшки домино стоит от 0 до N точек, причём для каждой пары чисел (a, b) таких, что a и b — целые от 0 до N, существует ровно одна доминошка. Космический турист выбрал наугад перевёрнутую костяшку. При каком N математическое ожидание модуля разности количеств точек на двух половинках будет равно 2?"}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/6 Пуассон отказы бюро ровно m", "name": "6 Пуассон отказы бюро ровно m", "problems": [{"index": 0, "url": null, "content": "Вероятность прихода в бюро k человек равна \\(\\lambda^k e^{-\\lambda}/k!\\). Вероятность получения отказа — p. Найдите вероятность ровно m отказов."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/7 Бернулли предельный переход Пуассон", "name": "7 Бернулли предельный переход Пуассон", "problems": [{"index": 0, "url": null, "content": "Пусть n стремится к бесконечности и \\(p_n\\) стремится к нулю так, что \\(np_n \\to \\lambda > 0\\). Докажите, что для любого k > 0 вероятность получить k успехов в n испытаниях схемы Бернулли с вероятностью \\(p_n\\) стремится к величине \\(\\lambda^k e^{-\\lambda}/k!\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/8 Геометрическое минимум матожидание", "name": "8 Геометрическое минимум матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых одинаково распределённых случайных величин \\(\\xi_n\\) с геометрическим распределением: \\(P(\\xi_n = k) = p(1-p)^{k-1}\\). Найдите распределение случайных величин \\(\\tau = \\min\\{n \\geq 1 : \\xi_n > 1\\}\\) и \\(\\xi_\\tau\\), вычислите \\(M[\\tau]\\), \\(M[\\xi_\\tau]\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/9 Равномерное убывание номер матожидание", "name": "9 Равномерное убывание номер матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых одинаково распределённых случайных величин \\(\\xi_n\\) с равномерным распределением на отрезке [0; 1]. Пусть \\(\\tau\\) — номер члена, с которого последовательность начала убывать. Найдите математическое ожидание \\(\\tau\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/11 Геометрическое распределение свойство памяти", "name": "11 Геометрическое распределение свойство памяти", "problems": [{"index": 0, "url": null, "content": "Доказать, что \\(\\xi\\) — геометрически распределённая случайная величина тогда и только тогда, когда \\(P(\\xi = n + k \\mid \\xi \\geq k) = P(\\xi = n)\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/12 Рулетка сумма среднее число", "name": "12 Рулетка сумма среднее число", "problems": [{"index": 0, "url": null, "content": "На игровой рулетке n секторов с числами \\(1, 2, \\ldots, n\\). Найдите, сколько в среднем раз нужно прокрутить барабан, чтобы сумма выпавших очков стала не меньше n."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/13 Робот шахматная доска чёрные белые", "name": "13 Робот шахматная доска чёрные белые", "problems": [{"index": 0, "url": null, "content": "Робот движется по клеткам бесконечной шахматной доски. Один его шаг — перемещение на случайную из восьми соседних клеток. Найдите математическое ожидание и дисперсию разности, а также модуля разности между количеством чёрных и количеством белых клеток, на которых робот побывал за n шагов (каждая клетка считается столько раз, сколько на ней побывал робот). Ответ представьте в виде компактного выражения."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/14 Четыре кости матожидание дисперсия", "name": "14 Четыре кости матожидание дисперсия", "problems": [{"index": 0, "url": null, "content": "Бросают четыре игральные кости. Найдите математическое ожидание и дисперсию числа выпавших очков."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/15 Карты колода сумма матожидание", "name": "15 Карты колода сумма матожидание", "problems": [{"index": 0, "url": null, "content": "В колоде 20 карт, на каждой — номер от 0 до 19, все номера различные. Вынули 5 карт. Найдите математическое ожидание и дисперсию суммы цифр на вынутых картах."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/16 Ящики дети подарки без подарка", "name": "16 Ящики дети подарки без подарка", "problems": [{"index": 0, "url": null, "content": "В комнате n ящиков, в каждом лежит по одному подарку. По очереди в комнату заходит m детей, каждый из которых случайным образом выбирает ящик и забирает оттуда подарок, если тот ещё есть. Найдите, сколько в среднем детей уйдут без подарка, и дисперсию количества детей без подарка."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/17 Доли сумма корреляция коэффициент", "name": "17 Доли сумма корреляция коэффициент", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1, \\ldots, X_n\\) — независимые одинаково распределённые случайные величины с математическим ожиданием a и дисперсией \\(\\sigma^2\\), принимающие положительные значения. Пусть \\(\\xi_k = \\frac{X_k}{X_1 + \\ldots + X_n}\\). Найдите коэффициент корреляции между \\(\\xi_i\\) и \\(\\xi_j\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/18 Дружба клика скидка способы", "name": "18 Дружба клика скидка способы", "problems": [{"index": 0, "url": null, "content": "В группе первокурсников ШАДа n ребят, видящих друг друга впервые. В парке аттракционов дают скидку компании ровно из k друзей, среди которых каждый дружит с каждым. Дружба между любой парой однокурсников независимо возникает с вероятностью p. Найдите среднее количество способов, которыми Макс может пойти на аттракционы со скидкой."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/19 Хоккей ничья матожидание дисперсия", "name": "19 Хоккей ничья матожидание дисперсия", "problems": [{"index": 0, "url": null, "content": "Две хоккейные команды одинаковой силы договорились играть до тех пор, пока суммарный счёт не достигнет 2n. Найдите математическое ожидание и дисперсию числа моментов, когда наступала ничья."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/20 Нули единицы группы матожидание", "name": "20 Нули единицы группы матожидание", "problems": [{"index": 0, "url": null, "content": "Последовательность состоит из k нулей и m единиц, расположенных в случайном порядке. Разобьём последовательность на чередующиеся группы нулей и единиц (группа — участок из одинаковых цифр подряд). Общее число групп — случайная величина. Найдите её математическое ожидание и дисперсию."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/21 Круглый стол соседи выбор", "name": "21 Круглый стол соседи выбор", "problems": [{"index": 0, "url": null, "content": "За круглым столом сидят n (n > 4) человек. Все они независимо друг от друга с вероятностью 1/2 выбирают одного из своих соседей. Найдите среднее количество людей, которых никто не выбрал."}, {"index": 1, "url": null, "content": "Найдите дисперсию количества людей, которых никто не выбрал."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/22 Жених невесты браки штампы", "name": "22 Жених невесты браки штампы", "problems": [{"index": 0, "url": null, "content": "Неразборчивый жених женится на первой желающей выйти за него замуж, а потом, как только встретит более привлекательную партию, оформляет развод и заключает новый брак. Потенциальные n невест могут быть строго ранжированы по привлекательности, но встречаются жениху в случайном порядке (все перестановки равновероятны). Хватит ли в среднем места в паспорте для всех штампов о браках и разводах, если n = 50, а паспорт вмещает всего 5 штампов о браках (вместе с 4 штампами о разводах)?"}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/23 Шапокляк Гена кубик дисперсия", "name": "23 Шапокляк Гена кубик дисперсия", "problems": [{"index": 0, "url": null, "content": "Крокодил Гена и старуха Шапокляк играют в игру с десятигранным кубиком. Первый ход делает Шапокляк: если выпадает от 8 до 10, ход остаётся за ней, иначе переходит к Гене. Гена в свой ход бросает кубик: если выпадает от 1 до 8, ход переходит к Шапокляк, иначе остаётся за ним. Игру прервали сразу после 91-го хода Гены. Пусть \\(\\xi\\) — количество ходов, сделанных Шапокляк. Найдите дисперсию \\(\\xi\\)."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/24 Паук решётка повороты матожидание", "name": "24 Паук решётка повороты матожидание", "problems": [{"index": 0, "url": null, "content": "По квадратной решётке размера \\(k \\times l\\) паук шагает из точки А в точку В, выбирая наугад любой из путей длины \\(k + l\\). Найдите математическое ожидание и дисперсию числа поворотов на его пути в узлах решётки."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/senior/25 Девицы театр вставания матожидание", "name": "25 Девицы театр вставания матожидание", "problems": [{"index": 0, "url": null, "content": "Благородные девицы (всего n) заходят в ряд из n кресел со стороны n-го кресла. Если девице нужно пройти мимо уже сидящей, та вежливо встаёт. Найдите математическое ожидание и дисперсию числа вставаний."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание и дисперсию числа тех, кому не придётся встать ни разу."}]}, {"id": "ydsa/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/senior/26 Булевы матрицы единицы произведение", "name": "26 Булевы матрицы единицы произведение", "problems": [{"index": 0, "url": null, "content": "Пусть A и B — две случайные булевы матрицы \\(n \\times n\\), у которых каждый элемент равен 1 с вероятностью p (значения различных элементов независимы). Найдите математическое ожидание и дисперсию числа единиц в их произведении, если сложение и умножение происходит по модулю 2."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/1 Гауссовы интегралы вероятностные методы", "name": "1 Гауссовы интегралы вероятностные методы", "problems": [{"index": 0, "url": null, "content": "Используя теоретико-вероятностные соображения, вычислите интеграл \\(\\int_0^{\\infty} e^{-\\frac{x^2}{3}} dx\\)."}, {"index": 1, "url": null, "content": "Используя теоретико-вероятностные соображения, вычислите интеграл \\(\\int_0^{\\infty} e^{-x^2+4x-1} dx\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/2 Коши обратная величина плотность", "name": "2 Коши обратная величина плотность", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(\\xi\\) распределена по Коши, то \\(\\eta = \\frac{1}{\\xi}\\) тоже распределена по Коши."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/3 Непрерывная функция дискретное распределение", "name": "3 Непрерывная функция дискретное распределение", "problems": [{"index": 0, "url": null, "content": "Приведите пример плотности распределения непрерывной случайной величины \\(\\xi\\) и непрерывной функции g таких, что \\(\\eta = g(\\xi)\\) имеет дискретное распределение."}, {"index": 1, "url": null, "content": "Приведите пример плотности распределения непрерывной случайной величины \\(\\xi\\) и непрерывной функции g таких, что \\(\\eta = g(\\xi)\\) имеет невырожденное дискретное распределение."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/4 Равномерная Бернулли сумма плотность", "name": "4 Равномерная Бернулли сумма плотность", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi\\) и \\(\\eta\\) независимы, причём \\(\\xi\\) равномерно распределена на отрезке [0, 1], а \\(\\eta\\) — бернуллиевская случайная величина с вероятностью успеха p. Найдите плотность распределения случайной величины \\(\\xi + \\eta\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/5 Пожар убыток страховка распределение", "name": "5 Пожар убыток страховка распределение", "problems": [{"index": 0, "url": null, "content": "Прямой убыток от пожара в миллионах рублей равномерно распределён на [0; 1]. Если убыток оказывается больше 0,7, страховая компания выплачивает компенсацию 0,7. Найдите функцию распределения потерь от пожара."}, {"index": 1, "url": null, "content": "Найдите средние потери."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/6 Плотность больше двух предел", "name": "6 Плотность больше двух предел", "problems": [{"index": 0, "url": null, "content": "Может ли функция плотности принимать значение больше 2023? Может ли предел \\(\\lim_{x \\to \\infty} f(x)\\) не равняться нулю?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/10 Нулевое матожидание неравенство дисперсия", "name": "10 Нулевое матожидание неравенство дисперсия", "problems": [{"index": 0, "url": null, "content": "Пусть \\(M[\\xi] = 0\\). Докажите, что \\(M[\\xi^2] \\leq \\frac{1}{2}(D[\\xi] + 1)\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/11 Порядковые статистики матожидание равномерные", "name": "11 Порядковые статистики матожидание равномерные", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\ldots, \\xi_n\\) — i.i.d., равномерно на \\([0;1]\\). Найдите математическое ожидание \\(\\xi_{(n)}\\) (максимума)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание \\(\\xi_{(1)}\\) (минимума)."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание \\(\\xi_{(k)}\\) (k-й порядковой статистики)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/12 Прямоугольник точка площадь треугольника", "name": "12 Прямоугольник точка площадь треугольника", "problems": [{"index": 0, "url": null, "content": "В прямоугольнике ABCD единичной площади выбираем точку M. Найдите математическое ожидание площади треугольника ABM."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/13 Показательное целая дробная матожидание", "name": "13 Показательное целая дробная матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть X распределена показательно с показателем 1. Найдите математическое ожидание и дисперсию \\([X]\\) (целой части)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание и дисперсию \\(\\{X\\}\\) (дробной части)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/7 Непрерывные распределения характеристики таблица", "name": "7 Непрерывные распределения характеристики таблица", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану равномерного распределения на отрезке \\([a; b]\\)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану экспоненциального распределения."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану нормального распределения."}, {"index": 3, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану логнормального распределения."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/8 Функция распределения матожидание экспонента", "name": "8 Функция распределения матожидание экспонента", "problems": [{"index": 0, "url": null, "content": "Пусть функция распределения случайной величины \\(\\xi\\) равна:\n\\[F(x) = \\begin{cases} 0, & x < 0 \\\\ \\frac{x+1}{4}, & x \\in [0, 1) \\\\ \\frac{x^2+2}{4}, & x \\in [1, \\sqrt{2}) \\\\ 1, & x \\geq \\sqrt{2} \\end{cases}\\]\nВычислите \\(Ee^{\\xi}\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/9 Нулевая дисперсия случайная величина", "name": "9 Нулевая дисперсия случайная величина", "problems": [{"index": 0, "url": null, "content": "Что можно сказать про случайную величину с нулевой дисперсией?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/14 Экспонента максимум отклонение медиана", "name": "14 Экспонента максимум отклонение медиана", "problems": [{"index": 0, "url": null, "content": "Найдите наибольшее значение \\(M|X - C|\\) и значение C, в котором оно достигается, где X распределена экспоненциально."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/15 Неравенство Йенсена обратная величина", "name": "15 Неравенство Йенсена обратная величина", "problems": [{"index": 0, "url": null, "content": "У положительной случайной величины \\(\\xi\\) существует математическое ожидание \\(M[\\xi]\\). Докажите, что \\(1 \\leq M[\\xi] \\cdot M\\left[\\frac{1}{\\xi}\\right]\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/16 Корреляция единица линейная функция", "name": "16 Корреляция единица линейная функция", "problems": [{"index": 0, "url": null, "content": "Докажите, что коэффициент корреляции между случайными величинами \\(\\xi\\) и \\(\\eta\\) равен единице тогда и только тогда, когда \\(\\eta = a\\xi + b\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/17 Марков неравенство матожидание модуль", "name": "17 Марков неравенство матожидание модуль", "problems": [{"index": 0, "url": null, "content": "Пусть случайная величина \\(\\xi\\) имеет \\(M[|\\xi|]\\). Докажите, что для любого \\(\\epsilon > 0\\) верно \\(P(|\\xi| \\geq \\epsilon) \\leq \\frac{M|\\xi|}{\\epsilon}\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/senior/18 Ломаная угол матожидание квадрат", "name": "18 Ломаная угол матожидание квадрат", "problems": [{"index": 0, "url": null, "content": "На плоскости нарисована ломаная с n звеньями. Длина каждого звена равна 1, ориентированный угол между соседними звеньями с равной вероятностью равен \\(\\alpha\\) или \\(-\\alpha\\). Найдите математическое ожидание квадрата расстояния от её начальной точки до конечной."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/senior/19 Положительная дисперсия ограничена неравенство", "name": "19 Положительная дисперсия ограничена неравенство", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) — строго положительная случайная величина, причём её дисперсия существует и не превосходит 2. Верно ли, что \\(P(E[\\xi] - 2 \\leq \\xi \\leq 2E[\\xi] + 1) \\geq \\frac{1}{2}\\)?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/20 Шар пятнадцать измерений расстояние", "name": "20 Шар пятнадцать измерений расстояние", "problems": [{"index": 0, "url": null, "content": "Рассмотрим единичный шар в 15-мерном пространстве. Найдите минимальное число n такое, что вероятность события «все n случайных равномерно распределённых в шаре точек расположены на расстоянии не менее 0,5 от центра» не превосходит 0,6."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/21 Симметричное распределение произведение одинаково", "name": "21 Симметричное распределение произведение одинаково", "problems": [{"index": 0, "url": null, "content": "Предположим, что случайная величина \\(\\xi\\) имеет симметричное распределение (\\(P(\\xi = x) = P(\\xi = -x)\\)), а случайная величина \\(\\eta\\) принимает значения 1 и \\(-1\\) с вероятностью 1/2. Докажите, что случайные величины \\(\\xi\\) и \\(\\xi\\eta\\) имеют одинаковое распределение."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/22 Независимость совокупности произведения набор", "name": "22 Независимость совокупности произведения набор", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(X, Y, Z, W\\) независимы в совокупности и одинаково распределены: каждая принимает значения 1 и \\(-1\\) с вероятностью 1/2. Являются ли независимыми в совокупности следующие наборы: \\(XYZ, XYW, XW\\)?"}, {"index": 1, "url": null, "content": "Являются ли независимыми в совокупности следующие наборы: \\(XY, XYW, XW, XZW\\)?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/23 Максимум минимум вероятность точка", "name": "23 Максимум минимум вероятность точка", "problems": [{"index": 0, "url": null, "content": "Дано: \\(P(x = a) = \\lambda\\), \\(P(\\max(x, y) = a) = \\mu\\), \\(P(\\min(x, y) = a) = \\nu\\). Найдите \\(P(y = a)\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/24 Две величины сумма равномерная", "name": "24 Две величины сумма равномерная", "problems": [{"index": 0, "url": null, "content": "Есть ли такие 2 случайные величины, что их сумма распределена равномерно (дискретно)?"}, {"index": 1, "url": null, "content": "Есть ли такие 2 случайные величины, что их сумма распределена равномерно (непрерывно)?"}, {"index": 2, "url": null, "content": "Те же вопросы для независимых случайных величин."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/25 Непрерывные величины сумма равномерная", "name": "25 Непрерывные величины сумма равномерная", "problems": [{"index": 0, "url": null, "content": "Есть ли такие 2 непрерывные случайные величины, что их сумма распределена равномерно (дискретно)?"}, {"index": 1, "url": null, "content": "Есть ли такие 2 непрерывные случайные величины, что их сумма распределена равномерно (непрерывно)?"}, {"index": 2, "url": null, "content": "Те же вопросы для независимых непрерывных случайных величин."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/26 Одинаковое распределение разные величины", "name": "26 Одинаковое распределение разные величины", "problems": [{"index": 0, "url": null, "content": "Приведите пример двух случайных величин \\(\\xi\\) и \\(\\eta\\), имеющих одну и ту же функцию распределения (\\(F_\\xi = F_\\eta\\)), но таких, что \\(P(\\xi \\neq \\eta) > 0\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/27 Функция распределения произведение совпадает", "name": "27 Функция распределения произведение совпадает", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi, \\eta\\) и \\(\\zeta\\) — случайные величины, причём функции распределения \\(\\xi\\) и \\(\\eta\\) совпадают. Верно ли, что тогда функции распределения произведений \\(\\xi\\zeta\\) и \\(\\eta\\zeta\\) совпадают?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/29 Равномерные произведение частное плотность", "name": "29 Равномерные произведение частное плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — независимые случайные величины, равномерно распределённые на отрезке \\([0; a]\\). Найдите распределение \\(\\xi\\eta\\)."}, {"index": 1, "url": null, "content": "Найдите распределение \\(\\frac{\\eta}{\\xi}\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/30 Константа независима от себя", "name": "30 Константа независима от себя", "problems": [{"index": 0, "url": null, "content": "Покажите, что случайная величина \\(\\xi\\) не зависит от самой себя (т.е. \\(\\xi\\) и \\(\\xi\\) независимы) тогда и только тогда, когда \\(\\xi = \\text{const}\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/31 Зависимые квадраты независимые пример", "name": "31 Зависимые квадраты независимые пример", "problems": [{"index": 0, "url": null, "content": "Приведите пример двух зависимых случайных величин \\(\\xi\\) и \\(\\eta\\) таких, что \\(\\xi^2\\) и \\(\\eta^2\\) независимы."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/32 Стандартные нормальные преобразование плотность", "name": "32 Стандартные нормальные преобразование плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — независимые случайные величины, распределённые как \\(N(0; 1)\\). Найдите распределение \\(\\sqrt{\\xi^2 + \\eta^2}\\) двумя способами: по определению и через функциональное преобразование плотности."}, {"index": 1, "url": null, "content": "Найдите распределение \\(\\xi\\eta\\) двумя способами."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/33 Равномерный треугольник функция распределения", "name": "33 Равномерный треугольник функция распределения", "problems": [{"index": 0, "url": null, "content": "Пусть вектор \\((X, Y)\\) имеет равномерное распределение на треугольнике с вершинами \\(A = (0,0)\\), \\(B = (2,0)\\) и \\(C = (1,1)\\). Найдите функции распределения и плотности случайных величин X и Y. Являются ли эти случайные величины независимыми?"}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/34 Синус косинус равномерное независимость", "name": "34 Синус косинус равномерное независимость", "problems": [{"index": 0, "url": null, "content": "Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = \\sin X\\) и \\(\\eta = \\cos X\\), если X равномерно распределена на интервале \\((0; 2\\pi)\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/38 Показательные вектор плотность сумма", "name": "38 Показательные вектор плотность сумма", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют экспоненциальное распределение с параметром 1. Найдите плотность распределения случайного вектора \\((\\xi, \\xi + \\eta)\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/28 Ковариация максимум отрезок", "name": "28 Ковариация максимум отрезок", "problems": [{"index": 0, "url": null, "content": "Две случайные величины имеют какое-то распределение на отрезке [−1, 1]. Найдите их максимальную ковариацию."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/35 Равномерный симплекс корреляция отрицательная", "name": "35 Равномерный симплекс корреляция отрицательная", "problems": [{"index": 0, "url": null, "content": "Пусть \\((\\zeta, \\nu)\\) — координаты случайной точки, имеющей равномерное распределение в области \\(D = \\{x + y \\leq 1, x \\geq 0, y \\geq 0\\}\\). Докажите, что коэффициент корреляции между \\(\\zeta\\) и \\(\\nu\\) отрицательный."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/36 Показательные X Y дисперсия T", "name": "36 Показательные X Y дисперсия T", "problems": [{"index": 0, "url": null, "content": "Пусть заданы две независимые случайные величины X и Y с экспоненциальными распределениями с параметрами \\(\\mu = 1\\) и \\(\\lambda = 2\\) соответственно. Найдите дисперсию величины \\(T\\), где \\(T = \\begin{cases} 1, & X > Y \\\\ 0, & X \\leq Y \\end{cases}\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/37 Треугольник из трёх отрезков", "name": "37 Треугольник из трёх отрезков", "problems": [{"index": 0, "url": null, "content": "Случайные величины X и Y независимы. Плотность X равна \\(p_X(t) = \\frac{t}{2} I_{[0,2]}(t)\\), а Y имеет равномерное распределение на отрезке \\([0, 3]\\). Найдите вероятность того, что из отрезков с длинами X, Y и 1 можно составить треугольник."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/39 Равномерные вектор Бокса-Мюллера", "name": "39 Равномерные вектор Бокса-Мюллера", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\eta))\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/40 Равномерные вектор пи угол", "name": "40 Равномерные вектор пи угол", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\pi\\eta))\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/41 Равномерные вектор двойное пи", "name": "41 Равномерные вектор двойное пи", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(2\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(2\\pi\\eta))\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/42 Порядковые статистики вектор плотность", "name": "42 Порядковые статистики вектор плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\ldots, \\xi_n\\) — последовательность независимых случайных величин, равномерно распределённых на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\xi_{(1)}, \\xi_{(n)})\\), где \\(\\xi_{(1)} = \\min(\\xi_1, \\ldots, \\xi_n)\\), а \\(\\xi_{(n)} = \\max(\\xi_1, \\ldots, \\xi_n)\\)."}]}, {"id": "ydsa/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/senior/43 Три равномерные сумма вероятность", "name": "43 Три равномерные сумма вероятность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины, равномерно распределённые на отрезке \\([0, 1]\\), а t — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/1 Совместная плотность произведение независимость", "name": "1 Совместная плотность произведение независимость", "problems": [{"index": 0, "url": null, "content": "Докажите, что если совместная плотность вероятности \\(f(x_1, x_2, \\ldots, x_n)\\) величин \\(\\xi_1, \\ldots, \\xi_n\\) представима в виде \\(f(x_1, \\ldots, x_n) = g_1(x_1)g_2(x_2)\\cdots g_n(x_n)\\), где \\(g_i(x_i) > 0\\), то функции \\(g_1, g_2, \\ldots, g_n\\) с точностью до нормирующих множителей служат частными плотностями вероятности величин \\(\\xi_1, \\ldots, \\xi_n\\) соответственно, причём эти величины независимы."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/2 Порядковые статистики разности плотность", "name": "2 Порядковые статистики разности плотность", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы и равномерно распределены на \\([0;1]\\). Построим \\(\\eta_1 = \\xi_{(1)}, \\eta_2 = \\xi_{(2)} - \\xi_{(1)}, \\ldots, \\eta_n = \\xi_{(n)} - \\xi_{(n-1)}\\). Найдите совместную плотность \\(\\eta_1, \\ldots, \\eta_n\\)."}, {"index": 1, "url": null, "content": "Найдите плотность каждого \\(\\eta_i\\)."}, {"index": 2, "url": null, "content": "Будут ли случайные величины \\(\\eta_1, \\ldots, \\eta_n\\) независимы?"}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/3 Показательные максимум сумма распределение", "name": "3 Показательные максимум сумма распределение", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы и имеют одно и то же показательное распределение с параметром \\(\\lambda\\). Докажите, что случайные величины \\(\\max\\{\\xi_1, \\xi_2, \\ldots, \\xi_n\\}\\) и \\(\\xi_1 + \\frac{\\xi_2}{2} + \\ldots + \\frac{\\xi_n}{n}\\) одинаково распределены."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/12 Монета герб решка минимум", "name": "12 Монета герб решка минимум", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) — минимальное число подбрасываний монеты, при котором хотя бы один раз выпадает герб и хотя бы один раз — решка. Найдите \\(M[\\xi]\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/4 Дракон башни перелёт матожидание", "name": "4 Дракон башни перелёт матожидание", "problems": [{"index": 0, "url": null, "content": "Есть три башни, расположенные в углах правильного треугольника. На первой сидит дракон. Дракон перелетает равновероятно в каждый момент времени на одну из соседних башен. Найдите математическое ожидание числа перелётов, после которых он вернётся на исходную башню."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/5 Две урны фишки условная замена", "name": "5 Две урны фишки условная замена", "problems": [{"index": 0, "url": null, "content": "Есть две урны. У одной — четыре фишки по 1 доллару и шесть фишек по 10 долларов, у другой — три фишки по 1 доллару и семь по 10 долларов. Вы случайно вытаскиваете фишку из одной урны — это оказывается фишка в 1 доллар. Затем, не возвращая вынутую фишку, вам предлагают второй раз вытянуть фишку из любой урны. Из какой урны выгоднее брать? Каково ожидаемое значение второй фишки?"}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/6 Кость d6 нечётные матожидание", "name": "6 Кость d6 нечётные матожидание", "problems": [{"index": 0, "url": null, "content": "Кость d6 бросают до выпадения 6. Найдите среднее количество выпавших нечётных чисел."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/7 Монета последовательность ходы матожидание", "name": "7 Монета последовательность ходы матожидание", "problems": [{"index": 0, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РР. Найдите среднее количество ходов."}, {"index": 1, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРО. Найдите среднее количество ходов."}, {"index": 2, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРОР. Найдите среднее количество ходов."}, {"index": 3, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРО или ООР. Найдите среднее количество ходов."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/10 Аня задачи неправильные ответы", "name": "10 Аня задачи неправильные ответы", "problems": [{"index": 0, "url": null, "content": "Аня решает задачи по математике и даёт правильный ответ с вероятностью 0,8. Маша дала Ане 15 задач и за каждый неправильный ответ даёт ей ещё 2 задачи. Аня решает задачи, пока они не кончатся. Найдите математическое ожидание количества задач, которые Маша суммарно даст Ане."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/11 Составное распределение матожидание Вальд", "name": "11 Составное распределение матожидание Вальд", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(\\xi_1, \\xi_2, \\ldots\\) — независимые одинаково распределённые случайные величины с \\(M|\\xi_1| < \\infty\\), а \\(\\nu\\) — не зависящая от них неотрицательная целочисленная случайная величина с \\(M[\\nu] < \\infty\\), то \\(M[\\xi_1 + \\ldots + \\xi_\\nu] = M[\\xi_1] \\cdot M[\\nu]\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/13 Гербы решки корреляция ковариация", "name": "13 Гербы решки корреляция ковариация", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — соответственно число гербов и число решек, выпадающих при бросании ста монет. Найдите коэффициент корреляции случайных величин \\(\\xi\\) и \\(\\eta\\)."}, {"index": 1, "url": null, "content": "Найдите ковариацию случайных величин \\(\\xi\\) и \\(\\eta\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/8 Три игрока кости ходы B", "name": "8 Три игрока кости ходы B", "problems": [{"index": 0, "url": null, "content": "Игроки А, В и С сменяя друг друга по очереди кидают две игральные кости до тех пор, пока не получат сумму очков, равную 7.
