 Найдите среднее количество ходов, которое сделает В."}, {"index": 1, "url": null, "content": "В результате эксперимента возможны два исхода: успех (с вероятностью p) и неуспех (с вероятностью 1−p). Экспериментаторы А, В и С по очереди проводят эксперимент до успеха. Найдите максимальное значение p, при котором математическое ожидание количества ходов В больше или равно математическому ожиданию ходов А и математическому ожиданию ходов С."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/9 Напёрстки ва-банк раунды матожидание", "name": "9 Напёрстки ва-банк раунды матожидание", "problems": [{"index": 0, "url": null, "content": "Игрок решил сыграть в напёрстки со ставкой 1 рубль (выиграть можно 2 рубля). Изначально у него 10 рублей, цель — 1000 рублей. Через сколько в среднем раундов игра закончится? Как изменится ответ, если игрок каждый раз будет идти ва-банк (ставить всё, что есть)?"}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/senior/14 Дерево ветки груши матожидание", "name": "14 Дерево ветки груши матожидание", "problems": [{"index": 0, "url": null, "content": "Из земли растёт ствол случайного дерева. С вероятностью p ствол расходится на две ветки, а с вероятностью 1−p заканчивается грушей. Каждая из веток также с вероятностью p расходится на две ветки, а с вероятностью 1−p заканчивается грушей, и так далее. Найдите среднее число груш на дереве."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/15 Две точки наибольший отрезок", "name": "15 Две точки наибольший отрезок", "problems": [{"index": 0, "url": null, "content": "Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются две точки X и Y. Найдите математическое ожидание и дисперсию наибольшего отрезка разбиения."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/16 Три точки наибольшее расстояние", "name": "16 Три точки наибольшее расстояние", "problems": [{"index": 0, "url": null, "content": "Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются три точки X, Y, Z. Используя условное математическое ожидание, найдите наибольшее расстояние между ними: \\(E[\\max\\{|X - Y|, |Y - Z|, |X - Z|\\}]\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/17 Перестановка неподвижные точки условное", "name": "17 Перестановка неподвижные точки условное", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\sigma\\) — случайная перестановка на n элементах, \\(\\xi\\) — количество неподвижных точек \\(\\sigma\\), \\(A_i\\) — событие, означающее, что i-я точка является неподвижной. Найдите значение условного математического ожидания \\(E[\\xi \\mid \\mathbf{1}\\{A_i\\} = x]\\) при всех возможных значениях x."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/18 Студент монетка подготовка распределение", "name": "18 Студент монетка подготовка распределение", "problems": [{"index": 0, "url": null, "content": "Студент готовится к экзамену ровно час. Сначала бросает монету. Если орёл — готовится полчаса и завершает. Если решка — равномерно на \\([0;1]\\) выбирает число x, готовится x часов, затем снова бросает монету. Если снова орёл — готовится оставшееся время до часа; если решка — прекращает подготовку. Найдите функцию распределения времени подготовки студента и его математическое ожидание."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/19 Авито Пуассон покупки матожидание", "name": "19 Авито Пуассон покупки матожидание", "problems": [{"index": 0, "url": null, "content": "Число пользователей, посещающих Авито с 12:00 до 13:00, является пуассоновской величиной с параметром \\(\\lambda = 100\\). С вероятностью \\(p = 0,15\\) каждый пользователь независимо совершает покупку. Найдите среднее число пользователей, совершающих покупку в течение этого часа."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/20 Показательные максимум сумма матожидание", "name": "20 Показательные максимум сумма матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1, X_2, Y_1, Y_2\\) — независимые случайные величины, распределённые экспоненциально с параметрами \\(\\lambda_1, \\lambda_2, \\mu_1, \\mu_2\\) соответственно. Найдите \\(E(\\max(X_1 + Y_1, X_2 + Y_2))\\)."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/21 Показательные максимум Z матожидание", "name": "21 Показательные максимум Z матожидание", "problems": [{"index": 0, "url": null, "content": "Случайные величины X и Y независимы и экспоненциально распределены: X с параметром \\(\\lambda = 1\\), Y с параметром \\(\\lambda = 2\\). Пусть \\(Z = \\max(X, Y)\\). Найдите математическое ожидание Z."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/22 Три части меньший матожидание", "name": "22 Три части меньший матожидание", "problems": [{"index": 0, "url": null, "content": "Отрезок \\([0, 1]\\) разбит двумя случайными точками на три части. Найдите математическое ожидание длины наименьшей из частей."}]}, {"id": "ydsa/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/24 Треугольное условное нормальное матожидание", "name": "24 Треугольное условное нормальное матожидание", "problems": [{"index": 0, "url": null, "conten
