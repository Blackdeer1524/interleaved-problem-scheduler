t[4]{\\cos(2x)}\\,\\operatorname{ch}(x^3)}{\\ln^2(\\cos(2x))}\\)"}, {"index": 4, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{(\\cos x)^{\\sin x} - \\sqrt{1 - x^3}}{x^6}\\)"}, {"index": 5, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{\\sin(\\sin x) - \\operatorname{tg}(x)}{x^5}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/16 Производная сложной функции", "name": "16 Производная сложной функции", "problems": [{"index": 0, "url": null, "content": "Найдите производную функции \\(f(x) = e^{\\sin(g(\\ln x))}\\) в точке \\(x = e\\), если \\(g(1) = 5\\) и \\(g'(1) = 3\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/17 Производная степенно-тригонометрической функции", "name": "17 Производная степенно-тригонометрической функции", "problems": [{"index": 0, "url": null, "content": "Для функции \\(f(x) = (\\sin x)^{\\cos x}\\) найти область определения и вычислить производную."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/18 Задача об оптимальном маршруте", "name": "18 Задача об оптимальном маршруте", "problems": [{"index": 0, "url": null, "content": "Берег моря — прямая линия с запада на восток. Остров находится в 7 км к северу от ближайшей точки \\(T\\) берега. Лёша стоит в хижине в 11 км западнее \\(T\\), а вокзал — в 25 км восточнее \\(T\\). Лёша бегает со скоростью 10 км/ч, плавает со скоростью 2 км/ч, а восточнее \\(T\\) может арендовать скутер (25 км/ч). За какое минимальное время Лёша доберётся до вокзала, посетив по пути остров?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/19 Пределы через производную", "name": "19 Пределы через производную", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) и \\(g\\) дифференцируемы в точке \\(a\\). Найдите \\(\\lim_{x \\to a} \\frac{xf(a) - af(x)}{x - a}\\)"}, {"index": 1, "url": null, "content": "Пусть \\(f\\) и \\(g\\) дифференцируемы в точке \\(a\\). Найдите \\(\\lim_{x \\to a} \\frac{f(x)g(a) - f(a)g(x)}{x - a}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/20 Неравенство для производной", "name": "20 Неравенство для производной", "problems": [{"index": 0, "url": null, "content": "Вещественнозначная функция \\(f\\) определена на отрезке \\([a; b]\\) (\\(b - a > 4\\)) и дифференцируема на нём. Докажите, что найдётся точка \\(x_0 \\in (a, b)\\), для которой \\(f'(x_0) < 1 + f^2(x_0)\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/21 Бесконечная дифференцируемость", "name": "21 Бесконечная дифференцируемость", "problems": [{"index": 0, "url": null, "content": "Докажите, что \\(f(x) = e^{-\\frac{1}{x^2}}\\), доопределённая в нуле как \\(f(0) = 0\\), бесконечно дифференцируема на всей числовой оси."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/22 Сравнение степеней и показателей", "name": "22 Сравнение степеней и показателей", "problems": [{"index": 0, "url": null, "content": "Что больше: \\(e^\\pi\\) или \\(\\pi^e\\)?"}, {"index": 1, "url": null, "content": "Что больше: \\(2^{\\sqrt{2}}\\) или \\(e\\)?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/23 Неравенства через выпуклость", "name": "23 Неравенства через выпуклость", "problems": [{"index": 0, "url": null, "content": "Докажите неравенство для положительных \\(x\\) и \\(y\\): \\(x \\ln x + y \\ln y \\ge (x + y) \\ln \\frac{x+y}{2}\\)"}, {"index": 1, "url": null, "content": "Докажите неравенство для положительных \\(x\\) и \\(y\\): \\(\\frac{e^y - e^x}{y - x} < \\frac{e^x + e^y}{2}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/24 Дифференцируемость кусочной функции", "name": "24 Дифференцируемость кусочной функции", "problems": [{"index": 0, "url": null, "content": "При каких вещественных значениях параметров \\(a, b, c\\) функция\n\n\\(f(x) = \\begin{cases} \\operatorname{arcctg}\\!\\left(5\\dfrac{\\sin x}{\\cos x}\\right), & -\\dfrac{\\pi}{2} < x < \\dfrac{\\pi}{2} \\\\[6pt] \\lim_{t \\to 0} \\dfrac{a(1 - \\cos t)}{t^2}, & x = \\dfrac{\\pi}{2} \\\\[6pt] bx + c, & x > \\dfrac{\\pi}{2} \\end{cases}\\)\n\nдифференцируема для любых \\(x \\ge -\\dfrac{\\pi}{2}\\)?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/25 Оценка производной через вторую производную", "name": "25 Оценка производной через вторую производную", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) дифференцируема на \\([0, 1]\\), причём \\(f(0) = f(1) = 0\\) и \\(|f''(x)| \\le A\\) для всех \\(x \\in (0, 1)\\). Найдите максимально возможное значение \\(|f'(x)|\\) при \\(x \\in [0, 1]\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/26 Теорема Ролля для f через x", "name": "26 Теорема Ролля для f через x", "problems": [{"index": 0, "url": null, "content": "Предположим, что \\(f\\) непрерывна на \\([a; b]\\), \\(a > 0\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(\\frac{f(a)}{a} = \\frac{f(b)}{b}\\), то существует точка \\(x_0 \\in (a; b)\\) такая, что \\(x_0 f'(x_0) = f(x_0)\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/27 Максимальное a для системы", "name": "27 Максимальное a для системы", "problems": [{"index": 0, "url": null, "content": "Найти максимальное \\(a\\), для которого существуют неубывающие дважды дифференцируемые функции \\(f(x)\\) и \\(g(x)\\) такие, что \\((f(x))^2 + (g(x))^2 \\le a\\), \\(f''(x) = g(x)\\), \\(g''(x) = f(x)\\) и функция \\(f(x)g(x)\\) линейна."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/28 Теорема Ролля для f через x (2)", "name": "28 Теорема Ролля для f через x (2)", "problems": [{"index": 0, "url": null, "content": "Предположим, что \\(f\\) непрерывна на \\([a; b]\\), \\(a > 0\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(\\frac{f(a)}{a} = \\frac{f(b)}{b}\\), то существует точка \\(x_0 \\in (a; b)\\) такая, что \\(x_0 f'(x_0) = f(x_0)\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/29 Неравенство для тригонометрического многочлена", "name": "29 Неравенство для тригонометрического многочлена", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(|a_1 \\sin x + a_2 \\sin 2x + \\ldots + a_n \\sin nx| \\le |\\sin x|\\) для всех \\(x \\in \\mathbb{R}\\), то \\(|a_1 + 2a_2 + \\ldots + na_n| \\le 1\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/30 Уравнение f'f=x", "name": "30 Уравнение f'f=x", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) непрерывна на \\([a; b]\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(f^2(b) - f^2(a) = b^2 - a^2\\), то уравнение \\(f'(x)f(x) = x\\) имеет хотя бы один корень в \\((a; b)\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/31 Правило Лопиталя", "name": "31 Правило Лопиталя", "problems": [{"index": 0, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 1} \\frac{\\arctan \\frac{x^2-1}{x^2+1}}{x-1}\\)"}, {"index": 1, "url": null, "content": "Найдите предел \\(\\lim_{x \\to \\infty} x\\!\\left(\\!\\left(1 + \\frac{1}{x}\\right)^x - e\\right)\\)"}, {"index": 2, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 5} (6-x)^{\\frac{1}{x-5}}\\)"}, {"index": 3, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\left(\\frac{\\sin x}{x}\\right)^{\\frac{1}{x}}\\)"}, {"index": 4, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0^+} \\left(\\frac{\\sin x}{x}\\right)^{\\frac{1}{x}}\\)"}, {"index": 5, "url": null, "content": "Найдите предел \\(\\lim_{x \\to \\infty} \\frac{x - \\sin x}{2x + \\sin x}\\)"}, {"index": 6, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} x^{\\sin x}\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/32 Экстремумы функции", "name": "32 Экстремумы функции", "problems": [{"index": 0, "url": null, "content": "Найдите наибольшее и наименьшее значение функции \\(f(x) = \\frac{x^4 - 6x^2 + 5}{|x-1|}\\) (если они существуют), а также множество всех её значений."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/33 Корень дифференциального уравнения", "name": "33 Корень дифференциального уравнения", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) дифференцируема на \\([0;1]\\). Докажите, что уравнение \\((x - x^2)f''(x) = (3x^2 - 1)f(x)\\) имеет хотя бы один корень."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/34 Корни многочлена Лежандра", "name": "34 Корни многочлена Лежандра", "problems": [{"index": 0, "url": null, "content": "Доказать, что у многочлена Лежандра все корни вещественные и принадлежат интервалу \\((-1; 1)\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/35 Разность выпуклых функций", "name": "35 Разность выпуклых функций", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f \\in C^2([0; 1])\\). Доказать, что функцию \\(f\\) можно представить в виде разности двух выпуклых вниз функций."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/junior/43 Решение уравнений", "name": "43 Решение уравнений", "problems": [{"index": 0, "url": null, "content": "Решить уравнение \\(3^x + 4^x = 5^x\\)"}, {"index": 1, "url": null, "content": "Решить уравнение \\(e^{e^x - 1} = x + 1\\)"}, {"index": 2, "url": null, "content": "Решить уравнение \\(x^2 - x + 2 = \\frac{1}{\\sqrt{x+7} - \\sqrt{x-1}}\\)"}, {"index": 3, "url": null, "content": "Решить уравнение \\(\\sin(\\sin(x)) = \\sin(\\cos(x))\\)"}, {"index": 4, "url": null, "content": "Решить уравнение \\(\\sqrt{a + \\sqrt{a + x}} = x\\)"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/middle/44 Монотонность и уравнения", "name": "44 Монотонность и уравнения", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) строго монотонная функция. Докажите, что уравнение \\(f(x) = \\mathrm{const}\\) имеет не более одного решения."}, {"index": 1, "url": null, "content": "Пусть \\(f(x)\\) строго монотонная функция. Докажите, что уравнение \\(f(f(x)) = x\\) равносильно уравнению \\(f(x) = x\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/middle/45 Непрерывная биекция монотонна", "name": "45 Непрерывная биекция монотонна", "problems": [{"index": 0, "url": null, "content": "Докажем, что непрерывная и биективная на \\([a; b]\\) функция \\(f(x)\\) монотонна на \\([a; b]\\)."}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/senior/46 Тождество f(f(x))=1-x^3", "name": "46 Тождество f(f(x))=1-x^3", "problems": [{"index": 0, "url": null, "content": "Существует ли непрерывная функция \\(f(x)\\), для которой выполняется тождество \\(f(f(x)) = 1 - x^3\\)?"}]}, {"id": "courses/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/senior/47 Пара функций arctg и arcctg", "name": "47 Пара функций arctg и arcctg", "problems": [{"index": 0, "url": null, "content": "Существуют ли такие непрерывные функции \\(f\\) и \\(g\\), что \\(f(g(x)) = \\operatorname{arctg}(x)\\) и \\(g(f(x)) = \\operatorname{arcctg}(x)\\)?"}]}, {"id": "courses/mathematics/probability/[01] 25-10-03 (2) Правило суммы и произведения 101", "name": "[01] 25-10-03 (2) Правило суммы и произведения 101", "problems": [{"index": 0, "url": null, "content": "В заборе 20 досок, каждую надо покрасить в черный, синий, зеленый или желтый\nцвет, причем соседние доски красятся в разные цвета.\n\n    1) Сколькими способами это можно сделать?\n    2) Если требуется, чтобы хоть одна из досок обязательно была синей?"}, {"index": 1, "url": null, "content": "На клетчатой доске размера 22 × 25 (длина стороны клетки равна 1) требу-\nется отметить тройку клеток так, чтобы центры этих клеток образовывали прямоугольный\nтреугольник с катетами длины 7 и 4 (катеты параллельны краям доски). Сколькими спо-\nсобами это можно сделать?"}, {"index": 2, "url": null, "content": "В классе за контрольную 6 учеников получили оценку 5, 7 оценку 4 и 1 оценку 3. Учитель сказал им разбиться на пары с разными оценками, где получивший лучшую\nоценку рассказал бы получившему худшую, где тот ошибся. Сколькими способами учени-\nки могли бы разбиться на пары при таком условии?"}, {"index": 3, "url": null, "content": "В волейбольной секции 24 спортсмена. Сколькими способами их можно разде-\nлить на 4 команды по 6 спортсменов в каждой для проведения тренировочного турнира?\nА сколькими способами можно разбить 7 мальчиков и 7 девочек на пары?"}, {"index": 4, "url": null, "content": "Сколькими способами можно выложить в ряд три красных, четыре синих и\nпять зелёных шаров так, чтобы никакие два синих шара не лежали рядом?"}, {"index": 5, "url": null, "content": "Каких целых чисел от 1 до \\(8 \\cdot 10^{20}\\) (включительно) больше и на сколько: со-\nдержащих в своей записи только чётные цифры или содержащих в своей записи только\nнечётные цифры?"}, {"index": 6, "url": null, "content": "Найдите количество шестизначных чисел\n\n    1) У которых пятая цифра меньше шестой на 2\n    2) У которых каждая следующая цифра меньше предыдущей"}, {"index": 7, "url": null, "content": "Найдите сумму всех 4-х значных четных чисел, которые можно получить из\nкарточек 1, 2, 3, 4 если каждая цифра может быть использована более одного раза"}, {"index": 8, "url": null, "content": "Комбинаторно докажите следующие свойства чисел сочетаний. Другими сло-\nвами, вас просят на примере различных решений одной задачи получить выражения, сто-\nящие в разных частях данных равенств:\n\n    1) \\(C_n^0 - C_n^1 + ... + (-1)^n \\cdot C_n^n = 0\\)\n    ✳ 2) \\(0 \\cdot C_n^0 + 1 \\cdot C_n^1 + ... + n \\cdot C_n^n = n \\cdot 2^{n-1}\\)"}, {"index": 9, "url": null, "content": "Найдите количество слагаемых в разложении функции:\n\n    1) \\((x + y + z)^{10}\\)\n    2) \\((x^{-1} + 1 + x)^{2016}\\)"}, {"index": 10, "url": null, "content": "Найдите коэффициент в разложении:\n\n    1) Выражения \\((a + b + c)^{18}\\) при \\(a^6 b^6 c^6\\)\n    ✳ 2) Выражения \\((x^2 + x + 1)^{20}\\) при \\(x^6\\)"}, {"index": 11, "url": null, "content": "Отметили все вершины правильного 12-тиугольника. Сколько существует неза-\nмкнутых несамопересекающихся одиннадцатизвенных ломаных с вершинами в отмечен-\nных точках? А десятизвенных ломаных с вершинами в отмеченных точках?"}, {"index": 12, "url": null, "content": "На каждой из прямых y = 1 и y = 12 отмечено по 200 точек с абсциссами 1,\n2, 3, . . . , 200. Сколькими способами можно выбрать три точки из отмеченных 400 так,\nчтобы они являлись вершинами прямоугольного треугольника?"}, {"index": 13, "url": null, "content": "В таблицу размера k x l записывают числа +1 и −1 так, чтобы произведение\nчисел в каждой строке и в каждом столбце равнялось 1. Сколькими способами это можно\nсделать?"}, {"index": 14, "url": null, "content": "Сколькими способами, используя 20 цветов, можно закрасить:\n\n    1) Вершины p-угольника, где p - простое, если цвета вершин могут повторяться?\n    2) Грани тетраэдра, если цвета граней могут повторяться?"}]}, {"id": "courses/mathematics/probability/[03] 25-10-21 (2) Правило суммы и произведения 102", "name": "[03] 25-10-21 (2) Правило суммы и произведения 102", "problems": [{"index": 0, "url": null, "content": "На книжной полке стоят \\(n\\) книг. Сколькими способами можно выбрать из них \\(p\\) книг так, чтобы между любыми двумя выбранными книгами, ровно как и после \\(p\\)-ой выбранной книги, было не менее \\(s\\) книг?"}, {"index": 1, "url": null, "content": "Сколькими способами можно поставить в ряд 3 англичан, 3 немцев и 3 русских, чтобы никакие 3 соотечественника не стояли рядом?"}, {"index": 2, "url": null, "content": "Докажите, что \\(r\\) различных вещей можно разделить между \\(n + p\\) людьми так, чтобы данные \\(n\\) получили по крайней мере по одному предмету\n\n\\((n + p)^r - C_n^1(n + p - 1)^r + C_n^2(n + p - 2)^r - ... + (-1)^n p^r\\)\n\nспособами."}, {"index": 3, "url": null, "content": "Найти количество способов поставить в ряд \\(m\\) французов и \\(n\\) англичан таким образом, чтобы рядом с каждым человеком стоял хотя бы один его соотечественник."}, {"index": 4, "url": null, "content": "На координатной плоскости дан параллелограмм с вершинами в точках \\(O(0; 0)\\), \\(P(-14; 42)\\), \\(Q(6; 42)\\) и \\(R(20; 0)\\). Найдите количество пар точек \\(A(x_1; y_1)\\) и \\(B(x_2; y_2)\\) с целыми координатами, лежащих в этом параллелограмме (возможно, на границе) и таких, что \\(3x_2 - 3x_1 + y_2 - y_1 = 33\\)."}, {"index": 5, "url": null, "content": "На одной прямой взяты \\(n\\) точек, а на параллельной ей прямой - \\(m\\) точек. Эти точки соединяются прямыми. Доказать, что количество точек пересечения проведенных прямых не превосходит \\(\\frac{mn(m-1)(n-1)}{4}\\)."}, {"index": 6, "url": null, "content": "Даны \\(n\\) точек плоскости, никакие 3 из которых не лежат на одной прямой и никакие 4 - на одной окружности. Через каждую пару этих точек проводится прямая, а через каждые 3 окружность. Найти наибольшее число точек пересечения всех проведенных прямых со всеми окружностями."}, {"index": 7, "url": null, "content": "Дан квадрат, стороны которого равны 500. Его стороны разбиты отмеченными точками на отрезки длины 2 (вершины исходного квадрата тоже отмечены). Найдите количество четверок из отмеченных точек, являющихся вершинами прямоугольника."}, {"index": 8, "url": null, "content": "На координатной плоскости отметили все точки у которых координаты по \\(x\\) и координаты по \\(y\\) не превосходят 10. Найдите количество пар перпендикулярных отрезков, которые наклонены к осям \\(OX\\) и \\(OY\\) под углом \\(45^\\circ\\) (угол между отрезками равен углу между прямыми на которых лежат эти отрезки)."}, {"index": 9, "url": null, "content": "В многочлене \\((x+y)^{10}(y+z)^{10}(z+x)^{10}\\) найдите коэффициент перед слагаемым \\(x^{10}y^{10}z^{10}\\)."}, {"index": 10, "url": null, "content": "Найдите коэффициент при \\(x^k\\) в разложении \\((1 + x + x^2 + ... + x^{n-1})^2\\)"}, {"index": 11, "url": null, "content": "Будем говорить, что 2 числа, входящие в размещение, образуют инверсию, если большее из них написано ранее, чем меньшее. Сколько инверсий во всех перестановках чисел \\(1, 2, 3, ..., n\\)?"}]}, {"id": "courses/mathematics/probability/[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "name": "[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "problems": [{"index": 0, "url": null, "content": "Найдите сумму натуральных чисел от 1 до 3000 включительно, имеющих с числом 3000 общие делители, большие 1."}, {"index": 1, "url": null, "content": "(\\*) Найдите количество троек натуральных чисел (a; b; c), удовлетворяющих системе уравнений \n\\[\n    \\begin{cases} \n    \\gcd(a;\\, b;\\, c) = 6, \\\\ \n    \\operatorname{lcm}(a;\\, b;\\, c) = 2^{15} \\cdot 3^{16} \n    \\end{cases}\n\\]"}, {"index": 2, "url": null, "content": "Найдите количество восьмизначных чисел, произведение цифр каждого из которых равно 3375. Ответ необходимо представить в виде целого числа."}, {"index": 3, "url": null, "content": "Сколько существует натуральных n меньших 10000 таких, что \\(2^n - n^2\\) делится на 7?"}, {"index": 4, "url": null, "content": "Сколько существует пар натуральных чисел (x; y) меньших 10000 таких, что \\(x^2 + y^2\\) делится на 49?"}, {"index": 5, "url": null, "content": "Найдите натуральное число вида \\(n = 2^x 3^y 5^z\\), зная, что половина его имеет на 30 делителей меньше, треть – на 35 и пятая часть – на 42 делителя меньше, чем само число."}, {"index": 6, "url": null, "content": "Есть 207 различных карточек с числами 1, 2, 3, \\(2^2\\), \\(3^2\\),...,\\(2^{103}\\), \\(3^{103}\\) (на каждой карточке написано ровно одно число, каждое встречается ровно один раз). Сколькими способами можно выбрать 3 карточки, чтобы произведение чисел выбранных карточек было квадратом целого числа, делящегося на 6?"}, {"index": 7, "url": null, "content": "Доказать, что если s — число всех делителей натурального числа n, то произведение всех делителей равно \\(\\sqrt{n^s}\\)."}, {"index": 8, "url": null, "content": "Найдите количество пар целых чисел (a, b) таких, что \\(1 \\leq a \\leq 700\\), \\(1 \\leq b \\leq 700\\), сумма a + b делится на 7, а произведение ab делится на 5. (При \\(a \\neq b\\) пары (a, b) и (b, a) считаются различными.)"}, {"index": 9, "url": null, "content": "Найдите количество натуральных чисел k, не превосходящих 291000 и таких, что \\(k^2 - 1\\) делится нацело на 291."}, {"index": 10, "url": null, "content": "В числе 2*0*1*6*0*2* нужно заменить каждую из 6 звёздочек на любую из цифр 0, 1, 2, 3, 4, 5, 6, 7, 8 (цифры могут повторяться) так, чтобы полученное 12-значное число делилось на 45. Сколькими способами это можно сделать?"}, {"index": 11, "url": null, "content": "Найдите количество решений уравнения:\n\n    1) \\(x^2 + xy = 300000\\) в целых числах\n    2) \\(5x^2 - 6xy + y^2 = 6^{1000}\\) в целых числах\n    3) \\(3^x + 7y = 3^{2016}\\) в натуральных числах"}, {"index": 12, "url": null, "content": "Найдите количество решений уравнения \\(x_1 + x_2 + ... + x_n = m\\) (решения, отличающиеся порядком, считаются различными) В целых числах таких, что \\(x_i \\geq -i\\)"}, {"index": 13, "url": null, "content": "Митя сложил все нечётные натуральные делители некоторого чётного числа N (включая единицу), а Ваня сложил все чётные натуральные делители числа N (включая само число). Затем Ванину сумму умножили на Митину. Может ли произведение быть квадратом натурального числа?"}, {"index": 14, "url": null, "content": "Петя выписал одно за другим 2019 чисел вида \\(\\frac{1 \\cdot 2}{2}\\), \\(\\frac{2 \\cdot 3}{2}\\), ..., \\(\\frac{2018 \\cdot 2019}{2}\\) и вычислил их. Сколько из получившихся чисел имеют в десятичной записи последнюю цифру 8?\n\n\n↑ Перебор остатков"}]}, {"id": "courses/mathematics/probability/[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "name": "[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "problems": [{"index": 0, "url": null, "content": "Сколько шестизначных чисел содержит ровно 3 различные цифры?"}, {"index": 1, "url": null, "content": "Сколько существует троек целых чисел (a; b; c) таких, что они образуют в указанном порядке геометрическую прогрессию, а их произведение равно \\(2^{150} 3^{150}\\)?"}, {"index": 2, "url": null, "content": "Найдите количество семизначных чисел, обладающих следующим свойством: сумма остатков от деления этих чисел на три последовательные степени числа десять равна 12345."}, {"index": 3, "url": null, "content": "Дано число: 5300...0035 (100 нулей). Требуется заменить некоторые два нуля на ненулевые цифры так, чтобы после замены получилось число, делящееся на 495. Сколькими способами это можно сделать?"}, {"index": 4, "url": null, "content": "Докажите, что число \\((n^2)!/(n!)^{n+1}\\) является целым для натуральных значений n."}, {"index": 5, "url": null, "content": "Найдите количество треугольников с целочисленными сторонами и периметром 12n."}, {"index": 6, "url": null, "content": "Найдите количество способов, которыми два человека могут разделить 2n предметов одного сорта, 2n предметов второго сорта и 2n предметов третьего сорта так, чтобы каждый получил 3n предметов."}, {"index": 7, "url": null, "content": "Сколько имеется чисел от 1 до 999999999, у которых сумма цифр равна 11?"}, {"index": 8, "url": null, "content": "Сколько цифр каждого вида потребуется для записи всех натуральных чисел от 1 до \\(10^n - 1\\)?"}, {"index": 9, "url": null, "content": "Доказать, что число треугольников с целочисленными сторонами и периметром \\(4n + 3\\) на \\(n + 1\\) больше числа треугольников с целочисленными сторонами и периметром \\(4n\\)."}, {"index": 10, "url": null, "content": "Найти количество треугольников с целочисленными сторонами, длина сторон которых не больше 2n."}, {"index": 11, "url": null, "content": "Найдите количество способов выбрать из n отрезков длины 1, 2, 3, ..., n (каждый отрезок можно взять более 1-го раза) 4 штуки так, чтобы получился описанный четырехугольник."}]}, {"id": "courses/mathematics/probability/[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "name": "[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "problems": [{"index": 0, "url": null, "content": "Первоклассница Маша, заходя в школу, каждый раз поднимается на школьное крыльцо\nпо лестнице, имеющей 10 ступенек. Находясь внизу лестницы или на очередной её ступеньке, она может либо подняться на следующую ступеньку, либо перепрыгнуть через\nодну ступеньку вверх. Какое минимальное количество раз Маше нужно зайти в школу,\nчтобы подняться на крыльцо всеми возможными способами?"}, {"index": 1, "url": null, "content": "Четырнадцать шаров и четырнадцать урн нумеруются от числами от 1 до 14. Шары\nкладутся в урны так, чтобы в каждой урне оказался ровно один шар. Шар можно положить в урну, если его номер совпадает с номером урны или отличается от него на единицу.\nСколькими способами можно разложить шары по урнам?"}, {"index": 2, "url": null, "content": "Сколько понадобится перекладываний в головоломке ханойская башня, если прямое перемещение диска с 1-го колышка на 3-й и с 3-го на 1-й запрещено (каждое перекладывание\nдолжно производиться через 2-й колышек)? А если добавить дополнительное требование:\nпервый (самый маленький) диск нельзя класть на 2-й колышек?"}, {"index": 3, "url": null, "content": "Сколько имеется разбиений отрезка длины 8 на отрезки длины 1, 2 и 3? (Разбиения,\nотличающиеся порядком следования отрезков, считаются различными.)"}, {"index": 4, "url": null, "content": "Найдите количество натуральных чисел от 0 до 99999 не содержащее двух подряд\nидущих цифр 7 в своей записи?"}, {"index": 5, "url": null, "content": "Петя выписывает все возможные 2018-буквенные слова, состоящие только из букв а, б,\nв. В скольких из них а встречается четное количество раз?\n\n↑ ПОЛУЧИТЬ ОТВЕТ В ЯВНОМ ВИДЕ"}, {"index": 6, "url": null, "content": "Рассмотрим алфавит из 2 букв. Словом будем считать любое конечное сочетание букв.\nНазовем слово непроизносимым, если в нем встречается больше 2 одинаковых букв подряд.\nСколько всего существует непроизносимых слов из 7 букв?"}, {"index": 7, "url": null, "content": "В алфавите жителей сказочной планеты АБ2020 всего две буквы: буква А и буква Б.\nВсе слова начинаются на букву А и заканчиваются тоже на букву А. В любом слове буква\nА не может соседствовать с другой буквой А. Также не может идти подряд больше, чем\n2 буквы Б. Сколько 20-буквенных слов в словаре этой планеты?"}, {"index": 8, "url": null, "content": "n человек выстраиваются по кругу и нумеруются числами от 1 до n. Затем из них\nисключается каждый второй до тех пор, пока не останется только один человек. Например,\nесли n = 10, то порядок исключения таков: 2, 4, 6, 8, 10, 3, 7, 1, 9, так что остается номер"}, {"index": 9, "url": null, "content": "Для данного n будем обозначать через J(n) номер последнего оставшегося человека.\nДокажите, что J(2n) = 2J(n) - 1 и J(2n + 1) = 2J(n) + 1."}, {"index": 10, "url": null, "content": "Пусть \\(a_n\\) - количество перестановок \\((k_1, k_2, ..., k_n)\\) чисел \\((1, 2, \\ldots, n)\\) таких, что выполнены два условия: \\(k_1 = 1\\); для любого номера \\(i = 1, 2, \\ldots, n - 1\\) выполнено неравенство\n\\(|k_i - k_{i+1}| \\leq 2\\). Каково число \\(a_{10}\\)?"}, {"index": 11, "url": null, "content": "Лягушка прыгает по вершинам шестиугольника ABCDEF, каждый раз перемещаясь\nв одну из соседних вершин. а) Сколькими способами она может попасть из A в C за n\nпрыжков? б) Тот же вопрос, но при условии, что ей нельзя прыгать в D?\n\n↑ ПОМНИМ ПРО СИММЕТРИИ"}]}, {"id": "courses/mathematics/probability/[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "name": "[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "problems": [{"index": 0, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций aaa, bbb, ccc."}, {"index": 1, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций ab, ca."}, {"index": 2, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c, начинаются и заканчиваются на букву b и при этом между любыми двумя буквами b находится четное количество букв a."}, {"index": 3, "url": null, "content": "Пусть \\(E_n\\) - это количество способов расставить числа от 1 до n таким образом, чтобы в образовавшемся ряду ровно один раз следующее число было больше предыдущего (например, в расстановке 4312 ровно одно число больше предыдущего). Докажите, что выполняется равенство \\(E_{n+1} = 2E_n + n\\) для любого натурального n."}, {"index": 4, "url": null, "content": "Найдите количество способов разбить прямоугольник размером \\(2 \\times 12\\) на прямоугольники из двух клеточек и уголки, которые состоят из трех клеток."}, {"index": 5, "url": null, "content": "В каждой клетке доски \\(n \\times n\\) написали её координаты (в левой нижней клетке (1;1),\nв следующей клетке этой строки (2;1) и так далее: первая координата - номер строки,\nвторая - номер столбца). После этого из таблицы удалили все клетки у которых сумма\nкоординат больше \\(n+1\\). Найдите количество способов поставить в оставшуюся часть доски\n2 одинаковые ладьи таким образом, чтобы они не били друг друга."}, {"index": 6, "url": null, "content": "Докажите формулу: \\(S(m, n) = \\sum_{k=n-1}^{m-1} C_{m-1}^k \\cdot S(k, n-1)\\), если \\(S(n, k)\\) - число Стирлинга второго рода."}, {"index": 7, "url": null, "content": "Докажите, что \\(\\sum_{k=0}^{n} c(n, k) \\cdot x^k = x(x+1)(x+2)...(x+n-1)\\), где \\(c(n, k)\\) - число Стирлинга первого рода без знака."}, {"index": 8, "url": null, "content": "Докажите, что количество способов соединения 2n точек на окружности n непересекающимися хордами равно \\(C_n\\) (число Каталана)."}, {"index": 9, "url": null, "content": "Докажите, что количество различных бинарных деревьев (узнайте определение), которые содержат \\(2n+1\\) вершину равно \\(C_n\\) (число Каталана). Попробуйте установить явную биекцию между деревьями и правильными скобочными структурами."}, {"index": 10, "url": null, "content": "Сколько существует способов организовать подсчет голосов на выборах с участием двух кандидатов, в которых первый набрал 12 голосов, а второй набрал 8, чтобы первый кандидат опережал второго в течение всего времени подсчета голосов?\n\n↑ ОТРАЖЕНИЕ ПУТИ"}, {"index": 11, "url": null, "content": "Имеются 12 карандашей попарно различной длины. Сколькими способами можно уложить их в коробку в два слоя по шесть карандашей так, чтобы в каждом слое карандаши были упорядочены по возрастанию длины (слева направо), а каждый карандаш верхнего слоя лежал строго над карандашом нижнего слоя и был короче его?\n\n↑ ЧИСЛА КАТАЛАНА"}]}, {"id": "courses/mathematics/probability/[10] 25-11-04 (4) Теория вероятностей 101", "name": "[10] 25-11-04 (4) Теория вероятностей 101", "problems": [{"index": 0, "url": null, "content": "Петя бросает несколько раз на стол игральный кубик и считает сумму очков, выпавших\nна его верхней грани. Для любого натурального числа n событие \\(A_n\\) наступает, если эта\nсумма равна n. Найти вероятность события \\(A_{11}\\)."}, {"index": 1, "url": null, "content": "Через случайно выбранные три вершины куба с ребром 2 проводится плоскость. Найти вероятность того, что площадь сечения превзойдёт 5. Допускается, что эти вершины принадлежат одной грани куба."}, {"index": 2, "url": null, "content": "\\* В квадрате ABCD со стороной 4 расположена точка O, отстоящая от сторон AD и CD\nна расстояние 1. Через точку O совершенно случайно проведена прямая L, разделяющая\nквадрат на две части. Найти вероятность того, что одна из частей будет иметь площадь,\nне превосходящую 3."}, {"index": 3, "url": null, "content": "\\* Точки P, Q расположены на сторонах AB и AC треугольника ABC так, что AP : PB =\n2 : 1, AQ : QC = 1 : 3. Точка M выбрана на стороне BC совершенно случайно. Найти\nвероятность того, что площадь треугольника ABC превосходит площадь треугольника\nPQM не более, чем в три раза. Найти математическое ожидание случайной величины –\nотношения площадей треугольников PQM и ABC."}, {"index": 4, "url": null, "content": "В колоде 10 карт, на каждой из них нарисовано одно из чисел от 1 до 10. Случайно\nвыбранную из колоды карту кладут на стол, показывают всем написанное на ней число\nи возвращают её в колоду. После этого колода тщательно перемешивается и готова к\nпродолжению игры. Петя выкладывал на стол карту три раза. Какова вероятность того,\nчто сумма выпавших чисел оказалась равной 5?\n\nПОМНИМ ПРО ГЕОМЕТРИЧЕСКУЮ ВЕР-СТЬ"}, {"index": 5, "url": null, "content": "Два игрока подбрасывают монету. Один считает выпавшие орлы, другой решки. Выигрывает тот, кто первым наберет 20 очков. Сейчас счет 19:17 в пользу первого игрока.\nКакова вероятность того, что он выиграет? (Ответ запишите в виде несократимой дроби)"}, {"index": 6, "url": null, "content": "В одной урне лежат 4 зеленых и 6 красных шариков, а в другой - 16 зеленых и N\nкрасных. Из каждой урны наугад вытаскивают по одному шарику. Вероятность того, что\nшарики окажутся одного цвета, равна 0,58. Найдите N."}, {"index": 7, "url": null, "content": "Из набора {1, 2, 3, ..., 10} наугад выбираются два различных числа. Найдите вероятность\nтого, что их произведение чётно. Если необходимо, округлите ответ с точностью до 0,01."}, {"index": 8, "url": null, "content": "На гранях игрального кубика написаны числа от 1 до 6. Однако вес кубика распределён\nнеравномерно и вероятность выпадения числа k прямо пропорциональна k. Кубик бросают\nдва раза подряд. Какова вероятность того, что сумма двух выпавших чисел будет равняться 7?\nЕсли необходимо, округлите ответ до 0,01."}, {"index": 9, "url": null, "content": "Монета искривлена так, что вероятность выпадения ровно 3-х орлов в серии из 5-ти бросков равна вероятности выпадения ровно 2-х орлов в серии из 4-х бросков. Найдите\nвероятность того, что в серии из 6-ти бросков выпадет не менее 3-х орлов. Если необходимо,\nответ округлите до сотых."}, {"index": 10, "url": null, "content": "На детском новогоднем празднике раздавали шоколадные и фруктовые конфеты. Дети\nподходили к деду Морозу, залезали рукой в его мешок и вынимали из него по две конфеты. Когда Петя подошел к мешку, он понял, что шоколадных конфет в мешке почти не\nосталось и вероятность получить две шоколадные конфеты в три раза меньше, чем шоколадную и фруктовую. Какое наименьшее число шоколадных конфет могло находиться в\nмешке деда Мороза в момент, когда Петя забирал свои конфеты, если после него ещё не\nменее 10 детей получили свои конфеты до того, как мешок опустел?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/junior/01 Seven-Digit Distinct Digits", "name": "01 Seven-Digit Distinct Digits", "problems": [{"index": 0, "url": null, "content": "Вася наугад написал на доске семизначное число. Какова вероятность того, что в нём все цифры различны? Ответ запишите в виде десятичной дроби."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/junior/02 Painted Cube Faces", "name": "02 Painted Cube Faces", "problems": [{"index": 0, "url": null, "content": "Куб со стороной 10 см окрасили по поверхности, разделили на \\(10^3\\) кубиков со стороной 1 см, перемешали кубики, наугад выбрали один. Какова вероятность того, что у этого кубика ровно одна окрашенная грань?"}, {"index": 1, "url": null, "content": "Какова вероятность того, что у этого кубика хотя бы две окрашенные грани?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/junior/03 Deck Kings And Fives", "name": "03 Deck Kings And Fives", "problems": [{"index": 0, "url": null, "content": "Перед нами колода из 36 карт. Какова вероятность того, что среди вытянутых наугад 6 карт найдутся не менее трёх королей и ровно две пятерки? В качестве ответа укажите одно вещественное число, округлённое до четырёх знаков после запятой: значение вероятности, умноженное на \\(10^3\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/junior/04 Banach Matchbox Problem", "name": "04 Banach Matchbox Problem", "problems": [{"index": 0, "url": null, "content": "Польский математик Стефан Банах имел привычку носить в каждом из двух карманов пальто по коробку спичек. Всякий раз, когда ему хотелось закурить трубку, он выбирал наугад один из коробков и доставал из него спичку. Первоначально в каждом коробке было по \\(n\\) спичек. Но когда-то наступает момент, когда выбранный наугад коробок оказывается пустым. Какова вероятность того, что в другом коробке в этот момент осталось ровно \\(k\\) спичек?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/middle/05 Three Cities Connectivity", "name": "05 Three Cities Connectivity", "problems": [{"index": 0, "url": null, "content": "В стране 3 города, каждый город соединён с каждым дорогой. Дорога может быть разрушена с вероятностью \\(1/2\\). Найдите вероятность того, что в стране из любого города можно добраться до любого другого города."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/middle/06 Sticks Broken Paired", "name": "06 Sticks Broken Paired", "problems": [{"index": 0, "url": null, "content": "Имеются \\(n\\) различных палочек. Каждая из них разламывается на две неодинаковые части — короткую и длинную. Получившиеся \\(2n\\) обломков перемешивают и наугад склеивают попарно в новые \\(n\\) палочек. Найти вероятность того, что каждая из новых палочек склеена из длинного и короткого обломка."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/middle/07 Matrix Finite Field Singular", "name": "07 Matrix Finite Field Singular", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(n \\times n\\) со случайными значениями из конечного поля \\(\\mathbb{F}_q\\). Найти вероятность того, что матрица будет вырождена."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/senior/08 Permutation Cycle Probability", "name": "08 Permutation Cycle Probability", "problems": [{"index": 0, "url": null, "content": "Рассмотрим случайную перестановку на \\(n\\) элементах. Докажите, что данные \\(k\\) элементов окажутся в одном цикле с вероятностью \\(1/k\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/senior/09 Round Table Mixed Pairs", "name": "09 Round Table Mixed Pairs", "problems": [{"index": 0, "url": null, "content": "Имеется \\(n\\) женщин и \\(n\\) мужчин, их случайно рассаживают за круглый обеденный стол. Какова вероятность, что в полученной рассадке гостей можно разбить на непересекающиеся пары так, что в каждой паре есть и мужчина и женщина?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[01] Классика/senior/10 Black Cube White Faces", "name": "10 Black Cube White Faces", "problems": [{"index": 0, "url": null, "content": "Чёрный куб покрасили снаружи белой краской, затем разрезали на 27 одинаковых маленьких кубиков и как попало сложили из них большой куб. С какой вероятностью все грани этого куба будут белыми?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/11 Точки на окружности дуга", "name": "11 Точки на окружности дуга", "problems": [{"index": 0, "url": null, "content": "n точек бросили на окружность единичной длины. Найдите вероятность того, что все точки принадлежат дуге длины x."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/12 Кости условная вероятность", "name": "12 Кости условная вероятность", "problems": [{"index": 0, "url": null, "content": "Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях (различные числа выпадают с равной вероятностью). Найдите вероятность того, что хотя бы на одной из них выпало 7, если сумма выпавших значений не превосходит 20."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/13 Независимость событий дополнения", "name": "13 Независимость событий дополнения", "problems": [{"index": 0, "url": null, "content": "Доказать, что если события A и B независимы, то также независимы события A и \\(\\overline{B}\\)."}, {"index": 1, "url": null, "content": "Доказать, что если события A и B независимы, то также независимы события \\(\\overline{A}\\) и \\(\\overline{B}\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/15 Муравьи многогранники встреча ребре", "name": "15 Муравьи многогранники встреча ребре", "problems": [{"index": 0, "url": null, "content": "В вершинах треугольника сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 1, "url": null, "content": "В вершинах четырёхугольника с диагоналями сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 2, "url": null, "content": "В вершинах куба сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 3, "url": null, "content": "В вершинах октаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 4, "url": null, "content": "В вершинах додекаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}, {"index": 5, "url": null, "content": "В вершинах икосаэдра сидят муравьи (по одному в каждой вершине). В некоторый момент они начинают ползти по рёбрам в одну из соседних вершин. Найдите вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/16 Независимые события оценка суммы", "name": "16 Независимые события оценка суммы", "problems": [{"index": 0, "url": null, "content": "Независимые в совокупности события \\(A_1, A_2, \\ldots, A_n\\) имеют вероятности \\(p_1, p_2, \\ldots, p_n\\) соответственно. Докажите, что \\(1 - e^{-(p_1+p_2+\\ldots+p_n)} < P(A_1 + A_2 + \\ldots + A_n) < p_1 + p_2 + \\ldots + p_n\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/17 День рождения позиция очереди", "name": "17 День рождения позиция очереди", "problems": [{"index": 0, "url": null, "content": "В кинотеатре менеджер объявляет, что подарит бесплатный билет первому человеку в очереди, чей день рождения совпадает с днём рождения кого-либо из уже купивших билет. Вам предоставляется возможность выбрать любую позицию в очереди. Предполагая, что вы не знаете чьих-либо дней рождения и все дни рождения распределены равновероятно в течение года (365 дней), найдите позицию в очереди, которая даёт наибольшие шансы получить бесплатный билет."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/21 Порядковая статистика k-е число", "name": "21 Порядковая статистика k-е число", "problems": [{"index": 0, "url": null, "content": "Из чисел от 1 до 100 случайно выбирается n чисел. Найдите вероятность того, что k-ое по величине число равно x."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/22 Три числа среднее без возврата", "name": "22 Три числа среднее без возврата", "problems": [{"index": 0, "url": null, "content": "Из чисел от 1 до 100 последовательно, без возвращения выбирается три числа. Найдите вероятность того, что третье выбранное число будет заключено между первыми двумя."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/junior/23 Три стрелка пробоины мишень", "name": "23 Три стрелка пробоины мишень", "problems": [{"index": 0, "url": null, "content": "Три стрелка, попадающие в цель независимо друг от друга с вероятностями 0,5, 0,4 и 0,3 соответственно, выстрелили по мишени одновременно. Найдите вероятность того, что в мишени не образовалось ни одной пробоины (событие \\(X_0\\))."}, {"index": 1, "url": null, "content": "Найдите вероятность того, что в мишени образовалась одна пробоина (событие \\(X_1\\))."}, {"index": 2, "url": null, "content": "Найдите вероятность того, что в мишени образовалось две пробоины (событие \\(X_2\\))."}, {"index": 3, "url": null, "content": "Найдите вероятность того, что в мишени образовалось три пробоины (событие \\(X_3\\))."}, {"index": 4, "url": null, "content": "Найдите вероятность того, что в мишени образовалась хотя бы одна пробоина (событие Y)."}, {"index": 5, "url": null, "content": "Найдите вероятность того, что в мишени образовалось не менее двух пробоин (событие Z)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/14 Кубик треугольник три числа", "name": "14 Кубик треугольник три числа", "problems": [{"index": 0, "url": null, "content": "Игральный кубик подбросили 3 раза. Найдите вероятность того, что полученные три числа могут быть длинами сторон некоторого треугольника."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/18 Монета орлы подряд рекуррентность", "name": "18 Монета орлы подряд рекуррентность", "problems": [{"index": 0, "url": null, "content": "Монету подбросили 10 раз. Найдите вероятность того, что в последовательности результатов этого опыта не будет двух последовательных орлов."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/19 Теннисный турнир победа схема", "name": "19 Теннисный турнир победа схема", "problems": [{"index": 0, "url": null, "content": "Три теннисиста (А, В и С) играют в турнире по следующей схеме. Сначала А играет с В, а во всех следующих партиях победитель последней партии встречается с участником, не игравшим в этой партии. Победителем турнира считается тот, кто выигрывает две партии подряд. Найдите вероятность победы для каждого участника."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/20 Подмножества пересечение пустое", "name": "20 Подмножества пересечение пустое", "problems": [{"index": 0, "url": null, "content": "Дано множество \\(A = \\{1, \\ldots, n\\}\\). Среди всех его подмножеств равновероятно выбираются k подмножеств. Найдите вероятность того, что \\(A_1 \\cap A_2 \\cap \\ldots \\cap A_k = \\emptyset\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/24 Парадокс Кондорсе маршруты выбор", "name": "24 Парадокс Кондорсе маршруты выбор", "problems": [{"index": 0, "url": null, "content": "Джордж, Гаррис и Джей выбирают один из трёх маршрутов своего будущего путешествия. Каждый упорядочивает маршруты по своему предпочтению. Они договорились считать вариант a лучше варианта b, если a предпочтительнее b по мнению большинства. Найдите вероятность того, что найдётся маршрут, который в глазах путешественников лучше двух других, если их предпочтения равновероятны и независимы."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/middle/25 Автомобиль интервал вероятность шоссе", "name": "25 Автомобиль интервал вероятность шоссе", "problems": [{"index": 0, "url": null, "content": "Вероятность наблюдения хотя бы одного автомобиля на шоссе в течение любого 20-минутного интервала времени равна 609/625. Найдите вероятность наблюдения хотя бы одного автомобиля в течение любого 5-минутного интервала времени. Предположите, что вероятность увидеть автомобиль в любой момент одинакова (постоянна) в течение всех 20 минут."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[02] Арифметика событий/senior/26 Многогранники кости симуляция", "name": "26 Многогранники кости симуляция", "problems": [{"index": 0, "url": null, "content": "У вас имеется неограниченное число костей в форме всех возможных правильных многогранников. Определите, можно ли, однократно бросив некоторый набор таких костей, симулировать бросок правильной семигранной кости."}, {"index": 1, "url": null, "content": "Определите, можно ли, однократно бросив некоторый набор таких костей, симулировать бросок правильной 15-гранной кости."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/27 Студенты группы экзамен Байес", "name": "27 Студенты группы экзамен Байес", "problems": [{"index": 0, "url": null, "content": "Один и тот же предмет в университете изучают студенты трёх групп: в первой 25 человек, а во второй и третьей по 20. Вероятность, что случайный студент первой группы сдаст экзамен 75%. Во второй группе эта вероятность равна 70%, а в третьей — 90%. Известно, что Вася сдал экзамен. Найдите вероятности того, что Вася учится в первой, второй или третьей группе соответственно."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/28 Монета нечестная орёл Байес", "name": "28 Монета нечестная орёл Байес", "problems": [{"index": 0, "url": null, "content": "Вам дается 1000 монет. Среди них 1 монета с орлами с обеих сторон. Остальные 999 монет — честные. Вы случайным образом выбираете монету и подбрасываете её 10 раз. Каждый раз монета выпадает орлом. Какова вероятность того, что выбранная вами монета окажется нечестной?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/29 Шары коробки красный Байес", "name": "29 Шары коробки красный Байес", "problems": [{"index": 0, "url": null, "content": "Имеется две коробки. В первой находится 4 синих шара и 5 красных, а во второй — 1 синий и 5 красных. Случайно равновероятно выбирается коробка, и из неё случайно равновероятно выбирается шар. Найдите вероятность того, что была выбрана первая коробка, при условии, что шар оказался красным."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/30 Кости восьмигранные условная семёрка", "name": "30 Кости восьмигранные условная семёрка", "problems": [{"index": 0, "url": null, "content": "Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях (различные числа выпадают с равной вероятностью). Какова вероятность того, что хотя бы на одной из них выпало 7, если сумма выпавших значений не превосходит 20?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/31 Ноутбуки заводы брак Байес", "name": "31 Ноутбуки заводы брак Байес", "problems": [{"index": 0, "url": null, "content": "На складе лежат ноутбуки \"Плутон\". Их производят по одному и тому же чертежу два завода: Завод красного знамени \"Поломка\" и Радиотехнический завод им. Криворучкина. На складе изделия этих заводов представлены в отношении 4:3. Известно, что 1 из 1000 ноутбуков производства ЗКЗ \"Поломка\" бракован, а у РЗ им. Криворучкина бракован только 1 из 1500 ноутбуков. Один из случайно выбранных ноутбуков на складе оказался сломан. Какова вероятность, что он был произведен на ЗКЗ \"Поломка\"?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/32 Книги цитаты условная вторая", "name": "32 Книги цитаты условная вторая", "problems": [{"index": 0, "url": null, "content": "Маша нашла n+1 новую книгу с цитатами, в каждой книге n цитат. Всего в книгах \\(\\frac{n(n+1)}{2}\\) цитат, которые понравятся Маше. Цитаты распределены по правилу: есть одна книга без подходящих цитат, одна книга с ровно двумя хорошими цитатами, ..., одна книга, где все цитаты хорошие. Маша наугад выбрала книгу и прочитала случайную цитату — та ей понравилась. Затем Маша случайно выбрала ещё одну цитату из той же книги. Найдите вероятность того, что и вторая цитата ей понравится."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/33 Маша спорт пятница условная", "name": "33 Маша спорт пятница условная", "problems": [{"index": 0, "url": null, "content": "Маша каждый день после работы собирается пойти на спорт. Известно, что она так и не сходит на спорт на неделе с вероятностью 1/3, а с вероятностью 2/3 сходит, но только в один из будних дней, причём в любой из них с равной вероятностью. В пятницу утром Аня заметила, что Маша так и не сходила на спорт на этой неделе. Найдите вероятность того, что в пятницу она всё-таки сходит на спорт."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/34 Урны шары перекладывание Байес", "name": "34 Урны шары перекладывание Байес", "problems": [{"index": 0, "url": null, "content": "В каждой из урн содержится 2 чёрных и 8 белых шаров. Из первой урны наудачу извлечён 1 шар и переложен во вторую урну, после чего из второй урны извлечён шар. Найдите вероятность того, что шар, извлечённый из второй урны, окажется белым."}, {"index": 1, "url": null, "content": "Если извлечённый из второй урны шар оказался белым, найдите вероятность того, что из первой урны был переложен белый шар."}, {"index": 2, "url": null, "content": "Если извлечённый из второй урны шар оказался белым, найдите вероятность того, что из первой урны был переложен чёрный шар."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/35 Пять урн белый условная Байес", "name": "35 Пять урн белый условная Байес", "problems": [{"index": 0, "url": null, "content": "Имеется пять урн. В 1-й, 2-й и 3-й урнах находится по 2 белых и 3 чёрных шара; в 4-й и 5-й урнах — по 1 белому и 1 чёрному шару. Случайно выбирается урна и из неё извлекается шар. Найдите условную вероятность того, что выбрана 4-я или 5-я урна, если извлечённый шар оказался белым."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/36 Шары цвета условная последовательность", "name": "36 Шары цвета условная последовательность", "problems": [{"index": 0, "url": null, "content": "В мешке лежат шары трёх цветов: 6 красных, 2 чёрных, 2 белых. Последовательно вытаскивается 5 шаров. Найдите вероятность того, что первые два шара были чёрными, при условии, что четвёртый и пятый оказались красным и белым соответственно."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/37 Коробки шары перекладывание Байес", "name": "37 Коробки шары перекладывание Байес", "problems": [{"index": 0, "url": null, "content": "В первой коробке лежит 4 чёрных шара и 3 белых. Во второй коробке лежит 5 чёрных и 4 белых шара. Из первой коробки наугад выбирается один шар и перекладывается во вторую, после чего из второй коробки достаётся произвольный шар. Если известно, что он оказался чёрным, найдите вероятность того, что из первой во вторую коробку переложили белый шар."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/38 Урна белый шар три игрока", "name": "38 Урна белый шар три игрока", "problems": [{"index": 0, "url": null, "content": "Из урны, содержащей a белых и b чёрных шаров, три игрока извлекают шары по очереди. Выигрывает тот, кому раньше попадается белый шар. Найдите вероятности \\(p_1, p_2, p_3\\) выигрыша 1-го, 2-го, 3-го игроков при извлечении по схеме равновероятного выбора с возвращением."}, {"index": 1, "url": null, "content": "Найдите вероятности \\(p_1, p_2, p_3\\) выигрыша 1-го, 2-го, 3-го игроков при извлечении по схеме равновероятного выбора без возвращения."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/39 Кости сумма семь очередь", "name": "39 Кости сумма семь очередь", "problems": [{"index": 0, "url": null, "content": "Игроки А, В и С сменяя друг друга, по очереди кидают две игральные кости до тех пор, пока не получат сумму очков, равную 7. Найдите вероятность того, что сумму очков, равную 7, получит В."}, {"index": 1, "url": null, "content": "В результате проведения эксперимента возможны два исхода: успех (с вероятностью p) и неуспех (с вероятностью 1−p). Экспериментаторы А, В и С сменяя друг друга, по очереди проводят этот эксперимент до тех пор, пока не получат успех. Найдите максимальное значение вероятности p, при котором вероятность того, что успех получит В, больше либо равна 1/3."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/40 Паутина мошка паук вернуться", "name": "40 Паутина мошка паук вернуться", "problems": [{"index": 0, "url": null, "content": "По паутине, имеющей вид правильного шестиугольника, разбитого на правильные треугольники, двигается мошка. В середине паутины (точка О) сидит паук. На каждой развилке нитей паутины мошка выбирает маршрут случайным образом, в частности, может повернуть назад. Если мошка попадает в точку О, то паук её съедает. Найдите вероятность того, что, начав прогулку по паутине в вершине шестиугольника, мошка в неё вернётся."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/41 Дротики третий дальше первого", "name": "41 Дротики третий дальше первого", "problems": [{"index": 0, "url": null, "content": "Иван бросает два дротика в мишень для дартса, целясь в центр. Второй дротик попадает дальше от центра, чем первый. Если Иван бросает третий дротик, целясь в центр, найдите вероятность того, что третий бросок будет дальше от центра, чем первый. Предположите, что мастерство Ивана постоянно."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/42 Конфеты красные синие зелёные", "name": "42 Конфеты красные синие зелёные", "problems": [{"index": 0, "url": null, "content": "Вы достаёте конфеты одну за другой из банки, в которой находится 10 красных конфет, 20 синих конфет и 30 зелёных конфет. Найдите вероятность того, что в банке останется по крайней мере 1 синяя конфета и 1 зелёная конфета, когда вы достанете все красные конфеты."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/junior/43 Русская рулетка пуля выбор", "name": "43 Русская рулетка пуля выбор", "problems": [{"index": 0, "url": null, "content": "В 6-камерный револьвер вставляется одна пуля. Барабан вращается случайным образом, так что каждая камера с одинаковой вероятностью окажется под ударником. Два игрока по очереди нажимают на спусковой крючок без дальнейшего вращения, пока пистолет не выстрелит. Если вы можете выбрать, играть первым или вторым, что вы выберете? Найдите вашу вероятность проигрыша."}, {"index": 1, "url": null, "content": "Снова вращают барабан после каждого нажатия на спусковой крючок. Выберете ли вы быть первым или вторым игроком? Найдите вашу вероятность проигрыша."}, {"index": 2, "url": null, "content": "В патронник случайным образом помещены две пули. Ваш противник сыграл первым и остался жив после первого нажатия на спусковой крючок. Вам предоставляется выбор — крутить ли барабан. Стоит ли вам крутить барабан?"}, {"index": 3, "url": null, "content": "Две пули случайным образом оказываются в двух последовательных положениях. Если ваш противник выжил в первом раунде, следует ли вам вращать барабан?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/44 Шары урны равные числа", "name": "44 Шары урны равные числа", "problems": [{"index": 0, "url": null, "content": "Имеются 2n шаров с числами \\(1, \\ldots, n\\), каждое число встречается по два раза. Эти шары случайным образом раскладываются по два в n урн. Из каждой урны вынимается один шар. Найдите вероятность того, что на вынутых шарах все числа различные."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/45 Тапки мешки пара условная", "name": "45 Тапки мешки пара условная", "problems": [{"index": 0, "url": null, "content": "Рядом стоят 2 мешка: один с левыми, другой с правыми тапками. В каждом ровно по 11 различных тапок. Уникальных пар ровно 11. Два друга решили собрать хотя бы одну пару и выбрали по мешку. Оба тянут тапки из своего мешка случайно и независимо. Найдите вероятность того, что друзья собрали хотя бы 1 пару при условии, что «левый друг» вытянул как минимум три тапка."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/46 Баскетбол штрафные броски вероятность", "name": "46 Баскетбол штрафные броски вероятность", "problems": [{"index": 0, "url": null, "content": "Баскетболистка выполняет 100 штрафных бросков. Она набирает одно очко, если мяч проходит через обруч, и ноль очков, если промахивается. Она забила со своего первого броска и промахнулась со второго. Для каждого из следующих бросков вероятность того, что она забьёт, равна доле успешных бросков на данный момент. Найдите вероятность того, что после 100 бросков она забьёт ровно 50 корзин."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/47 Заключённые освобождение парадокс", "name": "47 Заключённые освобождение парадокс", "problems": [{"index": 0, "url": null, "content": "Трое заключённых А, В и С с одинаково примерным поведением подали заявку на условно-досрочное освобождение. Комиссия решила освободить двух из них. Надзиратель знает, кто будет освобождён; А может спросить имя (кроме своего) другого счастливчика. А думает, что если надзиратель скажет «В будет освобождён», его шанс снизится до 1/2. Объясните, что не так в рассуждениях А."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/48 Две урны белый последовательный", "name": "48 Две урны белый последовательный", "problems": [{"index": 0, "url": null, "content": "В первой урне a белых, b чёрных шаров. Во второй урне c белых, d чёрных шаров. Наугад выбирается урна и из неё извлекается шар без возвращения. Шар оказался белым. Найдите вероятность того, что следующий шар, извлечённый из той же урны, окажется белым."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/49 Ноутбуки продавцы брак совместный", "name": "49 Ноутбуки продавцы брак совместный", "problems": [{"index": 0, "url": null, "content": "На маркетплейсе Озон ноутбук \"Плутон\" продают три продавца с долями продаж 25%, 45% и 30% соответственно. Доля брака в их продукции составляет 2%, 3% и 5% соответственно. Найдите вероятность того, что два случайно выбранных бракованных ноутбука \"Плутон\" были проданы одним и тем же продавцом."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/50 Стрелки зависимость выстрелы события", "name": "50 Стрелки зависимость выстрелы события", "problems": [{"index": 0, "url": null, "content": "При каждом выстреле, независимо от остальных, первый стрелок попадает в мишень с вероятностью \\(p_1\\), второй — с вероятностью \\(p_2\\). Из них наугад выбирается один стрелок. Пусть A и B — события, состоящие в том, что выбранный стрелок попадёт в мишень при первом и, соответственно, при втором выстреле. Являются ли события A и B зависимыми или независимыми?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/51 Стрелки два выстрела успех", "name": "51 Стрелки два выстрела успех", "problems": [{"index": 0, "url": null, "content": "При каждом выстреле, независимо от остальных, первый стрелок попадает в мишень с вероятностью 0,8, второй — с вероятностью 0,7. Из них наугад выбирается один стрелок. Первый выстрел оказался успешным. Найдите вероятность того, что успешным будет и второй выстрел, произведённый этим же стрелком."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/52 Урны шары круговое перекладывание", "name": "52 Урны шары круговое перекладывание", "problems": [{"index": 0, "url": null, "content": "Имеется n урн, в каждой из которых находится a белых и b чёрных шаров. Наугад последовательно перекладывают по одному шару из первой урны во вторую, из второй в третью, ..., из \\((n-1)\\)-й в n-ю, из n-й в первую. Найдите вероятность того, что шар, наугад извлечённый после этого из n-й урны, окажется белым."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/53 Тетраэдр перевороты вероятность ребро", "name": "53 Тетраэдр перевороты вероятность ребро", "problems": [{"index": 0, "url": null, "content": "На плоскости расположен правильный тетраэдр. Раз в минуту он переворачивается через одно из рёбер, причём перевороты через разные рёбра равновероятны. Найдите вероятность того, что через некоторое время тетраэдр вернётся в исходное положение."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/54 Монета капитал разорение", "name": "54 Монета капитал разорение", "problems": [{"index": 0, "url": null, "content": "Игрок выбирает герб или решку, после чего бросается монета. Если выпадает названная сторона, он выигрывает 1 рубль; иначе проигрывает 1 рубль. Обладая начальным капиталом a рублей, игрок хочет довести капитал до \\(b > a\\) рублей. Игра заканчивается, когда игрок набирает сумму b или разоряется. Найдите вероятность того, что игрок разорится."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/55 Монета два орла подряд первый", "name": "55 Монета два орла подряд первый", "problems": [{"index": 0, "url": null, "content": "Двое по очереди подбрасывают монету. Выигрывает тот, у которого раньше выпадут подряд два орла. Найдите вероятность выигрыша для первого игрока."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/middle/56 Монета три орла две решки", "name": "56 Монета три орла две решки", "problems": [{"index": 0, "url": null, "content": "Монету подбрасывают несколько раз до тех пор, пока не выпадут подряд три орла или две решки. Найдите вероятность того, что бросания завершатся выпадением трёх орлов. Вероятности выпадения орла и решки равны 1/2, результаты бросков независимы."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/senior/57 Самолёт пассажиры место последний", "name": "57 Самолёт пассажиры место последний", "problems": [{"index": 0, "url": null, "content": "При посадке в самолёт выстроилась очередь из n пассажиров, у каждого из которых имеется билет на одно из n мест. Первой в очереди стоит сумасшедшая старушка. Она вбегает в салон и садится на случайное место (возможно, и на своё). Далее пассажиры по очереди занимают свои места, а в случае, если своё место уже занято, садятся случайным образом на одно из свободных мест. Найдите вероятность того, что последний пассажир займёт своё место."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[03] Условная вероятность/senior/58 Анонимные подарки галстук носки динозавр", "name": "58 Анонимные подарки галстук носки динозавр", "problems": [{"index": 0, "url": null, "content": "В обществе анонимных подарков состоят 3n человек: n хотят получить галстук, n — носки, n — ручного динозавра. Каждый случайно выбирает и покупает подарок среди тех двух, что он сам не хотел бы получить. Собравшись на вечеринку, члены общества сложили подарки в кучу и разобрали их случайно. Алиса хотела бы получить ручного динозавра, а Боб — носки. Найдите вероятность того, что ни Алиса, ни Боб не получат желаемые подарки."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/59 Прямоугольник окружность угол точка", "name": "59 Прямоугольник окружность угол точка", "problems": [{"index": 0, "url": null, "content": "Найдите вероятность того, что случайно выбранная точка из прямоугольника со сторонами a и b окажется внутри окружности радиуса r с центром в левом верхнем углу прямоугольника (точки внутри прямоугольника распределены равномерно)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/60 Встреча друзья ШАД до сорока", "name": "60 Встреча друзья ШАД до сорока", "problems": [{"index": 0, "url": null, "content": "Два друга договорились встретиться у входа в ШАД с 14:00 до 15:00, не договорившись о точном времени. Момент прихода каждого равномерно распределён на этом часе; через 15 минут ожидания они заходят одни. Известно, что они встретились. Найдите вероятность того, что оба пришли до 14:40."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/61 Встреча независимость событий пятнадцать", "name": "61 Встреча независимость событий пятнадцать", "problems": [{"index": 0, "url": null, "content": "Лёша и Марина договорились встретиться между 8:00 и 9:00. Каждый приходит в случайный момент, ждёт 15 минут и уходит. Являются ли независимыми события «Лёша и Марина не встретились» и «хотя бы один из них пришёл после 8:45»? Время считайте непрерывным."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/62 Пистолет мишень отклонение попадание", "name": "62 Пистолет мишень отклонение попадание", "problems": [{"index": 0, "url": null, "content": "В мишень размера \\(3 \\times 2\\) стреляют из пистолета. Отклонение пули от точки прицеливания не превышает 0,1 по любому направлению, параллельному сторонам прямоугольника. Стрелок целится в произвольную точку мишени. Найдите вероятность того, что он попадёт в мишень."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/63 Круг расстояние абсцисса квадрат", "name": "63 Круг расстояние абсцисса квадрат", "problems": [{"index": 0, "url": null, "content": "Точку бросают наугад в круг \\(x^2 + y^2 < 1\\). Найдите вероятность того, что расстояние от точки до центра круга превысит 1/2."}, {"index": 1, "url": null, "content": "Найдите вероятность того, что абсцисса точки будет не больше 1/2."}, {"index": 2, "url": null, "content": "Найдите вероятность того, что точка окажется вне квадрата, вписанного в данный круг."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/64 Прыжки точка расстояние равномерные", "name": "64 Прыжки точка расстояние равномерные", "problems": [{"index": 0, "url": null, "content": "Находясь в начальный момент в точке O, некоторый объект совершает два прыжка: направо (в положительном направлении) и налево (в отрицательном направлении). Длины прыжков — независимые равномерные случайные величины: первый прыжок равномерно распределён на \\([0, 4]\\), второй — на \\([0, 2]\\). Найдите вероятность того, что после двух прыжков объект окажется в точке, удалённой от O на расстояние не больше 1."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/65 Стержень три части треугольник", "name": "65 Стержень три части треугольник", "problems": [{"index": 0, "url": null, "content": "Стержень разломан в двух наугад выбранных точках. Найдите вероятность того, что из образовавшихся трёх стержней можно составить треугольник."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/junior/66 Очередь Варя Таня время", "name": "66 Очередь Варя Таня время", "problems": [{"index": 0, "url": null, "content": "В 14:00 Аня встала в очередь. В 14:02 она поняла, что за ней никто не стоит. В 14:10 она увидела: за ней стоит Варя, а за Варей — Таня, пришедшая позже. Найдите вероятность того, что к 14:10 Таня стояла в очереди не более 4 минут. Время появления Тани и Вари в столовой распределено равномерно на допустимом промежутке."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/middle/67 Детекторы отрезок покрытие условная", "name": "67 Детекторы отрезок покрытие условная", "problems": [{"index": 0, "url": null, "content": "На отрезке [0, 1] в точках x, y, независимо выбранных из равномерного распределения, находятся два детектора элементарных частиц. Детектор засекает частицу, если она пролетает на расстоянии не более \\(\\frac{1}{3}\\) от него. Известно, что поля восприятия детекторов покрывают весь отрезок. Найдите вероятность того, что \\(y > \\frac{5}{6}\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/middle/68 Окружность точки центр треугольник", "name": "68 Окружность точки центр треугольник", "problems": [{"index": 0, "url": null, "content": "На окружности выбираются 4 случайных точки. Найдите вероятность того, что центр окружности лежит внутри треугольника, образованного тремя из этих точек (или четырёхугольника с вершинами в этих точках)."}, {"index": 1, "url": null, "content": "На окружности выбираются n случайных точек. Найдите вероятность того, что центр окружности лежит внутри выпуклой оболочки этих точек."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/69 Нейронные сети GPU сервер условная", "name": "69 Нейронные сети GPU сервер условная", "problems": [{"index": 0, "url": null, "content": "Вася поставил учиться две нейронные сети, каждую на своём GPU, и отправился спать. Времена обучения сетей независимы и равномерно распределены на отрезке [1, 3]. Через время t сервер упал, и оказалось, что лишь одна сеть успела доучиться. Найдите вероятность того, что \\(t < \\frac{3}{2}\\). Считайте, что время падения сервера тоже равномерно распределено на отрезке [1, 3]."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/70 Саньцзегунь палки пересечение крайние", "name": "70 Саньцзегунь палки пересечение крайние", "problems": [{"index": 0, "url": null, "content": "Аня взяла саньцзегунь, состоящий из трёх палок одинакового размера, и бросила его на землю. Найдите вероятность того, что крайние палки пересекаются. Считайте, что саньцзегунь представляет собой ломаную из трёх звеньев, а всевозможные углы, которые могут образовать крайние звенья со средним, равновероятны."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/71 Две точки отрезок независимость событий", "name": "71 Две точки отрезок независимость событий", "problems": [{"index": 0, "url": null, "content": "Из равномерного распределения на отрезке [0, 1] независимо выбираются две точки x и y. При каких числах a события \\(\\max(1 - 2x, y) < a\\) и \\(\\max(1 - 2y, x) < a\\) независимы?"}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/72 Три равномерные сумма вероятность", "name": "72 Три равномерные сумма вероятность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины, равномерно распределённые на отрезке [0, 1], а t — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}]}, {"id": "courses/mathematics/probability/[14] 25-11-24/[04] Геометрическая вероятность/senior/73 Монета ребро толщина треть", "name": "73 Монета ребро толщина треть", "problems": [{"index": 0, "url": null, "content": "Какой толщины должна быть монета, чтобы шанс того, что она упадёт на ребро, был равен 1/3?"}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/1 Дискретные распределения характеристики таблица", "name": "1 Дискретные распределения характеристики таблица", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану биноминального распределения."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану распределения Пуассона."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану распределения Бернулли."}, {"index": 3, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану равномерного распределения."}, {"index": 4, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану геометрического распределения."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/2 Два кубика сумма k очков", "name": "2 Два кубика сумма k очков", "problems": [{"index": 0, "url": null, "content": "Бросают два n-гранных кубика. Найдите вероятность того, что суммарно выпадет \\(k \\in [2, 2n]\\) очков."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/junior/3 Равномерное множество независимость некоррелированность", "name": "3 Равномерное множество независимость некоррелированность", "problems": [{"index": 0, "url": null, "content": "Случайная величина \\(\\zeta\\) распределена равномерно на множестве \\(\\{-1, 0, 1\\}\\). Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = 1 - \\zeta^{1000}\\) и \\(\\eta = 1 - \\zeta^{1001}\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/10 Носки пары дни матожидание", "name": "10 Носки пары дни матожидание", "problems": [{"index": 0, "url": null, "content": "У студента ШАДа дома восемь пар носков разных цветов (носки из одной пары одного цвета). В течение восьми дней он каждый день случайным образом достаёт два носка и не возвращает их обратно. Найдите математическое ожидание числа дней, в которые были выбраны два носка одного цвета."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/4 Игрок рубли раунды матожидание", "name": "4 Игрок рубли раунды матожидание", "problems": [{"index": 0, "url": null, "content": "У игрока есть k советских рублей. Каждый раунд с вероятностью p игрок получает 1 рубль, либо с вероятностью 1−p теряет 1 рубль. Игра заканчивается, как только у игрока останется 0 рублей или станет не меньше 6 рублей. Найдите математическое ожидание количества раундов игры при k = 2 и p = 0,75."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/5 Домино Тау-Кита модуль разности", "name": "5 Домино Тау-Кита модуль разности", "problems": [{"index": 0, "url": null, "content": "В далёком созвездии Тау-Кита на каждой половинке костяшки домино стоит от 0 до N точек, причём для каждой пары чисел (a, b) таких, что a и b — целые от 0 до N, существует ровно одна доминошка. Космический турист выбрал наугад перевёрнутую костяшку. При каком N математическое ожидание модуля разности количеств точек на двух половинках будет равно 2?"}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/6 Пуассон отказы бюро ровно m", "name": "6 Пуассон отказы бюро ровно m", "problems": [{"index": 0, "url": null, "content": "Вероятность прихода в бюро k человек равна \\(\\lambda^k e^{-\\lambda}/k!\\). Вероятность получения отказа — p. Найдите вероятность ровно m отказов."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/7 Бернулли предельный переход Пуассон", "name": "7 Бернулли предельный переход Пуассон", "problems": [{"index": 0, "url": null, "content": "Пусть n стремит
