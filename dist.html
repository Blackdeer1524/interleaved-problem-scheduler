<style>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
    </div>
    <div id="folder-bar"></div>
  </aside>
  <div class="main">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('train')">Train</button>
      <button class="nav-tab" onclick="switchView('solved')">Solved (<span id="solved-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('failed')">Failed (<span id="failed-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('buried')">Buried (<span id="buried-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('stats')">Stats</button>
    </div>
    <div id="train-view">
      <div class="header">
        <div class="progress" id="progress">Loading…</div>
        <div class="timer-row">
          <span>⏱</span>
          <input type="number" id="timer-min" min="0" max="99" value="0" title="minutes">
          <span>:</span>
          <input type="number" id="timer-sec" min="0" max="59" value="0" title="seconds">
          <button id="timer-start-btn" onclick="userStartTimer()">Start</button>
          <span id="timer-display"></span>
          <span id="overtime-label"></span>
          <button id="timer-reconfig-btn" onclick="reconfigureTimer()" style="display:none">Reconfigure</button>
        </div>
      </div>
      <hr class="divider">
      <div class="problem-area" id="problem-area">
        <div class="status">Loading problems…</div>
      </div>
      <div class="hint-row" id="hint-row" style="display:none">
        <button class="hint-btn" onclick="showHint()">Show hint</button>
        <div class="hint-path" id="hint-path"></div>
        <button class="hint-btn" id="copy-md-btn" onclick="copyMarkdown()" style="margin-left:auto">Copy markdown</button>
      </div>
      <div id="answer-section" style="display:none">
        <textarea id="answer-text" placeholder="Your answer…" rows="4"></textarea>
        <div id="answer-image-list"></div>
        <div id="answer-drop-zone">Paste or drop images here</div>
      </div>
      <div class="actions" id="actions" style="display:none">
        <button class="btn btn-danger" onclick="failProblem()">Fail ✗</button>
        <button class="btn btn-hard" onclick="markSolved('hard')">Hard</button>
        <button class="btn btn-good" onclick="markSolved('good')">Good</button>
        <button class="btn btn-easy" onclick="markSolved('easy')">Easy</button>
        <button class="btn btn-secondary" onclick="delayProblem()">Delay</button>
        <button class="btn btn-secondary" onclick="buryProblem()">Bury</button>
      </div>
    </div>
    <div id="solved-view" style="display:none"></div>
    <div id="failed-view" style="display:none"></div>
    <div id="buried-view" style="display:none"></div>
    <div id="stats-view" style="display:none"></div>
  </div>
</div>

<script>
let topics = [];
let solved = {};
let failed = {};
let buried = {};
let difficulties = {};
let selectedTopics = new Set();
let collapsedNodes = new Set();
let folderTree = null;
let deck = [];
let deckIdx = 0;
let timerHandle = null;
let timerRemaining = 0;
let timerActive = false;
let answers = {};
let currentImages = [];
let currentView = 'train';
let timeStats = {};
let statsCollapsed = new Set();
let problemStartTime = null;

// ── Folder tree ───────────────────────────────────────────────────────────────

function buildTree(topicIds) {
  const root = { path: null, topicId: null, isLeaf: false, children: {} };
  for (const id of topicIds) {
    let node = root;
    const parts = id.split('/');
    for (let i = 0; i < parts.length; i++) {
      const key = parts[i];
      if (!node.children[key]) {
        node.children[key] = {
          name: key,
          path: parts.slice(0, i + 1).join('/'),
          topicId: null,
          isLeaf: false,
          children: {},
        };
      }
      node = node.children[key];
    }
    node.isLeaf = true;
    node.topicId = id;
  }
  return root;
}

function getLeaves(node) {
  if (node.isLeaf) return [node.topicId];
  return Object.values(node.children).flatMap(getLeaves);
}

function findNode(root, path) {
  let node = root;
  for (const part of path.split('/')) {
    node = node.children[part];
    if (!node) return null;
  }
  return node;
}

function unsolvedInTopic(topicId) {
  const t = topics.find(x => x.id === topicId);
  if (!t) return 0;
  const s = solved[topicId] || new Set();
  return t.problems.filter(p => !s.has(p.index)).length;
}

function renderTreeHtml(node) {
  return Object.values(node.children)
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(child => {
      const leaves = getLeaves(child);
      const selCount = leaves.filter(l => selectedTopics.has(l)).length;
      const checked = selCount === leaves.length;
      const indet = selCount > 0 && selCount < leaves.length;
      const rem = leaves.reduce((n, id) => n + unsolvedInTopic(id), 0);
      const p = escHtml(child.path);
      const isCollapsed = !child.isLeaf && collapsedNodes.has(child.path);
      const arrow = child.isLeaf
        ? `<span class="folder-arrow-spacer"></span>`
        : `<span class="folder-arrow" onclick="event.stopPropagation();toggleCollapse('${p}')">${isCollapsed ? '▶' : '▼'}</span>`;
      const subtree = (!child.isLeaf && !isCollapsed)
        ? `<ul class="folder-subtree">${renderTreeHtml(child)}</ul>` : '';
      return `<li class="folder-node">
  <div class="folder-row" onclick="toggleNode('${p}')">
    ${arrow}<input type="checkbox" ${checked ? 'checked' : ''} data-indet="${indet}"
           onclick="event.stopPropagation();toggleNode('${p}')">
    <span>${escHtml(child.name)}</span>
    <b class="folder-count">${rem}</b>
  </div>${subtree}</li>`;
    }).join('');
}

function toggleCollapse(path) {
  if (collapsedNodes.has(path)) collapsedNodes.delete(path);
  else collapsedNodes.add(path);
  saveCollapsed();
  renderFolderBar();
}

function saveCollapsed() {
  localStorage.setItem('algo_shad_collapsed', JSON.stringify([...collapsedNodes]));
}

function loadCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_collapsed') || '[]');
    collapsedNodes = new Set(saved);
  } catch { collapsedNodes = new Set(); }
}

function saveStatsCollapsed() {
  localStorage.setItem('algo_shad_stats_collapsed', JSON.stringify([...statsCollapsed]));
}

function loadStatsCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_stats_collapsed') || '[]');
    statsCollapsed = new Set(saved);
  } catch { statsCollapsed = new Set(); }
}

// ── Persistence ───────────────────────────────────────────────────────────────

async function loadSolved() {
  if (window.__TOPICS__) {
    // Static dist.html mode: localStorage is the live store; __SOLVED__ is only a first-run seed
    try {
      const raw = localStorage.getItem('algo_shad_solved');
      if (raw) {
        for (const [k, v] of Object.entries(JSON.parse(raw)))
          solved[k] = new Set(v);
        return;
      }
    } catch {}
    try {
      if (window.__PROGRESS__) {
        for (const [topicId, entries] of Object.entries(window.__PROGRESS__))
          for (const [idxStr, entry] of Object.entries(entries))
            if (entry.status === 'solved') {
              if (!solved[topicId]) solved[topicId] = new Set();
              solved[topicId].add(Number(idxStr));
            }
      }
    } catch {}
    return;
  }
  // Server mode: /api/solved is authoritative, localStorage is a fallback
  try {
    const res = await fetch('/api/solved');
    if (res.ok) {
      for (const [k, v] of Object.entries(await res.json()))
        solved[k] = new Set(v);
      return;
    }
  } catch {}
  try {
    const raw = localStorage.getItem('algo_shad_solved');
    if (raw)
      for (const [k, v] of Object.entries(JSON.parse(raw)))
        solved[k] = new Set(v);
  } catch {}
}

function saveSolved() {
  const out = {};
  for (const [k, v] of Object.entries(solved)) out[k] = [...v];
  const body = JSON.stringify(out);
  localStorage.setItem('algo_shad_solved', body);
  if (!window.__TOPICS__)
    fetch('/api/solved', { method: 'POST', body }).catch(() => {});
}

function loadFailed() {
  try {
    const raw = localStorage.getItem('algo_shad_failed');
    if (raw) {
      for (const [k, v] of Object.entries(JSON.parse(raw)))
        failed[k] = new Set(v);
      return;
    }
  } catch {}
  try {
    if (window.__PROGRESS__)
      for (const [topicId, entries] of Object.entries(window.__PROGRESS__))
        for (const [idxStr, entry] of Object.entries(entries))
          if (entry.status === 'failed') {
            if (!failed[topicId]) failed[topicId] = new Set();
            failed[topicId].add(Number(idxStr));
          }
  } catch {}
}

function saveFailed() {
  const out = {};
  for (const [k, v] of Object.entries(failed)) out[k] = [...v];
  localStorage.setItem('algo_shad_failed', JSON.stringify(out));
}

function loadBuried() {
  try {
    const raw = localStorage.getItem('algo_shad_buried');
    if (raw) {
      for (const [k, v] of Object.entries(JSON.parse(raw)))
        buried[k] = new Set(v);
      return;
    }
  } catch {}
  try {
    if (window.__PROGRESS__)
      for (const [topicId, entries] of Object.entries(window.__PROGRESS__))
        for (const [idxStr, entry] of Object.entries(entries))
          if (entry.status === 'buried') {
            if (!buried[topicId]) buried[topicId] = new Set();
            buried[topicId].add(Number(idxStr));
          }
  } catch {}
}

function saveBuried() {
  const out = {};
  for (const [k, v] of Object.entries(buried)) out[k] = [...v];
  localStorage.setItem('algo_shad_buried', JSON.stringify(out));
}

function loadDifficulties() {
  try {
    const raw = localStorage.getItem('algo_shad_difficulties');
    if (raw) {
      difficulties = JSON.parse(raw);
      return;
    }
  } catch {}
  try {
    if (window.__PROGRESS__)

// ── Scheduler ─────────────────────────────────────────────────────────────────

function firstUnsolved(topic) {
  const s = solved[topic.id] || new Set();
  const f = failed[topic.id] || new Set();
  const k = buried[topic.id] || new Set();
  return topic.problems.find(p => !s.has(p.index) && !f.has(p.index) && !k.has(p.index)) ?? null;
}

function activeTopics() {
  return topics.filter(t => selectedTopics.has(t.id));
}

function totalUnsolved() {
  return activeTopics().reduce((n, t) => {
    const s = solved[t.id] || new Set();
    const f = failed[t.id] || new Set();
    const k = buried[t.id] || new Set();
    return n + t.problems.filter(p => !s.has(p.index) && !f.has(p.index) && !k.has(p.index)).length;
  }, 0);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildRound(prevLastTopicId) {
  const available = activeTopics()
    .map(t => ({ topic: t, problem: firstUnsolved(t) }))
    .filter(x => x.problem !== null);

  if (available.length === 0) return [];

  shuffle(available);

  // Ensure first item of new round doesn't repeat last item of previous round
  if (prevLastTopicId && available[0].topic.id === prevLastTopicId) {
    const swap = available.findIndex((x, i) => i > 0 && x.topic.id !== prevLastTopicId);
    if (swap > 0) [available[0], available[swap]] = [available[swap], available[0]];
  }

  // Fix any within-round consecutive duplicates
  // (only relevant when a single topic has multiple problems and all others are exhausted)
  for (let i = 1; i < available.length; i++) {
    if (available[i].topic.id === available[i - 1].topic.id) {
      const swap = available.findIndex((x, j) => j > i && x.topic.id !== available[i - 1].topic.id);
      if (swap > 0) [available[i], available[swap]] = [available[swap], available[i]];
    }
  }

  return available;
}

function advance() {
  if (deckIdx >= deck.length) {
    const prevLastId = deck.length > 0 ? deck[deck.length - 1].topic.id : null;
    deck = buildRound(prevLastId);
    deckIdx = 0;
    if (deck.length === 0) { renderDone(); return; }
  }
  renderCurrent();
}

// ── Timer ─────────────────────────────────────────────────────────────────────

function startTimer() {
  if (!timerActive) return;
  clearInterval(timerHandle);
  document.getElementById('overtime-label').textContent = '';
  document.getElementById('timer-display').classList.remove('expired');

  const min = +document.getElementById('timer-min').value || 0;
  const sec = +document.getElementById('timer-sec').value || 0;
  timerRemaining = min * 60 + sec;

  if (timerRemaining <= 0) {
    document.getElementById('timer-display').textContent = '';
    return;
  }

  renderTimerDisplay();
  timerHandle = setInterval(() => {
    timerRemaining--;
    renderTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerHandle);
      document.getElementById('timer-display').classList.add('expired');
      document.getElementById('overtime-label').textContent = '⏰ Time\'s up';
      beep();
    }
  }, 1000);
}

function userStartTimer() {
  timerActive = true;
  document.getElementById('timer-min').disabled = true;
  document.getElementById('timer-sec').disabled = true;
  document.getElementById('timer-start-btn').style.display = 'none';
  document.getElementById('timer-reconfig-btn').style.display = '';
  startTimer();
}

function reconfigureTimer() {

  document.getElementById('timer-min').disabled = false;
  document.getElementById('timer-sec').disabled = false;
  document.getElementById('timer-start-btn').style.display = '';
  document.getElementById('timer-reconfig-btn').style.display = 'none';
  document.getElementById('timer-display').textContent = '';
  document.getElementById('overtime-label').textContent = '';
  document.getElementById('timer-display').classList.remove('expired');
}

function renderTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timer-display').textContent =
    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start();
    osc.stop(ctx.currentTime + 0.8);
  } catch {}
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Protect math spans from marked.js by swapping them out before parsing and back after.
function parseWithMath(src) {
  const stash = [];
  const placeholder = (m) => { stash.push(m); return `\x02MATH${stash.length - 1}\x03`; };
  const guarded = src
    .replace(/\\\[[\s\S]*?\\\]/g, placeholder)   // display math \[...\]
    .replace(/\\\([\s\S]*?\\\)/g, placeholder);   // inline math \(...\)
  const html = marked.parse(guarded);
  return html.replace(/\x02MATH(\d+)\x03/g, (_, i) => stash[+i]);
}

function recordTime(outcome) {
  if (problemStartTime === null || !deck.length || deckIdx >= deck.length) return;
  const { topic, problem } = deck[deckIdx];
  const elapsed = Math.round((Date.now() - problemStartTime) / 1000);
  if (!timeStats[topic.id]) timeStats[topic.id] = {};
  const key = String(problem.index);
  if (!timeStats[topic.id][key])
    timeStats[topic.id][key] = { totalSeconds: 0, attempts: 0, solveCount: 0, failCount: 0, buryCount: 0 };
  const s = timeStats[topic.id][key];
  s.totalSeconds += elapsed;
  s.attempts++;
  if (outcome === 'hard') { s.solveCount++; s.hardCount = (s.hardCount || 0) + 1; }
  else if (outcome === 'good') { s.solveCount++; s.goodCount = (s.goodCount || 0) + 1; }
  else if (outcome === 'easy') { s.solveCount++; s.easyCount = (s.easyCount || 0) + 1; }
  else if (outcome === 'failed') s.failCount++;
  else s.buryCount++;
  saveTimeStats();
}

function formatTime(s) {
  if (!s) return '—';
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return sec ? `${m}m ${sec}s` : `${m}m`;
  const h = Math.floor(m / 60), min = m % 60;
  return min ? `${h}h ${min}m` : `${h}h`;
}

function getSubtreeTopicIds(node) {
  if (node.isLeaf) return node.topicId ? [node.topicId] : [];
  return Object.values(node.children).flatMap(getSubtreeTopicIds);
}

function aggregateTopics(topicIds) {
  let total = 0, solvedN = 0, failedN = 0, seconds = 0, attempts = 0;
  for (const id of topicIds) {
    const t = topics.find(x => x.id === id);
    if (!t) continue;
    total += t.problems.length;
    solvedN += (solved[id] || new Set()).size;
    failedN += (failed[id] || new Set()).size;
    const ts = timeStats[id] || {};
    for (const s of Object.values(ts)) { seconds += s.totalSeconds; attempts += s.attempts; }
  }
  return { total, solvedN, failedN, seconds, attempts };
}

    if (failed[topicId].size === 0) delete failed[topicId];

  saveFailed();
  updateFailedCount();
  renderFailedView();

function unbury(topicId, idx) {
  if (buried[topicId]) {

    if (buried[topicId].size === 0) delete buried[topicId];

  saveBuried();
  updateBuriedCount();
  renderBuriedView();

function exportProgress() {
  const out = {};
  const allIds = new Set([
    ...Object.keys(solved),
    ...Object.keys(failed),
    ...Object.keys(buried),
  ]);
  for (const topicId of allIds) {
    out[topicId] = {};
    for (const idx of (solved[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'solved', difficulty: difficulties[topicId]?.[String(idx)] ?? 'good' };
    for (const idx of (failed[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'failed' };
    for (const idx of (buried[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'buried' };
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      for (const [topicId, entries] of Object.entries(data)) {
        for (const [idxStr, entry] of Object.entries(entries)) {
          const idx = Number(idxStr);
          if (entry.status === 'solved') {
            if (!solved[topicId]) solved[topicId] = new Set();
            solved[topicId].add(idx);
            if (entry.difficulty) {
              if (!difficulties[topicId]) difficulties[topicId] = {};
              difficulties[topicId][idxStr] = entry.difficulty;
            }
          } else if (entry.status === 'failed') {
            if (!failed[topicId]) failed[topicId] = new Set();
            failed[topicId].add(idx);
          } else if (entry.status === 'buried') {
            if (!buried[topicId]) buried[topicId] = new Set();
            buried[topicId].add(idx);
          }
        }
      }
      saveSolved();
      saveFailed();
      saveBuried();
      saveDifficulties();
      updateSolvedCount();
      updateFailedCount();
      updateBuriedCount();
      if (currentView === 'solved') renderSolvedView();
      else if (currentView === 'failed') renderFailedView();
      else if (currentView === 'buried') renderBuriedView();
      else if (currentView === 'stats') renderStatsView();
    } catch {
      alert('Failed to import: invalid JSON');
    }
  };
  input.click();
}

function renderSolvedView() {
  const el = document.getElementById('solved-view');
  const sections = topics
    .map(t => ({ topic: t, problems: t.problems.filter(p => (solved[t.id] || new Set()).has(p.index)) }))
    .filter(s => s.problems.length > 0);

  const exportBar = `<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px">
    <button class="unsolve-btn" style="padding:5px 12px;font-size:13px" onclick="importProgress()">Import progress.json ↑</button>
    <button class="unsolve-btn" style="padding:5px 12px;font-size:13px" onclick="exportProgress()">Export progress.json ↓</button>
  </div>`;

  if (sections.length === 0) {
    el.innerHTML = exportBar + '<div class="status" style="padding-top:16px">No solved problems yet.</div>';
    return;
  }

  el.innerHTML = exportBar + sections.map(({ topic, problems }) => `
    <div class="solved-section">
      <div class="solved-topic-name">${escHtml(topic.id)}</div>
      ${problems.map(p => {
        const preview = p.url
          ? `<a class="solved-link" href="${escHtml(p.url)}" target="_blank" rel="noopener">${escHtml(p.url.replace(/^https?:\/\//, ''))}</a>`
          : `<span class="solved-preview">${escHtml(p.content.replace(/\n/g, ' ').substring(0, 90))}…</span>`;
        const expandHtml = p.url ? '' : `
          <div class="problem-expand" style="display:none">
            <div class="problem-text">${parseWithMath(p.content)}</div>
          </div>`;
        const ans = answers[topic.id]?.[String(p.index)];
        const ansHtml = (ans && (ans.text || (ans.images && ans.images.length))) ? `
          <div class="solved-answer">
            ${ans.text ? `<div class="solved-answer-text">${escHtml(ans.text)}</div>` : ''}
            ${ans.images && ans.images.length ? `<div class="solved-answer-images">${ans.images.map(src => `<img src="${src}" onclick="window.open(this.src)">`).join('')}</div>` : ''}
          </div>` : '';
        const diff = difficulties[topic.id]?.[String(p.index)];
        const diffBadge = diff ? `<span class="diff-badge ${diff}">${diff}</span>` : '';
        return `<div class="solved-item">
          <div class="solved-item-row">
            <span class="solved-num">#${p.index + 1}</span>
            ${diffBadge}
            ${preview}
            ${p.url ? '' : `<button class="expand-problem-btn" onclick="toggleProblemExpand(this)">Show problem</button>`}
            <button class="unsolve-btn" onclick="unsolve('${escHtml(topic.id)}',${p.index})">Unsolve</button>
          </div>${expandHtml}${ansHtml}
        </div>`;
      }).join('')}
    </div>`).join('');
}

function unsolve(topicId, idx) {
  if (solved[topicId]) {
    solved[topicId].delete(idx);
    if (solved[topicId].size === 0) delete solved[topicId];
  }
  saveSolved();
  updateSolvedCount();
  renderSolvedView();
  renderFolderBar();
}

function csvField(v) {
  return '"' + String(v ?? '').replace(/"/g, '""') + '"';
}

function exportStatsCSV() {
  const header = ['folder','topic_id','problem_index','status','difficulty','total_seconds','attempts','hard_count','good_count','easy_count','fail_count','bury_count','problem_type','problem_statement','answer_text','has_images'];
  const rows = [header.join(',')];
  for (const t of topics) {
    const folder = t.id.includes('/') ? t.id.substring(0, t.id.lastIndexOf('/')) : t.id;
    for (const p of t.problems) {
      const isSolved = (solved[t.id] || new Set()).has(p.index);
      const isFailed = (failed[t.id] || new Set()).has(p.index);
      const isBuried = (buried[t.id] || new Set()).has(p.index);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      const diff = difficulties[t.id]?.[String(p.index)] ?? '';
      const ts = timeStats[t.id]?.[String(p.index)] || { totalSeconds: 0, attempts: 0, hardCount: 0, goodCount: 0, easyCount: 0, failCount: 0, buryCount: 0 };
      const ans = answers[t.id]?.[String(p.index)];
      const stmt = p.url ? p.url : (p.content || '').replace(/\n/g, ' ').substring(0, 300);
      rows.push([
        csvField(folder), csvField(t.id), csvField(p.index), csvField(status), csvField(diff),
        csvField(ts.totalSeconds), csvField(ts.attempts),
        csvField(ts.hardCount||0), csvField(ts.goodCount||0), csvField(ts.easyCount||0),
        csvField(ts.failCount), csvField(ts.buryCount),
        csvField(p.url ? 'url' : 'text'), csvField(stmt),
        csvField(ans?.text || ''), csvField(!!(ans?.images?.length)),
      ].join(','));
    }
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stats.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderStatsView() {
  const el = document.getElementById('stats-view');

  // ── Folder aggregate table ──────────────────────────────────────────────────
  const folderRows = [];
  const allIds = topics.map(t => t.id);
  const allAgg = aggregateTopics(allIds);
  folderRows.push(`<tr>
    <td><strong>All</strong></td>
    <td class="mono">${allAgg.total}</td>
    <td class="mono">${allAgg.solvedN}</td>
    <td class="mono">${allAgg.failedN}</td>
    <td class="mono">${formatTime(allAgg.seconds)}</td>
    <td class="mono">${allAgg.attempts || '—'}</td>
  </tr>`);

  function walkForStats(node, depth) {
    if (node.path === null) {
      for (const child of Object.values(node.children)) walkForStats(child, 0);
      return;
    }
    const ids = getSubtreeTopicIds(node);
    if (ids.length === 0) return;
    const agg = aggregateTopics(ids);
    const pad = depth * 16;
    const label = node.path.split('/').pop();
    const hasChildren = Object.values(node.children).some(c => getSubtreeTopicIds(c).length > 0);
    const pathAttr = escHtml(node.path);
    const toggleHtml = hasChildren
      ? `<button class="stats-fold-btn" data-stats-toggle="${pathAttr}" onclick="toggleStatsFolder('${pathAttr}')">▼</button>`
      : `<span style="display:inline-block;width:14px"></span>`;
    folderRows.push(`<tr data-stats-path="${pathAttr}">
      <td style="padding-left:${10 + pad}px">${toggleHtml} ${escHtml(label)}</td>
      <td class="mono">${agg.total}</td>
      <td class="mono">${agg.solvedN}</td>
      <td class="mono">${agg.failedN}</td>
      <td class="mono">${formatTime(agg.seconds)}</td>
      <td class="mono">${agg.attempts || '—'}</td>
    </tr>`);
    for (const child of Object.values(node.children)) walkForStats(child, depth + 1);
  }
  if (folderTree) walkForStats(folderTree, 0);

  // ── Per-problem table ───────────────────────────────────────────────────────
  const problemRows = [];
  for (const t of topics) {
    const ts = timeStats[t.id];
    if (!ts) continue;
    for (const [idxStr, s] of Object.entries(ts)) {
      const idx = Number(idxStr);
      const isSolved = (solved[t.id] || new Set()).has(idx);
      const isFailed = (failed[t.id] || new Set()).has(idx);
      const isBuried = (buried[t.id] || new Set()).has(idx);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      problemRows.push(`<tr>
        <td>${escHtml(t.id)}</td>
        <td class="mono">#${idx + 1}</td>
        <td><span class="status-badge ${status}">${status}</span></td>
        <td class="mono">${formatTime(s.totalSeconds)}</td>
        <td class="mono">${s.attempts}</td>
        <td class="mono">${s.hardCount||0} / ${s.goodCount||0} / ${s.easyCount||0} / ${s.failCount} / ${s.buryCount}</td>
      </tr>`);
    }
  }

  el.innerHTML = `
    <div class="stats-bar">
      <button class="unsolve-btn" style="padding:5px 12px;font-size:13px" onclick="exportStatsCSV()">Export CSV ↓</button>
    </div>
    <div class="stats-section-title">Folder Stats</div>
    <table class="stats-table">
      <thead><tr>
        <th>Folder</th><th>Problems</th><th>Solved</th><th>Failed</th><th>Time Spent</th><th>Attempts</th>
      </tr></thead>
      <tbody>${folderRows.join('')}</tbody>
    </table>
    <div class="stats-section-title">Problem Stats</div>
    ${problemRows.length === 0
      ? '<div class="status" style="padding-top:0;text-align:left;color:#9ca3af;font-size:13px">No problems attempted yet.</div>'
      : `<table class="stats-table">
          <thead><tr>
            <th>Topic</th><th>#</th><th>Status</th><th>Time</th><th>Attempts</th><th>H / G / E / F / Bury</th>
          </tr></thead>
          <tbody>${problemRows.join('')}</tbody>
        </table>`}`;
  applyStatsCollapsed();
}

function applyStatsCollapsed() {
  document.querySelectorAll('#stats-view tr[data-stats-path]').forEach(row => {
    const rpath = row.dataset.statsPath;
    const hidden = [...statsCollapsed].some(cp => rpath.startsWith(cp + '/'));
    row.style.display = hidden ? 'none' : '';
  });
  document.querySelectorAll('#stats-view [data-stats-toggle]').forEach(btn => {
    btn.textContent = statsCollapsed.has(btn.dataset.statsToggle) ? '▶' : '▼';
  });
}

function toggleStatsFolder(path) {
  if (statsCollapsed.has(path)) statsCollapsed.delete(path);
  else statsCollapsed.add(path);
  saveStatsCollapsed();
  applyStatsCollapsed();
}

// ── Actions ───────────────────────────────────────────────────────────────────

function markSolved(difficulty) {
  const { topic, problem } = deck[deckIdx];
  if (!solved[topic.id]) solved[topic.id] = new Set();
  solved[topic.id].add(problem.index);
  saveSolved();
  if (!difficulties[topic.id]) difficulties[topic.id] = {};
  difficulties[topic.id][String(problem.index)] = difficulty;
  saveDifficulties();
  updateSolvedCount();
  recordTime(difficulty);
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function delayProblem() {
  recordTime('skip');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function buryProblem() {
  const { topic, problem } = deck[deckIdx];
  if (!buried[topic.id]) buried[topic.id] = new Set();
  buried[topic.id].add(problem.index);
  saveBuried();
  updateBuriedCount();
  recordTime('bury');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function newSession() {
  deck = [];
  deckIdx = 0;
  advance();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  await loadSolved();
  loadFailed();
  loadBuried();
  loadDifficulties();
  loadAnswers();
  loadTimeStats();
  loadCollapsed();
  loadStatsCollapsed();
  if (localStorage.getItem('algo_shad_sidebar') === '1')
    document.querySelector('.app').classList.add('collapsed');
  loadTimerPrefs();
  const _tmin = +document.getElementById('timer-min').value || 0;
  const _tsec = +document.getElementById('timer-sec').value || 0;
  if (_tmin * 60 + _tsec > 0) userStartTimer();
  if (window.__TOPICS__) {
    topics = window.__TOPICS__;
  } else {
    try {
      const res = await fetch('/api/problems');
      if (!res.ok) throw new Error(res.status);
      topics = (await res.json()).topics;
    } catch {
      document.getElementById('problem-area').innerHTML =
        '<div class="status">Could not load problems — is <code>server.py</code> running?</div>';
      return;
    }
  }
  const allTopicIds = topics.map(t => t.id).sort();
  folderTree = buildTree(allTopicIds);
  loadTopicPrefs(allTopicIds);
  updateSolvedCount();
  updateFailedCount();
  updateBuriedCount();
  renderFolderBar();
  advance();
}

document.addEventListener('DOMContentLoaded', init);

 краям доски). Сколькими спо-\nсобами это можно сделать?"}, {"index": 2, "url": null, "content": "В классе за контрольную 6 учеников получили оценку 5, 7 оценку 4 и 1 оценку 3. Учитель сказал им разбиться на пары с разными оценками, где получивший лучшую\nоценку рассказал бы получившему худшую, где тот ошибся. Сколькими способами учени-\nки могли бы разбиться на пары при таком условии?"}, {"index": 3, "url": null, "content": "В волейбольной секции 24 спортсмена. Сколькими способами их можно разде-\nлить на 4 команды по 6 спортсменов в каждой для проведения тренировочного турнира?\nА сколькими способами можно разбить 7 мальчиков и 7 девочек на пары?"}, {"index": 4, "url": null, "content": "Сколькими способами можно выложить в ряд три красных, четыре синих и\nпять зелёных шаров так, чтобы никакие два синих шара не лежали рядом?"}, {"index": 5, "url": null, "content": "Каких целых чисел от 1 до \\(8 \\cdot 10^{20}\\) (включительно) больше и на сколько: со-\nдержащих в своей записи только чётные цифры или содержащих в своей записи только\nнечётные цифры?"}, {"index": 6, "url": null, "content": "Найдите количество шестизначных чисел\n\n    1) У которых пятая цифра меньше шестой на 2\n    2) У которых каждая следующая цифра меньше предыдущей"}, {"index": 7, "url": null, "content": "Найдите сумму всех 4-х значных четных чисел, которые можно получить из\nкарточек 1, 2, 3, 4 если каждая цифра может быть использована более одного раза"}, {"index": 8, "url": null, "content": "Комбинаторно докажите следующие свойства чисел сочетаний. Другими сло-\nвами, вас просят на примере различных решений одной задачи получить выражения, сто-\nящие в разных частях данных равенств:\n\n    1) \\(C_n^0 - C_n^1 + ... + (-1)^n \\cdot C_n^n = 0\\)\n    ✳ 2) \\(0 \\cdot C_n^0 + 1 \\cdot C_n^1 + ... + n \\cdot C_n^n = n \\cdot 2^{n-1}\\)"}, {"index": 9, "url": null, "content": "Найдите количество слагаемых в разложении функции:\n\n    1) \\((x + y + z)^{10}\\)\n    2) \\((x^{-1} + 1 + x)^{2016}\\)"}, {"index": 10, "url": null, "content": "Найдите коэффициент в разложении:\n\n    1) Выражения \\((a + b + c)^{18}\\) при \\(a^6 b^6 c^6\\)\n    ✳ 2) Выражения \\((x^2 + x + 1)^{20}\\) при \\(x^6\\)"}, {"index": 11, "url": null, "content": "Отметили все вершины правильного 12-тиугольника. Сколько существует неза-\nмкнутых несамопересекающихся одиннадцатизвенных ломаных с вершинами в отмечен-\nных точках? А десятизвенных ломаных с вершинами в отмеченных точках?"}, {"index": 12, "url": null, "content": "На каждой из прямых y = 1 и y = 12 отмечено по 200 точек с абсциссами 1,\n2, 3, . . . , 200. Сколькими способами можно выбрать три точки из отмеченных 400 так,\nчтобы они являлись вершинами прямоугольного треугольника?"}, {"index": 13, "url": null, "content": "В таблицу размера k x l записывают числа +1 и −1 так, чтобы произведение\nчисел в каждой строке и в каждом столбце равнялось 1. Сколькими способами это можно\nсделать?"}, {"index": 14, "url": null, "content": "Сколькими способами, используя 20 цветов, можно закрасить:\n\n    1) Вершины p-угольника, где p - простое, если цвета вершин могут повторяться?\n    2) Грани тетраэдра, если цвета граней могут повторяться?"}]}, {"id": "mathematics/probability/[03] 25-10-21 (2) Правило суммы и произведения 102", "name": "[03] 25-10-21 (2) Правило суммы и произведения 102", "problems": [{"index": 0, "url": null, "content": "На книжной полке стоят \\(n\\) книг. Сколькими способами можно выбрать из них \\(p\\) книг так, чтобы между любыми двумя выбранными книгами, ровно как и после \\(p\\)-ой выбранной книги, было не менее \\(s\\) книг?"}, {"index": 1, "url": null, "content": "Сколькими способами можно поставить в ряд 3 англичан, 3 немцев и 3 русских, чтобы никакие 3 соотечественника не стояли рядом?"}, {"index": 2, "url": null, "content": "Докажите, что \\(r\\) различных вещей можно разделить между \\(n + p\\) людьми так, чтобы данные \\(n\\) получили по крайней мере по одному предмету\n\n\\((n + p)^r - C_n^1(n + p - 1)^r + C_n^2(n + p - 2)^r - ... + (-1)^n p^r\\)\n\nспособами."}, {"index": 3, "url": null, "content": "Найти количество способов поставить в ряд \\(m\\) французов и \\(n\\) англичан таким образом, чтобы рядом с каждым человеком стоял хотя бы один его соотечественник."}, {"index": 4, "url": null, "content": "На координатной плоскости дан параллелограмм с вершинами в точках \\(O(0; 0)\\), \\(P(-14; 42)\\), \\(Q(6; 42)\\) и \\(R(20; 0)\\). Найдите количество пар точек \\(A(x_1; y_1)\\) и \\(B(x_2; y_2)\\) с целыми координатами, лежащих в этом параллелограмме (возможно, на границе) и таких, что \\(3x_2 - 3x_1 + y_2 - y_1 = 33\\)."}, {"index": 5, "url": null, "content": "На одной прямой взяты \\(n\\) точек, а на параллельной ей прямой - \\(m\\) точек. Эти точки соединяются прямыми. Доказать, что количество точек пересечения проведенных прямых не превосходит \\(\\frac{mn(m-1)(n-1)}{4}\\)."}, {"index": 6, "url": null, "content": "Даны \\(n\\) точек плоскости, никакие 3 из которых не лежат на одной прямой и никакие 4 - на одной окружности. Через каждую пару этих точек проводится прямая, а через каждые 3 окружность. Найти наибольшее число точек пересечения всех проведенных прямых со всеми окружностями."}, {"index": 7, "url": null, "content": "Дан квадрат, стороны которого равны 500. Его стороны разбиты отмеченными точками на отрезки длины 2 (вершины исходного квадрата тоже отмечены). Найдите количество четверок из отмеченных точек, являющихся вершинами прямоугольника."}, {"index": 8, "url": null, "content": "На координатной плоскости отметили все точки у которых координаты по \\(x\\) и координаты по \\(y\\) не превосходят 10. Найдите количество пар перпендикулярных отрезков, которые наклонены к осям \\(OX\\) и \\(OY\\) под углом \\(45^\\circ\\) (угол между отрезками равен углу между прямыми на которых лежат эти отрезки)."}, {"index": 9, "url": null, "content": "В многочлене \\((x+y)^{10}(y+z)^{10}(z+x)^{10}\\) найдите коэффициент перед слагаемым \\(x^{10}y^{10}z^{10}\\)."}, {"index": 10, "url": null, "content": "Найдите коэффициент при \\(x^k\\) в разложении \\((1 + x + x^2 + ... + x^{n-1})^2\\)"}, {"index": 11, "url": null, "content": "Будем говорить, что 2 числа, входящие в размещение, образуют инверсию, если большее из них написано ранее, чем меньшее. Сколько инверсий во всех перестановках чисел \\(1, 2, 3, ..., n\\)?"}]}, {"id": "mathematics/probability/[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "name": "[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "problems": [{"index": 0, "url": null, "content": "Найдите сумму натуральных чисел от 1 до 3000 включительно, имеющих с числом 3000 общие делители, большие 1."}, {"index": 1, "url": null, "content": "(\\*) Найдите количество троек натуральных чисел (a; b; c), удовлетворяющих системе уравнений \n\\[\n    \\begin{cases} \n    \\gcd(a;\\, b;\\, c) = 6, \\\\ \n    \\operatorname{lcm}(a;\\, b;\\, c) = 2^{15} \\cdot 3^{16} \n    \\end{cases}\n\\]"}, {"index": 2, "url": null, "content": "Найдите количество восьмизначных чисел, произведение цифр каждого из которых равно 3375. Ответ необходимо представить в виде целого числа."}, {"index": 3, "url": null, "content": "Сколько существует натуральных n меньших 10000 таких, что \\(2^n - n^2\\) делится на 7?"}, {"index": 4, "url": null, "content": "Сколько существует пар натуральных чисел (x; y) меньших 10000 таких, что \\(x^2 + y^2\\) делится на 49?"}, {"index": 5, "url": null, "content": "Найдите натуральное число вида \\(n = 2^x 3^y 5^z\\), зная, что половина его имеет на 30 делителей меньше, треть – на 35 и пятая часть – на 42 делителя меньше, чем само число."}, {"index": 6, "url": null, "content": "Есть 207 различных карточек с числами 1, 2, 3, \\(2^2\\), \\(3^2\\),...,\\(2^{103}\\), \\(3^{103}\\) (на каждой карточке написано ровно одно число, каждое встречается ровно один раз). Сколькими способами можно выбрать 3 карточки, чтобы произведение чисел выбранных карточек было квадратом целого числа, делящегося на 6?"}, {"index": 7, "url": null, "content": "Доказать, что если s — число всех делителей натурального числа n, то произведение всех делителей равно \\(\\sqrt{n^s}\\)."}, {"index": 8, "url": null, "content": "Найдите количество пар целых чисел (a, b) таких, что \\(1 \\leq a \\leq 700\\), \\(1 \\leq b \\leq 700\\), сумма a + b делится на 7, а произведение ab делится на 5. (При \\(a \\neq b\\) пары (a, b) и (b, a) считаются различными.)"}, {"index": 9, "url": null, "content": "Найдите количество натуральных чисел k, не превосходящих 291000 и таких, что \\(k^2 - 1\\) делится нацело на 291."}, {"index": 10, "url": null, "content": "В числе 2*0*1*6*0*2* нужно заменить каждую из 6 звёздочек на любую из цифр 0, 1, 2, 3, 4, 5, 6, 7, 8 (цифры могут повторяться) так, чтобы полученное 12-значное число делилось на 45. Сколькими способами это можно сделать?"}, {"index": 11, "url": null, "content": "Найдите количество решений уравнения:\n\n    1) \\(x^2 + xy = 300000\\) в целых числах\n    2) \\(5x^2 - 6xy + y^2 = 6^{1000}\\) в целых числах\n    3) \\(3^x + 7y = 3^{2016}\\) в натуральных числах"}, {"index": 12, "url": null, "content": "Найдите количество решений уравнения \\(x_1 + x_2 + ... + x_n = m\\) (решения, отличающиеся порядком, считаются различными) В целых числах таких, что \\(x_i \\geq -i\\)"}, {"index": 13, "url": null, "content": "Митя сложил все нечётные натуральные делители некоторого чётного числа N (включая единицу), а Ваня сложил все чётные натуральные делители числа N (включая само число). Затем Ванину сумму умножили на Митину. Может ли произведение быть квадратом натурального числа?"}, {"index": 14, "url": null, "content": "Петя выписал одно за другим 2019 чисел вида \\(\\frac{1 \\cdot 2}{2}\\), \\(\\frac{2 \\cdot 3}{2}\\), ..., \\(\\frac{2018 \\cdot 2019}{2}\\) и вычислил их. Сколько из получившихся чисел имеют в десятичной записи последнюю цифру 8?\n\n\n↑ Перебор остатков"}]}, {"id": "mathematics/probability/[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "name": "[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "problems": [{"index": 0, "url": null, "content": "Сколько шестизначных чисел содержит ровно 3 различные цифры?"}, {"index": 1, "url": null, "content": "Сколько существует троек целых чисел (a; b; c) таких, что они образуют в указанном порядке геометрическую прогрессию, а их произведение равно \\(2^{150} 3^{150}\\)?"}, {"index": 2, "url": null, "content": "Найдите количество семизначных чисел, обладающих следующим свойством: сумма остатков от деления этих чисел на три последовательные степени числа десять равна 12345."}, {"index": 3, "url": null, "content": "Дано число: 5300...0035 (100 нулей). Требуется заменить некоторые два нуля на ненулевые цифры так, чтобы после замены получилось число, делящееся на 495. Сколькими способами это можно сделать?"}, {"index": 4, "url": null, "content": "Докажите, что число \\((n^2)!/(n!)^{n+1}\\) является целым для натуральных значений n."}, {"index": 5, "url": null, "content": "Найдите количество треугольников с целочисленными сторонами и периметром 12n."}, {"index": 6, "url": null, "content": "Найдите количество способов, которыми два человека могут разделить 2n предметов одного сорта, 2n предметов второго сорта и 2n предметов третьего сорта так, чтобы каждый получил 3n предметов."}, {"index": 7, "url": null, "content": "Сколько имеется чисел от 1 до 999999999, у которых сумма цифр равна 11?"}, {"index": 8, "url": null, "content": "Сколько цифр каждого вида потребуется для записи всех натуральных чисел от 1 до \\(10^n - 1\\)?"}, {"index": 9, "url": null, "content": "Доказать, что число треугольников с целочисленными сторонами и периметром \\(4n + 3\\) на \\(n + 1\\) больше числа треугольников с целочисленными сторонами и периметром \\(4n\\)."}, {"index": 10, "url": null, "content": "Найти количество треугольников с целочисленными сторонами, длина сторон которых не больше 2n."}, {"index": 11, "url": null, "content": "Найдите количество способов выбрать из n отрезков длины 1, 2, 3, ..., n (каждый отрезок можно взять более 1-го раза) 4 штуки так, чтобы получился описанный четырехугольник."}]}, {"id": "mathematics/probability/[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "name": "[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "problems": [{"index": 0, "url": null, "content": "Первоклассница Маша, заходя в школу, каждый раз поднимается на школьное крыльцо\nпо лестнице, имеющей 10 ступенек. Находясь внизу лестницы или на очередной её ступеньке, она может либо подняться на следующую ступеньку, либо перепрыгнуть через\nодну ступеньку вверх. Какое минимальное количество раз Маше нужно зайти в школу,\nчтобы подняться на крыльцо всеми возможными способами?"}, {"index": 1, "url": null, "content": "Четырнадцать шаров и четырнадцать урн нумеруются от числами от 1 до 14. Шары\nкладутся в урны так, чтобы в каждой урне оказался ровно один шар. Шар можно положить в урну, если его номер совпадает с номером урны или отличается от него на единицу.\nСколькими способами можно разложить шары по урнам?"}, {"index": 2, "url": null, "content": "Сколько понадобится перекладываний в головоломке ханойская башня, если прямое перемещение диска с 1-го колышка на 3-й и с 3-го на 1-й запрещено (каждое перекладывание\nдолжно производиться через 2-й колышек)? А если добавить дополнительное требование:\nпервый (самый маленький) диск нельзя класть на 2-й колышек?"}, {"index": 3, "url": null, "content": "Сколько имеется разбиений отрезка длины 8 на отрезки длины 1, 2 и 3? (Разбиения,\nотличающиеся порядком следования отрезков, считаются различными.)"}, {"index": 4, "url": null, "content": "Найдите количество натуральных чисел от 0 до 99999 не содержащее двух подряд\nидущих цифр 7 в своей записи?"}, {"index": 5, "url": null, "content": "Петя выписывает все возможные 2018-буквенные слова, состоящие только из букв а, б,\nв. В скольких из них а встречается четное количество раз?\n\n↑ ПОЛУЧИТЬ ОТВЕТ В ЯВНОМ ВИДЕ"}, {"index": 6, "url": null, "content": "Рассмотрим алфавит из 2 букв. Словом будем считать любое конечное сочетание букв.\nНазовем слово непроизносимым, если в нем встречается больше 2 одинаковых букв подряд.\nСколько всего существует непроизносимых слов из 7 букв?"}, {"index": 7, "url": null, "content": "В алфавите жителей сказочной планеты АБ2020 всего две буквы: буква А и буква Б.\nВсе слова начинаются на букву А и заканчиваются тоже на букву А. В любом слове буква\nА не может соседствовать с другой буквой А. Также не может идти подряд больше, чем\n2 буквы Б. Сколько 20-буквенных слов в словаре этой планеты?"}, {"index": 8, "url": null, "content": "n человек выстраиваются по кругу и нумеруются числами от 1 до n. Затем из них\nисключается каждый второй до тех пор, пока не останется только один человек. Например,\nесли n = 10, то порядок исключения таков: 2, 4, 6, 8, 10, 3, 7, 1, 9, так что остается номер"}, {"index": 9, "url": null, "content": "Для данного n будем обозначать через J(n) номер последнего оставшегося человека.\nДокажите, что J(2n) = 2J(n) - 1 и J(2n + 1) = 2J(n) + 1."}, {"index": 10, "url": null, "content": "Пусть \\(a_n\\) - количество перестановок \\((k_1, k_2, ..., k_n)\\) чисел \\((1, 2, \\ldots, n)\\) таких, что выполнены два условия: \\(k_1 = 1\\); для любого номера \\(i = 1, 2, \\ldots, n - 1\\) выполнено неравенство\n\\(|k_i - k_{i+1}| \\leq 2\\). Каково число \\(a_{10}\\)?"}, {"index": 11, "url": null, "content": "Лягушка прыгает по вершинам шестиугольника ABCDEF, каждый раз перемещаясь\nв одну из соседних вершин. а) Сколькими способами она может попасть из A в C за n\nпрыжков? б) Тот же вопрос, но при условии, что ей нельзя прыгать в D?\n\n↑ ПОМНИМ ПРО СИММЕТРИИ"}]}, {"id": "mathematics/probability/[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "name": "[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "problems": [{"index": 0, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций aaa, bbb, ccc."}, {"index": 1, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций ab, ca."}, {"index": 2, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c, начинаются и заканчиваются на букву b и при этом между любыми двумя буквами b находится четное количество букв a."}, {"index": 3, "url": null, "content": "Пусть \\(E_n\\) - это количество способов расставить числа от 1 до n таким образом, чтобы в образовавшемся ряду ровно один раз следующее число было больше предыдущего (например, в расстановке 4312 ровно одно число больше предыдущего). Докажите, что выполняется равенство \\(E_{n+1} = 2E_n + n\\) для любого натурального n."}, {"index": 4, "url": null, "content": "Найдите количество способов разбить прямоугольник размером \\(2 \\times 12\\) на прямоугольники из двух клеточек и уголки, которые состоят из трех клеток."}, {"index": 5, "url": null, "content": "В каждой клетке доски \\(n \\times n\\) написали её координаты (в левой нижней клетке (1;1),\nв следующей клетке этой строки (2;1) и так далее: первая координата - номер строки,\nвторая - номер столбца). После этого из таблицы удалили все клетки у которых сумма\nкоординат больше \\(n+1\\). Найдите количество способов поставить в оставшуюся часть доски\n2 одинаковые ладьи таким образом, чтобы они не били друг друга."}, {"index": 6, "url": null, "content": "Докажите формулу: \\(S(m, n) = \\sum_{k=n-1}^{m-1} C_{m-1}^k \\cdot S(k, n-1)\\), если \\(S(n, k)\\) - число Стирлинга второго рода."}, {"index": 7, "url": null, "content": "Докажите, что \\(\\sum_{k=0}^{n} c(n, k) \\cdot x^k = x(x+1)(x+2)...(x+n-1)\\), где \\(c(n, k)\\) - число Стирлинга первого рода без знака."}, {"index": 8, "url": null, "content": "Докажите, что количество способов соединения 2n точек на окружности n непересекающимися хордами равно \\(C_n\\) (число Каталана)."}, {"index": 9, "url": null, "content": "Докажите, что количество различных бинарных деревьев (узнайте определение), которые содержат \\(2n+1\\) вершину равно \\(C_n\\) (число Каталана). Попробуйте установить явную биекцию между деревьями и правильными скобочными структурами."}, {"index": 10, "url": null, "content": "Сколько существует способов организовать подсчет голосов на выборах с участием двух кандидатов, в которых первый набрал 12 голосов, а второй набрал 8, чтобы первый кандидат опережал второго в течение всего времени подсчета голосов?\n\n↑ ОТРАЖЕНИЕ ПУТИ"}, {"index": 11, "url": null, "content": "Имеются 12 карандашей попарно различной длины. Сколькими способами можно уложить их в коробку в два слоя по шесть карандашей так, чтобы в каждом слое карандаши были упорядочены по возрастанию длины (слева направо), а каждый карандаш верхнего слоя лежал строго над карандашом нижнего слоя и был короче его?\n\n↑ ЧИСЛА КАТАЛАНА"}]}, {"id": "mathematics/probability/[10] 25-11-04 (4) Теория вероятностей 101", "name": "[10] 25-11-04 (4) Теория вероятностей 101", "problems": [{"index": 0, "url": null, "content": "Петя бросает несколько раз на стол игральный кубик и считает сумму очков, выпавших\nна его верхней грани. Для любого натурального числа n событие \\(A_n\\) наступает, если эта\nсумма равна n. Найти вероятность события \\(A_{11}\\)."}, {"index": 1, "url": null, "content": "Через случайно выбранные три вершины куба с ребром 2 проводится плоскость. Найти вероятность того, что площадь сечения превзойдёт 5. Допускается, что эти вершины принадлежат одной грани куба."}, {"index": 2, "url": null, "content": "\\* В квадрате ABCD со стороной 4 расположена точка O, отстоящая от сторон AD и CD\nна расстояние 1. Через точку O совершенно случайно проведена прямая L, разделяющая\nквадрат на две части. Найти вероятность того, что одна из частей будет иметь площадь,\nне превосходящую 3."}, {"index": 3, "url": null, "content": "\\* Точки P, Q расположены на сторонах AB и AC треугольника ABC так, что AP : PB =\n2 : 1, AQ : QC = 1 : 3. Точка M выбрана на стороне BC совершенно случайно. Найти\nвероятность того, что площадь треугольника ABC превосходит площадь треугольника\nPQM не более, чем в три раза. Найти математическое ожидание случайной величины –\nотношения площадей треугольников PQM и ABC."}, {"index": 4, "url": null, "content": "В колоде 10 карт, на каждой из них нарисовано одно из чисел от 1 до 10. Случайно\nвыбранную из колоды карту кладут на стол, показывают всем написанное на ней число\nи возвращают её в колоду. После этого колода тщательно перемешивается и готова к\nпродолжению игры. Петя выкладывал на стол карту три раза. Какова вероятность того,\nчто сумма выпавших чисел оказалась равной 5?\n\nПОМНИМ ПРО ГЕОМЕТРИЧЕСКУЮ ВЕР-СТЬ"}, {"index": 5, "url": null, "content": "Два игрока подбрасывают монету. Один считает выпавшие орлы, другой решки. Выигрывает тот, кто первым наберет 20 очков. Сейчас счет 19:17 в пользу первого игрока.\nКакова вероятность того, что он выиграет? (Ответ запишите в виде несократимой дроби)"}, {"index": 6, "url": null, "content": "В одной урне лежат 4 зеленых и 6 красных шариков, а в другой - 16 зеленых и N\nкрасных. Из каждой урны наугад вытаскивают по одному шарику. Вероятность того, что\nшарики окажутся одного цвета, равна 0,58. Найдите N."}, {"index": 7, "url": null, "content": "Из набора {1, 2, 3, ..., 10} наугад выбираются два различных числа. Найдите вероятность\nтого, что их произведение чётно. Если необходимо, округлите ответ с точностью до 0,01."}, {"index": 8, "url": null, "content": "На гранях игрального кубика написаны числа от 1 до 6. Однако вес кубика распределён\nнеравномерно и вероятность выпадения числа k прямо пропорциональна k. Кубик бросают\nдва раза подряд. Какова вероятность того, что сумма двух выпавших чисел будет равняться 7?\nЕсли необходимо, округлите ответ до 0,01."}, {"index": 9, "url": null, "content": "Монета искривлена так, что вероятность выпадения ровно 3-х орлов в серии из 5-ти бросков равна вероятности выпадения ровно 2-х орлов в серии из 4-х бросков. Найдите\nвероятность того, что в серии из 6-ти бросков выпадет не менее 3-х орлов. Если необходимо,\nответ округлите до сотых."}, {"index": 10, "url": null, "content": "На детском новогоднем празднике раздавали шоколадные и фруктовые конфеты. Дети\nподходили к деду Морозу, залезали рукой в его мешок и вынимали из него по две конфеты. Когда Петя подошел к мешку, он понял, что шоколадных конфет в мешке почти не\nосталось и вероятность получить две шоколадные конфеты в три раза меньше, чем шоколадную и фруктовую. Какое наименьшее число шоколадных конфет могло находиться в\nмешке деда Мороза в момент, когда Петя забирал свои конфеты, если после него ещё не\nменее 10 детей получили свои конфеты до того, как мешок опустел?"}]}, {"id": "mathematics/probability/[14] 25-11-24 (6.1) Классика", "name": "[14] 25-11-24 (6.1) Классика", "problems": [{"index": 0, "url": null, "content": "(j) Вася наугад написал на доске семизначное число. Какова вероятность того, что в\nнём все цифры различны? Ответ запишите в виде десятичной дроби."}, {"index": 1, "url": null, "content": "(j) Куб со стороной 10 см окрасили по поверхности, разделили на \\(10^3\\) кубиков со стороной 1 см, перемешали кубики, наугад выбрали один. Какова вероятность того, что у этого\nкубика ровно одна окрашенная грань? Какова вероятность того, что у этого кубика хотя\nбы две окрашенные грани?"}, {"index": 2, "url": null, "content": "(j) Перед нами колода из 36 карт. Какова вероятность того, что среди вытянутых наугад 6\nкарт найдутся не менее трёх королей и ровно две пятерки? В качестве ответа укажите одно\nвещественное число, округлённое до четырёх знаков после запятой: значение вероятности,\nумноженное на \\(10^3\\)"}, {"index": 3, "url": null, "content": "(j) Польский математик Стефан Банах имел привычку носить в каждом из двух карманов пальто по коробку спичек. Всякий раз, когда ему хотелось закурить трубку, он\nвыбирал наугад один из коробков и доставал из него спичку. Первоначально в каждом\nкоробке было по n спичек. Но когда-то наступает момент, когда выбранный наугад коробок оказывается пустым. Какова вероятность того, что в другом коробке в этот момент\nосталось ровно k спичек?"}, {"index": 4, "url": null, "content": "(m) В стране 3 города, каждый город соединен с каждым дорогой. Дорога может быть\nразрушена с вероятностью 1/2. Найдите вероятность того, что в стране из любого города\nможно добраться до любого другого города"}, {"index": 5, "url": null, "content": "(m) Имеются n различных палочек. Каждая из них разламывается на две неодинаковые части короткую и длинную. Получившиеся 2n обломков перемешивают и наугад\nсклеивают попарно в новые 2n палочек. Найти вероятность того, что каждая из новых\nпалочек склеена из длинного и короткого обломка"}, {"index": 6, "url": null, "content": "(m) Дана матрица n на n со случайными значениями из конечного поля Fq. Найти\nвероятность того, что матрица будет вырождена"}, {"index": 7, "url": null, "content": "(s) Рассмотрим случайную перестановку на n элементах. Докажите, что данные k элементов окажутся в одном цикле с вероятностью 1/k."}, {"index": 8, "url": null, "content": "(s) Имеется n женщин и n мужчин, их случайно рассаживают за круглый обеденный\nстол. Какова вероятность, что в полученной рассадке гостей можно разбить на непересекающиеся пары так, что в одной пар есть и мужчина и женщина?"}, {"index": 9, "url": null, "content": "(s) Чёрный куб покрасили снаружи белой краской, затем разрезали на 27 одинаковых\nмаленьких кубиков и как попало сложили из них большой куб. С какой вероятностью все\nграни этого куба будут белыми?"}]}, {"id": "mathematics/probability/[14] 25-11-24 (6.2) Арифметика событий", "name": "[14] 25-11-24 (6.2) Арифметика событий", "problems": [{"index": 0, "url": null, "content": "(j) n точек бросили на окружность единичной длины. Какова вероятность, что все\nточки принадлежат дуге длины x?"}, {"index": 1, "url": null, "content": "(j) Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях\n(различные числа выпадают с равной вероятностью). Какова вероятность того, что хотя\nбы на одной из них выпало 7, если сумма выпавших значений не превосходит 20?"}, {"index": 2, "url": null, "content": "(j) Доказать, что события A и B независимы, то также независимы события а) A и\n\\(\\overline{B}\\); б) \\(\\overline{A}\\) и \\(\\overline{B}\\)."}, {"index": 3, "url": null, "content": "(m) Игральный кубик подбросили 3 раза. Найдите вероятность того, что полученные\nтри числа могут быть длинами сторон некоторого треугольника."}, {"index": 4, "url": null, "content": "(j) В вершинах а) треугольника б) четырех угольника с диагоналями в) куба г) октаэдра д) додекаэдр е) икосаэдра сидят муравьи (по одному в каждой вершине). В некоторый\nмомент времени они начинают ползти по ребрам в одну из соседних вершин. Какова вероятность того, что какие-то два муравья встретятся на ребре (не в вершине)"}, {"index": 5, "url": null, "content": "(j) Независимые в совокупности события \\(A_1, A_2, \\ldots, A_n\\) имеют вероятности \\(p_1, p_2, \\ldots, p_n\\)\nсоответственно. Докажите, что \\(1 - e^{-(p_1+p_2+\\ldots+p_n)} < P(A_1 + A_2 + \\ldots + A_n) < p_1 + p_2 + \\ldots + p_n\\)"}, {"index": 6, "url": null, "content": "(j) В кинотеатре капризный менеджер объявляет, что она подарит бесплатный билет\nпервому человеку в очереди, чей день рождения совпадает с днем рождения того, кто\nуже купил билет. Вам предоставляется возможность выбрать любую позицию в очереди.\nПредполагая, что вы не знаете, у кого когда день рождения, и все дни рождения распределяются случайным образом в течение года (предполагая, что в году 365 дней), какая\nпозиция в очереди дает вам наибольшие шансы получить бесплатный билет?"}, {"index": 7, "url": null, "content": "(m) Монету подбросили 10 раз. Найдите вероятность того, что в последовательности результатов этого опыта не будет двух последовательных орлов."}, {"index": 8, "url": null, "content": "(m) Три теннисиста (А, В и С) играют в турнире по следующей схеме. Сначала А\nиграет с В, а во всех следующих партиях победитель последней партии встречается с\nучастником, не игравшим в этой партии. Победителем турнира считается тот, кто выигрывает две партии подряд. Найдите вероятность победы для каждого участника."}, {"index": 9, "url": null, "content": "(m) Дано множество \\(A = \\{1, \\ldots, n\\}\\). Среди всех его подмножеств равновероятно\nвыбираются k его подмножеств. Найдите вероятность того, что \\(A_1 \\cap A_2 \\cap \\ldots A_k = \\emptyset\\)."}, {"index": 10, "url": null, "content": "(j) Из чисел от 1 до 100 случайно выбирается n чисел какова вероятность, что k-ое\nпо величине число равно x?"}, {"index": 11, "url": null, "content": "(j) Из чисел от 1 до 100 последовательно, без возащения выбирается три числа. Какова\nвероятность, что третье выбранное число будет заключено между первыми двумя?"}, {"index": 12, "url": null, "content": "(j) Три стрелка, попадающие в цель независимо друг от друга с вероятностями 0,5,\n0,4 и 0,3 соответственно, выстрелили по мишени одновременно. Какова вероятность того,\nчто в мишени:\n    а) не образовалось ни одной пробоины (событие \\(X_0\\));\n    б) образовалась одна пробоина (событие \\(X_1\\));\n    в) образовалось две пробоины (событие \\(X_2\\));\n    г) образовалось три пробоины (событие \\(X_3\\));\n    д) образовалась хотя бы одна пробоина (событие Y);\n    е) образовалось не менее двух пробоин (событие Z)?"}, {"index": 13, "url": null, "content": "(m) Джордж, Гаррис и Джей выбирают один из трёх маршрутов своего будущего путешествия. Каждый упорядочивает маршруты по своему предпочтению. Они договорились\nсчитать вариант a лучше варианта b, если a предпочтительнее b по мнению большинства.\nС какой вероятностью найдётся маршрут, который в глазах путешественников лучше двух\nдругих, если их предпочтения равновероятны и независимы?"}, {"index": 14, "url": null, "content": "(m) Если вероятность наблюдения хотя бы одного автомобиля на шоссе в течение\nлюбого 20-минутного интервала времени равна 609/625, то какова вероятность наблюдения хотя бы одного автомобиля в течение любого 20-минутного интервала времени?\n5-минутный интервал времени? Предположим, что вероятность увидеть автомобиль в любой момент одинакова (постоянна) в течение всех 20 минут."}, {"index": 15, "url": null, "content": "(s) У вас имеется неограниченное число костей в форме всех возможных правильных\nмногогранников. Можно ли, однократно бросив некоторый набор таких костей, симулировать бросок а) правильной семигранной кости б) правильной 15-гранной кости."}]}, {"id": "mathematics/probability/[14] 25-11-24 (6.3) Условная вероятность", "name": "[14] 25-11-24 (6.3) Условная вероятность", "problems": [{"index": 0, "url": null, "content": "(j) Один и тот же предмет в университете изучают студенты трёх групп: в первой\n25 человек, а во второй и третьей по 20. Вероятность, что случайный студент первой\nгруппы сдаст экзамен 75%. Во второй группе эта вероятность равна 70%, а в третьей\n- 90%. Известно, что Вася сдал экзамен. Найдите вероятности того, что Вася учится в\nпервой, второй или третьей те группе соответственно."}, {"index": 1, "url": null, "content": "(j) Вам дается 1000 монет. Среди них 1 монета с орлами с обеих сторон. Остальные\n999 монет - честные. Вы случайным образом выбираете монету и подбрасываете её 10\nраз. Каждый раз монета выпадает орлом. Какова вероятность того, что выбранная вами\nмонета окажется нечестной?"}, {"index": 2, "url": null, "content": "(j) Имеется две коробки. В первой находится 4 синих шара и 5 красных, а во второй\n- 1 синий и 5 красных. Случайно равновероятно выбирается коробка и из неё выбирается\nслучайно равновероятно шар. Найти вероятность, что была выбрана первая коробка при\nусловии, что шар оказался красным."}, {"index": 3, "url": null, "content": "(j) Вася бросил три восьмигранных кости с различными числами от 1 до 8 на гранях\n(различные числа выпадают с равной вероятностью). Какова вероятность того, что хотя\nбы на одной из них выпало 7, если сумма выпавших значений не превосходит 20?"}, {"index": 4, "url": null, "content": "(j) На складе лежат ноутбуки \"Плутон\". Их производят по одному и тому же чертежу\nдва завода: Завод красного знамени \"Поломка\" и Радиотехнический завод им. Криворучкина. На складе изделия этих заводов представлены в отношении 4:3. Известно, что 1 из\n1000 ноутбуков производства ЗКЗ \"Поломка\" бракован, а у РЗ им. Криворучкина бракован\nтолько 1 из 1500 ноутбуков. Один из случайно выбранных ноутбуков на складе оказался\nсломан. Какова вероятность, что он был произведен на ЗКЗ \"Поломка\"?"}, {"index": 5, "url": null, "content": "(j) Маша любит саморазвитие. Для этого она покупает книги с собранием цитатами\nвеликих людей. Если цитата ей нравится, она выкладывает её в свой инстаграм. Маша\nпришла в магазин с целью купить очередную книгу. Она нашла n + 1 новую книгу с\nцитатами. В каждой книге n цитат. Всего в книгах \\(\\frac{n(n+1)}{2}\\) цитат, которые понравятся Маше.\nЦитаты распределены по следующему правилу:\n    - Есть одна книга, в которой нет ни одной подходящей Маше цитаты.\n    - Есть одна книга, в которой ровно две хороших цитаты.\n    - . . .\n    - Есть ровно одна книга, в которой все цитаты - хорошие.\n    Маша наугад выбрала книгу и прочитала случайную цитату. Цитата ей понравилась\nи Маша случайно выбрала еще одну цитату из этой же книги. Какова вероятность, что и\nвторая цитата ей понравится."}, {"index": 6, "url": null, "content": "(j) Маша каждый день после работы собирается пойти на спорт. Известно, что она\nтак и не сходит на спорт на неделе с вероятностью 1/3, а с вероятностью 2/3 сходит, но\nтолько в один из будних дней, причём в любой из них с равной вероятностью. В пятницу утром\nАня заметила, что Маша так и не сходила на спорт на этой неделе. Какова вероятность\nтого, что в пятницу она всё-таки сходит на спорт? В качестве ответа введите несократимую\nдробь, например: 1/2."}, {"index": 7, "url": null, "content": "(j) В каждой из урн содержится 2 черных и 8 белых шаров. Из первой урны наудачу\nизвлечен 1 шар и переложен во вторую урну, после чего из второй урны извлечен шар.\n    а) Найдите вероятность того, что шар, извлеченный из второй урны, окажется белым.\n    Ели извлеченный шар оказался белым, то какова вероятность того, что из первой урны\n    извлечен и переложен во вторую урну: б) белый шар; в) черный шар."}, {"index": 8, "url": null, "content": "(j) Имеется пять урн. В 1-й, 2-й и 3-й урнах находится по 2 белых и 3 черных шара;\nв 4-й и 5-й урнах - по 1 белому и 1 черному шару. Случайно выбирается урна и из нее\nизвлекается шар. Какова условная вероятность того, что выбрана 4-я или 5-я урна, если\nизвлеченный шар оказался белым?"}, {"index": 9, "url": null, "content": "(j) В мешке лежат шары трёх цветов: 6 красных, 2 чёрных, 2 белых. Мы вытаскиваем\nпоследовательно 5 шаров. Какова вероятность, что первые два шара были чёрными при\nусловии, что четвёртый и пятый были красным и белым соответственно. В качестве ответа\nукажите одно вещественное число сло, округлённое до четырёх знаков после запятой:\nзначение вероятности."}, {"index": 10, "url": null, "content": "(j) В первой коробке лежит 4 чёрных шара и 3 белых. Во второй коробке лежит 5 чёрных и 4 белых шара. Из первой коробки наугад выбирается один шар и перекладывается\nво вторую, после чего из второй коробки достаётся произвольный шар. Если известно,\nчто он оказался чёрным, какова вероятность того, что из первой во вторую коробку переложили белый шар? В качестве ответа введите одно вещественное число, округлённое до\nдесяти знаков, с точкой в качестве разделителя - значение вероятности."}, {"index": 11, "url": null, "content": "(j) Из урны, содержащей a белых и b черных шаров, три игрока извлекают шары\nпо очереди. Выигрывает тот, кому раньше попадается белый шар. Найти вероятности\n\\(p_1, p_2, p_3\\) выигрыша 1-го, 2-го, 3-го игроков в случаях, когда шары извлекаются:\n    а) по схеме равновероятного выбора с возвращением,\n    б) по схеме равновероятного выбора без возвращения."}, {"index": 12, "url": null, "content": "(j)\n    а) Игроки А, В и С сменяя друг друга, по очереди кидают две игральные кости\n    до тех пор пока не получат сумму очков, равную 7. Найдите вероятность того, что\n    сумму очков равную 7 получит В.\n    б) В результате проведения эксперимента возможны два исхода: успех\n    (с вероятностью p) и неуспех (с вероятностью 1-p). Экспериментаторы А, В и С сменяя\n    друг друга, по очереди проводят этот эксперимент до тех пор пока не получат успех.\n    Найдите максимальное значение вероятности p, при котором вероятность того, что\n    успех получит В больше либо равна 1/3."}, {"index": 13, "url": null, "content": "(j) По паутине, имеющей вид правильного шестиугольника, разбитого на правильные\nтреугольники, двигается мошка. В середине паутины (точка О) сидит паук. На каждой\nразвилке нитей паутины мошка выбирает маршрут случайным образом, в частности, может повернуть назад. Если мошка попадает в точку О, то паук её съедает. Найдите вероятность того, что начав прогулку по паутине в вершине шестиугольника, мошка в неё\nвернется"}, {"index": 14, "url": null, "content": "(j) Иван бросает два дротика в мишень для дартса, целясь в центр. Второй дротик\nпопадает дальше от центра, чем первый. Если Иван бросает третий дротик, целясь в\nцентр, какова вероятность того, что третий бросок будет дальше от центра, чем первый?\nПредположим, что мастерство Ивана постоянно."}, {"index": 15, "url": null, "content": "(j) Вы достаете конфеты одну за другой из банки, в которой находится 10 красных\nконфет, 20 синих конфет и 30 зеленых конфет. Какова вероятность того, что в банке\nостанется по крайней мере 1 синяя конфета и 1 зеленая конфета, когда вы достанете все\nкрасные конфеты?"}, {"index": 16, "url": null, "content": "(j) Давайте сыграем в традиционную версию русской рулетки. В 6-камерный револьвер вставляется одна пуля. Барабан вращается случайным образом, так что каждая камера с одинаковой вероятностью окажется под ударником. Два игрока по очереди нажимают\nна спусковой крючок, направляя пистолет, к сожалению, себе в голову, без дальнейшего\nвращения, пока пистолет не выстрелит и убитый человек не проиграет.\n    а) Если вы, один из игроков, и можете выбрать, играть первым или вторым, что\n    вы выберете? И какова ваша вероятность проигрыша?\n    б) Теперь давайте немного изменим правила. Мы будем снова вращать барабан\n    после каждого нажатия на спусковой крючок. Выберете ли вы быть первым\n    или вторым игроком? И какова ваша вероятность проигрыша?\n    в) Если вместо одной пули в патронник случайным образом помещены две пули.\n    Ваш противник сыграл первым, и он остался жив после первого нажатия на спусковой\n    крючок. Вам предоставляется выбор, крутить ли барабан.\n    Стоит ли вам крутить барабан?\n    г) Что, если две пули случайным образом окажутся в двух последовательных\n    положениях? Если ваш противник выжил в первом раунде,\n    следует ли вам вращать барабан?"}, {"index": 17, "url": null, "content": "(m) Имеются 2n шаров с числами \\(1, \\ldots, n\\), каждое число встречается по два раза. Эти\nшары случайным образом раскладываются по два в n урн. Из каждой урны вынимается\nодин Какова вероятность того на ванутых шарах все чиепаваничные?"}, {"index": 18, "url": null, "content": "(m) Рядом стоят 2 мешка: один с левыми, а другой с правыми тапками. В каждом\nровно по 11 различных тапка. Уникальных пар ровно 11. Два друга решили собрать хотя\nбы одну пару и выбрали по мешку. Оба тянут тапки из своего мешка таким образом, что\nкаждый тапок вытягивается независимо и с вероятностью Какова вероятность того, что\nдрузья собрали хотя бы 1 пару при условии, что «левый друг» вытянул как минимум три\nтапка?"}, {"index": 19, "url": null, "content": "(m) Баскетболистка выполняет 100 штрафных бросков. Она набирает одно очко, если\nмяч проходит через обруч, и ноль очков, если промахивается. Она забила со своего первого\nброска и промахнулась со второго. Для каждого из следующих бросков вероятность того,\nчто она забьёт, равна доле бросков, которые она сделала на данный момент. Например,\nесли она набрала 23 очка после 40-го броска, вероятность того, что она забьёт в 41-м\nброске, равна 23/40. Какова вероятность того, что после 100 бросков (включая первый и\nвторой) она забьёт ровно 50 корзин?"}, {"index": 20, "url": null, "content": "(m) Трое заключенных, А, В и С, с одинаково примерным поведением, подали заявку на условно-досрочное освобождение. Комиссия решила освободить двух из них, и\nзаключенные знают об этом, но не знают, кого именно. Надзиратель заключенного А знает, кто должен быть освобожден. А не может спросить у надзирателя, будет ли он сам\n(А) освобожден, но может спросить имя (кроме своего) другого счастливчика. А думает,\nчто прежде чем он спросит, его шанс на освобождение равен 2/3. Он думает, что если\nнадзиратель скажет \"В будет освобожден его шанс снизится до 1/2, потому что либо А и\nВ, либо В и С будут освобождены. И поэтому А решает не уменьшать свои шансы, и не\nспрашивать. Объясните, что не так в рассуждениях А."}, {"index": 21, "url": null, "content": "(m) В первой урне a белых, b черных шаров. Во второй урне белых, d черных шаров.\nНаугад выбирается урна и из нее извлекается шар без возращения. Шар оказался белым.\nНайти вероятность извлеченный из той же урны шар окажется белым."}, {"index": 22, "url": null, "content": "(m) На маркетплейсе Озон ноутбук \"Плутон\" продают три продавца: ООО \"Слепили\nиз того, что было ИП Билл Гейтс и АО \"Импортозамещение\". На них приходится 25%,\n45% и 30% продаж соответственно. Доля брака в их продукции составляет 2%, 3% и\n5% соответственно. Найдите вероятность того, что два случайно выбранных бракованных\nноутбука \"Плутон\" были проданы одним и тем же продавцом."}, {"index": 23, "url": null, "content": "(m) При каждом выстреле, независимо от остальных выстрелов, первый стрелок попадает в мишень с вероятностью \\(p_1\\), второй с вероятностью \\(p_2\\). Из них наугад выбирается\nодин стрелок. Пусть А и В - события, состоящие в том, что выбранный стрелок попадет в\nмишень при первом и, соответственно, при втором выстреле. Какими являются события\nА и В - зависимыми или независимыми?"}, {"index": 24, "url": null, "content": "(m) При каждом выстреле, независимо от остальных выстрелов, первый стрелок попадает в мишень с вероятностью 0,8, второй с вероятностью 0,7. Из них наугад выбирается\nодин стрелок. Первый выстрел, произведенный им, оказался успешным. С какой вероятностью успешным будет и второй выстрел, произведенный этим стрелком?"}, {"index": 25, "url": null, "content": "(m) Имеется n урн, в каждой из которых находится a белых и b черных шаров. Наугад\nпоследовательно перекладывают по одному шару из первой урны во вторую, из второй\nурны в третью, . . . , из \\((n − 1)\\)-й урны в n-ю, из n-й урны в первую. Найдите вероятность\nтого, что шар, наугад извлеченный после этого из n-й урны, окажется белым."}, {"index": 26, "url": null, "content": "(m) На плоскости расположен правильный тетраэдр. Раз в минуту он переворачивается через одно из рёбер, причём перевороты через разные рёбра равновероятны. Найдите\nвероятность также рани внача е"}, {"index": 27, "url": null, "content": "(m) Игрок выбирает герб или решку, после чего бросается монета. Если выпадает\nсторона, названная игроком, он выигрывает 1 рубль; в противном случае игрок проигрывает 1 рубль. Обладая начальным капиталом в a рублей, игрок ставит себе целью довести\nкапитал до \\(b > a\\) рублей. Игра заканчивается, когда игрок либо набирает сумму b, либо\nразоряется, проиграв весь имевшийся у него капитал. Какова вероятность того, что игрок\nразорится?"}, {"index": 28, "url": null, "content": "(m) Двое по очереди подбрасывают монету. Выигрывает тот, у которого раньше выпадут подряд два орла. Найдите вероятность выигрыша для первого игрока."}, {"index": 29, "url": null, "content": "(m) Монету подбрасывают несколько раз до тех пор, пока не выпадут подряд три\nорла или две решки. Какова вероятность того, что бросания завершатся выпадением трех\nорлов? Вероятности выпадения орла и решки равны 1/2, результаты бросков независимы\nодин от другого."}, {"index": 30, "url": null, "content": "(s) При посадке в самолет выстроилась очередь из n пассажиров, у каждого из которых имеется билет на одно из n мест. Первой в очереди стоит сумасшедшая старушка. Она\nвбегает в салон и садится на случайное место (возможно, и на своё). Далее пассажиры по\nочереди занимают свои места, а в случае, если своё место уже занято, садятся случайным\nобразом на одно из свободных мест. Какова вероятность того, что последний пассажир\nзаймет своё место."}, {"index": 31, "url": null, "content": "(s) В обществе анонимных подарков состоят 3n человек. Они готовят подарки друг\nдругу на Новый год. Известно, что ровно n человек хотели бы получить в подарок галстук, n человек — носки, а n человек — ручного динозавра. Каждый из членов общества\nслучайно выбирает и покупает подарок среди тех двух, что он сам не хотел бы получить\n(например, если он хочет получить носки, то купит галстук или динозавра). Собравшись\nна новогоднюю вечеринку, члены общества сложили свои подарки в общую кучу, а в конце\nпраздника разобрали их случайно. Алиса и Боб входят в общество анонимных подарков.\nАлиса хотела бы получить в подарок ручного динозавра, а Боб — носки. Найдите вероятность того, что ни Алиса, ни Боб не получат те подарки, которые хотели."}]}, {"id": "mathematics/probability/[14] 25-11-24 (6.4) Геометрическая вероятность", "name": "[14] 25-11-24 (6.4) Геометрическая вероятность", "problems": [{"index": 0, "url": null, "content": "(j) Какова вероятность, что случайно выбранная точка из прямоугольника со сторонами a и b окажется внутри окружности радиуса с центром в левом верхнем углу прямоугольника (точки внутри прямоугольника распределены равномерно)?"}, {"index": 1, "url": null, "content": "(j) Два друга решили вместе пойти на экзамены в ШАД и договорились встретиться у входа с 14:00 до 15:00, но не договорились во сколько именно. Момент времени прихода каждого из них распределен равномерно на этом отрезке времени, но друзья нетерпеливые, поэтому через 15 минут ожидания они отчаиваются дождаться и заходят одни. Известно, что они встретились. Найдите вероятность того, что оба пришли до 14:40. Округлите ответ до 10 знаков после запятой."}, {"index": 2, "url": null, "content": "(j) Лёша и Марина договорились встретиться между 8 : 00 и 9 : 00 и вместе пойти на экзамен в ШАД. Каждый из них приходит на место встречи в случайный момент времени, ждёт 15 минут и уходит (никому не хочется опоздать на экзамен). Являются ли независимыми события \"Лёша и Марина не встретились\" и \"хотя бы один из них пришел после 8 : 45\"? Время считайте непрерывным."}, {"index": 3, "url": null, "content": "(j) В мишень, которая представляет собой прямоугольник размера \\(3 \\times 2\\), стреляют из пистолета. Известно, что отклонение пули от точки, на которую нацелен пистолет, произвольно, но не превышает 0.1 по любому направлению, параллельному сторонам прямоугольника. Стрелок целится в произвольную точку мишени. С какой вероятностью он попадет в мишень?"}, {"index": 4, "url": null, "content": "(j) Точку бросают наугад в круг \\(x^2 + y^2 < 1\\). Какова вероятность того, что:\n    а) расстояние от точки до центра круга превысит 1/2;\n    б) абсцисса точки будет не больше 1/2;\n    в) точка окажется вне квадрата, вписанного в данный круг."}, {"index": 5, "url": null, "content": "(j) Находясь в начальный момент времени в точке О, она совершает последовательно два прыжка: направо (в положительном направлении) и налево (в отрицательном направлении). Длины прыжков - независимые равномерные случайные величины. Длина первого прыжка равномерно распределена на отрезке [0, 4] а второго - на отрезке [0, 2]. Какова вероятность, что после двух прыжков она окажется в точке, удаленной от О на расстояние не больше 1?"}, {"index": 6
