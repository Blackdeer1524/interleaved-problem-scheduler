<style>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
    </div>
    <div id="folder-bar"></div>
  </aside>
  <div class="sidebar-resizer" id="sidebar-resizer"></div>
  <div class="main">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('train')">Train</button>
      <button class="nav-tab" onclick="switchView('solved')">Solved (<span id="solved-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('failed')">Failed (<span id="failed-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('buried')">Buried (<span id="buried-count">0</span>)</button>
      <button class="nav-tab" onclick="switchView('stats')">Stats</button>
    </div>
    <div id="train-view">
      <div class="header">
        <div class="progress" id="progress">Loading…</div>
        <div class="timer-row">
          <span>⏱</span>
          <input type="number" id="timer-min" min="0" max="99" value="0" title="minutes">
          <span>:</span>
          <input type="number" id="timer-sec" min="0" max="59" value="0" title="seconds">
          <button id="timer-start-btn" onclick="userStartTimer()">Start</button>
          <span id="timer-display"></span>
          <span id="overtime-label"></span>
          <button id="timer-reconfig-btn" onclick="reconfigureTimer()" style="display:none">Reconfigure</button>
        </div>
      </div>
      <hr class="divider">
      <div class="problem-area" id="problem-area">
        <div class="status">Loading problems…</div>
      </div>
      <div class="hint-row" id="hint-row" style="display:none">
        <button class="hint-btn" onclick="showHint()">Show hint</button>
        <div class="hint-path" id="hint-path"></div>
        <button class="hint-btn" id="copy-md-btn" onclick="copyMarkdown()" style="margin-left:auto">Copy markdown</button>
      </div>
      <div id="answer-section" style="display:none">
        <textarea id="answer-text" placeholder="Your answer…" rows="4"></textarea>
        <div id="answer-image-list"></div>
        <div id="answer-drop-zone">Paste or drop images here</div>
      </div>
      <div class="actions" id="actions" style="display:none">
        <button class="btn btn-danger" onclick="failProblem()">Fail ✗</button>
        <button class="btn btn-hard" onclick="markSolved('hard')">Hard</button>
        <button class="btn btn-good" onclick="markSolved('good')">Good</button>
        <button class="btn btn-easy" onclick="markSolved('easy')">Easy</button>
        <button class="btn btn-secondary" onclick="delayProblem()">Delay</button>
        <button class="btn btn-secondary" onclick="buryProblem()">Bury</button>
      </div>
    </div>
    <div id="solved-view" style="display:none"></div>
    <div id="failed-view" style="display:none"></div>
    <div id="buried-view" style="display:none"></div>
    <div id="stats-view" style="display:none"></div>
  </div>
</div>

<script>
let topics = [];
let solved = {};
let failed = {};
let buried = {};
let difficulties = {};
let selectedTopics = new Set();
let collapsedNodes = new Set();
let folderTree = null;
let deck = [];
let deckIdx = 0;
let timerHandle = null;
let timerRemaining = 0;
let timerActive = false;
let answers = {};
let currentImages = [];
let currentView = 'train';
let timeStats = {};
let statsCollapsed = new Set();
let problemStartTime = null;

// ── Folder tree ───────────────────────────────────────────────────────────────

function buildTree(topicIds) {
  const root = { path: null, topicId: null, isLeaf: false, children: {} };
  for (const id of topicIds) {
    let node = root;
    const parts = id.split('/');
    for (let i = 0; i < parts.length; i++) {
      const key = parts[i];
      if (!node.children[key]) {
        node.children[key] = {
          name: key,
          path: parts.slice(0, i + 1).join('/'),
          topicId: null,
          isLeaf: false,
          children: {},
        };
      }
      node = node.children[key];
    }
    node.isLeaf = true;
    node.topicId = id;
  }
  return root;
}

function getLeaves(node) {
  if (node.isLeaf) return [node.topicId];
  return Object.values(node.children).flatMap(getLeaves);
}

function findNode(root, path) {
  let node = root;
  for (const part of path.split('/')) {
    node = node.children[part];
    if (!node) return null;
  }
  return node;
}

function unsolvedInTopic(topicId) {
  const t = topics.find(x => x.id === topicId);
  if (!t) return 0;
  const s = solved[topicId] || new Set();
  return t.problems.filter(p => !s.has(p.index)).length;
}

function renderTreeHtml(node) {
  return Object.values(node.children)
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(child => {
      const leaves = getLeaves(child);
      const selCount = leaves.filter(l => selectedTopics.has(l)).length;
      const checked = selCount === leaves.length;
      const indet = selCount > 0 && selCount < leaves.length;
      const rem = leaves.reduce((n, id) => n + unsolvedInTopic(id), 0);
      const p = escHtml(child.path);
      const isCollapsed = !child.isLeaf && collapsedNodes.has(child.path);
      const arrow = child.isLeaf
        ? `<span class="folder-arrow-spacer"></span>`
        : `<span class="folder-arrow" onclick="event.stopPropagation();toggleCollapse('${p}')">${isCollapsed ? '▶' : '▼'}</span>`;
      const subtree = (!child.isLeaf && !isCollapsed)
        ? `<ul class="folder-subtree">${renderTreeHtml(child)}</ul>` : '';
      let levelBtns = '';
      if (!child.isLeaf) {
        const btnHtml = ['junior', 'middle', 'senior'].map(lv => {
          const matching = leaves.filter(id => id.split('/').includes(lv));
          if (!matching.length) return '';
          const allSel = matching.every(id => selectedTopics.has(id));
          return `<button class="folder-level-btn${allSel ? ' active' : ''}" onclick="event.stopPropagation();selectByLevelInNode('${p}','${lv}')" title="${lv}">${lv[0].toUpperCase()}</button>`;
        }).join('');
        if (btnHtml) levelBtns = `<div class="folder-level-btns">${btnHtml}</div>`;
      }
      return `<li class="folder-node">
  <div class="folder-row" onclick="toggleNode('${p}')">
    ${arrow}<input type="checkbox" ${checked ? 'checked' : ''} data-indet="${indet}"
           onclick="event.stopPropagation();toggleNode('${p}')">
    <span>${escHtml(child.name)}</span>
    ${levelBtns}
    <b class="folder-count">${rem}</b>
  </div>${subtree}</li>`;
    }).join('');
}

function toggleCollapse(path) {
  if (collapsedNodes.has(path)) collapsedNodes.delete(path);
  else collapsedNodes.add(path);
  saveCollapsed();
  renderFolderBar();
}

function saveCollapsed() {
  localStorage.setItem('algo_shad_collapsed', JSON.stringify([...collapsedNodes]));
}

function loadCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_collapsed') || '[]');
    collapsedNodes = new Set(saved);
  } catch { collapsedNodes = new Set(); }
}

function saveStatsCollapsed() {
  localStorage.setItem('algo_shad_stats_collapsed', JSON.stringify([...statsCollapsed]));
}

function loadStatsCollapsed() {
  try {
    const saved = JSON.parse(localStorage.getItem('algo_shad_stats_collapsed') || '[]');
    statsCollapsed = new Set(saved);
  } catch { statsCollapsed = new Set(); }
}

// ── Persistence ───────────────────────────────────────────────────────────────

async function loadSolved() {
  if (window.__TOPICS__) {
    // Static dist.html mode: localStorage is the live store; __SOLVED__ is only a first-run seed
    try {
      const raw = localStorage.getItem('algo_shad_solved');
      if (raw) {
        for (const [k, v] of Object.entries(JSON.parse(raw)))
          solved[k] = new Set(v);
        return;
      }
    } catch {}
    try {
      if (window.__PROGRESS__) {
        for (const [topicId, entries] of Object.entries(window.__PROGRESS__))
          for (const [idxStr, entry] of Object.entries(entries))
            if (entry.status === 'solved') {
              if (!solved[topicId]) solved[topicId] = new Set();
              solved[topicId].add(Number(idxStr));
            }
      }
    } catch {}
    return;
  }
  // Server mode: /api/solved is authoritative, localStorage is a fallback
  try {
    const res = await fetch('/api/solved');
    if (res.ok) {
      for (const [k, v] of Object.entries(await res.json()))
        solved[k] = new Set(v);
      return;
    }
  } catch {}
  try {
    const raw = localStorage.getItem('algo_shad_solved');
    if (raw)
      for (const [k, v] of Object.entries(JSON.parse(raw)))
        solved[k] = new Set(v);
  } catch {}
}

function saveSolved() {
  const out = {};
  for (const [k, v] of Object.entries(solved)) out[k] = [...v];
  const body = JSON.stringify(out);
  localStorage.setItem('algo_shad_solved', body);

// ── Scheduler ─────────────────────────────────────────────────────────────────

function firstUnsolved(topic) {
  const s = solved[topic.id] || new Set();
  const f = failed[topic.id] || new Set();
  const k = buried[topic.id] || new Set();
  return topic.problems.find(p => !s.has(p.index) && !k.has(p.index)) ?? null;
}

function activeTopics() {
  return topics.filter(t => selectedTopics.has(t.id));
}

function totalUnsolved() {
  return activeTopics().reduce((n, t) => {
    const s = solved[t.id] || new Set();
    const k = buried[t.id] || new Set();
    return n + t.problems.filter(p => !s.has(p.index) && !k.has(p.index)).length;
  }, 0);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildRound(prevLastTopicId) {
  const available = activeTopics()
    .map(t => ({ topic: t, problem: firstUnsolved(t) }))
    .filter(x => x.problem !== null);

  if (available.length === 0) return [];

  shuffle(available);

  // Ensure first item of new round doesn't repeat last item of previous round
  if (prevLastTopicId && available[0].topic.id === prevLastTopicId) {
    const swap = available.findIndex((x, i) => i > 0 && x.topic.id !== prevLastTopicId);
    if (swap > 0) [available[0], available[swap]] = [available[swap], available[0]];
  }

  // Fix any within-round consecutive duplicates
  // (only relevant when a single topic has multiple problems and all others are exhausted)
  for (let i = 1; i < available.length; i++) {
    if (available[i].topic.id === available[i - 1].topic.id) {
      const swap = available.findIndex((x, j) => j > i && x.topic.id !== available[i - 1].topic.id);
      if (swap > 0) [available[i], available[swap]] = [available[swap], available[i]];
    }
  }

  return available;
}

function advance() {
  if (deckIdx >= deck.length) {
    const prevLastId = deck.length > 0 ? deck[deck.length - 1].topic.id : null;
    deck = buildRound(prevLastId);
    deckIdx = 0;
    if (deck.length === 0) { renderDone(); return; }
  }
  renderCurrent();
}

function startTimer() {
  if (!timerActive) return;
  clearInterval(timerHandle);
  document.getElementById('overtime-label').textContent = '';
  document.getElementById('timer-display').classList.remove('expired');

  const min = +document.getElementById('timer-min').value || 0;
  const sec = +document.getElementById('timer-sec').value || 0;
  const limit = min * 60 + sec;

  timerRemaining = 0;

  if (limit <= 0) {
    document.getElementById('timer-display').textContent = '';
    return;
  }

  renderTimerDisplay();
  timerHandle = setInterval(() => {
    timerRemaining++;
    renderTimerDisplay();
    if (timerRemaining === limit) {
      document.getElementById('timer-display').classList.add('expired');
      beep();
    }
  }, 1000);
}

  document.getElementById('timer-display').textContent =
    `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start();
    osc.stop(ctx.currentTime + 0.8);
  } catch {}
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Protect math spans from marked.js by swapping them out before parsing and back after.
function parseWithMath(src) {
  const stash = [];
  const placeholder = (m) => { stash.push(m); return `\x02MATH${stash.length - 1}\x03`; };
  const guarded = src
    .replace(/\\\[[\s\S]*?\\\]/g, placeholder)   // display math \[...\]
    .replace(/\\\([\s\S]*?\\\)/g, placeholder);   // inline math \(...\)
  const html = marked.parse(guarded);
  return html.replace(/\x02MATH(\d+)\x03/g, (_, i) => stash[+i]);
}

function recordTime(outcome) {
  if (problemStartTime === null || !deck.length || deckIdx >= deck.length) return;
  const { topic, problem } = deck[deckIdx];
  const elapsed = Math.round((Date.now() - problemStartTime) / 1000);
  if (!timeStats[topic.id]) timeStats[topic.id] = {};
  const key = String(problem.index);
  if (!timeStats[topic.id][key])
    timeStats[topic.id][key] = { totalSeconds: 0, attempts: 0, solveCount: 0, failCount: 0, buryCount: 0 };
  const s = timeStats[topic.id][key];
  s.totalSeconds += elapsed;
  s.attempts++;
  if (outcome === 'hard') { s.solveCount++; s.hardCount = (s.hardCount || 0) + 1; }
  else if (outcome === 'good') { s.solveCount++; s.goodCount = (s.goodCount || 0) + 1; }
  else if (outcome === 'easy') { s.solveCount++; s.easyCount = (s.easyCount || 0) + 1; }
  else if (outcome === 'failed') s.failCount++;
  else s.buryCount++;
  saveTimeStats();
}

function formatTime(s) {
  if (!s) return '—';
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return sec ? `${m}m ${sec}s` : `${m}m`;
  const h = Math.floor(m / 60), min = m % 60;
  return min ? `${h}h ${min}m` : `${h}h`;
}

function getSubtreeTopicIds(node) {
  if (node.isLeaf) return node.topicId ? [node.topicId] : [];
  return Object.values(node.children).flatMap(getSubtreeTopicIds);
}

function aggregateTopics(topicIds) {
  let total = 0, solvedN = 0, failedN = 0, seconds = 0, attempts = 0;
  for (const id of topicIds) {
    const t = topics.find(x => x.id === id);
    if (!t) continue;
    total += t.problems.length;
    solvedN += (solved[id] || new Set()).size;
    failedN += (failed[id] || new Set()).size;
    const ts = timeStats[id] || {};
    for (const s of Object.values(ts)) { seconds += s.totalSeconds; attempts += s.attempts; }
  }
  return { total, solvedN, failedN, seconds, attempts };
}

function renderBuriedView() {

    .map(t => ({ topic: t, problems: t.problems.filter(p => (buried[t.id] || new Set()).has(p.index)) }))

  }

    <div class="solved-section">

      ${problems.map(p => {

          ? `<a class="solved-link" href="${escHtml(p.url)}" target="_blank" rel="noopener">${escHtml(p.url.replace(/^https?:\/\//, ''))}</a>`
          : `<span class="solved-preview">${escHtml(p.content.replace(/\n/g, ' ').substring(0, 90))}…</span>`;
        const expandHtml = p.url ? '' : `
          <div class="problem-expand" style="display:none">
            <div class="problem-text">${parseWithMath(p.content)}</div>

        const ansHtml = (ans && (ans.text || (ans.images && ans.images.length))) ? `
          <div class="solved-answer">

            <button class="unsolve-btn" onclick="unbury('${escHtml(topic.id)}',${p.index})">Unbury</button>
          </div>${expandHtml}${ansHtml}
        </div>`;
      }).join('')}
    </div>`).join('');
}

function switchView(v) {
  currentView = v;
  document.getElementById('train-view').style.display = v === 'train' ? '' : 'none';
  document.getElementById('solved-view').style.display = v === 'solved' ? '' : 'none';
  document.getElementById('failed-view').style.display = v === 'failed' ? '' : 'none';
  document.getElementById('buried-view').style.display = v === 'buried' ? '' : 'none';
  document.getElementById('stats-view').style.display = v === 'stats' ? '' : 'none';
  const tabs = document.querySelectorAll('.nav-tab');
  tabs.forEach(t => t.classList.remove('active'));
  const idx = { train: 0, solved: 1, failed: 2, buried: 3, stats: 4 }[v] ?? 0;
  tabs[idx].classList.add('active');
  if (v === 'solved') renderSolvedView();
  if (v === 'failed') renderFailedView();
  if (v === 'buried') renderBuriedView();
  if (v === 'stats') renderStatsView();
}

function exportProgress() {
  const out = {};
  const allIds = new Set([
    ...Object.keys(solved),
    ...Object.keys(failed),
    ...Object.keys(buried),
  ]);
  for (const topicId of allIds) {
    out[topicId] = {};
    for (const idx of (solved[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'solved', difficulty: difficulties[topicId]?.[String(idx)] ?? 'good' };
    for (const idx of (failed[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'failed' };
    for (const idx of (buried[topicId] || new Set()))
      out[topicId][String(idx)] = { status: 'buried' };
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'progress.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      for (const [topicId, entries] of Object.entries(data)) {
        for (const [idxStr, entry] of Object.entries(entries)) {
          const idx = Number(idxStr);
          if (entry.status === 'solved') {
            if (!solved[topicId]) solved[topicId] = new Set();
            solved[topicId].add(idx);
            if (entry.difficulty) {
              if (!difficulties[topicId]) difficulties[topicId] = {};
              difficulties[topicId][idxStr] = entry.difficulty;
            }
          } else if (entry.status === 'failed') {
            if (!failed[topicId]) failed[topicId] = new Set();
            failed[topicId].add(idx);
          } else if (entry.status === 'buried') {
            if (!buried[topicId]) buried[topicId] = new Set();
            buried[topicId].add(idx);
          }
        }
      }
      saveSolved();
      saveFailed();
      saveBuried();
      saveDifficulties();
      updateSolvedCount();
      updateFailedCount();
      updateBuriedCount();
      if (currentView === 'solved') renderSolvedView();
      else if (currentView === 'failed') renderFailedView();
      else if (currentView === 'buried') renderBuriedView();
      else if (currentView === 'stats') renderStatsView();
    } catch {
      alert('Failed to import: invalid JSON');
    }
  };
  input.click();
}

  if (sections.length === 0) {
    el.innerHTML = exportBar + '<div class="status" style="padding-top:16px">No solved problems yet.</div>';
    return;
  }

  el.innerHTML = exportBar + sections.map(({ topic, problems }) => `
    <div class="solved-section">

          : `<span class="solved-preview">${escHtml(p.content.replace(/\n/g, ' ').substring(0, 90))}…</span>`;
        const expandHtml = p.url ? '' : `
          <div class="problem-expand" style="display:none">

          <div class="solved-answer">
            ${ans.text ? `<div class="solved-answer-text">${escHtml(ans.text)}</div>` : ''}
            ${ans.images && ans.images.length ? `<div class="solved-answer-images">${ans.images.map(src => `<img src="${src}" onclick="window.open(this.src)">`).join('')}</div>` : ''}

function unsolve(topicId, idx) {
  if (solved[topicId]) {
    solved[topicId].delete(idx);
    if (solved[topicId].size === 0) delete solved[topicId];
  }
  saveSolved();
  updateSolvedCount();
  renderSolvedView();
  renderFolderBar();
}

function csvField(v) {
  return '"' + String(v ?? '').replace(/"/g, '""') + '"';
}

function exportStatsCSV() {
  const header = ['folder','topic_id','problem_index','status','difficulty','total_seconds','attempts','hard_count','good_count','easy_count','fail_count','bury_count','problem_type','problem_statement','answer_text','has_images'];
  const rows = [header.join(',')];
  for (const t of topics) {
    const folder = t.id.includes('/') ? t.id.substring(0, t.id.lastIndexOf('/')) : t.id;
    for (const p of t.problems) {
      const isSolved = (solved[t.id] || new Set()).has(p.index);
      const isFailed = (failed[t.id] || new Set()).has(p.index);
      const isBuried = (buried[t.id] || new Set()).has(p.index);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      const diff = difficulties[t.id]?.[String(p.index)] ?? '';
      const ts = timeStats[t.id]?.[String(p.index)] || { totalSeconds: 0, attempts: 0, hardCount: 0, goodCount: 0, easyCount: 0, failCount: 0, buryCount: 0 };
      const ans = answers[t.id]?.[String(p.index)];
      const stmt = p.url ? p.url : (p.content || '').replace(/\n/g, ' ').substring(0, 300);
      rows.push([
        csvField(folder), csvField(t.id), csvField(p.index), csvField(status), csvField(diff),
        csvField(ts.totalSeconds), csvField(ts.attempts),
        csvField(ts.hardCount||0), csvField(ts.goodCount||0), csvField(ts.easyCount||0),
        csvField(ts.failCount), csvField(ts.buryCount),
        csvField(p.url ? 'url' : 'text'), csvField(stmt),
        csvField(ans?.text || ''), csvField(!!(ans?.images?.length)),
      ].join(','));
    }
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'stats.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderStatsView() {
  const el = document.getElementById('stats-view');

  // ── Folder aggregate table ──────────────────────────────────────────────────
  const folderRows = [];
  const allIds = topics.map(t => t.id);
  const allAgg = aggregateTopics(allIds);
  folderRows.push(`<tr>
    <td><strong>All</strong></td>
    <td class="mono">${allAgg.total}</td>
    <td class="mono">${allAgg.solvedN}</td>
    <td class="mono">${allAgg.failedN}</td>
    <td class="mono">${formatTime(allAgg.seconds)}</td>
    <td class="mono">${allAgg.attempts || '—'}</td>
  </tr>`);

  function walkForStats(node, depth) {
    if (node.path === null) {
      for (const child of Object.values(node.children)) walkForStats(child, 0);
      return;
    }
    const ids = getSubtreeTopicIds(node);
    if (ids.length === 0) return;
    const agg = aggregateTopics(ids);
    const pad = depth * 16;
    const label = node.path.split('/').pop();
    const hasChildren = Object.values(node.children).some(c => getSubtreeTopicIds(c).length > 0);
    const pathAttr = escHtml(node.path);
    const toggleHtml = hasChildren
      ? `<button class="stats-fold-btn" data-stats-toggle="${pathAttr}" onclick="toggleStatsFolder('${pathAttr}')">▼</button>`
      : `<span style="display:inline-block;width:14px"></span>`;
    folderRows.push(`<tr data-stats-path="${pathAttr}">
      <td style="padding-left:${10 + pad}px">${toggleHtml} ${escHtml(label)}</td>
      <td class="mono">${agg.total}</td>
      <td class="mono">${agg.solvedN}</td>
      <td class="mono">${agg.failedN}</td>
      <td class="mono">${formatTime(agg.seconds)}</td>
      <td class="mono">${agg.attempts || '—'}</td>
    </tr>`);
    for (const child of Object.values(node.children)) walkForStats(child, depth + 1);
  }
  if (folderTree) walkForStats(folderTree, 0);

  // ── Per-problem table ───────────────────────────────────────────────────────
  const problemRows = [];
  for (const t of topics) {
    const ts = timeStats[t.id];
    if (!ts) continue;
    for (const [idxStr, s] of Object.entries(ts)) {
      const idx = Number(idxStr);
      const isSolved = (solved[t.id] || new Set()).has(idx);
      const isFailed = (failed[t.id] || new Set()).has(idx);
      const isBuried = (buried[t.id] || new Set()).has(idx);
      const status = isSolved ? 'solved' : isFailed ? 'failed' : isBuried ? 'buried' : 'unsolved';
      problemRows.push(`<tr>
        <td>${escHtml(t.id)}</td>
        <td class="mono">#${idx + 1}</td>
        <td><span class="status-badge ${status}">${status}</span></td>
        <td class="mono">${formatTime(s.totalSeconds)}</td>
        <td class="mono">${s.attempts}</td>
        <td class="mono">${s.hardCount||0} / ${s.goodCount||0} / ${s.easyCount||0} / ${s.failCount} / ${s.buryCount}</td>
      </tr>`);
    }
  }

  el.innerHTML = `
    <div class="stats-bar">
      <button class="unsolve-btn" style="padding:5px 12px;font-size:13px" onclick="exportStatsCSV()">Export CSV ↓</button>
    </div>
    <div class="stats-section-title">Folder Stats</div>
    <table class="stats-table">
      <thead><tr>
        <th>Folder</th><th>Problems</th><th>Solved</th><th>Failed</th><th>Time Spent</th><th>Attempts</th>
      </tr></thead>
      <tbody>${folderRows.join('')}</tbody>
    </table>
    <div class="stats-section-title">Problem Stats</div>
    ${problemRows.length === 0
      ? '<div class="status" style="padding-top:0;text-align:left;color:#9ca3af;font-size:13px">No problems attempted yet.</div>'
      : `<table class="stats-table">
          <thead><tr>
            <th>Topic</th><th>#</th><th>Status</th><th>Time</th><th>Attempts</th><th>H / G / E / F / Bury</th>
          </tr></thead>
          <tbody>${problemRows.join('')}</tbody>
        </table>`}`;
  applyStatsCollapsed();
}

function applyStatsCollapsed() {
  document.querySelectorAll('#stats-view tr[data-stats-path]').forEach(row => {
    const rpath = row.dataset.statsPath;
    const hidden = [...statsCollapsed].some(cp => rpath.startsWith(cp + '/'));
    row.style.display = hidden ? 'none' : '';
  });
  document.querySelectorAll('#stats-view [data-stats-toggle]').forEach(btn => {
    btn.textContent = statsCollapsed.has(btn.dataset.statsToggle) ? '▶' : '▼';
  });
}

function toggleStatsFolder(path) {
  if (statsCollapsed.has(path)) statsCollapsed.delete(path);
  else statsCollapsed.add(path);
  saveStatsCollapsed();
  applyStatsCollapsed();
}

// ── Actions ───────────────────────────────────────────────────────────────────

function markSolved(difficulty) {
  const { topic, problem } = deck[deckIdx];
  if (!solved[topic.id]) solved[topic.id] = new Set();
  solved[topic.id].add(problem.index);
  saveSolved();
  if (!difficulties[topic.id]) difficulties[topic.id] = {};
  difficulties[topic.id][String(problem.index)] = difficulty;
  saveDifficulties();
  updateSolvedCount();
  recordTime(difficulty);
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function delayProblem() {
  recordTime('skip');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function buryProblem() {
  const { topic, problem } = deck[deckIdx];
  if (!buried[topic.id]) buried[topic.id] = new Set();
  buried[topic.id].add(problem.index);
  saveBuried();
  updateBuriedCount();
  recordTime('bury');
  clearInterval(timerHandle);
  deckIdx++;
  advance();
}

function newSession() {
  deck = [];
  deckIdx = 0;
  advance();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  await loadSolved();
  loadFailed();
  loadBuried();
  loadDifficulties();
  loadAnswers();
  loadTimeStats();
  loadCollapsed();
  loadStatsCollapsed();
  const _isCollapsed = localStorage.getItem('algo_shad_sidebar') === '1';
  if (_isCollapsed) document.querySelector('.app').classList.add('collapsed');
  const _sidebar = document.querySelector('.sidebar');
  if (!_isCollapsed) {
    const _sw = localStorage.getItem('algo_shad_sidebar_width');
    if (_sw) _sidebar.style.width = _sw + 'px';
  }
  (function() {
    const resizer = document.getElementById('sidebar-resizer');
    const MIN = 160, MAX = 600;
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      resizer.classList.add('dragging');
      _sidebar.style.transition = 'none';
      const startX = e.clientX;
      const startW = _sidebar.getBoundingClientRect().width;
      function onMove(e) {
        const w = Math.min(MAX, Math.max(MIN, startW + e.clientX - startX));
        _sidebar.style.width = w + 'px';
      }
      function onUp() {
        resizer.classList.remove('dragging');
        _sidebar.style.transition = '';
        localStorage.setItem('algo_shad_sidebar_width', parseInt(_sidebar.style.width));
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  })();
  loadTimerPrefs();
  const _tmin = +document.getElementById('timer-min').value || 0;
  const _tsec = +document.getElementById('timer-sec').value || 0;
  if (_tmin * 60 + _tsec > 0) userStartTimer();
  if (window.__TOPICS__) {
    topics = window.__TOPICS__;
  } else {
    try {
      const res = await fetch('/api/problems');
      if (!res.ok) throw new Error(res.status);
      topics = (await res.json()).topics;
    } catch {
      document.getElementById('problem-area').innerHTML =
        '<div class="status">Could not load problems — is <code>server.py</code> running?</div>';
      return;
    }
  }
  const allTopicIds = topics.map(t => t.id).sort();
  folderTree = buildTree(allTopicIds);
  loadTopicPrefs(allTopicIds);
  updateSolvedCount();
  updateFailedCount();
  updateBuriedCount();
  renderFolderBar();
  advance();
}

document.addEventListener('DOMContentLoaded', init);

\\frac{x^2}{2!} + \\ldots + \\frac{x^n}{n!}\\) сходится к \\(e^x\\)"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/middle/21 Рекуррентная последовательность с остатком", "name": "21 Рекуррентная последовательность с остатком", "problems": [{"index": 0, "url": null, "content": "Найдите предел последовательности \\((c_n)\\), определяемой рекуррентным соотношением \\(c_{n+1} = \\left(1 - \\frac{1}{n}\\right)c_n + \\beta_n\\), где \\((\\beta_n)\\) — любая последовательность со свойством \\(n^2 \\beta_n \\to 0\\) при \\(n \\to \\infty\\)"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/middle/22 Ряд из sin последовательности", "name": "22 Ряд из sin последовательности", "problems": [{"index": 0, "url": null, "content": "Последовательность \\(a_n\\) задана условием \\(a_1 = 1\\), \\(a_{n+1} = \\sin a_n\\). Сходится ли ряд \\(\\sum_{i=1}^{\\infty} a_i\\)?"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/middle/23 Континуум положительных чисел", "name": "23 Континуум положительных чисел", "problems": [{"index": 0, "url": null, "content": "Дано некоторое множество положительных чисел мощности континуум. Докажите, что из него можно выбрать счётное подмножество с бесконечной суммой."}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/middle/24 Ряды sin и sin 2", "name": "24 Ряды sin и sin 2", "problems": [{"index": 0, "url": null, "content": "Существует ли последовательность \\(a_n\\) такая, что ряд с общим членом \\(\\sin(a_n)\\) сходится, а ряд с общим членом \\(\\sin(2a_n)\\) расходится?"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/senior/25 Биекция и ряд", "name": "25 Биекция и ряд", "problems": [{"index": 0, "url": null, "content": "Существует ли биекция \\(\\pi\\) из натуральных чисел в натуральные, для которой сходится ряд \\(\\sum \\frac{\\pi(n)}{n^2}\\)?"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[02] Ряды/senior/26 Рациональные числа в таблице", "name": "26 Рациональные числа в таблице", "problems": [{"index": 0, "url": null, "content": "Можно ли расставить все рациональные числа в клетки бесконечной клетчатой плоскости так, чтобы каждое число появлялось только один раз и при этом суммы по всем строкам были равны \\(-\\infty\\), а по всем столбцам \\(+\\infty\\)?"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[03] Подпоследовательности/junior/27 Монотонная подпоследовательность", "name": "27 Монотонная подпоследовательность", "problems": [{"index": 0, "url": null, "content": "Докажите, что у любой последовательности существует монотонная подпоследовательность"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[03] Подпоследовательности/junior/28 Сходимость через подпоследовательность", "name": "28 Сходимость через подпоследовательность", "problems": [{"index": 0, "url": null, "content": "Доказать, что для сходимости монотонной последовательности достаточно сходимости некоторой её подпоследовательности"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[03] Подпоследовательности/middle/29 Множество частичных пределов", "name": "29 Множество частичных пределов", "problems": [{"index": 0, "url": null, "content": "Существует ли последовательность, у которой множество частичных пределов в точности совпадает с \\(\\{0\\} \\cup \\left\\{\\frac{1}{n},\\ n \\in \\mathbb{N}\\right\\}\\)?"}, {"index": 1, "url": null, "content": "Существует ли последовательность, у которой множество частичных пределов в точности совпадает с \\([0;\\, 1]\\)?"}, {"index": 2, "url": null, "content": "Существует ли последовательность, у которой множество частичных пределов в точности совпадает с \\(\\left\\{\\frac{1}{n},\\ n \\in \\mathbb{N}\\right\\}\\)?"}, {"index": 3, "url": null, "content": "Существует ли последовательность, у которой множество частичных пределов в точности совпадает с \\([0;\\, 1)\\)?"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[03] Подпоследовательности/senior/30 Сходимость ограниченной последовательности", "name": "30 Сходимость ограниченной последовательности", "problems": [{"index": 0, "url": null, "content": "Последовательность \\((a_n)\\) такова, что все \\(a_n \\in (0, 1)\\) и \\(a_{n+1} < \\frac{a_n + a_{n-1}}{2}\\). Верно ли, что \\(a_n\\) сходится? Найдите множество всех возможных пределов таких последовательностей."}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[04] Предел функции/junior/31 Предел по Гейне", "name": "31 Предел по Гейне", "problems": [{"index": 0, "url": null, "content": "Найти пределы функции \\([x]\\) (целая часть) во всех точках"}, {"index": 1, "url": null, "content": "Найти пределы функции \\(\\cos \\frac{1}{x}\\) во всех точках"}, {"index": 2, "url": null, "content": "Найти пределы функции \\(x \\sin \\frac{1}{x}\\) во всех точках"}, {"index": 3, "url": null, "content": "Найти пределы функции Римана во всех точках"}]}, {"id": "ydsa/mathematics/analysis/[13] 25-11-24 (6) Пределы и последовательности/[04] Предел функции/middle/32 Функция с заданным множеством непрерывности", "name": "32 Функция с заданным множеством непрерывности", "problems": [{"index": 0, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в одной точке"}, {"index": 1, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в двух точках"}, {"index": 2, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в \\(n\\) точках"}, {"index": 3, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в счётном множестве точек"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/junior/01 Исследование на непрерывность", "name": "01 Исследование на непрерывность", "problems": [{"index": 0, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(\\frac{|x-1|}{x^3 - x^2}\\)"}, {"index": 1, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(\\frac{x}{\\sin x}\\)"}, {"index": 2, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: \\(x \\cos \\frac{1}{x}\\)"}, {"index": 3, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: индикатор рациональных чисел (функция Дирихле)"}, {"index": 4, "url": null, "content": "Исследовать на непрерывность, найти точки разрыва и определить их род: функцию Римана"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/junior/02 Функция с заданным множеством непрерывности", "name": "02 Функция с заданным множеством непрерывности", "problems": [{"index": 0, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в одной точке"}, {"index": 1, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в двух точках"}, {"index": 2, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в \\(n\\) точках"}, {"index": 3, "url": null, "content": "Привести пример функции, определённой на \\(\\mathbb{R}\\) и непрерывной только в счётном множестве точек"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/junior/03 Непрерывное отображение отрезка", "name": "03 Непрерывное отображение отрезка", "problems": [{"index": 0, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\(\\mathbb{R}\\)?"}, {"index": 1, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\((c, d)\\)?"}, {"index": 2, "url": null, "content": "Существует ли непрерывная на \\([a; b]\\) функция \\(f\\), взаимно однозначно отображающая его на \\([0; 1] \\cup [3; 4]\\)?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/04 Теорема Коши о промежуточном значении", "name": "04 Теорема Коши о промежуточном значении", "problems": [{"index": 0, "url": null, "content": "Доказать, что для любой непрерывной функции \\(f\\) из \\([0;1]\\) в \\([0;1]\\) существует неподвижная точка \\(x \\in [0;1]\\) такая, что \\(f(x) = x\\)"}, {"index": 1, "url": null, "content": "Верно ли то же самое для непрерывной функции \\(f\\) из \\((0;1)\\) в \\((0;1)\\)? А из \\([0;1)\\) в \\([0;1)\\)?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/05 Функциональное уравнение Коши", "name": "05 Функциональное уравнение Коши", "problems": [{"index": 0, "url": null, "content": "Найдите все непрерывные функции \\(f(x)\\) такие, что для всяких \\(x, y\\) выполнено \\(f(x + y) = f(x)f(y)\\). Можно ли заменить условие непрерывности на ограниченность? монотонность? непрерывность только в одной точке?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/06 Среднее значение непрерывной функции", "name": "06 Среднее значение непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на отрезке \\([a, b]\\) и \\(a = x_0 < x_1 < \\ldots < x_n = b\\). Доказать, что существует \\(\\xi \\in (a; b)\\) такое, что \\(f(\\xi) = \\frac{f(x_0) + f(x_1) + \\ldots + f(x_n)}{n+1}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/07 Срезающая функция", "name": "07 Срезающая функция", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на \\([a, b]\\). Доказать, что функция \\(f_c(x)\\), определённая как \\(-c\\) при \\(f(x) < -c\\), как \\(f(x)\\) при \\(|f(x)| \\le c\\) и как \\(c\\) при \\(f(x) > c\\), также непрерывна."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/08 Нечётная непрерывная функция", "name": "08 Нечётная непрерывная функция", "problems": [{"index": 0, "url": null, "content": "Верно ли, что всякая нечётная непрерывная функция, удовлетворяющая условию \\(f(x) = 2f(x)\\), линейна?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/middle/09 Наименьший период непрерывной функции", "name": "09 Наименьший период непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Пусть функция \\(f(x)\\) определена на всей числовой оси, непрерывна хотя бы в одной точке, периодична и отлична от постоянной. Доказать, что она имеет наименьший положительный период."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/10 Кратность значений непрерывной функции", "name": "10 Кратность значений непрерывной функции", "problems": [{"index": 0, "url": null, "content": "Может ли непрерывная на всей числовой прямой функция принимать каждое своё значение дважды?"}, {"index": 1, "url": null, "content": "Может ли непрерывная на всей числовой прямой функция принимать каждое своё значение трижды?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/11 Теорема Вейерштрасса", "name": "11 Теорема Вейерштрасса", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) непрерывна на \\([a, b]\\). Доказать, что функции \\(m(x) = \\inf_{a \\le y < x} f(y)\\) и \\(M(x) = \\sup_{a \\le y < x} f(y)\\) также непрерывны на \\([a, b]\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[01] Непреррывность/senior/12 Теорема о сжимающем отображении", "name": "12 Теорема о сжимающем отображении", "problems": [{"index": 0, "url": null, "content": "Пусть дана функция \\(f\\colon \\mathbb{R} \\to \\mathbb{R}\\) такая, что для всяких \\(x, y\\) выполнено \\(|f(x) - f(y)| < q|x - y|\\), где \\(q < 1\\). Докажите непрерывность функции \\(f\\)."}, {"index": 1, "url": null, "content": "В условиях задачи 1 докажите существование и единственность неподвижной точки \\(f(x) = x\\) и постройте последовательность, сходящуюся к ней."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/13 Предел функции", "name": "13 Предел функции", "problems": [{"index": 0, "url": null, "content": "Вычислите при всех \\(x\\) предел \\(\\lim_{n \\to \\infty} \\frac{\\sin\\!\\left(x + \\frac{1}{n}\\right) - \\sin(x)}{\\sin\\!\\left(x + \\frac{1}{n}\\right)\\!\\left(\\sqrt{x+n} - \\sqrt{n}\\right)}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/14 Сумма ряда", "name": "14 Сумма ряда", "problems": [{"index": 0, "url": null, "content": "Найдите сумму \\(\\sum_{k=0}^{\\infty} (-1)^k \\frac{(k+1)^2}{k!}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[02] Формула Тейлора/junior/15 Пределы по формуле Тейлора", "name": "15 Пределы по формуле Тейлора", "problems": [{"index": 0, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{x\\sqrt[3]{\\cos x} - \\sin x}{x^5}\\)"}, {"index": 1, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{\\cos(2x) - \\sqrt[4]{e^{-x^2}}}{x^4}\\)"}, {"index": 2, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{e^{x^2} \\cos x - \\operatorname{ch} x + x^5}{x^6 + x^2 \\sin^3 x}\\)"}, {"index": 3, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{e^{-\\frac{x^2}{2}} - \\sqrt[4]{\\cos(2x)}\\,\\operatorname{ch}(x^3)}{\\ln^2(\\cos(2x))}\\)"}, {"index": 4, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{(\\cos x)^{\\sin x} - \\sqrt{1 - x^3}}{x^6}\\)"}, {"index": 5, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\frac{\\sin(\\sin x) - \\operatorname{tg}(x)}{x^5}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/16 Производная сложной функции", "name": "16 Производная сложной функции", "problems": [{"index": 0, "url": null, "content": "Найдите производную функции \\(f(x) = e^{\\sin(g(\\ln x))}\\) в точке \\(x = e\\), если \\(g(1) = 5\\) и \\(g'(1) = 3\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/17 Производная степенно-тригонометрической функции", "name": "17 Производная степенно-тригонометрической функции", "problems": [{"index": 0, "url": null, "content": "Для функции \\(f(x) = (\\sin x)^{\\cos x}\\) найти область определения и вычислить производную."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/18 Задача об оптимальном маршруте", "name": "18 Задача об оптимальном маршруте", "problems": [{"index": 0, "url": null, "content": "Берег моря — прямая линия с запада на восток. Остров находится в 7 км к северу от ближайшей точки \\(T\\) берега. Лёша стоит в хижине в 11 км западнее \\(T\\), а вокзал — в 25 км восточнее \\(T\\). Лёша бегает со скоростью 10 км/ч, плавает со скоростью 2 км/ч, а восточнее \\(T\\) может арендовать скутер (25 км/ч). За какое минимальное время Лёша доберётся до вокзала, посетив по пути остров?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/19 Пределы через производную", "name": "19 Пределы через производную", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) и \\(g\\) дифференцируемы в точке \\(a\\). Найдите \\(\\lim_{x \\to a} \\frac{xf(a) - af(x)}{x - a}\\)"}, {"index": 1, "url": null, "content": "Пусть \\(f\\) и \\(g\\) дифференцируемы в точке \\(a\\). Найдите \\(\\lim_{x \\to a} \\frac{f(x)g(a) - f(a)g(x)}{x - a}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/20 Неравенство для производной", "name": "20 Неравенство для производной", "problems": [{"index": 0, "url": null, "content": "Вещественнозначная функция \\(f\\) определена на отрезке \\([a; b]\\) (\\(b - a > 4\\)) и дифференцируема на нём. Докажите, что найдётся точка \\(x_0 \\in (a, b)\\), для которой \\(f'(x_0) < 1 + f^2(x_0)\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/21 Бесконечная дифференцируемость", "name": "21 Бесконечная дифференцируемость", "problems": [{"index": 0, "url": null, "content": "Докажите, что \\(f(x) = e^{-\\frac{1}{x^2}}\\), доопределённая в нуле как \\(f(0) = 0\\), бесконечно дифференцируема на всей числовой оси."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/22 Сравнение степеней и показателей", "name": "22 Сравнение степеней и показателей", "problems": [{"index": 0, "url": null, "content": "Что больше: \\(e^\\pi\\) или \\(\\pi^e\\)?"}, {"index": 1, "url": null, "content": "Что больше: \\(2^{\\sqrt{2}}\\) или \\(e\\)?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/23 Неравенства через выпуклость", "name": "23 Неравенства через выпуклость", "problems": [{"index": 0, "url": null, "content": "Докажите неравенство для положительных \\(x\\) и \\(y\\): \\(x \\ln x + y \\ln y \\ge (x + y) \\ln \\frac{x+y}{2}\\)"}, {"index": 1, "url": null, "content": "Докажите неравенство для положительных \\(x\\) и \\(y\\): \\(\\frac{e^y - e^x}{y - x} < \\frac{e^x + e^y}{2}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/junior/24 Дифференцируемость кусочной функции", "name": "24 Дифференцируемость кусочной функции", "problems": [{"index": 0, "url": null, "content": "При каких вещественных значениях параметров \\(a, b, c\\) функция\n\n\\(f(x) = \\begin{cases} \\operatorname{arcctg}\\!\\left(5\\dfrac{\\sin x}{\\cos x}\\right), & -\\dfrac{\\pi}{2} < x < \\dfrac{\\pi}{2} \\\\[6pt] \\lim_{t \\to 0} \\dfrac{a(1 - \\cos t)}{t^2}, & x = \\dfrac{\\pi}{2} \\\\[6pt] bx + c, & x > \\dfrac{\\pi}{2} \\end{cases}\\)\n\nдифференцируема для любых \\(x \\ge -\\dfrac{\\pi}{2}\\)?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/25 Оценка производной через вторую производную", "name": "25 Оценка производной через вторую производную", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) дифференцируема на \\([0, 1]\\), причём \\(f(0) = f(1) = 0\\) и \\(|f''(x)| \\le A\\) для всех \\(x \\in (0, 1)\\). Найдите максимально возможное значение \\(|f'(x)|\\) при \\(x \\in [0, 1]\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/26 Теорема Ролля для f через x", "name": "26 Теорема Ролля для f через x", "problems": [{"index": 0, "url": null, "content": "Предположим, что \\(f\\) непрерывна на \\([a; b]\\), \\(a > 0\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(\\frac{f(a)}{a} = \\frac{f(b)}{b}\\), то существует точка \\(x_0 \\in (a; b)\\) такая, что \\(x_0 f'(x_0) = f(x_0)\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/27 Максимальное a для системы", "name": "27 Максимальное a для системы", "problems": [{"index": 0, "url": null, "content": "Найти максимальное \\(a\\), для которого существуют неубывающие дважды дифференцируемые функции \\(f(x)\\) и \\(g(x)\\) такие, что \\((f(x))^2 + (g(x))^2 \\le a\\), \\(f''(x) = g(x)\\), \\(g''(x) = f(x)\\) и функция \\(f(x)g(x)\\) линейна."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/28 Теорема Ролля для f через x (2)", "name": "28 Теорема Ролля для f через x (2)", "problems": [{"index": 0, "url": null, "content": "Предположим, что \\(f\\) непрерывна на \\([a; b]\\), \\(a > 0\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(\\frac{f(a)}{a} = \\frac{f(b)}{b}\\), то существует точка \\(x_0 \\in (a; b)\\) такая, что \\(x_0 f'(x_0) = f(x_0)\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/29 Неравенство для тригонометрического многочлена", "name": "29 Неравенство для тригонометрического многочлена", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(|a_1 \\sin x + a_2 \\sin 2x + \\ldots + a_n \\sin nx| \\le |\\sin x|\\) для всех \\(x \\in \\mathbb{R}\\), то \\(|a_1 + 2a_2 + \\ldots + na_n| \\le 1\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/30 Уравнение f'f=x", "name": "30 Уравнение f'f=x", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) непрерывна на \\([a; b]\\) и дифференцируема на \\((a, b)\\). Докажите, что если \\(f^2(b) - f^2(a) = b^2 - a^2\\), то уравнение \\(f'(x)f(x) = x\\) имеет хотя бы один корень в \\((a; b)\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/31 Правило Лопиталя", "name": "31 Правило Лопиталя", "problems": [{"index": 0, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 1} \\frac{\\arctan \\frac{x^2-1}{x^2+1}}{x-1}\\)"}, {"index": 1, "url": null, "content": "Найдите предел \\(\\lim_{x \\to \\infty} x\\!\\left(\\!\\left(1 + \\frac{1}{x}\\right)^x - e\\right)\\)"}, {"index": 2, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 5} (6-x)^{\\frac{1}{x-5}}\\)"}, {"index": 3, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} \\left(\\frac{\\sin x}{x}\\right)^{\\frac{1}{x}}\\)"}, {"index": 4, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0^+} \\left(\\frac{\\sin x}{x}\\right)^{\\frac{1}{x}}\\)"}, {"index": 5, "url": null, "content": "Найдите предел \\(\\lim_{x \\to \\infty} \\frac{x - \\sin x}{2x + \\sin x}\\)"}, {"index": 6, "url": null, "content": "Найдите предел \\(\\lim_{x \\to 0} x^{\\sin x}\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/32 Экстремумы функции", "name": "32 Экстремумы функции", "problems": [{"index": 0, "url": null, "content": "Найдите наибольшее и наименьшее значение функции \\(f(x) = \\frac{x^4 - 6x^2 + 5}{|x-1|}\\) (если они существуют), а также множество всех её значений."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/33 Корень дифференциального уравнения", "name": "33 Корень дифференциального уравнения", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) дифференцируема на \\([0;1]\\). Докажите, что уравнение \\((x - x^2)f''(x) = (3x^2 - 1)f(x)\\) имеет хотя бы один корень."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/34 Корни многочлена Лежандра", "name": "34 Корни многочлена Лежандра", "problems": [{"index": 0, "url": null, "content": "Доказать, что у многочлена Лежандра все корни вещественные и принадлежат интервалу \\((-1; 1)\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[03] Произовдная/middle/35 Разность выпуклых функций", "name": "35 Разность выпуклых функций", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f \\in C^2([0; 1])\\). Доказать, что функцию \\(f\\) можно представить в виде разности двух выпуклых вниз функций."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/junior/43 Решение уравнений", "name": "43 Решение уравнений", "problems": [{"index": 0, "url": null, "content": "Решить уравнение \\(3^x + 4^x = 5^x\\)"}, {"index": 1, "url": null, "content": "Решить уравнение \\(e^{e^x - 1} = x + 1\\)"}, {"index": 2, "url": null, "content": "Решить уравнение \\(x^2 - x + 2 = \\frac{1}{\\sqrt{x+7} - \\sqrt{x-1}}\\)"}, {"index": 3, "url": null, "content": "Решить уравнение \\(\\sin(\\sin(x)) = \\sin(\\cos(x))\\)"}, {"index": 4, "url": null, "content": "Решить уравнение \\(\\sqrt{a + \\sqrt{a + x}} = x\\)"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/middle/44 Монотонность и уравнения", "name": "44 Монотонность и уравнения", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f(x)\\) строго монотонная функция. Докажите, что уравнение \\(f(x) = \\mathrm{const}\\) имеет не более одного решения."}, {"index": 1, "url": null, "content": "Пусть \\(f(x)\\) строго монотонная функция. Докажите, что уравнение \\(f(f(x)) = x\\) равносильно уравнению \\(f(x) = x\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/middle/45 Непрерывная биекция монотонна", "name": "45 Непрерывная биекция монотонна", "problems": [{"index": 0, "url": null, "content": "Докажем, что непрерывная и биективная на \\([a; b]\\) функция \\(f(x)\\) монотонна на \\([a; b]\\)."}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/senior/46 Тождество f(f(x))=1-x^3", "name": "46 Тождество f(f(x))=1-x^3", "problems": [{"index": 0, "url": null, "content": "Существует ли непрерывная функция \\(f(x)\\), для которой выполняется тождество \\(f(f(x)) = 1 - x^3\\)?"}]}, {"id": "ydsa/mathematics/analysis/[21] 25-12-08 (7) Дифференцируемые функции 102/[04] Монотонность/senior/47 Пара функций arctg и arcctg", "name": "47 Пара функций arctg и arcctg", "problems": [{"index": 0, "url": null, "content": "Существуют ли такие непрерывные функции \\(f\\) и \\(g\\), что \\(f(g(x)) = \\operatorname{arctg}(x)\\) и \\(g(f(x)) = \\operatorname{arcctg}(x)\\)?"}]}, {"id": "ydsa/mathematics/probability/[01] 25-10-03 (2) Правило суммы и произведения 101", "name": "[01] 25-10-03 (2) Правило суммы и произведения 101", "problems": [{"index": 0, "url": null, "content": "В заборе 20 досок, каждую надо покрасить в черный, синий, зеленый или желтый\nцвет, причем соседние доски красятся в разные цвета.\n\n    1) Сколькими способами это можно сделать?\n    2) Если требуется, чтобы хоть одна из досок обязательно была синей?"}, {"index": 1, "url": null, "content": "На клетчатой доске размера 22 × 25 (длина стороны клетки равна 1) требу-\nется отметить тройку клеток так, чтобы центры этих клеток образовывали прямоугольный\nтреугольник с катетами длины 7 и 4 (катеты параллельны краям доски). Сколькими спо-\nсобами это можно сделать?"}, {"index": 2, "url": null, "content": "В классе за контрольную 6 учеников получили оценку 5, 7 оценку 4 и 1 оценку 3. Учитель сказал им разбиться на пары с разными оценками, где получивший лучшую\nоценку рассказал бы получившему худшую, где тот ошибся. Сколькими способами учени-\nки могли бы разбиться на пары при таком условии?"}, {"index": 3, "url": null, "content": "В волейбольной секции 24 спортсмена. Сколькими способами их можно разде-\nлить на 4 команды по 6 спортсменов в каждой для проведения тренировочного турнира?\nА сколькими способами можно разбить 7 мальчиков и 7 девочек на пары?"}, {"index": 4, "url": null, "content": "Сколькими способами можно выложить в ряд три красных, четыре синих и\nпять зелёных шаров так, чтобы никакие два синих шара не лежали рядом?"}, {"index": 5, "url": null, "content": "Каких целых чисел от 1 до \\(8 \\cdot 10^{20}\\) (включительно) больше и на сколько: со-\nдержащих в своей записи только чётные цифры или содержащих в своей записи только\nнечётные цифры?"}, {"index": 6, "url": null, "content": "Найдите количество шестизначных чисел\n\n    1) У которых пятая цифра меньше шестой на 2\n    2) У которых каждая следующая цифра меньше предыдущей"}, {"index": 7, "url": null, "content": "Найдите сумму всех 4-х значных четных чисел, которые можно получить из\nкарточек 1, 2, 3, 4 если каждая цифра может быть использована более одного раза"}, {"index": 8, "url": null, "content": "Комбинаторно докажите следующие свойства чисел сочетаний. Другими сло-\nвами, вас просят на примере различных решений одной задачи получить выражения, сто-\nящие в разных частях данных равенств:\n\n    1) \\(C_n^0 - C_n^1 + ... + (-1)^n \\cdot C_n^n = 0\\)\n    ✳ 2) \\(0 \\cdot C_n^0 + 1 \\cdot C_n^1 + ... + n \\cdot C_n^n = n \\cdot 2^{n-1}\\)"}, {"index": 9, "url": null, "content": "Найдите количество слагаемых в разложении функции:\n\n    1) \\((x + y + z)^{10}\\)\n    2) \\((x^{-1} + 1 + x)^{2016}\\)"}, {"index": 10, "url": null, "content": "Найдите коэффициент в разложении:\n\n    1) Выражения \\((a + b + c)^{18}\\) при \\(a^6 b^6 c^6\\)\n    ✳ 2) Выражения \\((x^2 + x + 1)^{20}\\) при \\(x^6\\)"}, {"index": 11, "url": null, "content": "Отметили все вершины правильного 12-тиугольника. Сколько существует неза-\nмкнутых несамопересекающихся одиннадцатизвенных ломаных с вершинами в отмечен-\nных точках? А десятизвенных ломаных с вершинами в отмеченных точках?"}, {"index": 12, "url": null, "content": "На каждой из прямых y = 1 и y = 12 отмечено по 200 точек с абсциссами 1,\n2, 3, . . . , 200. Сколькими способами можно выбрать три точки из отмеченных 400 так,\nчтобы они являлись вершинами прямоугольного треугольника?"}, {"index": 13, "url": null, "content": "В таблицу размера k x l записывают числа +1 и −1 так, чтобы произведение\nчисел в каждой строке и в каждом столбце равнялось 1. Сколькими способами это можно\nсделать?"}, {"index": 14, "url": null, "content": "Сколькими способами, используя 20 цветов, можно закрасить:\n\n    1) Вершины p-угольника, где p - простое, если цвета вершин могут повторяться?\n    2) Грани тетраэдра, если цвета граней могут повторяться?"}]}, {"id": "ydsa/mathematics/probability/[03] 25-10-21 (2) Правило суммы и произведения 102", "name": "[03] 25-10-21 (2) Правило суммы и произведения 102", "problems": [{"index": 0, "url": null, "content": "На книжной полке стоят \\(n\\) книг. Сколькими способами можно выбрать из них \\(p\\) книг так, чтобы между любыми двумя выбранными книгами, ровно как и после \\(p\\)-ой выбранной книги, было не менее \\(s\\) книг?"}, {"index": 1, "url": null, "content": "Сколькими способами можно поставить в ряд 3 англичан, 3 немцев и 3 русских, чтобы никакие 3 соотечественника не стояли рядом?"}, {"index": 2, "url": null, "content": "Докажите, что \\(r\\) различных вещей можно разделить между \\(n + p\\) людьми так, чтобы данные \\(n\\) получили по крайней мере по одному предмету\n\n\\((n + p)^r - C_n^1(n + p - 1)^r + C_n^2(n + p - 2)^r - ... + (-1)^n p^r\\)\n\nспособами."}, {"index": 3, "url": null, "content": "Найти количество способов поставить в ряд \\(m\\) французов и \\(n\\) англичан таким образом, чтобы рядом с каждым человеком стоял хотя бы один его соотечественник."}, {"index": 4, "url": null, "content": "На координатной плоскости дан параллелограмм с вершинами в точках \\(O(0; 0)\\), \\(P(-14; 42)\\), \\(Q(6; 42)\\) и \\(R(20; 0)\\). Найдите количество пар точек \\(A(x_1; y_1)\\) и \\(B(x_2; y_2)\\) с целыми координатами, лежащих в этом параллелограмме (возможно, на границе) и таких, что \\(3x_2 - 3x_1 + y_2 - y_1 = 33\\)."}, {"index": 5, "url": null, "content": "На одной прямой взяты \\(n\\) точек, а на параллельной ей прямой - \\(m\\) точек. Эти точки соединяются прямыми. Доказать, что количество точек пересечения проведенных прямых не превосходит \\(\\frac{mn(m-1)(n-1)}{4}\\)."}, {"index": 6, "url": null, "content": "Даны \\(n\\) точек плоскости, никакие 3 из которых не лежат на одной прямой и никакие 4 - на одной окружности. Через каждую пару этих точек проводится прямая, а через каждые 3 окружность. Найти наибольшее число точек пересечения всех проведенных прямых со всеми окружностями."}, {"index": 7, "url": null, "content": "Дан квадрат, стороны которого равны 500. Его стороны разбиты отмеченными точками на отрезки длины 2 (вершины исходного квадрата тоже отмечены). Найдите количество четверок из отмеченных точек, являющихся вершинами прямоугольника."}, {"index": 8, "url": null, "content": "На координатной плоскости отметили все точки у которых координаты по \\(x\\) и координаты по \\(y\\) не превосходят 10. Найдите количество пар перпендикулярных отрезков, которые наклонены к осям \\(OX\\) и \\(OY\\) под углом \\(45^\\circ\\) (угол между отрезками равен углу между прямыми на которых лежат эти отрезки)."}, {"index": 9, "url": null, "content": "В многочлене \\((x+y)^{10}(y+z)^{10}(z+x)^{10}\\) найдите коэффициент перед слагаемым \\(x^{10}y^{10}z^{10}\\)."}, {"index": 10, "url": null, "content": "Найдите коэффициент при \\(x^k\\) в разложении \\((1 + x + x^2 + ... + x^{n-1})^2\\)"}, {"index": 11, "url": null, "content": "Будем говорить, что 2 числа, входящие в размещение, образуют инверсию, если большее из них написано ранее, чем меньшее. Сколько инверсий во всех перестановках чисел \\(1, 2, 3, ..., n\\)?"}]}, {"id": "ydsa/mathematics/probability/[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "name": "[04] 25-10-21 (5) Комбинаторика и теория чисел 101", "problems": [{"index": 0, "url": null, "content": "Найдите сумму натуральных чисел от 1 до 3000 включительно, имеющих с числом 3000 общие делители, большие 1."}, {"index": 1, "url": null, "content": "(\\*) Найдите количество троек натуральных чисел (a; b; c), удовлетворяющих системе уравнений \n\\[\n    \\begin{cases} \n    \\gcd(a;\\, b;\\, c) = 6, \\\\ \n    \\operatorname{lcm}(a;\\, b;\\, c) = 2^{15} \\cdot 3^{16} \n    \\end{cases}\n\\]"}, {"index": 2, "url": null, "content": "Найдите количество восьмизначных чисел, произведение цифр каждого из которых равно 3375. Ответ необходимо представить в виде целого числа."}, {"index": 3, "url": null, "content": "Сколько существует натуральных n меньших 10000 таких, что \\(2^n - n^2\\) делится на 7?"}, {"index": 4, "url": null, "content": "Сколько существует пар натуральных чисел (x; y) меньших 10000 таких, что \\(x^2 + y^2\\) делится на 49?"}, {"index": 5, "url": null, "content": "Найдите натуральное число вида \\(n = 2^x 3^y 5^z\\), зная, что половина его имеет на 30 делителей меньше, треть – на 35 и пятая часть – на 42 делителя меньше, чем само число."}, {"index": 6, "url": null, "content": "Есть 207 различных карточек с числами 1, 2, 3, \\(2^2\\), \\(3^2\\),...,\\(2^{103}\\), \\(3^{103}\\) (на каждой карточке написано ровно одно число, каждое встречается ровно один раз). Сколькими способами можно выбрать 3 карточки, чтобы произведение чисел выбранных карточек было квадратом целого числа, делящегося на 6?"}, {"index": 7, "url": null, "content": "Доказать, что если s — число всех делителей натурального числа n, то произведение всех делителей равно \\(\\sqrt{n^s}\\)."}, {"index": 8, "url": null, "content": "Найдите количество пар целых чисел (a, b) таких, что \\(1 \\leq a \\leq 700\\), \\(1 \\leq b \\leq 700\\), сумма a + b делится на 7, а произведение ab делится на 5. (При \\(a \\neq b\\) пары (a, b) и (b, a) считаются различными.)"}, {"index": 9, "url": null, "content": "Найдите количество натуральных чисел k, не превосходящих 291000 и таких, что \\(k^2 - 1\\) делится нацело на 291."}, {"index": 10, "url": null, "content": "В числе 2*0*1*6*0*2* нужно заменить каждую из 6 звёздочек на любую из цифр 0, 1, 2, 3, 4, 5, 6, 7, 8 (цифры могут повторяться) так, чтобы полученное 12-значное число делилось на 45. Сколькими способами это можно сделать?"}, {"index": 11, "url": null, "content": "Найдите количество решений уравнения:\n\n    1) \\(x^2 + xy = 300000\\) в целых числах\n    2) \\(5x^2 - 6xy + y^2 = 6^{1000}\\) в целых числах\n    3) \\(3^x + 7y = 3^{2016}\\) в натуральных числах"}, {"index": 12, "url": null, "content": "Найдите количество решений уравнения \\(x_1 + x_2 + ... + x_n = m\\) (решения, отличающиеся порядком, считаются различными) В целых числах таких, что \\(x_i \\geq -i\\)"}, {"index": 13, "url": null, "content": "Митя сложил все нечётные натуральные делители некоторого чётного числа N (включая единицу), а Ваня сложил все чётные натуральные делители числа N (включая само число). Затем Ванину сумму умножили на Митину. Может ли произведение быть квадратом натурального числа?"}, {"index": 14, "url": null, "content": "Петя выписал одно за другим 2019 чисел вида \\(\\frac{1 \\cdot 2}{2}\\), \\(\\frac{2 \\cdot 3}{2}\\), ..., \\(\\frac{2018 \\cdot 2019}{2}\\) и вычислил их. Сколько из получившихся чисел имеют в десятичной записи последнюю цифру 8?\n\n\n↑ Перебор остатков"}]}, {"id": "ydsa/mathematics/probability/[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "name": "[05] 25-10-21 (8) Комбинаторика и теория чисел 102", "problems": [{"index": 0, "url": null, "content": "Сколько шестизначных чисел содержит ровно 3 различные цифры?"}, {"index": 1, "url": null, "content": "Сколько существует троек целых чисел (a; b; c) таких, что они образуют в указанном порядке геометрическую прогрессию, а их произведение равно \\(2^{150} 3^{150}\\)?"}, {"index": 2, "url": null, "content": "Найдите количество семизначных чисел, обладающих следующим свойством: сумма остатков от деления этих чисел на три последовательные степени числа десять равна 12345."}, {"index": 3, "url": null, "content": "Дано число: 5300...0035 (100 нулей). Требуется заменить некоторые два нуля на ненулевые цифры так, чтобы после замены получилось число, делящееся на 495. Сколькими способами это можно сделать?"}, {"index": 4, "url": null, "content": "Докажите, что число \\((n^2)!/(n!)^{n+1}\\) является целым для натуральных значений n."}, {"index": 5, "url": null, "content": "Найдите количество треугольников с целочисленными сторонами и периметром 12n."}, {"index": 6, "url": null, "content": "Найдите количество способов, которыми два человека могут разделить 2n предметов одного сорта, 2n предметов второго сорта и 2n предметов третьего сорта так, чтобы каждый получил 3n предметов."}, {"index": 7, "url": null, "content": "Сколько имеется чисел от 1 до 999999999, у которых сумма цифр равна 11?"}, {"index": 8, "url": null, "content": "Сколько цифр каждого вида потребуется для записи всех натуральных чисел от 1 до \\(10^n - 1\\)?"}, {"index": 9, "url": null, "content": "Доказать, что число треугольников с целочисленными сторонами и периметром \\(4n + 3\\) на \\(n + 1\\) больше числа треугольников с целочисленными сторонами и периметром \\(4n\\)."}, {"index": 10, "url": null, "content": "Найти количество треугольников с целочисленными сторонами, длина сторон которых не больше 2n."}, {"index": 11, "url": null, "content": "Найдите количество способов выбрать из n отрезков длины 1, 2, 3, ..., n (каждый отрезок можно взять более 1-го раза) 4 штуки так, чтобы получился описанный четырехугольник."}]}, {"id": "ydsa/mathematics/probability/[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "name": "[07] 25-10-28 (2) Рекурренты в комбинаторике 101", "problems": [{"index": 0, "url": null, "content": "Первоклассница Маша, заходя в школу, каждый раз поднимается на школьное крыльцо\nпо лестнице, имеющей 10 ступенек. Находясь внизу лестницы или на очередной её ступеньке, она может либо подняться на следующую ступеньку, либо перепрыгнуть через\nодну ступеньку вверх. Какое минимальное количество раз Маше нужно зайти в школу,\nчтобы подняться на крыльцо всеми возможными способами?"}, {"index": 1, "url": null, "content": "Четырнадцать шаров и четырнадцать урн нумеруются от числами от 1 до 14. Шары\nкладутся в урны так, чтобы в каждой урне оказался ровно один шар. Шар можно положить в урну, если его номер совпадает с номером урны или отличается от него на единицу.\nСколькими способами можно разложить шары по урнам?"}, {"index": 2, "url": null, "content": "Сколько понадобится перекладываний в головоломке ханойская башня, если прямое перемещение диска с 1-го колышка на 3-й и с 3-го на 1-й запрещено (каждое перекладывание\nдолжно производиться через 2-й колышек)? А если добавить дополнительное требование:\nпервый (самый маленький) диск нельзя класть на 2-й колышек?"}, {"index": 3, "url": null, "content": "Сколько имеется разбиений отрезка длины 8 на отрезки длины 1, 2 и 3? (Разбиения,\nотличающиеся порядком следования отрезков, считаются различными.)"}, {"index": 4, "url": null, "content": "Найдите количество натуральных чисел от 0 до 99999 не содержащее двух подряд\nидущих цифр 7 в своей записи?"}, {"index": 5, "url": null, "content": "Петя выписывает все возможные 2018-буквенные слова, состоящие только из букв а, б,\nв. В скольких из них а встречается четное количество раз?\n\n↑ ПОЛУЧИТЬ ОТВЕТ В ЯВНОМ ВИДЕ"}, {"index": 6, "url": null, "content": "Рассмотрим алфавит из 2 букв. Словом будем считать любое конечное сочетание букв.\nНазовем слово непроизносимым, если в нем встречается больше 2 одинаковых букв подряд.\nСколько всего существует непроизносимых слов из 7 букв?"}, {"index": 7, "url": null, "content": "В алфавите жителей сказочной планеты АБ2020 всего две буквы: буква А и буква Б.\nВсе слова начинаются на букву А и заканчиваются тоже на букву А. В любом слове буква\nА не может соседствовать с другой буквой А. Также не может идти подряд больше, чем\n2 буквы Б. Сколько 20-буквенных слов в словаре этой планеты?"}, {"index": 8, "url": null, "content": "n человек выстраиваются по кругу и нумеруются числами от 1 до n. Затем из них\nисключается каждый второй до тех пор, пока не останется только один человек. Например,\nесли n = 10, то порядок исключения таков: 2, 4, 6, 8, 10, 3, 7, 1, 9, так что остается номер"}, {"index": 9, "url": null, "content": "Для данного n будем обозначать через J(n) номер последнего оставшегося человека.\nДокажите, что J(2n) = 2J(n) - 1 и J(2n + 1) = 2J(n) + 1."}, {"index": 10, "url": null, "content": "Пусть \\(a_n\\) - количество перестановок \\((k_1, k_2, ..., k_n)\\) чисел \\((1, 2, \\ldots, n)\\) таких, что выполнены два условия: \\(k_1 = 1\\); для любого номера \\(i = 1, 2, \\ldots, n - 1\\) выполнено неравенство\n\\(|k_i - k_{i+1}| \\leq 2\\). Каково число \\(a_{10}\\)?"}, {"index": 11, "url": null, "content": "Лягушка прыгает по вершинам шестиугольника ABCDEF, каждый раз перемещаясь\nв одну из соседних вершин. а) Сколькими способами она может попасть из A в C за n\nпрыжков? б) Тот же вопрос, но при условии, что ей нельзя прыгать в D?\n\n↑ ПОМНИМ ПРО СИММЕТРИИ"}]}, {"id": "ydsa/mathematics/probability/[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "name": "[08] 25-10-28 (5) Рекурренты в комбинаторике 102", "problems": [{"index": 0, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций aaa, bbb, ccc."}, {"index": 1, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c и не содержат комбинаций ab, ca."}, {"index": 2, "url": null, "content": "Напишите рекуррентное соотношение для количества n буквенных слов, которые состоят из букв a, b, c, начинаются и заканчиваются на букву b и при этом между любыми двумя буквами b находится четное количество букв a."}, {"index": 3, "url": null, "content": "Пусть \\(E_n\\) - это количество способов расставить числа от 1 до n таким образом, чтобы в образовавшемся ряду ровно один раз следующее число было больше предыдущего (например, в расстановке 4312 ровно одно число больше предыдущего). Докажите, что выполняется равенство \\(E_{n+1} = 2E_n + n\\) для любого натурального n."}, {"index": 4, "url": null, "content": "Найдите количество способов разбить прямоугольник размером \\(2 \\times 12\\) на прямоугольники из двух клеточек и уголки, которые состоят из трех клеток."}, {"index": 5, "url": null, "content": "В каждой клетке доски \\(n \\times n\\) написали её координаты (в левой нижней клетке (1;1),\nв следующей клетке этой строки (2;1) и так далее: первая координата - номер строки,\nвторая - номер столбца). После этого из таблицы удалили все клетки у которых сумма\nкоординат больше \\(n+1\\). Найдите количество способов поставить в оставшуюся часть доски\n2 одинаковые ладьи таким образом, чтобы они не били друг друга."}, {"index": 6, "url": null, "content": "Докажите формулу: \\(S(m, n) = \\sum_{k=n-1}^{m-1} C_{m-1}^k \\cdot S(k, n-1)\\), если \\(S(n, k)\\) - число Стирлинга второго рода."}, {"index": 7, "url": null, "content": "Докажите, что \\(\\sum_{k=0}^{n} c(n, k) \\cdot x^k = x(x+1)(x+2)...(x+n-1)\\), где \\(c(n, k)\\) - число Стирлинга первого рода без знака."}, {"index": 8, "url": null, "content": "Докажите, что количество способов соединения 2n точек на окружности n непересекающимися хордами равно \\(C_n\\) (число Каталана)."}, {"index": 9, "url": null, "content": "Докажите, что количество различных бинарных деревьев (узнайте определение), которые содержат \\(2n+1\\) вершину равно \\(C_n\\) (число Каталана). Попробуйте установить явную биекцию между деревьями и правильными скобочными структурами."}, {"index": 10, "url": null, "content": "Сколько существует способов организовать подсчет голосов на выборах с участием двух кандидатов, в которых первый набрал 12 голосов, а второй набрал 8, чтобы первый кандидат опережал второго в течение всего времени подсчета голосов?\n\n↑ ОТРАЖЕНИЕ ПУТИ"}, {"index": 11, "url": null, "content": "Имеются 12 карандашей попарно различной длины. Сколькими способами можно уложить их в коробку в два слоя по шесть карандашей так, чтобы в каждом слое карандаши были упорядочены по возрастанию длины (слева направо), а каждый карандаш верхнего слоя лежал строго над карандашом нижнего слоя и был короче его?\n\n↑ ЧИСЛА КАТАЛАНА"}]}, {"id": "ydsa/mathematics/probability/[10] 25-11-04 (4) Теория вероятностей 101", "name": "[10] 25-11-04 (4) Теория вероятностей 101", "problems": [{"index": 0, "url": null, "content": "Петя бросает несколько раз на стол игральный кубик и считает сумму очков, выпавших\nна его верхней грани. Для любого натурального числа n событие \\(A_n\\) наступает, если эта\nсумма равна n. Найти вероятность события \\(A_{11}\\)."}, {"index": 1, "url": null, "content": "Через случайно выбранные три вершины куба с ребром 2 проводится плоскость. Найти вероятность того, что площадь сечения превзойдёт 5. Допускается, что эти вершины принадлежат одной грани куба."}, {"index": 2, "url": null, "content": "\\* В квадрате ABCD со стороной 4 расположена точка O, отстоящая от сторон AD и CD\nна расстояние 1. Через точку O совершенно случайно проведена прямая L, разделяющая\nквадрат на две части. Найти вероятность того, что одна из частей будет иметь площадь,\nне превосходящую 3."}, {"index": 3, "url": null, "content": "\\* Точки P, Q расположены на сторонах AB и AC треугольника ABC так, что AP : PB =\n2 : 1, AQ : QC = 1 : 3. Точка M выбрана на стороне BC совершенно случайно. Найти\nвероятность того, что площадь треугольника ABC превосходит площадь треугольника\nPQM не более, чем в три раза. Найти математическое ожидание случайной величины –\nотношения площадей треугольников PQM и ABC."}, {"index": 4, "url": null, "content": "В колоде 10 карт, на каждой из них нарисовано одно из чисел от 1 до 10. Случайно\nвыбранную из колоды карту кладут на стол, показывают всем написанное на ней число\nи возвращают её в колоду. После этого колода тщательно перемешивается и готова к\nпродолжению игры. Петя выкладывал на стол карту три раза. Какова вероятность того,\nчто сумма выпавших чисел оказалась равной 5?\n\nПОМНИМ ПРО ГЕОМЕТРИЧЕСКУЮ ВЕР-СТЬ"}, {"index": 5, "url": null, "content": "Два игрока подбрасывают монету. Один считает выпавшие орлы, другой решки. Выигрывает тот, кто первым наберет 20 очков. Сейчас счет 19:17 в пользу первого игрока.\nКакова вероятность того, что он выиграет? (Ответ запишите в виде несократимой дроби)"}, {"index": 6, "url": null, "content": "В одной урне лежат 4 зеленых и 6 красных шариков, а в другой - 16 зеленых и N\nкрасных. Из каждой урны наугад вытаскивают по одному шарику. Вероятность того, что\nшарики окажутся одного цвета, равна 0,58. Найдите N."}, {"index": 7, "url": null, "content": "Из набора {1, 2, 3, ..., 10} наугад выбираются два различных числа. Найдите вероятность\nтого, что их произведение чётно. Если необходимо, округлите ответ с точностью до 0,01."}, {"index": 8, "url": null, "content": "На гранях игрального кубика написаны числа от 1 до 6. Однако вес кубика распределён\nнеравномерно и вероятность выпадения числа k прямо пропорциональна k. Кубик бросают\nдва раза подряд. Какова вероятность того, что сумма двух выпавших чисел будет равняться 7?\nЕсли необходимо, округлите ответ до 0,01."}, {"index": 9, "url": null, "content": "Монета искривлена так, что вероятность выпадения ровно 3-х орлов в серии из 5-ти бросков равна вероятности выпадения ровно 2-х орлов в серии из 4-х бросков. Найдите\nвероятность того, что в серии из 6-ти бросков выпадет не менее 3-х орлов. Если необходимо,\nответ округлите до сотых."}, {"index": 10, "url": null, "content": "На детском новогоднем празднике раздавали шоколадные и фруктовые конфеты. Дети\nподходили к деду Морозу, залезали рукой в его мешок и вынимали из него по две конфеты. Когда Петя подошел к мешку, он понял, что шоколадных конфет в мешке почти не\nосталось и вероятность получить две шоколадные конфеты в три раза меньше, чем шоколадную и фруктовую. Какое наименьшее число шоколадных конфет могло находиться в\nмешке деда Мороза в момент, когда Петя забирал свои конфеты, если после него ещё не\nменее 10 детей получили свои конфеты до того, как мешок опустел?"}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/junior/01 Seven-Digit Distinct Digits", "name": "01 Seven-Digit Distinct Digits", "problems": [{"index": 0, "url": null, "content": "Вася наугад написал на доске семизначное число. Какова вероятность того, что в нём все цифры различны? Ответ запишите в виде десятичной дроби."}]}, {"id": "ydsa/mathematics/probability/[14] 25-11-24/[01] Классика/junior/02 Painted Cube Faces", "name": "
