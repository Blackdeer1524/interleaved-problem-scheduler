ся к бесконечности и \\(p_n\\) стремится к нулю так, что \\(np_n \\to \\lambda > 0\\). Докажите, что для любого k > 0 вероятность получить k успехов в n испытаниях схемы Бернулли с вероятностью \\(p_n\\) стремится к величине \\(\\lambda^k e^{-\\lambda}/k!\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/8 Геометрическое минимум матожидание", "name": "8 Геометрическое минимум матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых одинаково распределённых случайных величин \\(\\xi_n\\) с геометрическим распределением: \\(P(\\xi_n = k) = p(1-p)^{k-1}\\). Найдите распределение случайных величин \\(\\tau = \\min\\{n \\geq 1 : \\xi_n > 1\\}\\) и \\(\\xi_\\tau\\), вычислите \\(M[\\tau]\\), \\(M[\\xi_\\tau]\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/middle/9 Равномерное убывание номер матожидание", "name": "9 Равномерное убывание номер матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых одинаково распределённых случайных величин \\(\\xi_n\\) с равномерным распределением на отрезке [0; 1]. Пусть \\(\\tau\\) — номер члена, с которого последовательность начала убывать. Найдите математическое ожидание \\(\\tau\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/11 Геометрическое распределение свойство памяти", "name": "11 Геометрическое распределение свойство памяти", "problems": [{"index": 0, "url": null, "content": "Доказать, что \\(\\xi\\) — геометрически распределённая случайная величина тогда и только тогда, когда \\(P(\\xi = n + k \\mid \\xi \\geq k) = P(\\xi = n)\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/12 Рулетка сумма среднее число", "name": "12 Рулетка сумма среднее число", "problems": [{"index": 0, "url": null, "content": "На игровой рулетке n секторов с числами \\(1, 2, \\ldots, n\\). Найдите, сколько в среднем раз нужно прокрутить барабан, чтобы сумма выпавших очков стала не меньше n."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[01] Дискретные случайные величины/senior/13 Робот шахматная доска чёрные белые", "name": "13 Робот шахматная доска чёрные белые", "problems": [{"index": 0, "url": null, "content": "Робот движется по клеткам бесконечной шахматной доски. Один его шаг — перемещение на случайную из восьми соседних клеток. Найдите математическое ожидание и дисперсию разности, а также модуля разности между количеством чёрных и количеством белых клеток, на которых робот побывал за n шагов (каждая клетка считается столько раз, сколько на ней побывал робот). Ответ представьте в виде компактного выражения."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/14 Четыре кости матожидание дисперсия", "name": "14 Четыре кости матожидание дисперсия", "problems": [{"index": 0, "url": null, "content": "Бросают четыре игральные кости. Найдите математическое ожидание и дисперсию числа выпавших очков."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/15 Карты колода сумма матожидание", "name": "15 Карты колода сумма матожидание", "problems": [{"index": 0, "url": null, "content": "В колоде 20 карт, на каждой — номер от 0 до 19, все номера различные. Вынули 5 карт. Найдите математическое ожидание и дисперсию суммы цифр на вынутых картах."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/16 Ящики дети подарки без подарка", "name": "16 Ящики дети подарки без подарка", "problems": [{"index": 0, "url": null, "content": "В комнате n ящиков, в каждом лежит по одному подарку. По очереди в комнату заходит m детей, каждый из которых случайным образом выбирает ящик и забирает оттуда подарок, если тот ещё есть. Найдите, сколько в среднем детей уйдут без подарка, и дисперсию количества детей без подарка."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/junior/17 Доли сумма корреляция коэффициент", "name": "17 Доли сумма корреляция коэффициент", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1, \\ldots, X_n\\) — независимые одинаково распределённые случайные величины с математическим ожиданием a и дисперсией \\(\\sigma^2\\), принимающие положительные значения. Пусть \\(\\xi_k = \\frac{X_k}{X_1 + \\ldots + X_n}\\). Найдите коэффициент корреляции между \\(\\xi_i\\) и \\(\\xi_j\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/18 Дружба клика скидка способы", "name": "18 Дружба клика скидка способы", "problems": [{"index": 0, "url": null, "content": "В группе первокурсников ШАДа n ребят, видящих друг друга впервые. В парке аттракционов дают скидку компании ровно из k друзей, среди которых каждый дружит с каждым. Дружба между любой парой однокурсников независимо возникает с вероятностью p. Найдите среднее количество способов, которыми Макс может пойти на аттракционы со скидкой."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/19 Хоккей ничья матожидание дисперсия", "name": "19 Хоккей ничья матожидание дисперсия", "problems": [{"index": 0, "url": null, "content": "Две хоккейные команды одинаковой силы договорились играть до тех пор, пока суммарный счёт не достигнет 2n. Найдите математическое ожидание и дисперсию числа моментов, когда наступала ничья."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/20 Нули единицы группы матожидание", "name": "20 Нули единицы группы матожидание", "problems": [{"index": 0, "url": null, "content": "Последовательность состоит из k нулей и m единиц, расположенных в случайном порядке. Разобьём последовательность на чередующиеся группы нулей и единиц (группа — участок из одинаковых цифр подряд). Общее число групп — случайная величина. Найдите её математическое ожидание и дисперсию."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/21 Круглый стол соседи выбор", "name": "21 Круглый стол соседи выбор", "problems": [{"index": 0, "url": null, "content": "За круглым столом сидят n (n > 4) человек. Все они независимо друг от друга с вероятностью 1/2 выбирают одного из своих соседей. Найдите среднее количество людей, которых никто не выбрал."}, {"index": 1, "url": null, "content": "Найдите дисперсию количества людей, которых никто не выбрал."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/22 Жених невесты браки штампы", "name": "22 Жених невесты браки штампы", "problems": [{"index": 0, "url": null, "content": "Неразборчивый жених женится на первой желающей выйти за него замуж, а потом, как только встретит более привлекательную партию, оформляет развод и заключает новый брак. Потенциальные n невест могут быть строго ранжированы по привлекательности, но встречаются жениху в случайном порядке (все перестановки равновероятны). Хватит ли в среднем места в паспорте для всех штампов о браках и разводах, если n = 50, а паспорт вмещает всего 5 штампов о браках (вместе с 4 штампами о разводах)?"}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/23 Шапокляк Гена кубик дисперсия", "name": "23 Шапокляк Гена кубик дисперсия", "problems": [{"index": 0, "url": null, "content": "Крокодил Гена и старуха Шапокляк играют в игру с десятигранным кубиком. Первый ход делает Шапокляк: если выпадает от 8 до 10, ход остаётся за ней, иначе переходит к Гене. Гена в свой ход бросает кубик: если выпадает от 1 до 8, ход переходит к Шапокляк, иначе остаётся за ним. Игру прервали сразу после 91-го хода Гены. Пусть \\(\\xi\\) — количество ходов, сделанных Шапокляк. Найдите дисперсию \\(\\xi\\)."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/middle/24 Паук решётка повороты матожидание", "name": "24 Паук решётка повороты матожидание", "problems": [{"index": 0, "url": null, "content": "По квадратной решётке размера \\(k \\times l\\) паук шагает из точки А в точку В, выбирая наугад любой из путей длины \\(k + l\\). Найдите математическое ожидание и дисперсию числа поворотов на его пути в узлах решётки."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/senior/25 Девицы театр вставания матожидание", "name": "25 Девицы театр вставания матожидание", "problems": [{"index": 0, "url": null, "content": "Благородные девицы (всего n) заходят в ряд из n кресел со стороны n-го кресла. Если девице нужно пройти мимо уже сидящей, та вежливо встаёт. Найдите математическое ожидание и дисперсию числа вставаний."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание и дисперсию числа тех, кому не придётся встать ни разу."}]}, {"id": "courses/mathematics/probability/[17] 25-12-02/[02] Метод индикаторов/senior/26 Булевы матрицы единицы произведение", "name": "26 Булевы матрицы единицы произведение", "problems": [{"index": 0, "url": null, "content": "Пусть A и B — две случайные булевы матрицы \\(n \\times n\\), у которых каждый элемент равен 1 с вероятностью p (значения различных элементов независимы). Найдите математическое ожидание и дисперсию числа единиц в их произведении, если сложение и умножение происходит по модулю 2."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/1 Гауссовы интегралы вероятностные методы", "name": "1 Гауссовы интегралы вероятностные методы", "problems": [{"index": 0, "url": null, "content": "Используя теоретико-вероятностные соображения, вычислите интеграл \\(\\int_0^{\\infty} e^{-\\frac{x^2}{3}} dx\\)."}, {"index": 1, "url": null, "content": "Используя теоретико-вероятностные соображения, вычислите интеграл \\(\\int_0^{\\infty} e^{-x^2+4x-1} dx\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/2 Коши обратная величина плотность", "name": "2 Коши обратная величина плотность", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(\\xi\\) распределена по Коши, то \\(\\eta = \\frac{1}{\\xi}\\) тоже распределена по Коши."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/3 Непрерывная функция дискретное распределение", "name": "3 Непрерывная функция дискретное распределение", "problems": [{"index": 0, "url": null, "content": "Приведите пример плотности распределения непрерывной случайной величины \\(\\xi\\) и непрерывной функции g таких, что \\(\\eta = g(\\xi)\\) имеет дискретное распределение."}, {"index": 1, "url": null, "content": "Приведите пример плотности распределения непрерывной случайной величины \\(\\xi\\) и непрерывной функции g таких, что \\(\\eta = g(\\xi)\\) имеет невырожденное дискретное распределение."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/4 Равномерная Бернулли сумма плотность", "name": "4 Равномерная Бернулли сумма плотность", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi\\) и \\(\\eta\\) независимы, причём \\(\\xi\\) равномерно распределена на отрезке [0, 1], а \\(\\eta\\) — бернуллиевская случайная величина с вероятностью успеха p. Найдите плотность распределения случайной величины \\(\\xi + \\eta\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/5 Пожар убыток страховка распределение", "name": "5 Пожар убыток страховка распределение", "problems": [{"index": 0, "url": null, "content": "Прямой убыток от пожара в миллионах рублей равномерно распределён на [0; 1]. Если убыток оказывается больше 0,7, страховая компания выплачивает компенсацию 0,7. Найдите функцию распределения потерь от пожара."}, {"index": 1, "url": null, "content": "Найдите средние потери."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[01] Непрерывное распределение/junior/6 Плотность больше двух предел", "name": "6 Плотность больше двух предел", "problems": [{"index": 0, "url": null, "content": "Может ли функция плотности принимать значение больше 2023? Может ли предел \\(\\lim_{x \\to \\infty} f(x)\\) не равняться нулю?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/10 Нулевое матожидание неравенство дисперсия", "name": "10 Нулевое матожидание неравенство дисперсия", "problems": [{"index": 0, "url": null, "content": "Пусть \\(M[\\xi] = 0\\). Докажите, что \\(M[\\xi^2] \\leq \\frac{1}{2}(D[\\xi] + 1)\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/11 Порядковые статистики матожидание равномерные", "name": "11 Порядковые статистики матожидание равномерные", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\ldots, \\xi_n\\) — i.i.d., равномерно на \\([0;1]\\). Найдите математическое ожидание \\(\\xi_{(n)}\\) (максимума)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание \\(\\xi_{(1)}\\) (минимума)."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание \\(\\xi_{(k)}\\) (k-й порядковой статистики)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/12 Прямоугольник точка площадь треугольника", "name": "12 Прямоугольник точка площадь треугольника", "problems": [{"index": 0, "url": null, "content": "В прямоугольнике ABCD единичной площади выбираем точку M. Найдите математическое ожидание площади треугольника ABM."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/13 Показательное целая дробная матожидание", "name": "13 Показательное целая дробная матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть X распределена показательно с показателем 1. Найдите математическое ожидание и дисперсию \\([X]\\) (целой части)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание и дисперсию \\(\\{X\\}\\) (дробной части)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/7 Непрерывные распределения характеристики таблица", "name": "7 Непрерывные распределения характеристики таблица", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану равномерного распределения на отрезке \\([a; b]\\)."}, {"index": 1, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану экспоненциального распределения."}, {"index": 2, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану нормального распределения."}, {"index": 3, "url": null, "content": "Найдите математическое ожидание, дисперсию, моду, медиану логнормального распределения."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/8 Функция распределения матожидание экспонента", "name": "8 Функция распределения матожидание экспонента", "problems": [{"index": 0, "url": null, "content": "Пусть функция распределения случайной величины \\(\\xi\\) равна:\n\\[F(x) = \\begin{cases} 0, & x < 0 \\\\ \\frac{x+1}{4}, & x \\in [0, 1) \\\\ \\frac{x^2+2}{4}, & x \\in [1, \\sqrt{2}) \\\\ 1, & x \\geq \\sqrt{2} \\end{cases}\\]\nВычислите \\(Ee^{\\xi}\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/junior/9 Нулевая дисперсия случайная величина", "name": "9 Нулевая дисперсия случайная величина", "problems": [{"index": 0, "url": null, "content": "Что можно сказать про случайную величину с нулевой дисперсией?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/14 Экспонента максимум отклонение медиана", "name": "14 Экспонента максимум отклонение медиана", "problems": [{"index": 0, "url": null, "content": "Найдите наибольшее значение \\(M|X - C|\\) и значение C, в котором оно достигается, где X распределена экспоненциально."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/15 Неравенство Йенсена обратная величина", "name": "15 Неравенство Йенсена обратная величина", "problems": [{"index": 0, "url": null, "content": "У положительной случайной величины \\(\\xi\\) существует математическое ожидание \\(M[\\xi]\\). Докажите, что \\(1 \\leq M[\\xi] \\cdot M\\left[\\frac{1}{\\xi}\\right]\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/16 Корреляция единица линейная функция", "name": "16 Корреляция единица линейная функция", "problems": [{"index": 0, "url": null, "content": "Докажите, что коэффициент корреляции между случайными величинами \\(\\xi\\) и \\(\\eta\\) равен единице тогда и только тогда, когда \\(\\eta = a\\xi + b\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/middle/17 Марков неравенство матожидание модуль", "name": "17 Марков неравенство матожидание модуль", "problems": [{"index": 0, "url": null, "content": "Пусть случайная величина \\(\\xi\\) имеет \\(M[|\\xi|]\\). Докажите, что для любого \\(\\epsilon > 0\\) верно \\(P(|\\xi| \\geq \\epsilon) \\leq \\frac{M|\\xi|}{\\epsilon}\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/senior/18 Ломаная угол матожидание квадрат", "name": "18 Ломаная угол матожидание квадрат", "problems": [{"index": 0, "url": null, "content": "На плоскости нарисована ломаная с n звеньями. Длина каждого звена равна 1, ориентированный угол между соседними звеньями с равной вероятностью равен \\(\\alpha\\) или \\(-\\alpha\\). Найдите математическое ожидание квадрата расстояния от её начальной точки до конечной."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[02] Математическое ожидание/senior/19 Положительная дисперсия ограничена неравенство", "name": "19 Положительная дисперсия ограничена неравенство", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) — строго положительная случайная величина, причём её дисперсия существует и не превосходит 2. Верно ли, что \\(P(E[\\xi] - 2 \\leq \\xi \\leq 2E[\\xi] + 1) \\geq \\frac{1}{2}\\)?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/20 Шар пятнадцать измерений расстояние", "name": "20 Шар пятнадцать измерений расстояние", "problems": [{"index": 0, "url": null, "content": "Рассмотрим единичный шар в 15-мерном пространстве. Найдите минимальное число n такое, что вероятность события «все n случайных равномерно распределённых в шаре точек расположены на расстоянии не менее 0,5 от центра» не превосходит 0,6."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/21 Симметричное распределение произведение одинаково", "name": "21 Симметричное распределение произведение одинаково", "problems": [{"index": 0, "url": null, "content": "Предположим, что случайная величина \\(\\xi\\) имеет симметричное распределение (\\(P(\\xi = x) = P(\\xi = -x)\\)), а случайная величина \\(\\eta\\) принимает значения 1 и \\(-1\\) с вероятностью 1/2. Докажите, что случайные величины \\(\\xi\\) и \\(\\xi\\eta\\) имеют одинаковое распределение."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/22 Независимость совокупности произведения набор", "name": "22 Независимость совокупности произведения набор", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(X, Y, Z, W\\) независимы в совокупности и одинаково распределены: каждая принимает значения 1 и \\(-1\\) с вероятностью 1/2. Являются ли независимыми в совокупности следующие наборы: \\(XYZ, XYW, XW\\)?"}, {"index": 1, "url": null, "content": "Являются ли независимыми в совокупности следующие наборы: \\(XY, XYW, XW, XZW\\)?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/23 Максимум минимум вероятность точка", "name": "23 Максимум минимум вероятность точка", "problems": [{"index": 0, "url": null, "content": "Дано: \\(P(x = a) = \\lambda\\), \\(P(\\max(x, y) = a) = \\mu\\), \\(P(\\min(x, y) = a) = \\nu\\). Найдите \\(P(y = a)\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/24 Две величины сумма равномерная", "name": "24 Две величины сумма равномерная", "problems": [{"index": 0, "url": null, "content": "Есть ли такие 2 случайные величины, что их сумма распределена равномерно (дискретно)?"}, {"index": 1, "url": null, "content": "Есть ли такие 2 случайные величины, что их сумма распределена равномерно (непрерывно)?"}, {"index": 2, "url": null, "content": "Те же вопросы для независимых случайных величин."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/25 Непрерывные величины сумма равномерная", "name": "25 Непрерывные величины сумма равномерная", "problems": [{"index": 0, "url": null, "content": "Есть ли такие 2 непрерывные случайные величины, что их сумма распределена равномерно (дискретно)?"}, {"index": 1, "url": null, "content": "Есть ли такие 2 непрерывные случайные величины, что их сумма распределена равномерно (непрерывно)?"}, {"index": 2, "url": null, "content": "Те же вопросы для независимых непрерывных случайных величин."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/26 Одинаковое распределение разные величины", "name": "26 Одинаковое распределение разные величины", "problems": [{"index": 0, "url": null, "content": "Приведите пример двух случайных величин \\(\\xi\\) и \\(\\eta\\), имеющих одну и ту же функцию распределения (\\(F_\\xi = F_\\eta\\)), но таких, что \\(P(\\xi \\neq \\eta) > 0\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/27 Функция распределения произведение совпадает", "name": "27 Функция распределения произведение совпадает", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi, \\eta\\) и \\(\\zeta\\) — случайные величины, причём функции распределения \\(\\xi\\) и \\(\\eta\\) совпадают. Верно ли, что тогда функции распределения произведений \\(\\xi\\zeta\\) и \\(\\eta\\zeta\\) совпадают?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/29 Равномерные произведение частное плотность", "name": "29 Равномерные произведение частное плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — независимые случайные величины, равномерно распределённые на отрезке \\([0; a]\\). Найдите распределение \\(\\xi\\eta\\)."}, {"index": 1, "url": null, "content": "Найдите распределение \\(\\frac{\\eta}{\\xi}\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/30 Константа независима от себя", "name": "30 Константа независима от себя", "problems": [{"index": 0, "url": null, "content": "Покажите, что случайная величина \\(\\xi\\) не зависит от самой себя (т.е. \\(\\xi\\) и \\(\\xi\\) независимы) тогда и только тогда, когда \\(\\xi = \\text{const}\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/31 Зависимые квадраты независимые пример", "name": "31 Зависимые квадраты независимые пример", "problems": [{"index": 0, "url": null, "content": "Приведите пример двух зависимых случайных величин \\(\\xi\\) и \\(\\eta\\) таких, что \\(\\xi^2\\) и \\(\\eta^2\\) независимы."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/32 Стандартные нормальные преобразование плотность", "name": "32 Стандартные нормальные преобразование плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — независимые случайные величины, распределённые как \\(N(0; 1)\\). Найдите распределение \\(\\sqrt{\\xi^2 + \\eta^2}\\) двумя способами: по определению и через функциональное преобразование плотности."}, {"index": 1, "url": null, "content": "Найдите распределение \\(\\xi\\eta\\) двумя способами."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/33 Равномерный треугольник функция распределения", "name": "33 Равномерный треугольник функция распределения", "problems": [{"index": 0, "url": null, "content": "Пусть вектор \\((X, Y)\\) имеет равномерное распределение на треугольнике с вершинами \\(A = (0,0)\\), \\(B = (2,0)\\) и \\(C = (1,1)\\). Найдите функции распределения и плотности случайных величин X и Y. Являются ли эти случайные величины независимыми?"}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/34 Синус косинус равномерное независимость", "name": "34 Синус косинус равномерное независимость", "problems": [{"index": 0, "url": null, "content": "Исследуйте на независимость и некоррелированность случайные величины \\(\\xi = \\sin X\\) и \\(\\eta = \\cos X\\), если X равномерно распределена на интервале \\((0; 2\\pi)\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/junior/38 Показательные вектор плотность сумма", "name": "38 Показательные вектор плотность сумма", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют экспоненциальное распределение с параметром 1. Найдите плотность распределения случайного вектора \\((\\xi, \\xi + \\eta)\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/28 Ковариация максимум отрезок", "name": "28 Ковариация максимум отрезок", "problems": [{"index": 0, "url": null, "content": "Две случайные величины имеют какое-то распределение на отрезке [−1, 1]. Найдите их максимальную ковариацию."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/35 Равномерный симплекс корреляция отрицательная", "name": "35 Равномерный симплекс корреляция отрицательная", "problems": [{"index": 0, "url": null, "content": "Пусть \\((\\zeta, \\nu)\\) — координаты случайной точки, имеющей равномерное распределение в области \\(D = \\{x + y \\leq 1, x \\geq 0, y \\geq 0\\}\\). Докажите, что коэффициент корреляции между \\(\\zeta\\) и \\(\\nu\\) отрицательный."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/36 Показательные X Y дисперсия T", "name": "36 Показательные X Y дисперсия T", "problems": [{"index": 0, "url": null, "content": "Пусть заданы две независимые случайные величины X и Y с экспоненциальными распределениями с параметрами \\(\\mu = 1\\) и \\(\\lambda = 2\\) соответственно. Найдите дисперсию величины \\(T\\), где \\(T = \\begin{cases} 1, & X > Y \\\\ 0, & X \\leq Y \\end{cases}\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/37 Треугольник из трёх отрезков", "name": "37 Треугольник из трёх отрезков", "problems": [{"index": 0, "url": null, "content": "Случайные величины X и Y независимы. Плотность X равна \\(p_X(t) = \\frac{t}{2} I_{[0,2]}(t)\\), а Y имеет равномерное распределение на отрезке \\([0, 3]\\). Найдите вероятность того, что из отрезков с длинами X, Y и 1 можно составить треугольник."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/39 Равномерные вектор Бокса-Мюллера", "name": "39 Равномерные вектор Бокса-Мюллера", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\eta))\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/40 Равномерные вектор пи угол", "name": "40 Равномерные вектор пи угол", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(\\pi\\eta))\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/41 Равномерные вектор двойное пи", "name": "41 Равномерные вектор двойное пи", "problems": [{"index": 0, "url": null, "content": "Пусть независимые случайные величины \\(\\xi\\) и \\(\\eta\\) имеют равномерное распределение на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\sqrt{-2\\ln\\xi}\\cos(2\\pi\\eta), \\sqrt{-2\\ln\\xi}\\sin(2\\pi\\eta))\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/middle/42 Порядковые статистики вектор плотность", "name": "42 Порядковые статистики вектор плотность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1, \\ldots, \\xi_n\\) — последовательность независимых случайных величин, равномерно распределённых на отрезке \\([0, 1]\\). Найдите плотность распределения случайного вектора \\((\\xi_{(1)}, \\xi_{(n)})\\), где \\(\\xi_{(1)} = \\min(\\xi_1, \\ldots, \\xi_n)\\), а \\(\\xi_{(n)} = \\max(\\xi_1, \\ldots, \\xi_n)\\)."}]}, {"id": "courses/mathematics/probability/[20] 25-12-08/[03] Многомерное распредление/senior/43 Три равномерные сумма вероятность", "name": "43 Три равномерные сумма вероятность", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\), \\(\\eta\\) и \\(\\lambda\\) — независимые случайные величины, равномерно распределённые на отрезке \\([0, 1]\\), а t — фиксированное число. Найдите \\(P(\\xi + \\eta < t\\lambda)\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/1 Совместная плотность произведение независимость", "name": "1 Совместная плотность произведение независимость", "problems": [{"index": 0, "url": null, "content": "Докажите, что если совместная плотность вероятности \\(f(x_1, x_2, \\ldots, x_n)\\) величин \\(\\xi_1, \\ldots, \\xi_n\\) представима в виде \\(f(x_1, \\ldots, x_n) = g_1(x_1)g_2(x_2)\\cdots g_n(x_n)\\), где \\(g_i(x_i) > 0\\), то функции \\(g_1, g_2, \\ldots, g_n\\) с точностью до нормирующих множителей служат частными плотностями вероятности величин \\(\\xi_1, \\ldots, \\xi_n\\) соответственно, причём эти величины независимы."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/2 Порядковые статистики разности плотность", "name": "2 Порядковые статистики разности плотность", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы и равномерно распределены на \\([0;1]\\). Построим \\(\\eta_1 = \\xi_{(1)}, \\eta_2 = \\xi_{(2)} - \\xi_{(1)}, \\ldots, \\eta_n = \\xi_{(n)} - \\xi_{(n-1)}\\). Найдите совместную плотность \\(\\eta_1, \\ldots, \\eta_n\\)."}, {"index": 1, "url": null, "content": "Найдите плотность каждого \\(\\eta_i\\)."}, {"index": 2, "url": null, "content": "Будут ли случайные величины \\(\\eta_1, \\ldots, \\eta_n\\) независимы?"}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[01] Многомерное распределение/middle/3 Показательные максимум сумма распределение", "name": "3 Показательные максимум сумма распределение", "problems": [{"index": 0, "url": null, "content": "Случайные величины \\(\\xi_1, \\ldots, \\xi_n\\) независимы и имеют одно и то же показательное распределение с параметром \\(\\lambda\\). Докажите, что случайные величины \\(\\max\\{\\xi_1, \\xi_2, \\ldots, \\xi_n\\}\\) и \\(\\xi_1 + \\frac{\\xi_2}{2} + \\ldots + \\frac{\\xi_n}{n}\\) одинаково распределены."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/12 Монета герб решка минимум", "name": "12 Монета герб решка минимум", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) — минимальное число подбрасываний монеты, при котором хотя бы один раз выпадает герб и хотя бы один раз — решка. Найдите \\(M[\\xi]\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/4 Дракон башни перелёт матожидание", "name": "4 Дракон башни перелёт матожидание", "problems": [{"index": 0, "url": null, "content": "Есть три башни, расположенные в углах правильного треугольника. На первой сидит дракон. Дракон перелетает равновероятно в каждый момент времени на одну из соседних башен. Найдите математическое ожидание числа перелётов, после которых он вернётся на исходную башню."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/5 Две урны фишки условная замена", "name": "5 Две урны фишки условная замена", "problems": [{"index": 0, "url": null, "content": "Есть две урны. У одной — четыре фишки по 1 доллару и шесть фишек по 10 долларов, у другой — три фишки по 1 доллару и семь по 10 долларов. Вы случайно вытаскиваете фишку из одной урны — это оказывается фишка в 1 доллар. Затем, не возвращая вынутую фишку, вам предлагают второй раз вытянуть фишку из любой урны. Из какой урны выгоднее брать? Каково ожидаемое значение второй фишки?"}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/6 Кость d6 нечётные матожидание", "name": "6 Кость d6 нечётные матожидание", "problems": [{"index": 0, "url": null, "content": "Кость d6 бросают до выпадения 6. Найдите среднее количество выпавших нечётных чисел."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/junior/7 Монета последовательность ходы матожидание", "name": "7 Монета последовательность ходы матожидание", "problems": [{"index": 0, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РР. Найдите среднее количество ходов."}, {"index": 1, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРО. Найдите среднее количество ходов."}, {"index": 2, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРОР. Найдите среднее количество ходов."}, {"index": 3, "url": null, "content": "Бросают нечестную монету до выпадения последовательности РРО или ООР. Найдите среднее количество ходов."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/10 Аня задачи неправильные ответы", "name": "10 Аня задачи неправильные ответы", "problems": [{"index": 0, "url": null, "content": "Аня решает задачи по математике и даёт правильный ответ с вероятностью 0,8. Маша дала Ане 15 задач и за каждый неправильный ответ даёт ей ещё 2 задачи. Аня решает задачи, пока они не кончатся. Найдите математическое ожидание количества задач, которые Маша суммарно даст Ане."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/11 Составное распределение матожидание Вальд", "name": "11 Составное распределение матожидание Вальд", "problems": [{"index": 0, "url": null, "content": "Докажите, что если \\(\\xi_1, \\xi_2, \\ldots\\) — независимые одинаково распределённые случайные величины с \\(M|\\xi_1| < \\infty\\), а \\(\\nu\\) — не зависящая от них неотрицательная целочисленная случайная величина с \\(M[\\nu] < \\infty\\), то \\(M[\\xi_1 + \\ldots + \\xi_\\nu] = M[\\xi_1] \\cdot M[\\nu]\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/13 Гербы решки корреляция ковариация", "name": "13 Гербы решки корреляция ковариация", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi\\) и \\(\\eta\\) — соответственно число гербов и число решек, выпадающих при бросании ста монет. Найдите коэффициент корреляции случайных величин \\(\\xi\\) и \\(\\eta\\)."}, {"index": 1, "url": null, "content": "Найдите ковариацию случайных величин \\(\\xi\\) и \\(\\eta\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/8 Три игрока кости ходы B", "name": "8 Три игрока кости ходы B", "problems": [{"index": 0, "url": null, "content": "Игроки А, В и С сменяя друг друга по очереди кидают две игральные кости до тех пор, пока не получат сумму очков, равную 7. Найдите среднее количество ходов, которое сделает В."}, {"index": 1, "url": null, "content": "В результате эксперимента возможны два исхода: успех (с вероятностью p) и неуспех (с вероятностью 1−p). Экспериментаторы А, В и С по очереди проводят эксперимент до успеха. Найдите максимальное значение p, при котором математическое ожидание количества ходов В больше или равно математическому ожиданию ходов А и математическому ожиданию ходов С."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/middle/9 Напёрстки ва-банк раунды матожидание", "name": "9 Напёрстки ва-банк раунды матожидание", "problems": [{"index": 0, "url": null, "content": "Игрок решил сыграть в напёрстки со ставкой 1 рубль (выиграть можно 2 рубля). Изначально у него 10 рублей, цель — 1000 рублей. Через сколько в среднем раундов игра закончится? Как изменится ответ, если игрок каждый раз будет идти ва-банк (ставить всё, что есть)?"}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[02] Дискретное условное математическое ожидание/senior/14 Дерево ветки груши матожидание", "name": "14 Дерево ветки груши матожидание", "problems": [{"index": 0, "url": null, "content": "Из земли растёт ствол случайного дерева. С вероятностью p ствол расходится на две ветки, а с вероятностью 1−p заканчивается грушей. Каждая из веток также с вероятностью p расходится на две ветки, а с вероятностью 1−p заканчивается грушей, и так далее. Найдите среднее число груш на дереве."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/15 Две точки наибольший отрезок", "name": "15 Две точки наибольший отрезок", "problems": [{"index": 0, "url": null, "content": "Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются две точки X и Y. Найдите математическое ожидание и дисперсию наибольшего отрезка разбиения."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/16 Три точки наибольшее расстояние", "name": "16 Три точки наибольшее расстояние", "problems": [{"index": 0, "url": null, "content": "Пусть на отрезке \\([0;1]\\) равновероятно и независимо выбираются три точки X, Y, Z. Используя условное математическое ожидание, найдите наибольшее расстояние между ними: \\(E[\\max\\{|X - Y|, |Y - Z|, |X - Z|\\}]\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/17 Перестановка неподвижные точки условное", "name": "17 Перестановка неподвижные точки условное", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\sigma\\) — случайная перестановка на n элементах, \\(\\xi\\) — количество неподвижных точек \\(\\sigma\\), \\(A_i\\) — событие, означающее, что i-я точка является неподвижной. Найдите значение условного математического ожидания \\(E[\\xi \\mid \\mathbf{1}\\{A_i\\} = x]\\) при всех возможных значениях x."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/18 Студент монетка подготовка распределение", "name": "18 Студент монетка подготовка распределение", "problems": [{"index": 0, "url": null, "content": "Студент готовится к экзамену ровно час. Сначала бросает монету. Если орёл — готовится полчаса и завершает. Если решка — равномерно на \\([0;1]\\) выбирает число x, готовится x часов, затем снова бросает монету. Если снова орёл — готовится оставшееся время до часа; если решка — прекращает подготовку. Найдите функцию распределения времени подготовки студента и его математическое ожидание."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/junior/19 Авито Пуассон покупки матожидание", "name": "19 Авито Пуассон покупки матожидание", "problems": [{"index": 0, "url": null, "content": "Число пользователей, посещающих Авито с 12:00 до 13:00, является пуассоновской величиной с параметром \\(\\lambda = 100\\). С вероятностью \\(p = 0,15\\) каждый пользователь независимо совершает покупку. Найдите среднее число пользователей, совершающих покупку в течение этого часа."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/20 Показательные максимум сумма матожидание", "name": "20 Показательные максимум сумма матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X_1, X_2, Y_1, Y_2\\) — независимые случайные величины, распределённые экспоненциально с параметрами \\(\\lambda_1, \\lambda_2, \\mu_1, \\mu_2\\) соответственно. Найдите \\(E(\\max(X_1 + Y_1, X_2 + Y_2))\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/21 Показательные максимум Z матожидание", "name": "21 Показательные максимум Z матожидание", "problems": [{"index": 0, "url": null, "content": "Случайные величины X и Y независимы и экспоненциально распределены: X с параметром \\(\\lambda = 1\\), Y с параметром \\(\\lambda = 2\\). Пусть \\(Z = \\max(X, Y)\\). Найдите математическое ожидание Z."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/22 Три части меньший матожидание", "name": "22 Три части меньший матожидание", "problems": [{"index": 0, "url": null, "content": "Отрезок \\([0, 1]\\) разбит двумя случайными точками на три части. Найдите математическое ожидание длины наименьшей из частей."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/middle/24 Треугольное условное нормальное матожидание", "name": "24 Треугольное условное нормальное матожидание", "problems": [{"index": 0, "url": null, "content": "Случайная величина X имеет симметричное треугольное распределение на отрезке \\([-2, 2]\\), а условное распределение \\(Y|X\\) задаётся следующим образом: \\(Y|X\\) распределено равномерно на \\([0; |X|]\\) при \\(X < 1\\), и \\(Y|X \\sim N(3, X)\\) при \\(X > 1\\) (нормальное распределение со средним 3 и дисперсией X). Найдите математическое ожидание Y."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/senior/23 Минимум максимум ковариация доказательство", "name": "23 Минимум максимум ковариация доказательство", "problems": [{"index": 0, "url": null, "content": "Пусть \\(\\xi_1\\) и \\(\\xi_2\\) — независимые случайные величины, обе равномерно распределены на \\((0;1)\\). Рассмотрим \\(\\eta_1 = \\min(\\xi_1, \\xi_2)\\) и \\(\\eta_2 = \\max(\\xi_1, \\xi_2)\\). Докажите, что \\(M\\left[\\frac{\\eta_1}{\\eta_2}\\right] = \\frac{M[\\eta_1]}{M[\\eta_2]} = \\frac{1}{2}\\)."}, {"index": 1, "url": null, "content": "Найдите \\(\\mathrm{cov}(\\eta_1; \\eta_2)\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/senior/25 Пуассон показательные ковариация матожидание", "name": "25 Пуассон показательные ковариация матожидание", "problems": [{"index": 0, "url": null, "content": "Пусть задана последовательность независимых случайных величин \\(\\xi_n\\) с экспоненциальным распределением с параметром n+1, а \\(\\eta\\) — независимая от них пуассоновская случайная величина с параметром \\(\\lambda\\). Найдите такую случайную величину \\(\\xi\\) (или докажите, что такой не существует), зависящую от \\(\\xi_1, \\ldots, \\xi_n, \\ldots\\), ковариация которой с \\(\\eta\\) не равна нулю."}, {"index": 1, "url": null, "content": "Вычислите \\(E[\\xi\\eta]\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/senior/26 Нормальный вектор функция минимизация", "name": "26 Нормальный вектор функция минимизация", "problems": [{"index": 0, "url": null, "content": "Известно, что случайный вектор \\((X, Y)\\) распределён нормально: \\((X, Y) \\sim N\\left(\\begin{pmatrix}1\\\\2\\end{pmatrix}, \\begin{pmatrix}1 & 1\\\\1 & 2\\end{pmatrix}\\right)\\). Найдите измеримую функцию \\(g(x)\\), минимизирующую математическое ожидание \\(E(24Y^4 + (g(X))^2 + 2g(X)Y^2 + 4)\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[03] Непрерывное условное математическое ожидание/senior/27 Параллелограмм две точки расстояние", "name": "27 Параллелограмм две точки расстояние", "problems": [{"index": 0, "url": null, "content": "На параллелограмм со сторонами a и b случайно бросаются две точки. Найдите математическое ожидание квадрата расстояния между ними."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[04] Условное распредление/junior/28 Точки окружность дуга наименьшая", "name": "28 Точки окружность дуга наименьшая", "problems": [{"index": 0, "url": null, "content": "Точки \\(\\xi_1, \\ldots, \\xi_n\\) независимы и имеют равномерное распределение на окружности единичной длины. Найдите вероятность того, что длина наименьшей дуги, содержащей все эти точки, не больше 1/2."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[04] Условное распредление/junior/29 Три точки круг треугольник", "name": "29 Три точки круг треугольник", "problems": [{"index": 0, "url": null, "content": "На границу круга единичного радиуса бросают три точки \\(\\xi_1, \\xi_2, \\xi_3\\). Затем внутрь круга случайно бросают точку X. Найдите вероятность того, что X попала в треугольник, образованный точками \\(\\xi_1, \\xi_2, \\xi_3\\)."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[04] Условное распредление/junior/30 Квадрат прямоугольники вложение пять", "name": "30 Квадрат прямоугольники вложение пять", "problems": [{"index": 0, "url": null, "content": "В квадрат со стороной 5 случайным образом бросают прямоугольник (стороны параллельны сторонам квадрата). Прямоугольник задаётся двумя парами точек; все 4 точки задаются независимо из равномерного распределения на \\([0; 5]\\). Найдите вероятность события S — что после 5 бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[04] Условное распредление/middle/31 Квадрат прямоугольники площадь вложение", "name": "31 Квадрат прямоугольники площадь вложение", "problems": [{"index": 0, "url": null, "content": "В квадрат со стороной 5 случайным образом бросают прямоугольник (стороны параллельны; вероятность прямоугольника равна отношению его площади к площади квадрата). Найдите вероятность события S — что после 5 бросков среди выпавших прямоугольников существует такой, в котором лежат все остальные."}]}, {"id": "courses/mathematics/probability/[26] 25-12-24 Условное распределение 102/[04] Условное распредление/middle/32 Квадрат окружность разбиение площадь", "name": "32 Квадрат окружность разбиение площадь", "problems": [{"index": 0, "url": null, "content": "В квадрате со стороной 1 равномерно выбирается точка и проводится вертикальная прямая. В получившейся фигуре \\(F_1\\) наибольшей площади снова равномерно выбирают точку,  "url": null, "content": "Пусть \\(A_{1},A_{2},\\ldots,A_{n}\\) — конечные множества и \\(a_{ij}=|A_{i}\\bigcap A_{j}|\\).\nДокажите, что матрица \\((a_{ij})_{i=1,2,\\ldots,n}^{j=1,2,\\ldots,n}\\) неотрицательно определена.\n\nHint: https://shadhelper.notion.site/1f13e92cc2eb42a696cd16f21b108922"}]}, {"id": "ysda/2012/Математический анализ/Интегралы/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Вычислите \\(\\int \\limits_0^{2\\pi} (\\sin x)^8 dx\\).\n\nHint: https://shadhelper.notion.site/88e4d9933a1b45e0b7c8a6199b0508cb"}]}, {"id": "ysda/2012/Математический анализ/Интегралы/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Вычислите интеграл \\(\\int \\frac{1}{\\sqrt{1+e^x}} dx\\).\n\nHint: https://shadhelper.notion.site/dcd91e754ff242ef912fbce218152c0e"}]}, {"id": "ysda/2012/Математический анализ/Производные/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Найти \\(f^{(319)}(0)\\), если \\(f(x) = \\frac{x^2+17}{x^4 - 5x^2+4}\\).\n\nHint: https://shadhelper.notion.site/9a758145111b4328aa9849f25beb93bb"}]}, {"id": "ysda/2012/Математический анализ/Ряды/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Рассмотрим функцию\n\\[\n\\varphi(x) = \\sum_{k=1}^{\\infty} \\dfrac{1}{2^{2[\\log_2 k]}} x^k,\n\\]\nгде квадратные скобки означают целую часть числа. Найдите \\(\\int \\limits_0^1 \\varphi(x) \\varphi'(x) dx\\).\n\nHint: https://shadhelper.notion.site/b46895e3f7dc474b8e3f3dd5d5dc7ba5"}]}, {"id": "ysda/2012/Математический анализ/Теория множеств/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Дано некоторое множество положительных чисел мощности континуум. Докажите, что из него можно выбрать счётное подмножество с бесконечной суммой.\n\nHint: https://shadhelper.notion.site/fa67a06d5fab46598f00423dee851f04"}]}, {"id": "ysda/2012/Математический анализ/Числовые последовательности/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Определим последовательность \\(\\{x_n\\}\\) начальными условиями \\(x_1 = a,\\ x_2 = b\\) и рекуррентной формулой \\(x_{n+1} =\\frac{1}{2} (x_n + x_{n-1})\\). Найдите \\(\\lim_{n\\rightarrow \\infty}x_n\\).\n\nHint: https://shadhelper.notion.site/45e773d96e2d4061a9fdf5423db01dc0"}]}, {"id": "ysda/2012/Теория вероятностей/Комбинаторика/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Сколько способов пройти из \\((0,0,0)\\) в \\((n,2n,3n)\\), если можно делать шаги на \\(+1\\) по любой из осей.\n\nHint: https://shadhelper.notion.site/9c469d0f0862415396aa7d3e50c622df"}]}, {"id": "ysda/2012/Теория вероятностей/Комбинаторика/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Улоф Пальме и Рави Шанкар подбрасывают правильную монетку (вероятность выпадения орла \\(0.5\\)). Улоф подбрасывает её \\(n\\) раз, а Рави — \\(n+1\\). Найдите вероятность того, что у Рави будет больше орлов, чем у Улофа.\n\nHint: https://shadhelper.notion.site/beef965a11da452fb62ce4c540bf7fd0"}]}, {"id": "ysda/2012/Теория вероятностей/Комбинаторика/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Рассмотрим случайную перестановку на \\(n\\) элементах. Докажите, что данные \\(k\\) элементов окажутся в одном цикле с вероятностью \\(\\dfrac{1}{k}\\).\n\nHint: https://shadhelper.notion.site/0016078d0b0a423d8a9cb17d249994d2"}]}, {"id": "ysda/2012/Теория вероятностей/Случайные величины в общем случае/Задача 4 (2)", "name": "Задача 4 (2)", "problems": [{"index": 0, "url": null, "content": "Какую наибольшую дисперсию может иметь случайная величина, принимающая значения на отрезке \\([0,1]\\)?\n\nHint: https://shadhelper.notion.site/e0ddae7f3891485c97d11522379f0076"}]}, {"id": "ysda/2012/Теория вероятностей/Случайные величины в общем случае/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "В равностороннем треугольнике \\(ABC\\) единичной площади выбираем точку \\(M\\). Найти математическое ожидание площади треугольника \\(ABM\\).\n\nHint: https://shadhelper.notion.site/2aff91d3d52c4247bcfe7ca0a6e5c12d"}]}, {"id": "ysda/2012/Теория вероятностей,Алгебра/Комбинаторика,Отображения множеств,Подстановки/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Рассмотрим всевозможные непустые подмножества множества \\(\\{1,\\ldots,n\\}\\). В каждом подмножестве перемножим числа, обратные его элементам. Потом сложим полученные \\(2^n - 1\\) чисел. Найти полученную сумму.\n\nHint: https://shadhelper.notion.site/40fe4384926d4c7d8791c68cbc62d310"}]}, {"id": "ysda/2013/Алгебра/Векторные пространства,Ранг матрицы/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(A\\) размера \\(n\\times n\\), где \\(a_{ij}=(i-j)^{2}\\), \\(i,j=1,\\ldots,n\\). Найдите ранг\nматрицы \\(A\\).\n\nHint: https://shadhelper.notion.site/02d58e63a49e4db491f188b402d28236"}]}, {"id": "ysda/2013/Алгебра/Векторные пространства,Ранг матрицы/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Верно ли, что \\(rankAB=rankBA\\) для любых квадратных матриц \\(A\\) и \\(B\\)?\n\nHint: https://shadhelper.notion.site/70d85ec5bab24580b1255c8ba81dd4d0"}]}, {"id": "ysda/2013/Алгебра/Определители/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Дана матрица \\(M\\) размера \\(n\\times n\\), где \\(m_{ij}=a_{i}a_{j}\\) при \\(i\\neq j\\) и \\(m_{ii}=a_{i}^{2}+k\\).\nНайдите определитель матрицы \\(M\\).\n\nHint: https://shadhelper.notion.site/39142c19875b4f459cdda30a805ea249"}]}, {"id": "ysda/2013/Алгебра/Определители/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Дана матрица из нулей и единиц, причем для каждой строки матрицы\nверно следующее: если в строке есть единицы, то они все идут подряд\n(неразрывной группой из единиц). Докажите, что определитель такой\nматрицы может быть равен только \\(\\pm1\\) или \\(0\\).\n\nHint: https://shadhelper.notion.site/2439aff0c7d74baab5f65f210ff1bd50"}]}, {"id": "ysda/2013/Алгебра/Спектральная теория матриц/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Дан неориентированный непустой граф \\(G\\) без петель. Пронумеруем все его вершины. Матрица смежности графа \\(G\\) с конечным числом вершин \\(n\\) (пронумерованных числами от \\(1\\) до \\(n\\) ) — это квадратная матрица \\(A\\) размера \\(n\\), в которой значение элемента \\(a_{ij}\\) равно числу ребер из \\(i\\)-й вершины графа в \\(j\\)-ю вершину. Докажите, что матрица \\(A\\) имеет отрицательное собственное значение.\n\nHint: https://shadhelper.notion.site/1b32e849f6f74374b93ff52c6cd1d47d"}]}, {"id": "ysda/2013/Алгебра/Спектральная теория матриц/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "У линейного преобразования \\(n\\)-мерного пространства существуют \\(n+1\\) собственных векторов, таких, что любые \\(n\\) из них линейно независимы. Найдите всевозможные матрицы, которые могли бы задавать такое преобразование.\n\nHint: https://shadhelper.notion.site/9f87f1c627f843e5ac4bbea69e67f2da"}]}, {"id": "ysda/2013/Математический анализ/Интегралы/Задача 4 (2)", "name": "Задача 4 (2)", "problems": [{"index": 0, "url": null, "content": "Пусть \\(I_m =\\int_0^{2\\pi} \\cos (x) \\cos(2x) \\ldots \\cos(mx) dx\\). Для каких \\(m\\in [1,10]\\ I_m\\ne 0\\)?\n\nHint: https://shadhelper.notion.site/df0b1a7e6e0c47bbb3ba26c0615180da"}]}, {"id": "ysda/2013/Математический анализ/Интегралы/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Пусть функция \\(f\\) — положительная непрерывная функция на \\(\\mathbb{R}\\), причём \\({\\int_{-\\infty}^{+\\infty}f(x) dx =1}\\). Пусть \\(\\alpha \\in (0,1)\\), а интервал \\([a,b]\\) — это интервал минимальной длины из тех,\nдля которых \\(\\int \\limits_a^b f(x)dx = \\alpha\\). Покажите, что \\(f(a) = f(b)\\).\n\nHint: https://shadhelper.notion.site/02d34f8ae0fc4da8b24cca8fb7d177df"}]}, {"id": "ysda/2013/Математический анализ/Ряды/Задача 1 (2)", "name": "Задача 1 (2)", "problems": [{"index": 0, "url": null, "content": "Рассмотрим функцию\n\\[\n\\varphi(x)=\\sum \\limits_{k=1}^{\\infty}\\dfrac{1}{2^{2[\\log_2 k]}}x^k,\n\\]\nгде квадратные скобки означают целую часть числа. Найдите\n\\[\n\\int \\limits_0^1 \\varphi(x) \\varphi'(x) dx.\n\\]\n\nHint: https://shadhelper.notion.site/b6abd4f5317648c9aaba59b4a888be36"}]}, {"id": "ysda/2013/Математический анализ/Ряды/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найдите\n\\[\n\\prod_{k=1}^{\\infty} \\cos(x2^{-k}).\n\\]\n\nHint: https://shadhelper.notion.site/291dbc4cb2ae4cbca4de466a0af8af31"}]}, {"id": "ysda/2013/Математический анализ/Ряды/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Найдите cумму ряда:\n\\[\n\\sum_{n=1}^{\\infty} \\frac{f(n)}{n(n+1)},\n\\]\nгде \\(f(n)\\) — количество единиц в двоичном представлении числа \\(n\\).\n\nHint: https://shadhelper.notion.site/ea0909c52af7460d986c3aefe23ef867"}]}, {"id": "ysda/2013/Математический анализ/Числовые последовательности/Задача 1 (2)", "name": "Задача 1 (2)", "problems": [{"index": 0, "url": null, "content": "Последовательность \\(\\{x_n\\}_{n=0}^{\\infty}\\) задана рекуррентным соотношением:\n\\[\nx_0 =0,\\quad x_1 = 1,\\quad x_{n+1} =\\frac{ x_n + nx_{n-1}}{n+1}.\n\\]\nПокажите, что данная последовательность имеет предел и найдите её предел.\n\nHint: https://shadhelper.notion.site/d148e51ac1794240921e8950d670daa1"}]}, {"id": "ysda/2013/Математический анализ/Числовые последовательности/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Последовательность \\(\\{a_n\\}_{n=0}^{\\infty}\\) определена рекурсивно:\n\\[\na_0 = 1,\\quad a_{n+1} = \\frac{a_n}{1+ n a_n}.\n\\]\nНайдите формулу общего члена последовательности.\n\nHint: https://shadhelper.notion.site/70965be817f14938a4ea87ac453d6d31"}]}, {"id": "ysda/2013/Математический анализ/Числовые последовательности/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Определим последовательность \\(\\{x_n\\}\\) начальными условиями \\(x_1=a\\), \\(x_2=b\\) и рекуррентной\nформулой \\(x_{n+1}=(x_n+\\,x_{n-1})/2\\). Найдите предел последовательности.\n\nHint: https://shadhelper.notion.site/1afce0cefeae47d589a0aca5776356fc"}]}, {"id": "ysda/2013/Математический анализ,Алгебра/Интегралы,Векторные пространства,Ранг матрицы/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Рассмотрим линейное пространство многочленов над \\(\\mathbb{R}\\) от двух переменных степени не выше \\(2013\\). Рассмотрим его подпространство \\(V\\), образованное всеми многочленами \\(f\\), для которых криволинейный интеграл первого рода\n\\[\n\\oint_{x^2 + y^2 = R^2} f(x,y) ds = 0,\n\\]\nпричём для любого \\(R\\). Найдите размерность подпространства \\(V\\).\n\nHint: https://shadhelper.notion.site/125e5b763b6e41c180a6ac705748f00a"}]}, {"id": "ysda/2013/Теория вероятностей/Геометрические вероятности/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "На единичной окружности с центром в начале координат выбирается случайная точка \\(P\\) (из равномерного распределения). В круге, который ограничивает данная окружность, случайно выбирается точка \\(Q\\) (также из равномерного распределения).\nПусть \\(R\\) — прямоугольник со сторонами, параллельными осям координат и диагональю \\(PQ\\). Какова вероятность того, что прямоугольник целиком лежит в единичном круге.\n\nHint: https://shadhelper.notion.site/cc275758031e46509ef1f9fd11013028"}]}, {"id": "ysda/2013/Теория вероятностей/Геометрические вероятности/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "На окружности случайно выбирается \\(n\\) точек. Найдите вероятность того, что все они принадлежат некоторой полуокружности.\n\nHint: https://shadhelper.notion.site/057806e2270e40889f3ad408ff404972"}]}, {"id": "ysda/2013/Теория вероятностей/Комбинаторика/Задача 2 (2)", "name": "Задача 2 (2)", "problems": [{"index": 0, "url": null, "content": "Улоф Пальме и Рави Шанкар подбрасывают правильную монетку (вероятность выпадения орла \\(0.5\\)). Улоф подбрасывает её \\(n\\) раз, а Рави — \\(n+1\\). Найдите вероятность того, что у Рави будет больше орлов, чем у Улофа.\n\nHint: https://shadhelper.notion.site/cb4f2e995a4e4e29b6cafd74b4b2708a"}]}, {"id": "ysda/2013/Теория вероятностей/Комбинаторика/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Дано множество \\(A = \\{1,\\ldots,n\\}\\). Среди всех его подмножеств равновероятно выбираются \\(k\\) его подмножеств. Найдите вероятность того, что \\(A_1\\cap A_2 \\cap \\ldots A_k = \\emptyset\\).\n\nHint: https://shadhelper.notion.site/7c55f8e92be14e47954ca724545c6377"}]}, {"id": "ysda/2013/Теория вероятностей,Алгебра/Подстановки,Математические ожидания функций случайных величин/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание числа неподвижных точек для случайной перестановки на \\(n\\) элементах.\n\nHint: https://shadhelper.notion.site/72b7bb3388c6468baed81b76425582d1"}]}, {"id": "ysda/2014/Алгебра/Векторные пространства,Ранг матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — невырожденная вещественная матрица \\(n\\times n\\), все элементы которой положительны. Докажите, что число нулей среди элементов матрицы \\(A^{-1}\\) не превосходит \\(n^{2}-2n\\).\n\nHint: https://shadhelper.notion.site/e7cdf55c37634af5b90b8f3cf6e4c9b1"}]}, {"id": "ysda/2014/Алгебра/Векторные пространства,Ранг матрицы/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(9\\times9\\) над полем характеристики, отличной от \\(2\\), такова, что \\(A^{2}=E\\). Найдите ранг матрицы \\(E-A\\), если известно, что ранг матрицы \\(E+A\\) равен \\(7\\).\n\nHint: https://shadhelper.notion.site/82f1fea8a8dc49c3b8f100bbb86890ae"}]}, {"id": "ysda/2014/Алгебра/Матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найти все квадратные вещественные матрицы порядка \\(3\\), удовлетворяющие\nуравнению \\(X^{2}+E=0\\).\n\nHint: https://shadhelper.notion.site/92d9ad6035044e68a681b75ffee3abd0"}]}, {"id": "ysda/2014/Алгебра/Матрицы/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Опишите все невырожденные вещественные матрицы \\(A\\), для которых\nвсе элементы матриц \\(A\\) и \\(A^{-1}\\) неотрицательны.\n\nHint: https://shadhelper.notion.site/aa990b22c576441193053bcc034694c4"}]}, {"id": "ysda/2014/Алгебра/Матрицы/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "При каких натуральных \\(N\\) существует квадратная матрица порядка\n\\(N\\) с элементами \\(0,1\\) такая, что ее квадрат — это матрица из\nодних единиц?\n\nHint: https://shadhelper.notion.site/b2a987e26f5a411197213c88e05eb593"}]}, {"id": "ysda/2014/Алгебра/Определители/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) размера \\(n\\times n\\) строится следующим\nобразом:\n\\[\na_{ij}=\\begin{cases}\n1, & \\text{если}\\:i\\:\\text{делит}\\:j,\\\\\n0, & \\text{иначе}.\n\\end{cases}\n\\]\nВычислите определитель матрицы \\(A\\).\n\nHint: https://shadhelper.notion.site/1fea22c73c4e43b684a514f0576dc2ff"}]}, {"id": "ysda/2014/Алгебра/Определители/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Найдите максимальное значение определителя матрицы (а) второго (б) третьего порядка, если сумма квадратов всех ее элементов не превосходит \\(1\\).\n\nHint: https://shadhelper.notion.site/428cf27aa0a44474aeb71927a59aef33"}]}, {"id": "ysda/2014/Алгебра/Спектральная теория матриц/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) — квадратная матрица, у которой сумма матричных элементов в каждом столбце равна \\(\\lambda\\). Докажите, что \\(\\lambda\\) является собственным значением матрицы \\(A\\).\n\nHint: https://shadhelper.notion.site/3b4ebe0eb2704ca482d4e8cd12c3ac1f"}]}, {"id": "ysda/2014/Алгебра/Спектральная теория матриц/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — квадратичные матрицы размера \\(2\\times2\\). Рассмотрим линейный оператор \\(F\\) на пространстве матриц \\(2\\times2\\), действующий по правилу \\(F(M)=AMB\\). Матрица \\(A\\) имеет \\(2\\) различных собственных значения \\(\\lambda_{1}\\) и \\(\\lambda_{2}\\), а \\(B\\) — \\(2\\) различных собственных значения \\(\\mu_{1}\\) и \\(\\mu_{2}\\). Найдите собственные значения оператора \\(F\\), если\n(а) матрицы \\(A\\) и \\(B\\) — диагональные; (б) матрицы \\(A\\) и \\(B\\) — произвольные.\n\nHint: https://shadhelper.notion.site/9a8ba4d5b53f4bed9e7b9d8fca0e922b"}]}, {"id": "ysda/2014/Математический анализ/Интегралы/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Найдите интеграл:\n\\[\n\\int \\limits_{-\\frac{\\pi}{2}}^{\\frac{\\pi}{2}} \\frac{\\sin^{2014}x}{\\sin^{2014}x+\\cos^{2014}x} dx.\n\\]\n\nHint: https://shadhelper.notion.site/c79727347a984957b4dffcdb736b5fd2"}]}, {"id": "ysda/2014/Математический анализ/Интегралы/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Найдите предел\n\\[\n\\lim_{\\lambda\\to0+} \\frac{1}{\\ln \\lambda} \\int \\limits_\\lambda^a \\frac{\\cos x}{x} dx.\n\\]\n\nHint: https://shadhelper.notion.site/e4381ae64bb34b31a8e29a4b07397608"}]}, {"id": "ysda/2014/Математический анализ/Интегралы/Задача 6 (2)", "name": "Задача 6 (2)", "problems": [{"index": 0, "url": null, "content": "Вычислите сумму интегралов:\n\\[\n\\int \\limits_{\\sqrt{\\pi/6}}^{\\sqrt{\\pi/3}} \\sin(x^2) dx + \\int \\limits_{1/2}^{\\sqrt{3}/2} \\sqrt{\\mathrm{arcsin}\\ x} dx.\n\\]\n\nHint: https://shadhelper.notion.site/f61972e6498847268b078b76360d1d26"}]}, {"id": "ysda/2014/Математический анализ/Интегралы/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Вычислите интеграл\n\\[\n\\int e^{e^x+ 2014 x} dx.\n\\]\n\nHint: https://shadhelper.notion.site/23e006b5b1734850b1926cbc448a9db4"}]}, {"id": "ysda/2014/Математический анализ/Непрерывные функции/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть функция \\(f\\) непрерывна и ограничена на промежутке \\((0,+\\infty)\\). Докажите, что для любого числа \\(T\\) существует последовательность \\(\\{x_n\\}\\), стремящаяся к \\(+\\infty\\) и такая, что \\(f(x_n+T) - f(x_n) \\to 0\\) при \\(n \\to \\infty\\).\n\nHint: https://shadhelper.notion.site/0d253e2855624028b54854826e44fb46"}]}, {"id": "ysda/2014/Математический анализ/Разное/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Найдите минимум и максимум функции\n\\[\nf(x,y) = x^2+y^2-12x+16y\n\\]\nна круге \\(x^2+y^2\\leqslant 5^2\\).\nь\n\nHint: https://shadhelper.notion.site/1b56029954914c9bae5c9d60c57c0db9"}]}, {"id": "ysda/2014/Математический анализ/Ряды/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Найдите сумму ряда\n\\[\n\\sum_{n=1}^{\\infty} \\frac{2^n}{n!}.\n\\]\n\nHint: https://shadhelper.notion.site/fc3b7477fb9345b9bcdfbe51450f708b"}]}, {"id": "ysda/2014/Математический анализ/Ряды/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Пусть \\(a\\) — действительное число. Для каждого целого \\(n\\geqslant 0\\) обозначим через \\(a_n\\) расстояние от \\(a\\) до ближайшего рационального числа вида \\(\\dfrac{m}{2^n}\\), где \\(m\\) — целое.\nНайдите наибольшую возможную сумму ряда \\(\\sum \\limits_{n=0}^{\\infty} a_n\\).\n\nHint: https://shadhelper.notion.site/49f13e109f9942ea9e401b2eaf786c54"}]}, {"id": "ysda/2014/Математический анализ/Теория множеств/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Пусть \\(M\\subset \\mathbb{R}\\) — множество из \\(n\\) элементов. Пусть, далее,\n\\[\nS_M = \\left\\{ \\frac{x+y}{2}| x,y \\in M,\\ x\\ne y \\right\\}.\n\\]\nНайдите наименьшую возможную мощность множества \\(S_M\\) (одинаковые элементы множества считаются одним элементов).\n\nHint: https://shadhelper.notion.site/107f88bbdf214434aa75b769306c048f"}]}, {"id": "ysda/2014/Математический анализ/Числовые последовательности/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Найдите предел последовательности \\((c_n)\\), определяемой рекуррентным соотношением \\(c_{n+1} = (1 - \\frac{1}{n})c_n + \\beta_n\\), где \\((\\beta_n)\\) — любая последовательность со свойством \\(n^2 \\beta_n \\to 0\\) при \\(n\\to 0\\).\n\nHint: https://shadhelper.notion.site/ed9bc6283efb4e25a7b17d03aa480ce5"}]}, {"id": "ysda/2014/Теория вероятностей/Геометрические вероятности/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Стержень длины \\(L\\) произвольным образом разламывают на две части и выбрасывают меньшую часть. Затем оставшуюся часть ломают и снова выбрасывают меньшую часть.\nНайдите вероятность того, что длина оставшейся части не меньше \\(L/2\\).\n\nHint: https://shadhelper.notion.site/97f4d8be543b43d48eaffa6ab6326093"}]}, {"id": "ysda/2014/Теория вероятностей/Геометрические вероятности/Задача 2 (2)", "name": "Задача 2 (2)", "problems": [{"index": 0, "url": null, "content": "На окружности выбираются \\(3\\) случайных точки. С какой вероятностью центр окружности лежит внутри треугольника с вершинами в этих точках?\n\nHint: https://shadhelper.notion.site/71c40e06dc434f46873deeab7086565c"}]}, {"id": "ysda/2014/Теория вероятностей/Геометрические вероятности/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "На плоскости зафиксированы две точки \\(A\\) и \\(B\\) на расстоянии \\(2\\). Пусть \\(C\\) — случайно выбранная точка круга радиуса \\(R\\) с центром в середине отрезка \\(AB\\).\nС какой вероятностью треугольник \\(ABC\\) будет тупоугольным?\n\nHint: https://shadhelper.notion.site/6ff0aa9f14b346d9a02f30a9d120a9f5"}]}, {"id": "ysda/2014/Теория вероятностей/Дискретные случайные величины/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "Игральную кость с \\(n\\) гранями (и числами от \\(1\\) до \\(n\\) на этих гранях) подбрасывают до тех пор, пока сумма выпавших очков не станет больше либо равна \\(n\\). Все грани кости выпадают с одинаковой вероятностью. Найдите математическое ожидание числа бросков.\n\nHint: https://shadhelper.notion.site/1652f271cf2141e396ba2867c43b3bac"}]}, {"id": "ysda/2014/Теория вероятностей/Комбинаторика,Случайные блуждания/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Игра состоит из одинаковых и независимых конов, в каждом из которых выигрыш происходит с вероятностью \\(p\\). Когда игрок выигрывает, он получает \\(1\\) доллар, а когда проигрывает —платит \\(1\\) доллар. Как только его капитал достигает величины \\(N\\) долларов, он объявляется победителем и удаляется из казино. Найдите вероятность того, что игрок рано или поздно проиграет все деньги, в зависимости от его стартового капитала \\(K\\).\n\nHint: https://shadhelper.notion.site/c63c04e47b104b138d2eec2f25214016"}]}, {"id": "ysda/2014/Теория вероятностей/Случайные блуждания/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Когда студент пришёл в аудиторию, на доске было написано число \\(0\\). В ожидании лекции студент подкидывает монетку и, если выпадает орёл, он прибавляет \\(1\\), а если решка — то вычитает. Орёл и решка выпадают с одинаковой вероятностью. Найдите вероятность того, что на момент после \\((2n+1)\\)-го подбрасывания число на доске сменило знак (с положительного на отрицательный или наоборот) а) ровно \\(n\\) раз; б) ни разу.\n\nHint: https://shadhelper.notion.site/91f00556358445dca4eb18b14204a0ee"}]}, {"id": "ysda/2014/Теория вероятностей/Случайные величины в общем случае/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Отрезок \\([0,1]\\) разбит двумя случайными точками на три части. Найдите математическое ожидание длины меньшей из частей.\n\nHint: https://shadhelper.notion.site/21c1d0d135064f2dba74adccdd215bfe"}]}, {"id": "ysda/2014/Теория вероятностей,Дискретная математика/Комбинаторика/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Сколько \\(2014\\)-значных чисел, составленных из цифр \\(1,3,4,6,7,9\\) делятся на \\(7\\).\n\nHint: https://shadhelper.notion.site/9678e15e32914258b5fdf396e8dd6abc"}]}, {"id": "ysda/2015/Алгебра/Векторные пространства,Ранг матрицы/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Квадратная матрица \\(A\\) такова, что \\(tr(AX)=0\\) для любой матрицы \\(X\\), имеющей нулевой след. Докажите, что матрица \\(A\\) является скалярной (то есть имеет вид \\(\\lambda E\\) для некоторого скаляра \\(\\lambda\\)).\n\nHint: https://shadhelper.notion.site/05dc7bd441f94388a54e3c5ffbb3eecd"}]}, {"id": "ysda/2015/Алгебра/Матрицы/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Пусть \\(X\\) и \\(Y\\) — квадратные матрицы одинакового размера,\nпричем \\(XY=\\lambda X+\\mu Y\\) для некоторых \\(\\lambda,\\mu\\neq0\\). Докажите,\nчто матрицы \\(X\\) и \\(Y\\) коммутируют.\n\nHint: https://shadhelper.notion.site/57d15ff8b9794af0bdfdf90158c64115"}]}, {"id": "ysda/2015/Алгебра/Определители/Задача 4", "name": "Задача 4", "problems": [{"index": 0, "url": null, "content": "Найдите определитель матрицы \\(A=(a_{ij})\\), где \\(a_{ij}=C_{i+j-2}^{i-1}\\).\n\nHint: https://shadhelper.notion.site/7b8503aa7e83404eb453a3789ee50fd2"}]}, {"id": "ysda/2015/Алгебра/Определители/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Пусть \\(A\\) и \\(B\\) — квадратные вещественные матрицы одного и того же размера.\nДокажите, что \\(det(E-AB)=det(E-BA)\\).\n\nHint: https://shadhelper.notion.site/f08bc1ec7b87446abf74ae675287820f"}]}, {"id": "ysda/2015/Алгебра/Спектральная теория матриц/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Найдите собственные значения матрицы \\(vv^{T}\\), где \\(v\\) — некоторый вектор-столбец.\n\nHint: https://shadhelper.notion.site/9a314cdde881420fbe3bb8a369cee8b3"}]}, {"id": "ysda/2015/Алгебра/Спектральная теория матриц/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Дима и Ваня по очереди вписывают элементы в квадратную матрицу порядка \\(2n\\) . Цель Вани — сделать так, чтобы получившаяся в итоге матрица имела собственное значение \\(1\\), а цель Димы — помешать ему. Дима ходит первым. Есть ли у кого-нибудь из них выигрышная стратегия?\n\nHint: https://shadhelper.notion.site/5be9070427e7482ba5fcb43f9330c537"}]}, {"id": "ysda/2015/Математический анализ/Интегралы/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "Пусть \\(f\\) — дифференцируемая функция, причём \\(f(0)=0\\) и \\(0<f'(x)\\leqslant 1\\). Докажите, что для всех \\(x\\geqslant 0\\) имеет место неравенство\n\\[\n\\int \\limits_0^x f^3(t) dt \\leqslant \\left(\\int \\limits_0^x f(t) dt\\right)^2.\n\\]\n\nHint: https://shadhelper.notion.site/9d8620caab324fdfabb3ac8acb2aa0c5"}]}, {"id": "ysda/2015/Математический анализ/Интегралы/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Вычислите интеграл\n\\[\n\\int \\limits_{\\frac{1}{3}}^3 \\frac{\\mathrm{arctg}x}{x^2 - x +1} dx.\n\\]\n\nHint: https://shadhelper.notion.site/7b67f09ca70e4a2aac0ef6b6c1ac20c4"}]}, {"id": "ysda/2015/Математический анализ/Предел функций/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Постройте график функции\n\\[\nf(x) = \\lim_{n\\to \\infty}\\sqrt[n]{1+x^n + \\left(\\frac{x^2}{2}\\right)^n},\\ x\\geqslant 0.\n\\]\n\nHint: https://shadhelper.notion.site/743df7491b4e47a1b51deb5ec97d3239"}]}, {"id": "ysda/2015/Математический анализ/Ряды/Задача 5", "name": "Задача 5", "problems": [{"index": 0, "url": null, "content": "Исследуйте на сходимость и абсолютную сходимость ряд:\n\\[\n\\sum_{k=1}^{\\infty} \\sin \\left(\\pi \\sqrt{k^2+1} \\right).\n\\]\n\nHint: https://shadhelper.notion.site/f572bf39fd7b448f84c2d882ff4317bf"}]}, {"id": "ysda/2015/Математический анализ/Числовые последовательности/Задача 1", "name": "Задача 1", "problems": [{"index": 0, "url": null, "content": "Найдите предел последовательности \\((a_n)\\), для которой \\(a_0=-\\frac{1}{2}\\), \\(a_{n+1} = \\frac{a_n^2(a_n -3)}{4}\\).\n\nHint: https://shadhelper.notion.site/0fb6e94a4dd2455a892eca7eb88b07f4"}]}, {"id": "ysda/2015/Теория вероятностей/Геометрические вероятности/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "На плоскости, однородно покрытой прямоугольниками со сторонами \\(10\\) и \\(20\\), рисуют случайную окружность радиуса \\(4\\). Найдите вероятность того, что окружность имеет общие точки ровно с тремя прямоугольниками.\n\nHint: https://shadhelper.notion.site/afa601e84b92448c8b5838196c06760a"}]}, {"id": "ysda/2015/Теория вероятностей/Геометрические вероятности/Задача 8", "name": "Задача 8", "problems": [{"index": 0, "url": null, "content": "На сфере случайным образом выбираются четыре точки \\(A,B,C,D\\). С какой вероятностью кратчайшие дуги \\(AB\\) и \\(CD\\) пересекаются?\n\nHint: https://shadhelper.notion.site/8182432546dd47db8977ad338b364e3f"}]}, {"id": "ysda/2015/Теория вероятностей/Дискретные случайные величины/Задача 2", "name": "Задача 2", "problems": [{"index": 0, "url": null, "content": "Рассмотрим случайную перестановку \\(P = (p_1,\\ldots,p_n)\\) натуральных чисел от \\(1\\) до \\(n\\). Пару чисел \\((i,j)\\) назовём \"обменом'', если выполняются соотношения \\(p_i = j\\) и \\(p_j = i\\). Вычислите математическое ожидание количества обменов в перестановке \\(P\\) (перестановка выбирается случайно равновероятно из множества всех перестановок от \\(1\\) до \\(n\\)).\n\nHint: https://shadhelper.notion.site/583c14204cc74f9a9b60efbb83517080"}]}, {"id": "ysda/2015/Теория вероятностей/Дискретные случайные величины/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Найдите математическое ожидание числа неподвижных точек подстановки на \\(n\\) элементах.\n\nHint: https://shadhelper.notion.site/ef64943ee92a4e22b1bdc69d3b595caa"}]}, {"id": "ysda/2015/Теория вероятностей/Комбинаторика/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "Докажите, что для любого неотрицательного целого \\(n\\) существуют целые числа \\(x\\), \\(y\\) и \\(z\\) \\({(0\\leqslant x<y<z)}\\) такие, что выполняется соотношение:\n\\[\nn = C_x^1 + C_y^2 + C_z^3.\n\\]\n\nHint: https://shadhelper.notion.site/48f5f4983f0448c880917d865452b824"}]}, {"id": "ysda/2015/Теория вероятностей/Комбинаторика/Задача 6", "name": "Задача 6", "problems": [{"index": 0, "url": null, "content": "У вас имеется неограниченное число костей в форме всех возможных правильных многогранников. Можно ли, однократно бросив некоторый набор таких костей, симулировать бросок а) правильной семигранной кости б) правильной 15-гранной кости.\n\nHint: https://shadhelper.notion.site/ca38a910d2cf4e28bf83a3426bd4abb6"}]}, {"id": "ysda/2015/Теория вероятностей/Комбинаторика/Задача 7", "name": "Задача 7", "problems": [{"index": 0, "url": null, "content": "Для произвольных \\(n\\), \\(m\\) вычислите сумму:\n\\[\n\\sum_{i=0}^n \\frac{1}{2^{m+i+1}} C_{m+i}^i + \\sum_{i=0}^m \\frac{1}{2^{n+i+1}} C_{n+i}^i.\n\\]\n\nHint: https://shadhelper.notion.site/66f33a7497f944c69a9e1bb02633cdc4"}]}, {"id": "ysda/2015/Теория вероятностей/Случайные величины в общем случае/Задача 3", "name": "Задача 3", "problems": [{"index": 0, "url": null, "content": "На окружности выбираются две случайные точки \\(A\\) и \\(B\\). Найдите математическое ожидание площади меньшего из сегментов, на которые
